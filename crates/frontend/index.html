<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus</title>

    <!-- Favicons - copy all icons -->
    <link data-trunk rel="copy-file" href="favicon.png" />
    <link data-trunk rel="copy-file" href="imgs/asterisk.png" />
    <link data-trunk rel="copy-file" href="imgs/exposure_plus_1.png" />
    <link data-trunk rel="copy-file" href="imgs/exposure_plus_2.png" />
    <link data-trunk rel="copy-file" href="imgs/function.png" />
    <link data-trunk rel="copy-file" href="imgs/functions.png" />
    <link data-trunk rel="copy-file" href="imgs/percent.png" />
    <link id="favicon" rel="icon" type="image/png" href="/favicon.png" />

    <!-- KaTeX for math rendering (static content) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- jQuery (required by MathQuill) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- MathQuill for interactive math input -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.css">
    <script src="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.js"></script>

    <!-- Nerdamer for symbolic math and LaTeX conversion -->
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Prevent flash of wrong theme -->
    <script>
      if (localStorage.getItem('theme') === 'dark' ||
          (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }
        .katex { font-size: 1.1em; }
        .math-input {
            font-family: 'Monaco', 'Consolas', monospace;
        }

        /* MathQuill styling */
        .mq-editable-field {
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 18px;
            min-height: 48px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            outline: none;
        }
        .mq-editable-field.mq-focused {
            border-color: #1f2937;
            box-shadow: 0 0 0 1px #1f2937;
        }

        /* === Dark mode centralized overrides === */

        /* Body defaults */
        .dark body,
        .dark .bg-white { background-color: #030712; }
        .dark body { color: #f3f4f6; }
        .dark .bg-gray-50 { background-color: #111827; }
        .dark .bg-gray-100 { background-color: #1f2937; }

        /* Text */
        .dark .text-gray-900 { color: #f3f4f6; }
        .dark .text-gray-700 { color: #d1d5db; }
        .dark .text-gray-600 { color: #9ca3af; }
        .dark .text-gray-500 { color: #9ca3af; }

        /* Borders */
        .dark .border-b,
        .dark .border-gray-200,
        .dark .border-gray-100 { border-color: #1f2937; }
        .dark .border-gray-300 { border-color: #374151; }
        .dark .divide-gray-100 > * + * { border-color: #1f2937; }

        /* Hover states */
        .dark .hover\:bg-gray-50:hover { background-color: #111827; }
        .dark .hover\:text-gray-600:hover { color: #d1d5db; }
        .dark .hover\:text-gray-900:hover { color: #f3f4f6; }
        .dark .hover\:text-gray-700:hover { color: #d1d5db; }
        .dark .hover\:border-gray-400:hover { border-color: #6b7280; }

        /* Focus states */
        .dark .focus\:border-gray-900:focus { border-color: #9ca3af; }

        /* Form elements */
        .dark input, .dark select, .dark textarea {
            background-color: #111827;
            color: #f3f4f6;
            border-color: #374151;
        }
        .dark input::placeholder { color: #6b7280; }

        /* Alert backgrounds */
        .dark .bg-red-50 { background-color: #450a0a; }
        .dark .bg-green-50 { background-color: #052e16; }
        .dark .bg-blue-50 { background-color: #172554; }

        /* Alert borders */
        .dark .border-red-200 { border-color: #991b1b; }
        .dark .border-green-200 { border-color: #166534; }
        .dark .border-blue-200 { border-color: #1e40af; }

        /* Alert text */
        .dark .text-red-700 { color: #f87171; }
        .dark .text-red-900 { color: #fecaca; }
        .dark .text-green-700 { color: #4ade80; }
        .dark .text-blue-900 { color: #93bbfd; }
        .dark .text-blue-800 { color: #93bbfd; }

        /* MathQuill dark mode */
        .dark .mq-editable-field {
            background: #111827;
            color: #f3f4f6;
            border-color: #374151;
        }
        .dark .mq-editable-field.mq-focused {
            border-color: #9ca3af;
            box-shadow: 0 0 0 1px #9ca3af;
        }
        .dark .mq-editable-field .mq-cursor {
            border-color: #e5e7eb;
        }
        .dark .mq-editable-field .mq-root-block,
        .dark .mq-editable-field .mq-math-mode {
            color: #f3f4f6;
        }

        /* KaTeX */
        .dark .katex,
        .dark .katex .mord,
        .dark .katex .mbin,
        .dark .katex .mrel,
        .dark .katex .mopen,
        .dark .katex .mclose,
        .dark .katex .mpunct,
        .dark .katex .mop { color: #f3f4f6 !important; }

        /* Danger zone */
        .dark .border-red-200.border-2 { border-color: #991b1b; }

        /* Whiteboard canvas — Fabric.js generates .canvas-container wrapping the <canvas> */
        .canvas-container { position: absolute !important; inset: 0; z-index: 0; }
    </style>

    <link data-trunk rel="rust" data-wasm-opt="z" />

    <!-- Random favicon selector -->
    <script>
        (function() {
            const favicons = [
                '/favicon.png',
                '/asterisk.png',
                '/exposure_plus_1.png',
                '/exposure_plus_2.png',
                '/function.png',
                '/functions.png',
                '/percent.png'
            ];

            // Pick a random favicon
            const randomFavicon = favicons[Math.floor(Math.random() * favicons.length)];

            // Add cache-busting timestamp
            const cacheBuster = '?v=' + Date.now();

            // Update favicon immediately
            const faviconLink = document.getElementById('favicon');
            if (faviconLink) {
                faviconLink.href = randomFavicon + cacheBuster;
            }
        })();
    </script>
</head>
<body class="bg-white min-h-screen">
    <div id="app"></div>

    <script>
        // Render KaTeX for static content (problem questions)
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderMathInElement !== 'undefined') {
                // Only run once on initial load for static content
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });

                // Set up a MutationObserver for new static content only
                const observer = new MutationObserver(() => {
                    requestAnimationFrame(() => {
                        renderMathInElement(document.body, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    });
                });

                observer.observe(document.body, {
                    childList: true,
                    subtree: true
                });
            }
        });
    </script>
</body>
</html>
