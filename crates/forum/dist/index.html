<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus Forum</title>

    <!-- Tailwind CSS (matches main frontend) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Prevent flash of wrong theme (shares localStorage with main app) -->
    <script>
      if (localStorage.getItem('theme') === 'dark' ||
          (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        /* === Dark mode overrides (same as main frontend) === */
        .dark body,
        .dark .bg-white { background-color: #030712; }
        .dark body { color: #f3f4f6; }
        .dark .bg-gray-50 { background-color: #111827; }
        .dark .bg-gray-100 { background-color: #1f2937; }

        .dark .text-gray-900 { color: #f3f4f6; }
        .dark .text-gray-700 { color: #d1d5db; }
        .dark .text-gray-600 { color: #9ca3af; }
        .dark .text-gray-500 { color: #9ca3af; }
        .dark .text-gray-400 { color: #6b7280; }

        .dark .border-b,
        .dark .border-gray-200,
        .dark .border-gray-100 { border-color: #1f2937; }
        .dark .border-gray-300 { border-color: #374151; }

        .dark .hover\:bg-gray-50:hover { background-color: #111827; }
        .dark .hover\:text-gray-600:hover { color: #d1d5db; }
        .dark .hover\:text-gray-700:hover { color: #d1d5db; }
        .dark .hover\:text-gray-900:hover { color: #f3f4f6; }
        .dark .hover\:bg-gray-800:hover { background-color: #1f2937; }

        .dark .focus\:border-gray-900:focus { border-color: #9ca3af; }

        .dark input, .dark select, .dark textarea {
            background-color: #111827;
            color: #f3f4f6;
            border-color: #374151;
        }
        .dark input::placeholder { color: #6b7280; }

        .dark .bg-red-50 { background-color: #450a0a; }
        .dark .bg-green-50 { background-color: #052e16; }
        .dark .border-red-200 { border-color: #991b1b; }
        .dark .border-green-200 { border-color: #166534; }
        .dark .text-red-600 { color: #f87171; }
        .dark .text-red-700 { color: #f87171; }
        .dark .text-green-700 { color: #4ade80; }

        .dark .divide-gray-100 > * + * { border-color: #1f2937; }
    </style>

    
<script type="module">
import init, * as bindings from '/locus-forum-5186f44a426870b3.js';
const wasm = await init({ module_or_path: '/locus-forum-5186f44a426870b3_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>

<link rel="modulepreload" href="/locus-forum-5186f44a426870b3.js" crossorigin="anonymous" integrity="sha384-y4ow7hdStXCjJGCa7FKx9+So/JO6p+XFmiBpTuRAGVGW53LkPmBuTropZ4/JYylc"><link rel="preload" href="/locus-forum-5186f44a426870b3_bg.wasm" crossorigin="anonymous" integrity="sha384-ACA84vB6XiPRkILBAfB69eJPMCK/5Qs7x/ytxb2bc4aShstoP12IIcp1Iqy/KlHt" as="fetch" type="application/wasm"></head>
<body class="bg-white min-h-screen">
<script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
