<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus Forum</title>

    <!-- Tailwind CSS (matches main frontend) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Prevent flash of wrong theme (shares localStorage with main app) -->
    <script>
      if (localStorage.getItem('theme') === 'dark' ||
          (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        /* === Dark mode overrides (same as main frontend) === */
        .dark body,
        .dark .bg-white { background-color: #030712; }
        .dark body { color: #f3f4f6; }
        .dark .bg-gray-50 { background-color: #111827; }
        .dark .bg-gray-100 { background-color: #1f2937; }

        .dark .text-gray-900 { color: #f3f4f6; }
        .dark .text-gray-700 { color: #d1d5db; }
        .dark .text-gray-600 { color: #9ca3af; }
        .dark .text-gray-500 { color: #9ca3af; }
        .dark .text-gray-400 { color: #6b7280; }

        .dark .border-b,
        .dark .border-gray-200,
        .dark .border-gray-100 { border-color: #1f2937; }
        .dark .border-gray-300 { border-color: #374151; }

        .dark .hover\:bg-gray-50:hover { background-color: #111827; }
        .dark .hover\:text-gray-600:hover { color: #d1d5db; }
        .dark .hover\:text-gray-700:hover { color: #d1d5db; }
        .dark .hover\:text-gray-900:hover { color: #f3f4f6; }
        .dark .hover\:bg-gray-800:hover { background-color: #1f2937; }

        .dark .focus\:border-gray-900:focus { border-color: #9ca3af; }

        .dark input, .dark select, .dark textarea {
            background-color: #111827;
            color: #f3f4f6;
            border-color: #374151;
        }
        .dark input::placeholder { color: #6b7280; }

        .dark .bg-red-50 { background-color: #450a0a; }
        .dark .bg-green-50 { background-color: #052e16; }
        .dark .border-red-200 { border-color: #991b1b; }
        .dark .border-green-200 { border-color: #166534; }
        .dark .text-red-600 { color: #f87171; }
        .dark .text-red-700 { color: #f87171; }
        .dark .text-green-700 { color: #4ade80; }

        .dark .divide-gray-100 > * + * { border-color: #1f2937; }
    </style>

    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="css" href="style.css" />
</head>
<body class="bg-white min-h-screen">
</body>
</html>
