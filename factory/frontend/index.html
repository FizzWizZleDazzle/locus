<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locus Factory</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="factory.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <h1>Locus Factory</h1>
    <span>v2.0</span>
  </div>
  <div class="header-right">
    <div class="badge" id="stagedBadge">0 staged</div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel" class="mono" style="font-size:10px;color:var(--text-muted)">...</span>
    </div>
  </div>
</header>

<!-- Tabs -->
<nav class="tabs">
  <div class="tab active" data-tab="config">Config</div>
  <div class="tab" data-tab="generate">Generate</div>
  <div class="tab" data-tab="review">Review</div>
</nav>

<!-- Main Layout -->
<div class="container">
  <!-- Sidebar: Script Library -->
  <aside class="sidebar">
    <div class="section-title mono" style="font-size:9px;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Scripts</div>
    <div id="scriptList" class="list"></div>
    <button class="btn btn-primary btn-sm w-full" style="margin-top:12px" onclick="massGenerate()">Mass Generate All</button>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Config Tab -->
    <div class="tab-content active" id="tab-config">
      <div id="configStatus" class="status-box">Checking...</div>

      <div class="section">
        <div class="section-title">LLM Configuration</div>
        <div class="form-group">
          <label class="label">Endpoint</label>
          <input type="text" id="llmEndpoint" placeholder="https://api.anthropic.com/v1/messages">
        </div>
        <div class="form-group">
          <label class="label">API Key</label>
          <input type="text" id="llmKey" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label class="label">Model</label>
          <input type="text" id="llmModel" value="claude-sonnet-4-5-20250929">
        </div>
        <button class="btn btn-primary w-full" onclick="saveLLMConfig()">Save Config</button>
      </div>
    </div>

    <!-- Generate Tab -->
    <div class="tab-content" id="tab-generate">
      <div class="section">
        <div class="section-title">Problem Parameters</div>
        <div class="form-group">
          <label class="label">Topic</label>
          <input type="text" id="genTopic" placeholder="calculus">
        </div>
        <div class="form-group">
          <label class="label">Subtopic</label>
          <input type="text" id="genSubtopic" placeholder="derivatives">
        </div>
        <div class="form-group">
          <label class="label">Difficulty Level</label>
          <select id="genDifficulty">
            <option value="easy">Easy (for this topic)</option>
            <option value="medium" selected>Medium (for this topic)</option>
            <option value="hard">Hard (for this topic)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="label">Grading Mode</label>
          <select id="genMode">
            <option value="equivalent">Equivalent</option>
            <option value="factor">Factor</option>
            <option value="expand">Expand</option>
          </select>
        </div>
        <div class="form-group">
          <label class="label">Answer Type</label>
          <select id="answerType">
            <option value="expression">Expression (default)</option>
            <option value="numeric">Numeric</option>
            <option value="set">Set</option>
            <option value="tuple">Tuple/Ordered Pair</option>
            <option value="list">List</option>
            <option value="interval">Interval</option>
            <option value="inequality">Inequality</option>
            <option value="equation">Equation</option>
            <option value="boolean">Boolean</option>
            <option value="word">Word</option>
            <option value="matrix">Matrix</option>
            <option value="multi_part">Multi-Part</option>
          </select>
        </div>
        <div class="form-group">
          <label class="label">Calculator Allowed</label>
          <select id="calculatorAllowed">
            <option value="none">None (default)</option>
            <option value="scientific">Scientific</option>
            <option value="graphing">Graphing</option>
            <option value="cas">CAS</option>
          </select>
        </div>
        <button class="btn btn-primary w-full" id="genBtn" onclick="generateScript()">Generate Script</button>
      </div>

      <div class="section">
        <div class="section-title">Script</div>
        <div class="editor">
          <textarea id="scriptEditor" placeholder="# Generated script appears here..."></textarea>
        </div>
        <div class="row" style="margin-top:10px">
          <button class="btn btn-success" onclick="testScript()">Test</button>
          <button class="btn btn-primary" onclick="saveScriptDialog()">Save</button>
          <button class="btn btn-ghost" onclick="clearScript()">Clear</button>
        </div>
        <div id="testResult" style="margin-top:12px;display:none"></div>
      </div>
    </div>

    <!-- Review Tab -->
    <div class="tab-content" id="tab-review">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div class="mono" style="font-size:12px;font-weight:600">Problems</div>
          <div class="mono" style="font-size:10px;color:var(--text-muted);margin-top:2px" id="reviewCount">0</div>
        </div>
        <div class="row" id="reviewActions" style="display:none">
          <button class="btn btn-success btn-sm" onclick="approveAll()">Approve All</button>
          <button class="btn btn-danger btn-sm" onclick="clearReview()">Clear</button>
        </div>
      </div>
      <div id="problemsContainer">
        <div class="empty">
          <div class="empty-icon">?</div>
          <p>Run a script to generate problems</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Staging Panel -->
  <aside class="panel">
    <div class="panel-header">
      <div class="panel-title">Staging</div>
      <div class="panel-count" id="stagingCount">0</div>
      <div class="panel-label">ready</div>
    </div>
    <div class="panel-body" id="stagingList">
      <div class="empty" style="padding:40px 10px">
        <p style="font-size:11px">No problems staged</p>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn btn-primary btn-sm w-full" onclick="exportSQL()">Save to SQL File</button>
      <button class="btn btn-ghost btn-sm w-full" onclick="viewExports()">View Exports</button>
      <button class="btn btn-danger btn-sm w-full" onclick="clearStaging()">Clear Staging</button>
    </div>
  </aside>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="factory.js"></script>
</body>
</html>
