# Production-like Docker Compose for local testing

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: locus-db-prod
    environment:
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: locus
    ports:
      - "5434:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - locus-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locus-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Required
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: postgresql://locus:${DB_PASSWORD}@postgres:5432/locus
      JWT_SECRET: ${JWT_SECRET}

      # CORS and URLs
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE}

      # OAuth (required)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}

      # Email (required)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}

      # Server config
      HOST: 0.0.0.0
      PORT: 28743
    ports:
      - "28743:28743"
    networks:
      - locus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:28743/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_prod_data:

networks:
  locus-network:
    driver: bridge
