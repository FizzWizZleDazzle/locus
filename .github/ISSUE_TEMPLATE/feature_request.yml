name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New math topic/subtopic
        - Problem generation (DSL)
        - Grading improvements
        - Frontend/UX
        - API
        - Physics C support
        - Diagrams
        - Other
    validations:
      required: true
