name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  # Compile-time env vars for forum/status crates
  COMMUNITY_API_URL: http://localhost:9090
  LOCUS_FRONTEND_URL: http://localhost:8080

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache SymEngine
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/libsymengine.a
          key: symengine-static-v1

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev cmake g++ pkg-config libssl-dev

      - name: Build SymEngine
        run: |
          if [ ! -f /usr/local/lib/libsymengine.a ]; then
            git clone --depth 1 https://github.com/symengine/symengine.git /tmp/symengine
            cd /tmp/symengine && mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/local ..
            make -j$(nproc)
            sudo make install
            cd / && rm -rf /tmp/symengine
          fi

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test (common)
        run: cargo test -p locus-common

      - name: Cargo test (dsl)
        run: cargo test -p locus-dsl

      - name: Validate problem files
        run: |
          cargo build --bin dsl-cli
          for f in problems/*/*.yaml; do
            echo "Validating $f..."
            cargo run --bin dsl-cli -- generate "$f" -n 3 || exit 1
          done

      - name: Cargo clippy
        run: cargo clippy -p locus-common -p locus-dsl -p locus-dsl-cli -- -D warnings

  docker:
    name: Docker Build & Push
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile
            image: locus
          - dockerfile: crates/services-backend/Dockerfile
            image: locus-services
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
