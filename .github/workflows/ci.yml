name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  # Compile-time env vars for status crate
  COMMUNITY_API_URL: http://localhost:8090
  LOCUS_FRONTEND_URL: http://localhost:8080

# Path filters drive which downstream jobs run. A docs- or YAML-only push
# skips the Rust pipeline entirely; a Rust-only push skips YAML validation.
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      yaml: ${{ steps.filter.outputs.yaml }}
      docker_locus: ${{ steps.filter.outputs.docker_locus }}
      docker_services: ${{ steps.filter.outputs.docker_services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-symengine/**'
            yaml:
              - 'problems/**/*.yaml'
              - 'crates/dsl/**'
              - 'crates/dsl-cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            docker_locus:
              - 'docker/Dockerfile'
              - 'crates/common/**'
              - 'crates/backend/**'
              - 'crates/frontend/**'
              - 'crates/dsl/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            docker_services:
              - 'crates/services-backend/Dockerfile'
              - 'crates/services-backend/**'
              - 'crates/common/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  build:
    name: Cargo check & clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build
      - uses: ./.github/actions/setup-symengine
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo clippy
        run: cargo clippy -p locus-dsl -p locus-dsl-cli -- -W clippy::all

  test:
    name: Cargo test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
      - uses: ./.github/actions/setup-symengine
      - name: Cargo test (common + dsl)
        run: cargo test -p locus-common -p locus-dsl

  validate:
    name: Validate problem YAML
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: validate
      - uses: ./.github/actions/setup-symengine
      - name: Validate problem files
        run: |
          cargo build --bin dsl-cli
          BIN=target/debug/dsl-cli
          find problems/ -name "handwritten.yaml" -print0 | while IFS= read -r -d '' f; do
            "$BIN" generate "$f" -n 3 || exit 1
          done
          find problems/ -name "*.yaml" -print0 | while IFS= read -r -d '' f; do
            "$BIN" parse "$f" || exit 1
          done

  # Single required status check for branch protection. Always runs; succeeds
  # when every gated upstream job either passed or was skipped by path filter.
  mergeable:
    name: Mergeable
    needs: [changes, build, test, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate gated job results
        run: |
          fail() { echo "::error::$1"; exit 1; }
          [[ "${{ needs.changes.result }}" == "success" ]] || fail "changes failed"
          for r in "${{ needs.build.result }}" "${{ needs.test.result }}" "${{ needs.validate.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) fail "downstream job result=$r" ;;
            esac
          done

  docker-locus:
    name: Docker - locus
    needs: [changes, build, test]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.docker_locus == 'true' &&
      needs.build.result == 'success' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag_latest=${{ env.REGISTRY }}/${OWNER}/locus:latest" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${{ env.REGISTRY }}/${OWNER}/locus:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag_latest }}
            ${{ steps.meta.outputs.tag_sha }}

  docker-services:
    name: Docker - services-backend
    needs: [changes, build, test]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.docker_services == 'true' &&
      needs.build.result == 'success' &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag_latest=${{ env.REGISTRY }}/${OWNER}/locus-services:latest" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${{ env.REGISTRY }}/${OWNER}/locus-services:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: crates/services-backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag_latest }}
            ${{ steps.meta.outputs.tag_sha }}
