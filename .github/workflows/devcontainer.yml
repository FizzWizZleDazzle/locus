name: Build Dev Container Image

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - '.github/workflows/devcontainer.yml'
      - 'symengine.js/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/*/Cargo.toml'
  # PRs always trigger so the required `build` status reports. The job below
  # short-circuits on pull_request to avoid pushing images, leaving a
  # `skipped` conclusion which counts as success for branch protection.
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ghcr.io/fizzwizzledazzle/locus-devcontainer:latest
            ghcr.io/fizzwizzledazzle/locus-devcontainer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
