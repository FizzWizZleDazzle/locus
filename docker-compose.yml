services:
  postgres:
    image: postgres:16-alpine
    container_name: locus-db
    environment:
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: locus_dev_password
      POSTGRES_DB: locus
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus -d locus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
