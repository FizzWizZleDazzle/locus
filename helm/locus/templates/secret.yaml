apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | required "secrets.jwtSecret is required" | quote }}
  api-key-secret: {{ .Values.secrets.apiKeySecret | required "secrets.apiKeySecret is required" | quote }}
  database-password: {{ .Values.secrets.databasePassword | required "secrets.databasePassword is required" | quote }}
  google-client-id: {{ .Values.secrets.googleClientId | default "" | quote }}
  google-client-secret: {{ .Values.secrets.googleClientSecret | default "" | quote }}
  github-client-id: {{ .Values.secrets.githubClientId | default "" | quote }}
  github-client-secret: {{ .Values.secrets.githubClientSecret | default "" | quote }}
  resend-api-key: {{ .Values.secrets.resendApiKey | required "secrets.resendApiKey is required" | quote }}
  resend-from-email: {{ .Values.secrets.resendFromEmail | quote }}
  resend-from-name: {{ .Values.secrets.resendFromName | quote }}
