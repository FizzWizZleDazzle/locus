apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}-backend
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 28743
        env:
        - name: ENVIRONMENT
          value: {{ .Values.backend.environment | quote }}
        - name: HOST
          value: {{ .Values.backend.host | quote }}
        - name: PORT
          value: {{ .Values.backend.port | quote }}
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username }}:$(DB_PASSWORD)@{{ .Release.Name }}-postgres:5432/{{ .Values.postgresql.auth.database }}"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: database-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: jwt-secret
        - name: API_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: api-key-secret
        - name: JWT_EXPIRY_HOURS
          value: {{ .Values.backend.jwtExpiryHours | quote }}
        - name: ALLOWED_ORIGINS
          value: {{ .Values.backend.allowedOrigins | quote }}
        - name: FRONTEND_BASE_URL
          value: {{ .Values.backend.frontendBaseUrl | quote }}
        - name: OAUTH_REDIRECT_BASE
          value: {{ .Values.backend.oauthRedirectBase | quote }}
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: google-client-secret
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: github-client-id
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: github-client-secret
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: resend-api-key
        - name: RESEND_FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: resend-from-email
        - name: RESEND_FROM_NAME
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: resend-from-name
        livenessProbe:
          {{- toYaml .Values.backend.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.backend.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
