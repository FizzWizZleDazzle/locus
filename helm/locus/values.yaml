# Default values for Locus Helm chart
# Override these values using --set or a custom values.yaml file

# Container image configuration
image:
  repository: ghcr.io/fizzwizzledazzle/locus
  tag: latest
  pullPolicy: IfNotPresent

# Number of backend replicas
replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 28743

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: locus.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: locus-tls
      hosts:
        - locus.yourdomain.com

# Backend configuration
backend:
  environment: production
  host: 0.0.0.0
  port: 28743
  jwtExpiryHours: 24
  skipMigrations: "false"

  # CORS and URLs
  allowedOrigins: https://locus.yourdomain.com
  frontendBaseUrl: https://locus.yourdomain.com
  oauthRedirectBase: https://locus.yourdomain.com

  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Health checks
  livenessProbe:
    httpGet:
      path: /api/health
      port: 28743
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /api/health
      port: 28743
    initialDelaySeconds: 10
    periodSeconds: 5

# PostgreSQL configuration
postgresql:
  enabled: false
  image: postgres:16-alpine

  # Storage
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

  # Database credentials (will be stored in secrets)
  auth:
    database: locus
    username: locus
    # password: set via --set or secrets

  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Secrets (REQUIRED - must be provided)
secrets:
  # Database URL (use your existing database)
  databaseUrl: ""

  # Generate with: openssl rand -base64 32
  jwtSecret: ""
  apiKeySecret: ""

  # OAuth credentials
  googleClientId: ""
  googleClientSecret: ""
  githubClientId: ""
  githubClientSecret: ""

  # Email service (Resend)
  resendApiKey: ""
  resendFromEmail: "no-reply@yourdomain.com"
  resendFromName: "Locus"

# Cloudflare Tunnel configuration
cloudflaredTunnel:
  hostname: locusb.fizzwizzledazzle.dev
  token: ""  # Get token from Cloudflare dashboard or: cloudflared tunnel token <tunnel-name>

# Autoscaling (optional)
autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
