# Production values override
# Copy this file and customize for your environment
# Deploy with: helm upgrade --install locus ./helm/locus -f values.production.yaml

# Container image
image:
  repository: your-registry.com/locus
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Scaling
replicaCount: 3

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: locus.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: locus-tls
      hosts:
        - locus.yourdomain.com

# Backend configuration
backend:
  environment: production
  allowedOrigins: https://locus.yourdomain.com
  frontendBaseUrl: https://locus.yourdomain.com
  oauthRedirectBase: https://locus.yourdomain.com

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# PostgreSQL
postgresql:
  enabled: true
  persistence:
    enabled: true
    size: 50Gi
    storageClass: "standard"

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

