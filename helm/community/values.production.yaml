replicaCount: 1

backend:
  environment: production
  allowedOrigins: "https://forum.locusmath.org,https://status.locusmath.org"
  healthCheckUrl: "https://api.locusmath.org/api/health"
  healthCheckIntervalSecs: "300"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
