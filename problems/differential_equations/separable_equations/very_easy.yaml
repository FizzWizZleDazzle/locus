topic: differential_equations/separable_equations
difficulty: very_easy
calculator: none
variables:
  k: integer(2, 5)
  C: integer(1, 4)
  f: k * y
  general_solution: C * exp(k * x)
  initial_y: integer(2, 8)
  C_value: initial_y
  particular_solution: initial_y * exp(k * x)
question: "Solve the differential equation {equation(dy/dx, f)} with initial condition y(0) = {initial_y}."
answer: particular_solution
solution:
  - "Start with {equation(dy/dx, f)}"
  - "Separate variables: {equation(dy/y, k * dx)}"
  - "Integrate both sides: {equation(integral_of(1/y, y), integral_of(k, x))}"
  - "This gives: {equation(ln|y|, k*x + C)}"
  - "Exponentiating: {equation(y, C * exp(k*x))}"
  - "Apply initial condition y(0) = {initial_y}:"
  - "{initial_y} = C * exp(0) = C"
  - "So C = {initial_y}"
  - "Therefore: {equation(y, particular_solution)}"