topic: differential_equations/variation_of_parameters
difficulty: hard
calculator: none
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  k: integer(2, 5)
  char_eq: (r - r1) * (r - r2)
  expanded_char: expand(char_eq)
  a: -(r1 + r2)
  b: r1 * r2
  g: k * exp(r2 * x)
  y1: exp(r1 * x)
  y2: exp(r2 * x)
  W: y1 * derivative(y2, x) - y2 * derivative(y1, x)
  W_simplified: simplify(W)
  u1_prime: -y2 * g / W_simplified
  u2_prime: y1 * g / W_simplified
  u1_prime_simplified: simplify(u1_prime)
  u2_prime_simplified: simplify(u2_prime)
  u1: integral(u1_prime_simplified, x)
  u2: integral(u2_prime_simplified, x)
  y_p: simplify(u1 * y1 + u2 * y2)
  answer: y_p
constraints:
  - r1 != r2
  - abs(r1) != abs(r2)
question: "Use variation of parameters to find a particular solution to y'' + {a}y' + {b}y = {g}"
answer: answer
solution:
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "This factors as {equation(char_eq, 0)}, giving r = {r1}, {r2}"
  - "The complementary solution is y_c = c₁{y1} + c₂{y2}"
  - "For variation of parameters, we have y₁ = {y1} and y₂ = {y2}"
  - "The Wronskian is W = {equation('W', W_simplified)}"
  - "We need u₁' = {equation('u₁′', u1_prime_simplified)} and u₂' = {equation('u₂′', u2_prime_simplified)}"
  - "Integrating: u₁ = {u1} and u₂ = {u2}"
  - "Therefore y_p = u₁y₁ + u₂y₂ = {answer}"