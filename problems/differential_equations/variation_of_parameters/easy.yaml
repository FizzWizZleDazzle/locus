topic: differential_equations/variation_of_parameters
difficulty: easy
calculator: scientific
variants:
  - name: default
    variables:
      a: nonzero(-4, 4)
      m: choice(2, 3, 4, -2, -3, -4)
      m_sq: m*m
      denom: m_sq - 1
      g: a*exp(m*x)
      y1: exp(x)
      y2: exp(-x)
      W_val: -2
      m_minus_1: m - 1
      m_plus_1: m + 1
      u1_prime: a*exp(m_minus_1*x)/2
      u2_prime: -a*exp(m_plus_1*x)/2
      u1: a*exp(m_minus_1*x)/(2*m_minus_1)
      u2: -a*exp(m_plus_1*x)/(2*m_plus_1)
      yp: a*exp(m*x)/denom
    question: |
      Use variation of parameters to find a particular solution {math(y_p)} to {nth_derivative_of(y, x, 2)} - {math(y)} = {g}.
    answer: yp
    answer_type: expression
    solution:
      - The homogeneous equation {math(y'' - y = 0)} has characteristic roots {math(r = 1)} and {math(r = -1)}, giving fundamental solutions {math(y_1)} = {y1} and {math(y_2)} = {y2}.
      - The Wronskian is {equation(math(W), W_val)}.
      - 'By variation of parameters: {equation(math(u_1''), u1_prime)} and {equation(math(u_2''), u2_prime)}.'
      - 'Integrating: {equation(math(u_1), u1)} and {equation(math(u_2), u2)}.'
      - The particular solution {math(y_p = u_1 y_1 + u_2 y_2)} simplifies to {equation(math(y_p), yp)}.
