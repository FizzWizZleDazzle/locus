topic: differential_equations/variation_of_parameters
difficulty: competition
calculator: none
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  k: integer(2, 5)
  yh: c1 * e^(r1*x) + c2 * e^(r2*x)
  g: k * e^((r1+r2)*x)
  W: (r2 - r1) * e^((r1+r2)*x)
  u1_prime: -k
  u2_prime: k
  u1: -k * x
  u2: k * x
  yp: u1 * e^(r1*x) + u2 * e^(r2*x)
  yp_expanded: expand(yp)
  yp_simplified: k * x * e^(r2*x) - k * x * e^(r1*x)
  answer: yh + yp_simplified
constraints:
  - r1 < 0
  - r2 > 0
  - abs(r1) != r2
question: "Solve y'' - {r1+r2}y' + {r1*r2}y = {g} using variation of parameters."
answer: answer
solution:
  - "First find the homogeneous solution by solving y'' - {r1+r2}y' + {r1*r2}y = 0"
  - "The characteristic equation is r² - {r1+r2}r + {r1*r2} = 0"
  - "This factors as (r - {r1})(r - {r2}) = 0, giving r = {r1}, {r2}"
  - "So {equation(yh, c1 * e^(r1*x) + c2 * e^(r2*x))}"
  - "For variation of parameters, let y₁ = e^({r1}x) and y₂ = e^({r2}x)"
  - "The Wronskian is W = {W}"
  - "We have u₁' = -y₂g/W = -{k} and u₂' = y₁g/W = {k}"
  - "Integrating: u₁ = {u1} and u₂ = {u2}"
  - "The particular solution is yₚ = {yp_simplified}"
  - "Therefore y = {answer}"