topic: differential_equations/undetermined_coefficients
difficulty: competition
calculator: none
variables:
  # Build from known solution components
  c1: choice(2, 3, 4)
  c2: choice(1, 2, 3)
  # Homogeneous solution roots
  r1: -2
  r2: -3
  # Particular solution for exponential forcing
  a: 1
  # Build the differential equation
  p: r1 + r2
  q: r1 * r2
  # Forcing term coefficient
  k: choice(5, 6, 10, 12)
  # The equation is y'' - p*y' + q*y = k*e^(a*x)
  # Since a=1 is not a root, particular solution is A*e^x
  A: k / (1 - p + q)
  # General solution
  answer: c1*e^(r1*x) + c2*e^(r2*x) + A*e^(a*x)
constraints:
  - c1 > 0
  - c2 > 0
question: "Find the general solution to y'' + {-p}y' + {q}y = {k}e^x"
answer: answer
answer_type: expression
solution:
  - "First solve the homogeneous equation: y'' + {-p}y' + {q}y = 0"
  - "Characteristic equation: r^2 + {-p}r + {q} = 0"
  - "Factor: (r - {r1})(r - {r2}) = 0, so r = {r1}, {r2}"
  - "Homogeneous solution: y_h = c_1e^{r1*x} + c_2e^{r2*x}"
  - "For the particular solution, try y_p = Ae^x"
  - "Then y_p' = Ae^x and y_p'' = Ae^x"
  - "Substitute: Ae^x + {-p}Ae^x + {q}Ae^x = {k}e^x"
  - "Factor: A(1 + {-p} + {q})e^x = {k}e^x"
  - "So A({1 - p + q}) = {k}, giving A = {A}"
  - "General solution: y = {answer}"