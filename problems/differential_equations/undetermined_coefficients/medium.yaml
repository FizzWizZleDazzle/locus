topic: differential_equations/undetermined_coefficients
difficulty: medium
calculator: none
variables:
  a: choice(2, 3, 4)
  b: choice(1, 2, 3)
  c: nonzero(-4, 4)
  d: integer(-3, 3)
  char_eq: r^2 - a*r + b
  yp: c*x + d
  yp_prime: derivative(yp, x)
  yp_double_prime: derivative(yp_prime, x)
  lhs: yp_double_prime - a*yp_prime + b*yp
  lhs_expanded: expand(lhs)
  rhs: -a*c + b*(c*x + d)
  rhs_expanded: expand(rhs)
  answer: yp
constraints:
  - c != d
question: "Find a particular solution to {equation(derivative(derivative(y, x), x) - a*derivative(y, x) + b*y, rhs_expanded)} using the method of undetermined coefficients."
answer: answer
solution:
  - "Since the right side is {rhs_expanded}, we try {equation(y_p, c*x + d)}"
  - "Then {equation(derivative(y_p, x), c)} and {equation(derivative(derivative(y_p, x), x), 0)}"
  - "Substituting: {equation(0 - a*c + b*(c*x + d), rhs_expanded)}"
  - "This gives us {equation(lhs_expanded, rhs_expanded)}"
  - "Matching coefficients confirms our guess works"
  - "Therefore {equation(y_p, answer)}"