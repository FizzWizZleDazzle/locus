topic: differential_equations/exact_equations
difficulty: easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  M: a * x + b * y
  N: b * x + c * y
  dM_dy: derivative(M, y)
  dN_dx: derivative(N, x)
  F: integral(M, x)
  g_prime: N - derivative(F, y)
  g: integral(g_prime, y)
  answer: F + g
constraints:
  - dM_dy == dN_dx
question: "Solve the exact differential equation {equation(M * dx + N * dy, 0)}"
answer: answer
solution:
  - "Check exactness: {derivative_of(M, y)} = {dM_dy} and {derivative_of(N, x)} = {dN_dx}"
  - "Since {dM_dy} = {dN_dx}, the equation is exact"
  - "Find F(x,y) such that {derivative_of(F, x)} = {M}"
  - "Integrate: F = {integral_of(M, x)} = {F} + g(y)"
  - "Use {derivative_of(F, y)} = {N} to find g(y)"
  - "{derivative_of(F, y)} = {derivative(F, y)} + g'(y) = {N}"
  - "So g'(y) = {g_prime}"
  - "Therefore g(y) = {g}"
  - "The solution is F(x,y) = {answer} = C"