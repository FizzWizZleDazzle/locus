variants:
  - name: default
    variables:
      a: nonzero(-4, 4)
      b: nonzero(-4, 4)
      c: nonzero(-4, 4)
      d: nonzero(-4, 4)
      M: 2*a*x*y + b*y^2 + 2*c*x
      N: a*x^2 + 2*b*x*y + 2*d*y
      M_y: derivative(M, y)
      N_x: derivative(N, x)
      F: a*x^2*y + b*x*y^2 + c*x^2 + d*y^2
      F_y_expr: derivative(F, y)
    question: Show that the differential equation {M} dx + {N} dy = 0 is exact, then find its general solution.
    answer: F
    answer_type: expression
    solution:
      - Step 1 — Check exactness. Here {math(M)} = {M} and {math(N)} = {N}.
      - Compute {partial_of(M, y)} = {M_y} and {partial_of(N, x)} = {N_x}.
      - Since {equation(M_y, N_x)}, the equation is exact.
      - 'Step 2 — Find the potential function. Integrate {math(M)} with respect to {math(x)}: {math(F)} = {F} + {math(g(y))}.'
      - Step 3 — Determine {math(g(y))}. Differentiate with respect to {math(y)} and set equal to {math(N)}.
      - We get {equation(F_y_expr, N)}, which holds identically, so {math(g'(y) = 0)}.
      - Thus {math(g(y))} is an arbitrary constant, and the general solution is {equation(F, C)}.
