topic: differential_equations/laplace_transforms
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  k: integer(2, 4)
  f: t^k * exp(-a*t) * cos(b*t)
  F_partial: k! / ((s + a)^(k+1))
  denominator: (s + a)^2 + b^2
  power: k + 1
  F_numerator: k! * ((s + a)^power - power * b^2 * (s + a)^(power-2))
  F_simplified: F_numerator / (denominator^power)
  answer: simplify(F_simplified)
constraints:
  - a != b
  - gcd(a, b) == 1
question: "Find the Laplace transform of {f}. Use the fact that L[t^n * e^(-at) * g(t)] involves derivatives of L[g(t)] shifted by a."
answer: answer
solution:
  - "We need to find L[{f}]"
  - "First recall that L[t^n * g(t)] = (-1)^n * d^n/ds^n[G(s)] where G(s) = L[g(t)]"
  - "Also, L[e^(-at) * g(t)] = G(s + a)"
  - "Start with L[cos(bt)] = s/(s^2 + b^2)"
  - "Apply the exponential shift: L[e^(-at) * cos(bt)] = (s + a)/((s + a)^2 + b^2)"
  - "Now apply the t^k multiplication rule by taking the {k}th derivative with respect to s"
  - "After differentiation and simplification, we get:"
  - "L[{f}] = {answer}"