topic: differential_equations/laplace_transforms
difficulty: competition
calculator: none
variables:
  a: choice(2, 3, 4, 5)
  b: choice(1, 2, 3, 4)
  c: choice(2, 3, 4, 5)
  d: choice(1, 2, 3)
  k: a*b
  m: c*d
  f: k*sin(m*t) + m*cos(m*t)
  F_sin_part: k*m/(s^2 + m^2)
  F_cos_part: m*s/(s^2 + m^2)
  F: F_sin_part + F_cos_part
  F_combined: (k*m + m*s)/(s^2 + m^2)
  F_factored: m*(k + s)/(s^2 + m^2)
  g: derivative(f, t)
  G_intermediate: s*F_factored - 0
  G: s*m*(k + s)/(s^2 + m^2)
  answer: G
constraints:
  - a != c
  - b != d
question: "Find the Laplace transform of {derivative_of(f, t)} where {equation(f, k*sin(m*t) + m*cos(m*t))}"
answer: answer
answer_type: expression
solution:
  - "Given {equation(f, k*sin(m*t) + m*cos(m*t))} with k = {k} and m = {m}"
  - "First find L[f(t)] = L[{k}sin({m}t) + {m}cos({m}t)]"
  - "L[{k}sin({m}t)] = {F_sin_part} and L[{m}cos({m}t)] = {F_cos_part}"
  - "So L[f(t)] = {F_combined} = {F_factored}"
  - "For {derivative_of(f, t)}, use the derivative property: L[f'(t)] = sL[f(t)] - f(0)"
  - "Since f(0) = {k}sin(0) + {m}cos(0) = 0 + {m} = {m}"
  - "We get L[f'(t)] = s·{F_factored} - {m}"
  - "But wait - we need to verify this. Let's compute f'(t) directly:"
  - "f'(t) = {k}·{m}cos({m}t) - {m}·{m}sin({m}t) = {k*m}cos({m}t) - {m*m}sin({m}t)"
  - "Actually, f(0) = {m}, so L[f'(t)] = s·{F_factored} - {m}"
  - "This gives us a more elegant approach. Notice that f(t) = {m}[{c*d/m}sin({m}t) + cos({m}t)]"
  - "So f'(t) = {m}[{k}cos({m}t) - {m}sin({m}t)]"
  - "Therefore L[f'(t)] = {G}"