topic: differential_equations/laplace_transforms
difficulty: medium
calculator: scientific
variants:
  - name: default
    variables:
      a: nonzero(-5, 5)
      b: nonzero(-4, 4)
      c: nonzero(-5, 5)
      n: choice(1, 2)
      n_fact: n
      f: a*exp(b*t) + c*t^n
      term1: a/(s - b)
      term2: c*n_fact/s^(n+1)
      ans_expr: a/(s - b) + c*n_fact/s^(n+1)
    question: Find the Laplace transform {math(F(s))} of the function {f}.
    answer: ans_expr
    answer_type: expression
    solution:
      - 'Use linearity: the Laplace transform of a sum is the sum of individual transforms.'
      - 'Exponential term: applying the rule {math(L(e^(b*t)))} = {math(1/(s - b))}, the transform of {math(a*exp(b*t))} is {term1}.'
      - 'Power term: applying the rule {math(L(t^n))} = {math(n_fact/s^(n+1))}, the transform of {math(c*t^n)} is {term2}.'
      - 'Adding the two terms: {equation(F(s), ans_expr)}.'
