topic: differential_equations/first_order_linear
difficulty: easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-8, 8)
  c: integer(1, 5)
  f: a*x + b
  equation_form: y' + c*y
  rhs: f
  integrating_factor: exp(c*x)
  general_solution: (1/c) * f + K * exp(-c*x)
  particular: (a*x + b - a/c) / c
  answer: particular + K * exp(-c*x)
constraints:
  - a != 0
  - c != 0
question: "Solve the differential equation {equation(equation_form, rhs)}"
answer: answer
solution:
  - "This is a first-order linear ODE: {equation(equation_form, rhs)}"
  - "The integrating factor is {integrating_factor}"
  - "Multiply both sides by the integrating factor"
  - "This gives {derivative_of(y * integrating_factor, x)} = {f} * {integrating_factor}"
  - "Integrate both sides to get y * {integrating_factor} = {integral_of(f * integrating_factor, x)}"
  - "Therefore y = {answer}"