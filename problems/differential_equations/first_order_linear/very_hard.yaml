topic: differential_equations/first_order_linear
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-4, 4)
  b: nonzero(-4, 4)
  c: nonzero(-3, 3)
  k: integer(-3, 3)
  p: a * x + b
  q: c * x^2
  integrating_factor: exp(integral(p, x))
  IF_simplified: exp(a * x^2 / 2 + b * x)
  rhs_times_IF: q * IF_simplified
  integral_rhs: integral(rhs_times_IF, x)
  general_solution: (integral_rhs + k) / IF_simplified
  y0: integer(-2, 2)
  x0: 0
  k_value: y0 * IF_simplified - evaluate(integral_rhs, x, x0)
  k_simplified: simplify(k_value)
  particular_solution: (integral_rhs + k_simplified) / IF_simplified
constraints:
  - a != b
  - abs(a * b) <= 8
  - gcd(abs(a), abs(b)) == 1
question: "Solve the initial value problem {derivative_of(y, x)} + {p}y = {q} with y(0) = {y0}"
answer: particular_solution
solution:
  - "This is a first-order linear ODE in standard form {derivative_of(y, x)} + P(x)y = Q(x)"
  - "Here P(x) = {p} and Q(x) = {q}"
  - "The integrating factor is {integral_of(p, x)} = {IF_simplified}"
  - "Multiply the entire equation by the integrating factor"
  - "This gives {derivative_of(y * IF_simplified, x)} = {rhs_times_IF}"
  - "Integrate both sides: y · {IF_simplified} = {integral_of(rhs_times_IF, x)} + C"
  - "So y · {IF_simplified} = {integral_rhs} + C"
  - "Apply initial condition y(0) = {y0}:"
  - "{y0} · {evaluate(IF_simplified, x, 0)} = {evaluate(integral_rhs, x, 0)} + C"
  - "Solving for C: C = {k_simplified}"
  - "Therefore y = {particular_solution}"