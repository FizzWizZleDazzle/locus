topic: differential_equations/first_order_linear
difficulty: very_easy
calculator: none
variables:
  a: choice(1, 2, 3, 4, 5)
  b: choice(1, 2, 3, 4, 6)
  general: b/a + C*exp(-a*x)
  C_val: integer(1, 5)
  answer: b/a + C_val*exp(-a*x)
question: "Solve the differential equation {derivative_of(y, x)} + {a}y = {b} with initial condition y(0) = {evaluate(answer, x, 0)}"
answer: answer
solution:
  - "This is a first-order linear differential equation with constant coefficients"
  - "The general solution is y = {general}"
  - "Apply initial condition: y(0) = {b/a} + C = {evaluate(answer, x, 0)}"
  - "So C = {C_val}"
  - "Therefore y = {answer}"