topic: differential_equations/first_order_linear
difficulty: hard
calculator: scientific

variables:
  p: nonzero(1, 3)
  a: nonzero(-4, 4)
  b: integer(-5, 5)
  y0: integer(-4, 4)
  coeff_x: p*a
  const_term: a + p*b
  C_val: y0 - b
  rhs_ode: coeff_x*x + const_term
  rhs_slope: rhs_ode - p*y
  answer: C_val*exp(-p*x) + a*x + b
  part_sol: a*x + b
  mu: exp(p*x)
  hom_sol: exp(-p*x)
  std_lhs: p*y
  mu_times_part: mu * part_sol
  mu_times_rhs: mu * rhs_ode

question: >
  Solve the initial value problem
  {equation(derivative_of(y, x), rhs_slope)},
  with {math(y(0))} = {y0}.
  Find {math(y(x))}.

answer: answer
answer_type: expression

solution:
  - "Rewrite in standard form: {derivative_of(y, x)} + {std_lhs} = {rhs_ode}."
  - "This is a first-order linear ODE with constant coefficient {p} and right-hand side {math(Q(x))} = {rhs_ode}."
  - "The integrating factor is {mu}."
  - "Multiply both sides by {mu}. The left side becomes {math(d/dx)} of {math(exp(p*x)*y)}, and the right side is {mu_times_rhs}."
  - "Integrate both sides: {math(exp(p*x)*y)} = {mu_times_part} + C."
  - "Divide by {mu}: the general solution is {math(y(x))} = {part_sol} + C{hom_sol}."
  - "Apply {math(y(0))} = {y0}: {y0} = {b} + C, so C = {C_val}."
  - "The solution is {equation(math(y(x)), answer)}."