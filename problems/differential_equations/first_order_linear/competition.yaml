topic: differential_equations/first_order_linear
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  c: integer(1, 4)
  n: integer(2, 4)
  p_x: k * x
  q_x: c * x^n
  integrating_factor: exp(k * x^2 / 2)
  lhs: y + p_x * y
  general_form: integrating_factor * y
  rhs_integrated: c * x^(n+1) / (n+1) * integrating_factor
  y_general: c * x^(n+1) / (n+1) + C / integrating_factor
  y0: integer(1, 3)
  x0: 0
  C_value: y0
  answer: c * x^(n+1) / (n+1) + y0 * exp(-k * x^2 / 2)
constraints:
  - k != n
  - c != k
question: "Solve the initial value problem {derivative_of(y, x)} + {p_x} y = {q_x} with y(0) = {y0}."
answer: answer
solution:
  - "This is a first-order linear ODE in standard form {derivative_of(y, x)} + P(x)y = Q(x)"
  - "Here P(x) = {p_x} and Q(x) = {q_x}"
  - "The integrating factor is μ(x) = {integral_of(p_x, x)} = {integrating_factor}"
  - "Multiply the equation by μ(x): {integrating_factor}({derivative_of(y, x)} + {p_x} y) = {integrating_factor} · {q_x}"
  - "The left side is {derivative_of(general_form, x)}"
  - "So {derivative_of(general_form, x)} = {integrating_factor} · {q_x}"
  - "Integrate both sides: {general_form} = {integral_of(integrating_factor * q_x, x)} + C"
  - "Since {integral_of(x^n * exp(k*x^2/2), x)} requires substitution, we get {rhs_integrated} + C"
  - "Therefore y = {y_general}"
  - "Apply initial condition: {y0} = {c} · 0 / {n+1} + C / 1"
  - "So C = {C_value}"
  - "The solution is y = {answer}"