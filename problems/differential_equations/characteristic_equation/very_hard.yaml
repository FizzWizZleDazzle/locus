topic: differential_equations/characteristic_equation
difficulty: very_hard
calculator: scientific
variables:
  # Design backwards: pick eigenvalues first for clean solution
  lambda1: integer(-5, -1)
  lambda2: integer(1, 5)
  lambda3: integer(-5, 5)
  # Build characteristic polynomial from eigenvalues
  char_poly: (r - lambda1) * (r - lambda2) * (r - lambda3)
  expanded: expand(char_poly)
  # Extract coefficients for the differential equation
  a: -1 * (lambda1 + lambda2 + lambda3)
  b: lambda1*lambda2 + lambda1*lambda3 + lambda2*lambda3
  c: -1 * lambda1 * lambda2 * lambda3
  # Initial conditions chosen to yield clean particular solution
  y0: integer(1, 5)
  y1: integer(-5, 5)
  y2: integer(-10, 10)
  # General solution form
  c1: (y2 - a*y1 - b*y0) / ((lambda1 - lambda2)*(lambda1 - lambda3)*exp(lambda1*0))
  c2: (lambda1*y0 - y1 + c1*exp(lambda1*0)*(lambda1 - lambda3)) / (lambda2 - lambda3)
  c3: y0 - c1 - c2
  answer: simplify(c1*exp(lambda1*x) + c2*exp(lambda2*x) + c3*exp(lambda3*x))
constraints:
  - lambda1 != lambda2
  - lambda2 != lambda3
  - lambda1 != lambda3
question: "Solve the third-order linear differential equation y''' + {a}y'' + {b}y' + {c}y = 0 with initial conditions y(0) = {y0}, y'(0) = {y1}, y''(0) = {y2}."
answer: answer
solution:
  - "Find the characteristic equation: r³ + {a}r² + {b}r + {c} = 0"
  - "This factors as {char_poly} = 0"
  - "The roots are r₁ = {lambda1}, r₂ = {lambda2}, r₃ = {lambda3}"
  - "General solution: y = c₁e^({lambda1}x) + c₂e^({lambda2}x) + c₃e^({lambda3}x)"
  - "Apply initial condition y(0) = {y0}: c₁ + c₂ + c₃ = {y0}"
  - "Apply y'(0) = {y1}: {lambda1}c₁ + {lambda2}c₂ + {lambda3}c₃ = {y1}"
  - "Apply y''(0) = {y2}: {lambda1}²c₁ + {lambda2}²c₂ + {lambda3}²c₃ = {y2}"
  - "Solving this system: c₁ = {c1}, c₂ = {c2}, c₃ = {c3}"
  - "Therefore: y = {answer}"