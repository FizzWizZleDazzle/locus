topic: differential_equations/characteristic_equation
difficulty: medium
calculator: none
variables:
  r1: integer(-5, 5)
  r2: integer(-5, 5)
  char_poly: (r - r1) * (r - r2)
  expanded: expand(char_poly)
  a: -r1 - r2
  b: r1 * r2
  diff_eq: y'' + a * y' + b * y
  c1: choice(1, 2, 3, 4, 5)
  c2: choice(1, 2, 3, 4, 5)
  answer: c1 * e^(r1 * x) + c2 * e^(r2 * x)
constraints:
  - r1 != r2
  - r1 != 0
  - r2 != 0
question: "Find the general solution to the differential equation {equation(diff_eq, 0)}."
answer: answer
solution:
  - "Write the characteristic equation: {equation(expanded, 0)}"
  - "Factor: {equation(char_poly, 0)}"
  - "The roots are r = {r1} and r = {r2}"
  - "Since we have two distinct real roots, the general solution is:"
  - "y = {answer}"
  - "where {c1} and {c2} are arbitrary constants"