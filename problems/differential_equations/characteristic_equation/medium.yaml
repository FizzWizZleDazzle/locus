topic: differential_equations/characteristic_equation
difficulty: medium
calculator: none
variables:
  r1: nonzero(-5, 5)
  r2: nonzero(-5, 5)
  b_coeff: expand(-(r1 + r2))
  c_coeff: expand(r1 * r2)
  char_eq: expand(r^2 + b_coeff*r + c_coeff)
  factor_check: expand((r - r1)*(r - r2))
constraints:
  - r1 != r2
question: "Find the two roots of the characteristic equation {equation(char_eq, 0)}, which arises from a second-order linear ODE with constant coefficients."
answer: r1, r2
answer_type: set
solution:
  - "The characteristic equation is {equation(char_eq, 0)}."
  - "Factor the quadratic: {equation((r - r1)*(r - r2), 0)}."
  - "Setting each factor equal to zero gives the roots {math(r_1 = r1)} and {math(r_2 = r2)}."
  - "Since the roots are real and distinct, the general solution of the corresponding ODE is {math(y = C_1*e^(r1*x) + C_2*e^(r2*x))}."
