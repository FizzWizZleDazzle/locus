topic: differential_equations/characteristic_equation
difficulty: hard
calculator: none
variants:
  - name: repeated_root
    variables:
      r0: nonzero(-4, 4)
      b_coeff: evaluate(-2*r0, r0, r0)
      c_coeff: evaluate(r0^2, r0, r0)
      char_poly: r^2 + b_coeff*r + c_coeff
      gen_sol: exp(r0*x)*(C1 + C2*x)
    constraints:
      - r1 != r2
    question: A second-order linear homogeneous ODE with constant coefficients has characteristic equation {equation(char_poly, 0)}. Write the general solution {math(y(x))}.
    answer: gen_sol
    answer_type: expression
    solution:
      - The characteristic equation is {equation(char_poly, 0)}.
      - This factors as {math((r - r0)^2 = 0)}, giving a repeated root {math(r = r0)}.
      - For a repeated root, the general solution is {equation(math(y(x)), gen_sol)}.
  - name: complex_roots
    variables:
      alpha: integer(-3, 3)
      beta: integer(1, 4)
      b_coeff: evaluate(-2*alpha, alpha, alpha)
      c_coeff: evaluate(alpha^2 + beta^2, alpha, alpha)
      char_poly: r^2 + b_coeff*r + c_coeff
      disc: evaluate(b_coeff^2 - 4*c_coeff, alpha, alpha)
      gen_sol: exp(alpha*x)*(C1*cos(beta*x) + C2*sin(beta*x))
    constraints:
      - r1 != r2
    question: A second-order linear homogeneous ODE with constant coefficients has characteristic equation {equation(char_poly, 0)}. Write the general solution {math(y(x))}.
    answer: gen_sol
    answer_type: expression
    solution:
      - The characteristic equation is {equation(char_poly, 0)}.
      - 'The discriminant is {disc} (negative), so the roots are complex: {math(alpha + beta*i)} and {math(alpha - beta*i)}.'
      - For complex roots with real part {alpha} and imaginary part {math(+/-)} {beta}, the general solution is {equation(math(y(x)), gen_sol)}.
