topic: differential_equations/characteristic_equation
difficulty: hard
calculator: scientific
variables:
  r1: integer(-5, 5)
  r2: integer(-5, 5)
  r3: integer(-5, 5)
  char_poly: (r - r1) * (r - r2) * (r - r3)
  expanded: expand(char_poly)
  a: -evaluate(derivative(expanded, r), r, 0)
  b: evaluate(derivative(derivative(expanded, r), r), r, 0) / 2
  c: -evaluate(derivative(derivative(derivative(expanded, r), r), r), r, 0) / 6
  de: y''' + a * y'' + b * y' + c * y
  roots: solve(expanded, r)
  c1: integer(1, 5)
  c2: integer(-5, -1)
  c3: integer(1, 5)
  general_solution: c1 * exp(r1 * x) + c2 * exp(r2 * x) + c3 * exp(r3 * x)
constraints:
  - r1 != r2
  - r2 != r3
  - r1 != r3
question: "Find the general solution to the differential equation {equation(de, 0)}."
answer: general_solution
answer_type: expression
solution:
  - "Write the characteristic equation: {equation(expanded, 0)}"
  - "Factor: {equation(char_poly, 0)}"
  - "The roots are r = {r1}, r = {r2}, r = {r3}"
  - "Since all roots are distinct, the general solution is:"
  - "y = C₁e^({r1}x) + C₂e^({r2}x) + C₃e^({r3}x)"
  - "Using arbitrary constants C₁, C₂, C₃"