topic: differential_equations/homogeneous_equations
difficulty: very_hard
calculator: none
variables:
  r1: integer(-5, -1)
  r2: integer(1, 5)
  char_poly: (r - r1)^2 * (r - r2)
  expanded_char: expand(char_poly)
  a: -r1^2 - 2*r1*r2
  b: 2*r1 + r2
  c: -1
  diff_eq: y''' + a*y'' + b*y' + c*y
  c1: integer(1, 3)
  c2: integer(-3, -1)
  c3: integer(1, 4)
  answer: c1*e^(r1*x) + c2*x*e^(r1*x) + c3*e^(r2*x)
constraints:
  - r1 != r2
  - abs(r1) != abs(r2)
question: "Solve the homogeneous differential equation {equation(diff_eq, 0)} with initial conditions y(0) = {c1 + c3}, y'(0) = {c1*r1 + c2 + c3*r2}, and y''(0) = {c1*r1^2 + 2*c2*r1 + c3*r2^2}."
answer: answer
solution:
  - "Find the characteristic equation by substituting y = e^(rx)"
  - "This gives {equation(expanded_char, 0)}"
  - "Factor as {equation(char_poly, 0)}"
  - "The roots are r = {r1} (double) and r = {r2}"
  - "General solution: y = A*e^({r1}x) + B*x*e^({r1}x) + C*e^({r2}x)"
  - "Apply y(0) = {c1 + c3}: A + C = {c1 + c3}"
  - "Apply y'(0) = {c1*r1 + c2 + c3*r2}: {r1}A + B + {r2}C = {c1*r1 + c2 + c3*r2}"
  - "Apply y''(0) = {c1*r1^2 + 2*c2*r1 + c3*r2^2}: {r1^2}A + {2*r1}B + {r2^2}C = {c1*r1^2 + 2*c2*r1 + c3*r2^2}"
  - "Solving the system: A = {c1}, B = {c2}, C = {c3}"
  - "Therefore y = {answer}"