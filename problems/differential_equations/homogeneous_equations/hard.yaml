topic: differential_equations/homogeneous_equations
difficulty: hard
calculator: none
variables:
  r1: integer(-5, -1)
  r2: integer(1, 5)
  char_eq: r^2 - (r1 + r2)*r + r1*r2
  expanded_char: expand(char_eq)
  a: -(r1 + r2)
  b: r1 * r2
  c1: integer(1, 4)
  c2: integer(-4, -1)
  answer: c1*exp(r1*x) + c2*exp(r2*x)
constraints:
  - r1 < r2
question: "Solve the differential equation {equation(derivative(derivative(y, x), x) + a*derivative(y, x) + b*y, 0)}"
answer: answer
answer_type: expression
solution:
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "Factor: {equation((r - r1)*(r - r2), 0)}"
  - "The roots are r = {r1} and r = {r2}"
  - "Since the roots are real and distinct, the general solution is:"
  - "y = {answer}"