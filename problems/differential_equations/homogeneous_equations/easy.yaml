topic: differential_equations/homogeneous_equations
difficulty: easy
calculator: none
variants:
  - name: default
    variables:
      b: nonzero(1, 4)
      C_val: b
      answer: b*x^2 - b*x
      lhs_ode: 2*y + b*x
    question: Solve the initial value problem {math(dy/dx)} = {math(lhs_ode / x)}, {math(y(1) = 0)}, using the substitution {math(v = y/x)}.
    answer: answer
    answer_type: expression
    solution:
      - The ODE {math(dy/dx = lhs_ode / x)} is homogeneous of degree 1 since the right side depends only on {math(y/x)}.
      - Let {math(v = y/x)}, so {math(y = v*x)} and {math(dy/dx = v + x*(dv/dx))}.
      - 'Substituting: {math(v + x*(dv/dx) = 2*v + b)}, which simplifies to {math(x*(dv/dx) = v + b)}.'
      - 'Separating variables: {math((1/(v + b))*dv = (1/x)*dx)}.'
      - Integrating both sides yields {math(ln(v + b) = ln(x) + K)}, so {math(v + b = C*x)}.
      - Back-substituting {math(v = y/x)} gives {math(y/x + b = C*x)}, so the general solution is {math(y = C*x^2 - b*x)}.
      - 'Applying {math(y(1) = 0)}: {math(C*1^2 - b*1 = 0)}, so {math(C = C_val)}.'
      - The particular solution is {math(y = answer)}.
