topic: differential_equations/homogeneous_equations
difficulty: easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: nonzero(-3, 3)
  f: a*x + b*y
  g: c*y
  eq_form: (a*x + b*y)*dx + c*y*dy
  substitution: y/x
  answer: ln(abs(x)) + (b/c)*ln(abs(a + b*(y/x))) - (a/c)*(y/x)
constraints:
  - a != 0
  - a + b != 0
question: "Solve the homogeneous differential equation {equation(eq_form, 0)}"
answer: answer
solution:
  - "This is homogeneous since both terms have degree 1"
  - "Let v = {substitution}, so y = vx and dy = v dx + x dv"
  - "Substituting: ({a}x + {b}vx)dx + {c}vx(v dx + x dv) = 0"
  - "Factor out x: x[({a} + {b}v)dx + {c}v(v dx + x dv)] = 0"
  - "Simplify: ({a} + {b}v + {c}v²)dx + {c}vx dv = 0"
  - "Separate variables: dx/x = -{c}v dv/({a} + {b}v + {c}v²)"
  - "Integrate both sides to get the solution"
  - "Back-substitute v = y/x to get: {answer} = C"