topic: differential_equations/second_order_constant
difficulty: hard
calculator: none
variables:
  r1: integer(-5, -1)
  r2: integer(1, 5)
  char_poly: (r - r1) * (r - r2)
  expanded_char: expand(char_poly)
  a: -(r1 + r2)
  b: r1 * r2
  c1: integer(-3, 3)
  c2: integer(-3, 3)
  general_solution: c1 * e^(r1 * x) + c2 * e^(r2 * x)
  y0: evaluate(general_solution, x, 0)
  y_prime: derivative(general_solution, x)
  y0_prime: evaluate(y_prime, x, 0)
  answer: general_solution
constraints:
  - r1 != r2
  - c1 != 0
  - c2 != 0
question: "Solve the initial value problem: y'' + {a}y' + {b}y = 0 with y(0) = {y0} and y'(0) = {y0_prime}"
answer: answer
solution:
  - "The characteristic equation is r² + {a}r + {b} = 0"
  - "This factors as {equation(char_poly, 0)}"
  - "So r = {r1} or r = {r2}"
  - "General solution: y = C₁e^({r1}x) + C₂e^({r2}x)"
  - "Apply y(0) = {y0}: C₁ + C₂ = {y0}"
  - "Find y' = {r1}C₁e^({r1}x) + {r2}C₂e^({r2}x)"
  - "Apply y'(0) = {y0_prime}: {r1}C₁ + {r2}C₂ = {y0_prime}"
  - "From the first equation: C₁ + C₂ = {y0}"
  - "From the second equation: {r1}C₁ + {r2}C₂ = {y0_prime}"
  - "Solving this system gives C₁ = {c1} and C₂ = {c2}"
  - "Therefore y = {answer}"