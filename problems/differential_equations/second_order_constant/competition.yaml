topic: differential_equations/second_order_constant
difficulty: competition
calculator: scientific
variables:
  # Design backward from characteristic roots
  r1: integer(-5, 5)
  r2: integer(-5, 5)
  # Build characteristic polynomial from roots
  char_poly: (r - r1) * (r - r2)
  expanded_char: expand(char_poly)
  # Extract coefficients for DE: y'' + py' + qy = 0
  p: -(r1 + r2)
  q: r1 * r2
  # Initial conditions chosen for clean particular solution
  y0: integer(1, 8)
  y_prime0: integer(-8, 8)
  # General solution coefficients from ICs
  c1: (y_prime0 - r2 * y0) / (r1 - r2)
  c2: (r1 * y0 - y_prime0) / (r1 - r2)
  # Verify c1, c2 are integers by construction
  c1_int: round(c1, 0)
  c2_int: round(c2, 0)
  # Build the particular solution
  answer: c1_int * e^(r1 * x) + c2_int * e^(r2 * x)
constraints:
  - r1 != r2
  - r1 != 0
  - abs(c1) == abs(c1_int)  # Ensures c1 came out integer
question: "Solve the initial value problem: y'' + {p}y' + {q}y = 0 with y(0) = {y0} and y'(0) = {y_prime0}"
answer: answer
solution:
  - "Find the characteristic equation: r² + {p}r + {q} = 0"
  - "Factor: {equation(char_poly, 0)}"
  - "Characteristic roots: r₁ = {r1}, r₂ = {r2}"
  - "General solution: y = c₁e^({r1}x) + c₂e^({r2}x)"
  - "Apply y(0) = {y0}: c₁ + c₂ = {y0}"
  - "Apply y'(0) = {y_prime0}: {r1}c₁ + {r2}c₂ = {y_prime0}"
  - "Solving the system: c₁ = {c1_int}, c₂ = {c2_int}"
  - "Particular solution: y = {answer}"