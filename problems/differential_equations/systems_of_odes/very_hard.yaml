topic: differential_equations/systems_of_odes
difficulty: very_hard
calculator: none
variables:
  a: integer(-4, 4)
  b: integer(-4, 4)
  c: integer(-4, 4)
  d: integer(-4, 4)
  det: a*d - b*c
  trace: a + d
  discriminant: trace^2 - 4*det
  lambda1: (trace + sqrt(discriminant))/2
  lambda2: (trace - sqrt(discriminant))/2
  v1_x: integer(-3, 3)
  v1_y: (lambda1 - a)*v1_x/b
  v2_x: integer(-3, 3)
  v2_y: (lambda2 - a)*v2_x/b
  c1: integer(-3, 3)
  c2: integer(-3, 3)
  x_solution: c1*v1_x*exp(lambda1*t) + c2*v2_x*exp(lambda2*t)
  y_solution: c1*v1_y*exp(lambda1*t) + c2*v2_y*exp(lambda2*t)
constraints:
  - det > 0
  - discriminant > 0
  - b != 0
question: "Solve the system {system(derivative_of(x, t) = a*x + b*y, derivative_of(y, t) = c*x + d*y)} with initial conditions x(0) = {c1*v1_x + c2*v2_x} and y(0) = {c1*v1_y + c2*v2_y}."
answer: x_solution
solution:
  - "Write the system in matrix form: {derivative_of(vec([x, y]), t)} = {matrix_of([[a, b], [c, d]])} {vec([x, y])}"
  - "Find eigenvalues by solving {det_of([[a - lambda, b], [c, d - lambda]])} = 0"
  - "This gives {equation((a - lambda)*(d - lambda) - b*c, 0)}"
  - "Expanding: {equation(lambda^2 - trace*lambda + det, 0)}"
  - "Using the quadratic formula: λ₁ = {lambda1}, λ₂ = {lambda2}"
  - "For λ₁ = {lambda1}, find eigenvector by solving {matrix_of([[a - lambda1, b], [c, d - lambda1]])} {vec([v_x, v_y])} = {vec([0, 0])}"
  - "Choose v₁ = {vec([v1_x, v1_y])}"
  - "For λ₂ = {lambda2}, similarly get v₂ = {vec([v2_x, v2_y])}"
  - "General solution: {vec([x, y])} = c₁{vec([v1_x, v1_y])}e^({lambda1}t) + c₂{vec([v2_x, v2_y])}e^({lambda2}t)"
  - "Apply initial conditions to find c₁ = {c1}, c₂ = {c2}"
  - "Therefore x(t) = {x_solution} and y(t) = {y_solution}"