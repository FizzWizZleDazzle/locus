topic: differential_equations/systems_of_odes
difficulty: very_easy
calculator: none
variables:
  a: integer(-3, 3)
  b: integer(-3, 3)
  c: integer(-3, 3)
  d: integer(-3, 3)
  det: a*d - b*c
  trace: a + d
  discriminant: trace^2 - 4*det
  lambda1: (trace + sqrt(discriminant))/2
  lambda2: (trace - sqrt(discriminant))/2
constraints:
  - det != 0
  - discriminant > 0
  - discriminant == 1 or discriminant == 4 or discriminant == 9
question: "Find the eigenvalues of the system {system(derivative(x, t) = a*x + b*y, derivative(y, t) = c*x + d*y)}"
answer: lambda1, lambda2
answer_type: set
solution:
  - "The coefficient matrix is {matrix_of([[a, b], [c, d]])}"
  - "Find eigenvalues by solving {equation(det([[a - lambda, b], [c, d - lambda]]), 0)}"
  - "This gives {equation((a - lambda)(d - lambda) - b*c, 0)}"
  - "Expanding: {equation(lambda^2 - (a + d)*lambda + (a*d - b*c), 0)}"
  - "So {equation(lambda^2 - trace*lambda + det, 0)}"
  - "Using the quadratic formula: lambda = {(trace ± sqrt(discriminant))/2}"
  - "Therefore lambda = {lambda1} and lambda = {lambda2}"