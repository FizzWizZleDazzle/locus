topic: differential_equations/systems_of_odes
difficulty: competition
calculator: none
variables:
  lambda1: choice(-3, -2, -1, 1, 2, 3)
  lambda2: choice(-3, -2, -1, 1, 2, 3)
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: a*lambda1 + b*lambda2
  d: a*lambda1^2 + b*lambda2^2
  char_poly: r^2 + c*r - d
  eigenvalues: solve(char_poly, r)
  x0: integer(1, 5)
  y0: integer(1, 5)
  A: (y0 - lambda2*x0)/(lambda1 - lambda2)
  B: (lambda1*x0 - y0)/(lambda1 - lambda2)
  answer: A, B
constraints:
  - lambda1 != lambda2
  - lambda1 < lambda2
question: "Consider the system {system(derivative(x, t) = y, derivative(y, t) = d*x - c*y)}. Given initial conditions x(0) = {x0} and y(0) = {y0}, find the constants A and B in the general solution x(t) = A*e^({lambda1}*t) + B*e^({lambda2}*t)."
answer: answer
answer_type: tuple
solution:
  - "Convert to matrix form: X' = [[0, 1], [{d}, -{c}]] * X where X = [x, y]^T"
  - "Find eigenvalues by solving det([[0, 1], [{d}, -{c}]] - rI) = 0"
  - "This gives characteristic equation: {equation(char_poly, 0)}"
  - "Eigenvalues are r = {lambda1} and r = {lambda2}"
  - "General solution: x(t) = A*e^({lambda1}*t) + B*e^({lambda2}*t)"
  - "Apply x(0) = {x0}: A + B = {x0}"
  - "For y(t), we have y(t) = x'(t) = {lambda1}*A*e^({lambda1}*t) + {lambda2}*B*e^({lambda2}*t)"
  - "Apply y(0) = {y0}: {lambda1}*A + {lambda2}*B = {y0}"
  - "Solving the system: A = {A}, B = {B}"