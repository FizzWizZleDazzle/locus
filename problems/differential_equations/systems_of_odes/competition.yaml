topic: differential_equations/systems_of_odes
difficulty: competition
calculator: none
variables:
  a: integer(-4, 4)
  b: integer(-4, 4)
  c: integer(-4, 4)
  d: integer(-4, 4)
  A: matrix(2, 2, -4, 4)
  det: a*d - b*c
  trace: a + d
  discriminant: trace^2 - 4*det
  sqrt_disc: sqrt(discriminant)
  lambda1: (trace + sqrt_disc)/2
  lambda2: (trace - sqrt_disc)/2
  k1: integer(1, 3)
  k2: integer(1, 3)
  c1: k1
  c2: k2
  x_sol: c1 * exp(lambda1 * t) + c2 * exp(lambda2 * t)
  y_expr: (lambda1 - a)/b
  y_sol: c1 * y_expr * exp(lambda1 * t) + c2 * ((lambda2 - a)/b) * exp(lambda2 * t)
  init_x: k1 + k2
  init_y_coef1: y_expr
  init_y_coef2: (lambda2 - a)/b
  init_y: k1 * init_y_coef1 + k2 * init_y_coef2
constraints:
  - det > 0
  - discriminant == 9 or discriminant == 16 or discriminant == 25
  - b != 0
question: "Consider the system {system(derivative_of(x, t) = a*x + b*y, derivative_of(y, t) = c*x + d*y)}. Given initial conditions x(0) = {init_x} and y(0) = {init_y}, find the solution x(t)."
answer: x_sol
solution:
  - "The system matrix is A = {matrix_of(A)}"
  - "Find eigenvalues: {det_of(A - lambda*I)} = 0"
  - "This gives λ² - {trace}λ + {det} = 0"
  - "Using the quadratic formula: λ = {lambda1}, {lambda2}"
  - "For λ₁ = {lambda1}, eigenvector v₁ has y/x = {y_expr}"
  - "For λ₂ = {lambda2}, eigenvector v₂ has y/x = {init_y_coef2}"
  - "General solution: x(t) = c₁e^({lambda1}t) + c₂e^({lambda2}t)"
  - "From x(0) = {init_x}: c₁ + c₂ = {init_x}"
  - "From y(0) = {init_y}: {y_expr}c₁ + {init_y_coef2}c₂ = {init_y}"
  - "Solving: c₁ = {c1}, c₂ = {c2}"
  - "Therefore x(t) = {x_sol}"