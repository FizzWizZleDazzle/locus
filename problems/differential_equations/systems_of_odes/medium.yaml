topic: differential_equations/systems_of_odes
difficulty: medium
calculator: scientific
variants:
  - name: default
    variables:
      lam1: nonzero(-4, -1)
      lam2: integer(1, 4)
      a: 0
      b: 1
      c: -lam1*lam2
      d: lam1 + lam2
      trace_val: a + d
      det_val: a*d - b*c
      char_poly: expand((x - lam1)*(x - lam2))
      rhs_x: a*x + b*y
      rhs_y: c*x + d*y
    constraints:
      - lam1 != lam2
    question: Consider the linear system {system(equation(derivative_of(x, t), rhs_x), equation(derivative_of(y, t), rhs_y))}. Find the eigenvalues of the coefficient matrix {matrix_of([[a, b], [c, d]])}.
    answer: lam1, lam2
    answer_type: set
    solution:
      - The coefficient matrix is {matrix_of([[a, b], [c, d]])}.
      - Compute the characteristic polynomial by expanding {det_of([[a - x, b], [c, d - x]])} and setting it to zero.
      - Trace is {trace_val} and determinant is {det_val}.
      - The characteristic equation is {equation(char_poly, 0)}.
      - Factoring gives {equation((x - lam1)*(x - lam2), 0)}, so the eigenvalues are {lam1} and {lam2}.
