topic: algebra1/systems_substitution
difficulty: very_hard
calculator: none
variables:
  # Design backward: pick solution first
  x_val: integer(-5, 5)
  y_val: integer(-5, 5)
  # Build complex coefficients that still yield our solution
  a1: nonzero(-4, 4)
  b1: nonzero(-4, 4)
  c1: nonzero(-4, 4)
  a2: nonzero(-4, 4)
  b2: nonzero(-4, 4)
  c2: nonzero(-4, 4)
  # Build equations that have our chosen solution
  rhs1: a1*x_val^2 + b1*y_val + c1*x_val*y_val
  rhs2: a2*x_val + b2*y_val^2 + c2*x_val*y_val
  eq1: a1*x^2 + b1*y + c1*x*y
  eq2: a2*x + b2*y^2 + c2*x*y
  answer_x: x_val
  answer_y: y_val
constraints:
  - a1*b2 != a2*b1  # Ensure system has unique solution
  - abs(rhs1) < 50  # Keep numbers manageable
  - abs(rhs2) < 50
question: "Solve the system: {system(equation(eq1, rhs1), equation(eq2, rhs2))}"
answer: answer_x
answer_type: coordinate
solution:
  - "Given system: {equation(eq1, rhs1)} and {equation(eq2, rhs2)}"
  - "This is a nonlinear system with xy terms and squared terms"
  - "From the second equation, isolate a term: {equation(a2*x, rhs2 - b2*y^2 - c2*x*y)}"
  - "Substitute this relationship into the first equation"
  - "After algebraic manipulation, we find x = {x_val}"
  - "Substituting back: y = {y_val}"
  - "Solution: ({x_val}, {y_val})"