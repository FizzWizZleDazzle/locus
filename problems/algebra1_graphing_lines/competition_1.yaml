topic: algebra1/graphing_lines
difficulty: competition
calculator: none
variables:
  m1: integer(-5, 5)
  m2: integer(-5, 5)
  b1: integer(-8, 8)
  b2: integer(-8, 8)
  line1: m1*x + b1
  line2: m2*x + b2
  x_int: (b2 - b1)/(m1 - m2)
  y_int: m1*x_int + b1
  x_coord: simplify(x_int)
  y_coord: simplify(y_int)
  area_expr: abs(x_coord * y_coord / 2)
  answer: simplify(area_expr)
constraints:
  - m1 != m2
  - m1 != 0
  - m2 != 0
question: "Two lines {equation(y, line1)} and {equation(y, line2)} intersect to form a triangle with the coordinate axes. Find the area of this triangle."
answer: answer
solution:
  - "Find where the lines intersect by solving {equation(line1, line2)}"
  - "This gives x = {x_coord}, so y = {y_coord}"
  - "The lines intersect the axes at: Line 1 crosses y-axis at (0, {b1}) and x-axis at ({simplify(-b1/m1)}, 0)"
  - "Line 2 crosses y-axis at (0, {b2}) and x-axis at ({simplify(-b2/m2)}, 0)"
  - "The three vertices of the triangle are the intersection point ({x_coord}, {y_coord}) and two axis intercepts"
  - "Using the formula for area with vertices, the area is {answer}"