topic: differential_equations/variation_of_parameters
difficulty: very_hard
calculator: none
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  a: r1 + r2
  b: r1 * r2
  diff_eq: y'' - a*y' + b*y
  g: (r2 - r1) * exp(r1 * x)
  y_h1: exp(r1 * x)
  y_h2: exp(r2 * x)
  W: (r2 - r1) * exp((r1 + r2) * x)
  u1_prime: -g * y_h2 / W
  u2_prime: g * y_h1 / W
  u1_simplified: simplify(u1_prime)
  u2_simplified: simplify(u2_prime)
  u1: integral(u1_simplified, x)
  u2: integral(u2_simplified, x)
  y_p: simplify(u1 * y_h1 + u2 * y_h2)
  answer: y_p
constraints:
  - r1 < 0
  - r2 > 0
  - abs(r1) != abs(r2)
question: "Use variation of parameters to find a particular solution to {equation(diff_eq, g)}."
answer: answer
solution:
  - "The characteristic equation is {equation(r^2 - a*r + b, 0)}"
  - "Factor: {equation((r - r1)*(r - r2), 0)}, so r = {r1}, {r2}"
  - "Homogeneous solutions: y₁ = {y_h1}, y₂ = {y_h2}"
  - "Wronskian: W = {W}"
  - "For variation of parameters: u₁' = {u1_simplified}, u₂' = {u2_simplified}"
  - "Integrate: u₁ = {u1}, u₂ = {u2}"
  - "Particular solution: yₚ = {y_p}"