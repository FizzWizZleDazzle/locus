topic: differential_equations/variation_of_parameters
difficulty: easy
calculator: scientific
variables:
  a: integer(2, 5)
  r: integer(-3, -1)
  c: integer(1, 3)
  homogeneous: y'' - a*y' + a*r*y
  y1: exp(r*x)
  y2: exp(a*x)
  g: c*exp(r*x)
  W: simplify(y1*derivative(y2, x) - y2*derivative(y1, x))
  u1_prime: simplify(-y2*g/W)
  u2_prime: simplify(y1*g/W)
  u1: integral(u1_prime, x)
  u2: integral(u2_prime, x)
  y_p: simplify(u1*y1 + u2*y2)
  answer: simplify(y_p)
constraints:
  - a != r
  - a > 0
question: "Use variation of parameters to find a particular solution to {equation(homogeneous, g)}. The homogeneous solutions are {y1} and {y2}."
answer: answer
solution:
  - "The Wronskian is W = {equation(y1*derivative(y2, x) - y2*derivative(y1, x), W)}"
  - "For variation of parameters: u₁' = {equation(-y2*g/W, u1_prime)}"
  - "u₂' = {equation(y1*g/W, u2_prime)}"
  - "Integrating: u₁ = {u1}, u₂ = {u2}"
  - "The particular solution is yₚ = u₁y₁ + u₂y₂ = {answer}"