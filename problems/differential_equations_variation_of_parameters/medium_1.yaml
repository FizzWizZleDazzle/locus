topic: differential_equations/variation_of_parameters
difficulty: medium
calculator: scientific
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  g_coeff: choice(1, 2, 3, 4)
  g: g_coeff * exp(3*x)
  char_eq: (r - r1) * (r - r2)
  expanded_char: expand(char_eq)
  a: -(r1 + r2)
  b: r1 * r2
  y1: exp(r1 * x)
  y2: exp(r2 * x)
  W: y1 * derivative(y2, x) - y2 * derivative(y1, x)
  W_simplified: simplify(W)
  u1_prime: -y2 * g / W_simplified
  u2_prime: y1 * g / W_simplified
  u1: integral(u1_prime, x)
  u2: integral(u2_prime, x)
  y_p: simplify(u1 * y1 + u2 * y2)
  answer: y_p
constraints:
  - r1 != r2
  - r1 + r2 != 3
question: "Use variation of parameters to find a particular solution to {equation(derivative(derivative(y, x), x) + a * derivative(y, x) + b * y, g)}."
answer: answer
solution:
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "This factors as {equation(char_eq, 0)}, giving r = {r1}, {r2}"
  - "The complementary solution is y_c = c1 * exp({r1}*x) + c2 * exp({r2}*x)"
  - "For variation of parameters, let y1 = {y1} and y2 = {y2}"
  - "The Wronskian is W = {W_simplified}"
  - "u1' = -{y2} * {g} / {W_simplified} = {u1_prime}"
  - "u2' = {y1} * {g} / {W_simplified} = {u2_prime}"
  - "Integrating: u1 = {u1}, u2 = {u2}"
  - "Therefore y_p = u1*y1 + u2*y2 = {y_p}"