topic: geometry/area_of_polygons
difficulty: competition
calculator: none
variables:
  # Backward design: construct a hexagon from equilateral triangles
  # This guarantees integer area with side length 6
  s: 6
  # Area of regular hexagon = (3√3/2)s² = (3√3/2)*36 = 54√3
  # But we want integer area, so use a different approach
  # Construct hexagon as rectangle with two triangular cuts
  w: 12
  h: 9
  # Cut triangles from corners with base 3, height 4
  cut_base: 3
  cut_height: 4
  rect_area: w * h
  triangle_area: cut_base * cut_height / 2
  total_cut: 2 * triangle_area
  hexagon_area: rect_area - total_cut
  # Now add a trapezoid attached to one side
  trap_b1: 8
  trap_b2: 5
  trap_h: 6
  trapezoid_area: (trap_b1 + trap_b2) * trap_h / 2
  answer: hexagon_area + trapezoid_area
question: "A convex polygon is formed by taking a {w} by {h} rectangle, cutting isosceles right triangles with legs of length {cut_base} from two opposite corners, then attaching a trapezoid with parallel sides {trap_b1} and {trap_b2} and height {trap_h} to one of the uncut sides. Find the area of the resulting polygon."
answer: answer
solution:
  - "Start with rectangle area: {w} × {h} = {rect_area}"
  - "Each cut triangle has area: ({cut_base} × {cut_height})/2 = {triangle_area}"
  - "Total area removed: 2 × {triangle_area} = {total_cut}"
  - "Hexagon area: {rect_area} - {total_cut} = {hexagon_area}"
  - "Trapezoid area: ({trap_b1} + {trap_b2}) × {trap_h} / 2 = {trapezoid_area}"
  - "Total polygon area: {hexagon_area} + {trapezoid_area} = {answer}"