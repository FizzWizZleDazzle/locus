topic: precalculus/transformations
difficulty: very_easy
calculator: none
variables:
  h: integer(-5, 5)
  k: integer(-5, 5)
  f: x^2
  g: (x - h)^2 + k
  vertex_x: h
  vertex_y: k
constraints:
  - h != 0
  - k != 0
question: "The graph of {equation(f, y)} is shifted to create {equation(g, y)}. What is the vertex of the new parabola?"
answer: vertex_x
answer_type: coordinate
answer_y: vertex_y
solution:
  - "The original parabola {equation(f, y)} has vertex at (0, 0)"
  - "The transformation {equation(g, y)} shifts the graph:"
  - "- Right by {h} units (since we have (x - {h}))"
  - "- Up by {k} units (since we add {k})"
  - "Therefore, the new vertex is at ({vertex_x}, {vertex_y})"