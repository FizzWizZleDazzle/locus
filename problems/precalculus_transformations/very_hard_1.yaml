topic: precalculus/transformations
difficulty: very_hard
calculator: graphing
variables:
  # Design backwards: start with a clean transformed function
  a: choice(-3, -2, 2, 3)
  h: nonzero(-4, 4)
  k: nonzero(-6, 6)
  # Base function with integer critical points
  p: integer(2, 4)
  q: integer(-3, 3)
  base: x^p + q*x
  # Build the transformed function
  g: a * base.subs(x, x - h) + k
  expanded_g: expand(g)
  # Find critical points of both functions
  base_derivative: derivative(base, x)
  g_derivative: derivative(expanded_g, x)
  base_critical: solve(base_derivative, x)
  g_critical: solve(g_derivative, x)
  # Verify the transformation relationship
  critical_shift: g_critical[0] - base_critical[0]
  # Y-values at critical points
  base_y: evaluate(base, x, base_critical[0])
  g_y: evaluate(expanded_g, x, g_critical[0])
  y_scale_shift: simplify((g_y - k) / base_y)
constraints:
  - p % 2 == 0  # Even power ensures single critical point at origin for base
  - q != 0  # Ensures non-trivial transformation
  - abs(a) > 1  # Non-trivial vertical scaling
question: "Given f(x) = {base}, the function g(x) = {expanded_g} is obtained by applying transformations to f(x). Identify the sequence of transformations (horizontal shift, vertical scaling, vertical shift) and verify by comparing the critical points of both functions."
answer: a
answer_type: expression
solution:
  - "First, find the critical point of f(x) = {base}"
  - "{derivative_of(base, x)} = {base_derivative}"
  - "Setting equal to 0: {base_critical[0]}"
  - "Now find the critical point of g(x) = {expanded_g}"
  - "{derivative_of(expanded_g, x)} = {g_derivative}"
  - "Setting equal to 0: x = {g_critical[0]}"
  - "The horizontal shift is {g_critical[0]} - {base_critical[0]} = {h}"
  - "To find vertical scaling and shift, evaluate at critical points:"
  - "f({base_critical[0]}) = {base_y}"
  - "g({g_critical[0]}) = {g_y}"
  - "Since g(x) = a·f(x - h) + k, we have:"
  - "{g_y} = a·{base_y} + k"
  - "The transformation is: horizontal shift by {h}, vertical scale by {a}, vertical shift by {k}"
  - "This gives g(x) = {a}·f(x - {h}) + {k}"