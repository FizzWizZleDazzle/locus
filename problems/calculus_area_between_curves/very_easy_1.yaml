topic: calculus/area_between_curves
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  f: a * x
  g: b * x^2
  x1: 0
  x2: a/b
  integrand: f - g
  antiderivative: (a * x^2)/2 - (b * x^3)/3
  area_value: evaluate(antiderivative, x, x2) - evaluate(antiderivative, x, x1)
  answer: simplify(area_value)
constraints:
  - a > b
question: "Find the area between {equation(y, f)} and {equation(y, g)} from x = {x1} to where they intersect."
answer: answer
solution:
  - "Find intersection: {f} = {g}"
  - "Solve: {a}x = {b}x^2, so x = 0 or x = {x2}"
  - "Since {f} > {g} on (0, {x2}), area = {integral_of(integrand, x)}"
  - "= {antiderivative} evaluated from {x1} to {x2}"
  - "= {answer}"