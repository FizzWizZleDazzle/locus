topic: algebra2/complex_number_operations
difficulty: hard
calculator: none
variables:
  a: integer(-5, 5)
  b: nonzero(-5, 5)
  c: integer(-5, 5)
  d: nonzero(-5, 5)
  z1: a + b*i
  z2: c + d*i
  product: expand(z1 * z2)
  real_part: a*c - b*d
  imag_part: a*d + b*c
  answer: product
constraints:
  - abs(real_part) <= 30
  - abs(imag_part) <= 30
  - gcd(abs(real_part), abs(imag_part)) == 1
question: "Let z₁ = {z1} and z₂ = {z2}. Find the product z₁z₂ and express it in the form a + bi."
answer: answer
solution:
  - "To multiply complex numbers, use (a + bi)(c + di) = ac - bd + (ad + bc)i"
  - "z₁z₂ = ({a} + {b}i)({c} + {d}i)"
  - "= ({a})({c}) - ({b})({d}) + [({a})({d}) + ({b})({c})]i"
  - "= {real_part} + {imag_part}i"
  - "Therefore z₁z₂ = {answer}"