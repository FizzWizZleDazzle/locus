topic: algebra2/complex_number_operations
difficulty: hard
calculator: none
variables:
  a1: nonzero(-5, 5)
  b1: nonzero(-5, 5)
  a2: nonzero(-5, 5)
  b2: nonzero(-5, 5)
  z1: a1 + b1*i
  z2: a2 + b2*i
  product_real: a1*a2 - b1*b2
  product_imag: a1*b2 + a2*b1
  product: product_real + product_imag*i
  z2_conj: a2 - b2*i
  num_real: a1*a2 + b1*b2
  num_imag: b1*a2 - a1*b2
  denom: a2^2 + b2^2
  quot_real: num_real/denom
  quot_imag: num_imag/denom
  answer: quot_real + quot_imag*i
constraints:
  - a1 != a2
  - b1 != b2
question: "Let z₁ = {z1} and z₂ = {z2}. Find z₁/z₂ in the form a + bi."
answer: answer
answer_type: expression
solution:
  - "To divide complex numbers, multiply by the conjugate of the denominator"
  - "z₁/z₂ = {z1}/{z2} · {z2_conj}/{z2_conj}"
  - "Numerator: ({a1} + {b1}i)({a2} - {b2}i) = {a1}·{a2} - {a1}·{b2}i + {b1}·{a2}i - {b1}·{b2}i²"
  - "= {num_real} + {num_imag}i (since i² = -1)"
  - "Denominator: ({a2} + {b2}i)({a2} - {b2}i) = {denom}"
  - "Therefore: z₁/z₂ = ({num_real} + {num_imag}i)/{denom} = {answer}"