topic: algebra2/complex_number_operations
difficulty: hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  d: nonzero(-5, 5)
  numer: a + b*I
  denom: c + d*I
  denom_sq: c*c + d*d
  num_real: a*c + b*d
  num_imag: b*c - a*d
  real_part: num_real / denom_sq
  imag_part: num_imag / denom_sq
  answer: real_part + imag_part*I
  conj: c - d*I
  num_after_conj: num_real + num_imag*I
question: "Divide {numer} by {denom} and write the result in the form {math(p + q*I)}, where {math(p)} and {math(q)} are real numbers."
answer: answer
answer_type: expression
solution:
  - "Multiply the numerator and denominator by the complex conjugate of the denominator."
  - "The conjugate of {denom} is {conj}."
  - "New numerator: {numer} times {conj} = {num_after_conj}."
  - "New denominator: {denom} times {conj} = {denom_sq}."
  - "Divide each component by {denom_sq}: {answer}."
