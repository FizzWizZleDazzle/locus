topic: algebra2/complex_number_operations
difficulty: medium
calculator: none

variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  d: nonzero(-5, 5)
  ac: a*c
  bd: b*d
  ad: a*d
  bc: b*c
  neg_bd: -b*d
  real_part: a*c - b*d
  imag_part: a*d + b*c

question: "Compute the product of {math(a + b*i)} and {math(c + d*i)}, where {math(i^2 = -1)}. Give your answer as an ordered pair {math((p, q))} where {math(p)} is the real part and {math(q)} is the imaginary part."

answer: real_part, imag_part
answer_type: tuple

solution:
  - "Use FOIL to multiply the two complex numbers."
  - "F (first): {a} * {c} = {ac}."
  - "O (outer): {a} * {math(d*i)} = {math(ad*i)}."
  - "I (inner): {math(b*i)} * {c} = {math(bc*i)}."
  - "L (last): {math(b*i)} * {math(d*i)} = {math(b*d)} * {math(i^2)} = {bd} * (-1) = {neg_bd}."
  - "Combine real parts: {ac} and {neg_bd} give {real_part}."
  - "Combine imaginary parts: {ad} and {bc} give {imag_part}."
  - "The product is {math(real_part + imag_part*i)}, giving {math((p, q))} = ({real_part}, {imag_part})."
