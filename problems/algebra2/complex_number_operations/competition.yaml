topic: algebra2/complex_number_operations
difficulty: competition
calculator: none
variables:
  a: integer(-5, 5)
  b: nonzero(-5, 5)
  c: integer(-5, 5)
  d: nonzero(-5, 5)
  z1: a + b*i
  z2: c + d*i
  product: expand(z1 * z2)
  real_part: a*c - b*d
  imag_part: a*d + b*c
  modulus_sq: real_part^2 + imag_part^2
  n: integer(3, 5)
  power: expand(z1^n)
  conjugate: a - b*i
  quotient_num: expand(z1 * conjugate)
  quotient_den: a^2 + b^2
  answer: expand((z1 * z2)^2 / (z1^n))
constraints:
  - a^2 + b^2 <= 25
  - gcd(abs(real_part), abs(imag_part)) == 1
  - mod(n, 2) == 1
question: "Let z = {z1} and w = {z2}. Compute {equation((z * w)^2 / z^n, ?)}"
answer: answer
solution:
  - "First compute zw = {product}"
  - "Then (zw)² = {expand((z1 * z2)^2)}"
  - "Next compute z^{n} = {power}"
  - "To divide complex numbers, multiply numerator and denominator by the conjugate of the denominator"
  - "The answer is {answer}"