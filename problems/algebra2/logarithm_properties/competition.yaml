topic: algebra2/logarithm_properties
difficulty: competition
calculator: none
variables:
  # Design backwards: want log_b(x) + log_b(y) = clean integer
  # So x*y must be a perfect power of b
  b: choice(2, 3, 5)
  k: integer(3, 6)
  product: b^k
  # Factor product into two parts that are powers of b
  k1: integer(1, 5)
  k2: k - k1
  x: b^k1
  y: b^k2
  # Create a more complex expression
  m: integer(2, 4)
  n: integer(2, 4)
  expr: log(x^m * y^n, b) - log(x^(m-1), b) - log(y^(n-1), b)
  answer: simplify(expr)
constraints:
  - k1 < k - 1
  - k1 >= 2
  - k2 >= 2
question: "Simplify the expression {equation(log(x^m * y^n, b) - log(x^(m-1), b) - log(y^(n-1), b), '?')} where x = {x}, y = {y}, and all logarithms are base {b}."
answer: answer
solution:
  - "Given x = {x} = {b}^{k1} and y = {y} = {b}^{k2}"
  - "Rewrite the expression using logarithm properties:"
  - "{log(x^m * y^n, b)} = {log(x^m, b)} + {log(y^n, b)} = m·{log(x, b)} + n·{log(y, b)}"
  - "Since x = {b}^{k1}, we have {log(x, b)} = {k1}"
  - "Since y = {b}^{k2}, we have {log(y, b)} = {k2}"
  - "So {log(x^m * y^n, b)} = {m}·{k1} + {n}·{k2} = {m*k1 + n*k2}"
  - "Similarly, {log(x^(m-1), b)} = ({m}-1)·{k1} = {(m-1)*k1}"
  - "And {log(y^(n-1), b)} = ({n}-1)·{k2} = {(n-1)*k2}"
  - "Therefore: {m*k1 + n*k2} - {(m-1)*k1} - {(n-1)*k2} = {answer}"