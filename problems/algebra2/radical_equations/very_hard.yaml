topic: algebra2/radical_equations
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(1, 3)
  k: a^2 + b^2
  m: 2*a*b
  p: a^2 - b^2
  q: c^2
  left: sqrt(k*x + m) + sqrt(k*x - m)
  right: c * sqrt(p*x + q)
  x_val: (c^2 * q - 2*b^2) / (2*b^2 - c^2 * p)
  answer: simplify(x_val)
constraints:
  - 2*b^2 != c^2 * p
  - c^2 * q > 2*b^2
  - p > 0
question: "Solve the equation {equation(left, right)} for x."
answer: answer
solution:
  - "Start with {equation(left, right)}"
  - "Square both sides: {equation((sqrt(k*x + m) + sqrt(k*x - m))^2, (c * sqrt(p*x + q))^2)}"
  - "Expand left side: {k}x + {m} + 2{sqrt((k*x + m)(k*x - m))} + {k}x - {m} = {c^2}({p}x + {q})"
  - "Simplify: {2*k}x + 2{sqrt((k*x)^2 - m^2)} = {c^2 * p}x + {c^2 * q}"
  - "Since (k*x)^2 - m^2 = {k^2}x^2 - {m^2}, and k = {k}, m = {m}:"
  - "We have k^2 - m^2 = {k^2} - {m^2} = {k^2 - m^2} = {4*a^2*b^2}"
  - "So: {2*k}x + 2{sqrt(4*a^2*b^2*x^2)} = {c^2 * p}x + {c^2 * q}"
  - "This gives: {2*k}x + {2*2*a*b}x = {c^2 * p}x + {c^2 * q}"
  - "Simplify: {2*k + 4*a*b}x = {c^2 * p}x + {c^2 * q}"
  - "Since k = {k} and 2ab = {m/2}, we get: {2*k + 2*m}x = {c^2 * p}x + {c^2 * q}"
  - "Rearranging: {2*k + 2*m - c^2 * p}x = {c^2 * q}"
  - "Therefore: x = {c^2 * q}/{2*k + 2*m - c^2 * p}"
  - "Substituting values and simplifying: x = {answer}"
  - "Check: Both sides equal {evaluate(right, x, answer)} when x = {answer}"