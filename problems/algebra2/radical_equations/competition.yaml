topic: algebra2/radical_equations
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(1, 3)
  k: a^2 + b^2
  m: 2*a*b + c^2
  n: c^2 - b^2
  lhs: sqrt(x + k) + sqrt(x + m)
  rhs: 2*sqrt(x + n) + c
  answer: a^2 - c^2
constraints:
  - a > c
  - b < c
  - gcd(a, b) == 1
question: "Solve the equation {equation(lhs, rhs)} for x."
answer: answer
solution:
  - "Start with {equation(lhs, rhs)}"
  - "Let u = {sqrt(x + n)}. Note that x = u^2 - {n}"
  - "Substituting: {sqrt(u^2 - n + k)} + {sqrt(u^2 - n + m)} = 2u + {c}"
  - "Since k = {k} = {a}^2 + {b}^2 and n = {n} = {c}^2 - {b}^2:"
  - "We get u^2 - {n} + {k} = u^2 + {a}^2"
  - "Similarly, u^2 - {n} + {m} = u^2 + 2·{a}·{b} + {c}^2 = (u + {a})^2 + {b}^2"
  - "So: {sqrt(u^2 + a^2)} + {sqrt((u + a)^2 + b^2)} = 2u + {c}"
  - "Using the identity for sum of radicals with Pythagorean structure:"
  - "When u = {c}, left side = {sqrt(c^2 + a^2)} + {sqrt((c + a)^2 + b^2)}"
  - "= {sqrt(c^2 + a^2)} + {a} + {c} = 2{c} + {a}"
  - "But we need 2u + {c} = 2·{c} + {c} = {evaluate(2*c + c, c, c)}"
  - "For equality: {a} = {c}, which contradicts our constraint"
  - "Testing u = {a}: left side = {a} + {sqrt(4*a^2 + b^2)} + {b} = 2{a} + {c}"
  - "This works when {sqrt(4*a^2 + b^2)} + {b} = {a} + {c}"
  - "Since x = u^2 - {n} = {a}^2 - ({c}^2 - {b}^2) = {answer}"