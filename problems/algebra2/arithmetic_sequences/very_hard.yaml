topic: algebra2/arithmetic_sequences
difficulty: very_hard
calculator: none
variables:
  # Design backwards: pick the answer first (sum of specific terms)
  target_sum: integer(150, 300)
  # Pick which terms to sum (non-consecutive for complexity)
  k1: integer(5, 8)
  k2: integer(12, 15)
  k3: integer(20, 25)
  # Work backwards: if a_k1 + a_k2 + a_k3 = target_sum
  # and a_n = a_1 + (n-1)d, we need to solve for a_1 and d
  # Let's pick d first to ensure clean arithmetic
  d: nonzero(-5, 5)
  # From a_k1 + a_k2 + a_k3 = target_sum:
  # 3*a_1 + d*(k1-1 + k2-1 + k3-1) = target_sum
  # So a_1 = (target_sum - d*(k1 + k2 + k3 - 3))/3
  sum_indices: k1 + k2 + k3 - 3
  a1: (target_sum - d * sum_indices) / 3
  # Now define the sequence terms
  term1: a1 + (k1 - 1) * d
  term2: a1 + (k2 - 1) * d  
  term3: a1 + (k3 - 1) * d
  # Additional term for the question
  n: integer(30, 40)
  answer: a1 + (n - 1) * d
constraints:
  - k1 < k2
  - k2 < k3
  - mod(target_sum - d * sum_indices, 3) == 0
question: "In an arithmetic sequence, the {k1}th term is {term1}, the {k2}th term is {term2}, and the {k3}th term is {term3}. Find the {n}th term."
answer: answer
solution:
  - "Let the first term be a and the common difference be d"
  - "For an arithmetic sequence: a_n = a + (n-1)d"
  - "From the given information:"
  - "a_{k1} = a + {k1 - 1}d = {term1}"
  - "a_{k2} = a + {k2 - 1}d = {term2}"
  - "a_{k3} = a + {k3 - 1}d = {term3}"
  - "From the first two equations: {term2} - {term1} = ({k2 - 1} - {k1 - 1})d = {k2 - k1}d"
  - "So d = {d}"
  - "Substituting back: a + {k1 - 1}({d}) = {term1}"
  - "Therefore a = {a1}"
  - "The {n}th term is: a_{n} = {a1} + ({n} - 1)({d}) = {answer}"