topic: algebra2/arithmetic_sequences
difficulty: medium
calculator: none
variants:
  - name: default
    variables:
      a1: integer(2, 15)
      d: nonzero(-6, 6)
      n: integer(6, 20)
      n_minus_1: n - 1
      step: n_minus_1 * d
      answer: a1 + step
    question: An arithmetic sequence has first term {a1} and common difference {d}. Find the {n}th term.
    answer: answer
    answer_type: numeric
    solution:
      - 'The nth term formula is: a_n = a_1 + (n - 1)d.'
      - Here the first term is {a1}, the common difference is {d}, and n = {n}.
      - 'Compute (n - 1)d: ({n_minus_1})({d}) = {step}.'
      - Therefore the {n}th term equals {a1} + ({step}) = {answer}.
