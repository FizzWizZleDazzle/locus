topic: algebra2/arithmetic_sequences
difficulty: easy
calculator: none
variables:
  a1: integer(2, 10)
  d: nonzero(-5, 5)
  n: integer(4, 8)
  an: a1 + (n - 1) * d
  answer: an
constraints:
  - d > 0
question: "Find the {n}th term of the arithmetic sequence where the first term is {a1} and the common difference is {d}."
answer: answer
answer_type: numeric
solution:
  - "Use the formula for the nth term: a_n = a_1 + (n - 1)d"
  - "Substitute a_1 = {a1}, d = {d}, and n = {n}"
  - "a_{n} = {a1} + ({n} - 1) × {d}"
  - "a_{n} = {a1} + {evaluate((n - 1) * d, n, n)}"
  - "a_{n} = {answer}"