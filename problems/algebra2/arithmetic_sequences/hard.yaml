topic: algebra2/arithmetic_sequences
difficulty: hard
calculator: none
variables:
  d: nonzero(-12, 12)
  n: integer(15, 25)
  k: integer(3, 7)
  a1: integer(-20, 20)
  an: a1 + (n - 1) * d
  ak: a1 + (k - 1) * d
  sum_n: n * (a1 + an) / 2
  sum_k: k * (a1 + ak) / 2
  diff: sum_n - sum_k
  answer: d
constraints:
  - abs(d) >= 3
  - mod(n * (2 * a1 + (n - 1) * d), 2) == 0
  - mod(k * (2 * a1 + (k - 1) * d), 2) == 0
question: "An arithmetic sequence has first term {a1}. The sum of the first {n} terms minus the sum of the first {k} terms equals {diff}. Find the common difference."
answer: answer
solution:
  - "Let d be the common difference"
  - "Sum of first n terms: {equation(sum_n, n * (2 * a1 + (n - 1) * d) / 2)}"
  - "Sum of first {n} terms: {equation(sum_n, n * (2 * {a1} + ({n} - 1) * d) / 2)}"
  - "Sum of first {k} terms: {equation(sum_k, k * (2 * {a1} + ({k} - 1) * d) / 2)}"
  - "Given: {equation(sum_n - sum_k, diff)}"
  - "Substituting: {equation(n * (2 * {a1} + ({n} - 1) * d) / 2 - k * (2 * {a1} + ({k} - 1) * d) / 2, diff)}"
  - "Simplifying the left side gives us an equation in d"
  - "Solving for d: d = {answer}"