topic: algebra2/arithmetic_sequences
difficulty: competition
calculator: none
variables:
  # Design backwards: want sum = 1000, work out what a1 and d need to be
  n: integer(20, 30)
  sum: 1000
  # For arithmetic sequence sum: S_n = n/2 * (2a1 + (n-1)d)
  # Rearranging: 2a1 + (n-1)d = 2*sum/n
  # Pick d first, then solve for a1
  d: integer(2, 8)
  target: 2 * sum / n
  a1: (target - (n - 1) * d) / 2
  # Verify our construction
  first_term: a1
  last_term: a1 + (n - 1) * d
  actual_sum: n * (first_term + last_term) / 2
  # Find which term equals 100
  k: (100 - a1) / d + 1
  answer: floor(k)
constraints:
  - mod(2 * sum, n) == 0  # Ensures target is integer
  - mod(target - (n - 1) * d, 2) == 0  # Ensures a1 is integer
  - a1 > 0
question: "An arithmetic sequence has first term {first_term} and common difference {d}. If the sum of the first {n} terms equals {sum}, which term of the sequence equals 100?"
answer: answer
answer_type: integer
solution:
  - "The sum formula gives us: {equation(actual_sum, sum)}"
  - "We can verify: S_{n} = {n}/2 * ({first_term} + {last_term}) = {actual_sum}"
  - "The general term is a_k = {first_term} + (k-1) * {d}"
  - "Setting a_k = 100: {equation(first_term + (k-1) * d, 100)}"
  - "Solving: (k-1) * {d} = 100 - {first_term} = {100 - first_term}"
  - "So k-1 = {(100 - first_term) / d}, which gives k = {answer}"