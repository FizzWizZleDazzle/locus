topic: algebra2/complex_number_equations
difficulty: medium
calculator: none

variables:
  a: integer(-5, 5)
  b: nonzero(-5, 5)
  re_ans: integer(-5, 5)
  im_ans: nonzero(-5, 5)
  c: a + re_ans
  d: b + im_ans
  known: a + b*I
  rhs: c + d*I
  answer: re_ans + im_ans*I

question: "Solve for {math(z)}: {equation(z + known, rhs)}"
answer: answer
answer_type: expression

solution:
  - "Isolate {math(z)} by subtracting {known} from both sides."
  - "{equation(z, answer)}"

