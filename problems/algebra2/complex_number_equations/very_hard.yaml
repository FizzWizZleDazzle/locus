topic: algebra2/complex_number_equations
difficulty: very_hard
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  d: integer(1, 4)
  k: integer(2, 6)
  # Build z^2 = (a + bi)^2 = a^2 - b^2 + 2abi
  real_part: a^2 - b^2
  imag_coeff: 2*a*b
  # Build equation: z^2 + (c + di)z + k = 0
  # Substituting z = a + bi gives us the answer
  z_squared: real_part + imag_coeff*i
  z_times_coeff: (a + b*i)*(c + d*i)
  z_times_expanded: a*c - b*d + (a*d + b*c)*i
  # Left side when z = a + bi is substituted
  left_real: real_part + a*c - b*d + k
  left_imag: imag_coeff + a*d + b*c
  # For equation to hold, both parts must be zero
  answer: a + b*i
constraints:
  - left_real == 0
  - left_imag == 0
  - a != b
question: "Find all complex solutions to {equation(z^2 + (c + d*i)*z + k, 0)}"
answer: answer
answer_type: set
solution:
  - "Let z = x + yi where x, y are real"
  - "Substitute into {equation(z^2 + (c + d*i)*z + k, 0)}"
  - "Expand z^2 = (x + yi)^2 = x^2 - y^2 + 2xyi"
  - "Expand (c + di)(x + yi) = cx - dy + (dx + cy)i"
  - "Combine: (x^2 - y^2 + cx - dy + k) + (2xy + dx + cy)i = 0"
  - "For equality, both real and imaginary parts must be zero:"
  - "x^2 - y^2 + cx - dy + k = 0"
  - "2xy + dx + cy = 0"
  - "By inspection or systematic solving, z = {answer} satisfies both equations"
  - "Verify: z^2 = {z_squared}, (c + di)z = {z_times_expanded}"
  - "So z^2 + (c + di)z + k = {left_real} + {left_imag}i = 0 ✓"