topic: algebra2/complex_number_equations
difficulty: competition
calculator: none
variables:
  a: integer(1, 5)
  b: integer(1, 5)
  c: integer(1, 5)
  d: integer(1, 5)
  z1: a + b*i
  z2: c + d*i
  product: (a*c - b*d) + (a*d + b*c)*i
  sum_real: a*c - b*d + a + c
  sum_imag: a*d + b*c + b + d
  w_squared: (sum_real)^2 - (sum_imag)^2 + 2*(sum_real)*(sum_imag)*i
  real_part: (sum_real)^2 - (sum_imag)^2
  imag_part: 2*(sum_real)*(sum_imag)
  modulus_squared: (real_part)^2 + (imag_part)^2
  answer: sqrt(modulus_squared)
constraints:
  - a*c != b*d
  - sum_real > 0
  - sum_imag > 0
question: "Let {equation(z_1, z1)} and {equation(z_2, z2)}. If w = z_1 z_2 + z_1 + z_2, find {abs_of(w^2)}."
answer: answer
solution:
  - "First compute {equation(z_1 z_2, product)}"
  - "Then {equation(w, product + z1 + z2)}"
  - "Simplifying: {equation(w, sum_real + sum_imag * i)}"
  - "Now {equation(w^2, w_squared)}"
  - "This equals {equation(w^2, real_part + imag_part * i)}"
  - "The modulus is {equation(abs_of(w^2), sqrt((real_part)^2 + (imag_part)^2))}"
  - "Computing: {equation(abs_of(w^2), answer)}"