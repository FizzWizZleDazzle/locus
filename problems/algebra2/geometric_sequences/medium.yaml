topic: algebra2/geometric_sequences
difficulty: medium
calculator: scientific

variables:
  a1: choice(2, 3, 4, 5, 6)
  r: choice(2, 3, -2, -3)
  n: integer(4, 7)
  n_minus_1: n - 1
  r_to_nm1: r^(n - 1)
  answer: a1 * r^(n - 1)

question: "A geometric sequence has first term {a1} and common ratio {r}. Find the {n}th term."
answer: answer
answer_type: numeric

solution:
  - "The nth term of a geometric sequence is the first term multiplied by the common ratio raised to the power (n - 1)."
  - "First term: {a1}. Common ratio: {r}. Term number: {n}."
  - "Compute {r} raised to the power {n_minus_1}: {r_to_nm1}."
  - "Multiply: {a1} times {r_to_nm1} = {answer}."
