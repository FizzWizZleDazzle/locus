topic: algebra2/rational_expressions
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  k: a*b*c*d
  p1: (a*x + b)*(c*x + d)
  p2: (a*x - b)*(c*x - d)
  p3: (a*x + b)*(c*x - d)
  num: k*(x^2 + 1)
  denom: p1*p2*p3
  expanded_denom: expand(denom)
  f: num/expanded_denom
  partial_A: k*(c^2 + d^2)/(4*b*c*d*(a*c + b*d))
  partial_B: -k*(c^2 + d^2)/(4*b*c*d*(a*c - b*d))
  partial_C: k*(a^2 + b^2)/(2*c*d*(a*c - b*d)*(a*c + b*d))
  answer: partial_A/(a*x + b) + partial_B/(a*x - b) + partial_C/(c*x - d)
constraints:
  - a*c != b*d
  - a != b
  - c != d
question: "Express {f} as a sum of partial fractions."
answer: answer
solution:
  - "Factor the denominator: {expanded_denom} = {p1}·{p2}·{p3}"
  - "Note that {p1} and {p2} share the factor (a*x)² - b² when expanded"
  - "Set up partial fractions: {f} = A/{a*x + b} + B/{a*x - b} + C/{c*x - d}"
  - "Multiply through by the denominator and equate coefficients"
  - "After solving the system: A = {partial_A}, B = {partial_B}, C = {partial_C}"
  - "Therefore: {f} = {answer}"