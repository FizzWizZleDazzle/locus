  - a != d
question: "Simplify the product {equation(f1 * f2, '?')} and state any restrictions on x."
answer: answer
solution:
  - "Start with {f1} · {f2}"
  - "Multiply numerators: {numerator1} · {numerator2} = {product_num}"
  - "Multiply denominators: {denominator1} · {denominator2} = {product_den}"
  - "Cancel common factor (x - c) from numerator and denominator"
  - "Cancel common factors (x - a)(x - b) from numerator and denominator"
  - "Result: {answer}"
