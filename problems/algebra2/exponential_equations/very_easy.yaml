topic: algebra2/exponential_equations
difficulty: very_easy
calculator: none
variables:
  base: choice(2, 3, 5)
  k: integer(1, 4)
  answer: integer(0, 5)
  rhs: base^answer
  equation_form: base^(x + k)
constraints:
  - answer + k <= 6
question: "Solve for x: {equation(equation_form, rhs)}"
answer: answer
solution:
  - "We have {equation(equation_form, rhs)}"
  - "Since {base}^{answer} = {rhs}, we need {equation(x + k, answer)}"
  - "Subtract {k} from both sides: x = {answer} - {k}"
  - "Therefore x = {answer}"