topic: algebra2/exponential_equations
difficulty: hard
calculator: none
variables:
  base: choice(2, 3, 4, 5)
  x_val: integer(2, 5)
  k: integer(2, 4)
  rhs: base^(k*x_val)
  answer: x_val
constraints:
  - base > 2
question: "Solve for x: {equation(base^(k*x), rhs)}"
answer: answer
answer_type: numeric
solution:
  - "We have {equation(base^(k*x), rhs)}"
  - "Since {rhs} = {base}^{k*x_val}, we can write {equation(base^(k*x), base^(k*x_val))}"
  - "Since the bases are equal, the exponents must be equal: {equation(k*x, k*x_val)}"
  - "Dividing both sides by {k}: {equation(x, x_val)}"