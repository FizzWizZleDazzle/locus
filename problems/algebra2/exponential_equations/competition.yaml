topic: algebra2/exponential_equations
difficulty: competition
calculator: scientific
variables:
  # Design backwards: want 3^x * 5^y = 3^a * 5^b to have unique integer solution
  # Pick the solution first
  x_val: integer(2, 5)
  y_val: integer(1, 4)
  # Create RHS that matches when x=x_val, y=y_val
  a: integer(1, 3)
  b: integer(2, 5)
  # Build equation coefficients to make LHS = RHS at our solution
  k: 3^(x_val - a) * 5^(y_val - b)
  # Ensure k can be expressed as 3^m * 5^n for integers m,n
  m: x_val - a
  n: y_val - b
  # The equation is: 3^x * 5^y = k * 3^a * 5^b
  # Which simplifies to: 3^x * 5^y = 3^(a+m) * 5^(b+n)
  rhs_exp3: a + m
  rhs_exp5: b + n
  answer_x: x_val
  answer_y: y_val
constraints:
  - m >= 0
  - n >= 0
  - x_val != y_val
question: "Solve the system of equations: {equation(3^x * 5^y, 3^rhs_exp3 * 5^rhs_exp5)} and {equation(x + y, answer_x + answer_y)}. Find the value of x."
answer: answer_x
answer_type: integer
solution:
  - "From the first equation: {equation(3^x * 5^y, 3^rhs_exp3 * 5^rhs_exp5)}"
  - "Since the bases are coprime, we can equate exponents: x = {rhs_exp3} and y = {rhs_exp5}"
  - "Check with the second equation: {answer_x} + {answer_y} = {answer_x + answer_y} ✓"
  - "Therefore, x = {answer_x}"