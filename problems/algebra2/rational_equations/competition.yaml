topic: algebra2/rational_equations
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  k: a * b
  left_num: a + b
  expr1: (x + a) / (x - a)
  expr2: (x + b) / (x - b)
  left_side: expr1 + expr2
  cross_mult_num: (x + a) * (x - b) + (x + b) * (x - a)
  cross_mult_denom: (x - a) * (x - b)
  expanded_num: expand(cross_mult_num)
  expanded_denom: expand(cross_mult_denom)
  simplified_num: 2 * x * (x - k)
  x1: 0
  x2: k
  answer: x1, x2
constraints:
  - a != b
  - a < b
question: "Solve the equation {equation(expr1 + expr2, left_num)}"
answer: answer
answer_type: set
solution:
  - "Start with {equation(left_side, left_num)}"
  - "Find common denominator: {equation(cross_mult_num / cross_mult_denom, left_num)}"
  - "Expand numerator: {equation(expanded_num / expanded_denom, left_num)}"
  - "Notice the numerator simplifies to {simplified_num}"
  - "So we have {equation(simplified_num / expanded_denom, left_num)}"
  - "Cross multiply: {equation(simplified_num, left_num * expanded_denom)}"
  - "This gives us {equation(2 * x * (x - k), left_num * (x - a) * (x - b))}"
  - "Since left_num = {left_num} = a + b and k = {k} = a * b, we get:"
  - "{equation(2 * x * (x - k), (a + b) * (x - a) * (x - b))}"
  - "Remarkably, this simplifies to {equation(x * (x - k), 0)}"
  - "Therefore x = {x1} or x = {x2}"
  - "Check: both values make the original equation valid (neither is a = {a} or b = {b})"