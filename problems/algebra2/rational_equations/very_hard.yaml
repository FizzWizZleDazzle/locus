topic: algebra2/rational_equations
difficulty: very_hard
calculator: none
variables:
  x: integer(-8, 8)
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  left_num: a*x + b
  left_denom: x - c
  right_num: a*c + b
  right_denom: c
  cross_left: left_num * right_denom
  cross_right: right_num * left_denom
  expanded_left: expand(cross_left)
  expanded_right: expand(cross_right)
  answer: x
constraints:
  - x != c
  - a != b
question: "Solve for x: {equation((left_num)/(x - c), (right_num)/c)}"
answer: answer
answer_type: numeric
solution:
  - "Given: {equation((left_num)/(x - c), (right_num)/c)}"
  - "Cross multiply: {equation(left_num * c, right_num * (x - c))}"
  - "Expand: {equation(expanded_left, expanded_right)}"
  - "Since both sides equal {expanded_left}, the equation is satisfied for x = {x}"
  - "Check: x ≠ {c} (to avoid division by zero), which is satisfied"