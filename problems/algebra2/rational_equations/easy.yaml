topic: algebra2/rational_equations
difficulty: easy
calculator: none
variants:
  - name: default
    variables:
      c: choice(2, 3, 4, -2, -3, -4)
      k: nonzero(-4, 4)
      a: c * k
      b: integer(1, 5)
      answer: k + b
    constraints:
      - k != b
    question: 'Solve for {math(x)}: {equation(a / (x - b), c)}'
    answer: answer
    answer_type: numeric
    solution:
      - 'Multiply both sides by {math(x - b)} to clear the denominator: {equation(a, c * (x - b))}'
      - 'Divide both sides by {c}: {equation(x - b, k)}'
      - 'Add {b} to both sides: {equation(x, answer)}'
