topic: algebra2/exponential_growth_decay
difficulty: competition
calculator: scientific
variables:
  initial: choice(1000, 2000, 4000, 5000, 8000, 10000)
  half_life: choice(3, 4, 5, 6, 8, 10, 12, 15)
  k: ln(2) / half_life
  t1: choice(2, 3, 4)
  t2: t1 + half_life
  t3: t1 + 2 * half_life
  amount1: initial * exp(-k * t1)
  amount2: initial * exp(-k * t2)
  amount3: initial * exp(-k * t3)
  rounded1: round(amount1, 0)
  rounded2: round(amount2, 0)
  rounded3: round(amount3, 0)
  ratio: rounded1 / rounded3
  answer: round(ratio, 0)
question: "A radioactive isotope has a half-life of {half_life} years. A scientist measures {rounded1} grams of the isotope at time t = {t1} years. How many times larger was the amount at t = {t1} years compared to the amount at t = {t3} years? Round to the nearest integer."
answer: answer
solution:
  - "The exponential decay formula is A(t) = A₀e^(-kt) where k = ln(2)/{half_life}"
  - "At t = {t1}: A({t1}) = {rounded1} grams"
  - "From t = {t1} to t = {t3}, exactly {t3} - {t1} = {2 * half_life} years pass"
  - "This is exactly 2 half-lives, so the amount decreases by a factor of 2² = 4"
  - "At t = {t3}: A({t3}) = {rounded1}/4 = {rounded3} grams"
  - "The ratio is {rounded1}/{rounded3} = {answer}"