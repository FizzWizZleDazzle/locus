topic: algebra2/exponential_growth_decay
difficulty: medium
calculator: scientific

variables:
  p: choice(100, 200, 500, 1000, 1500)
  r_pct: choice(5, 10, 15, 20, 25)
  t: integer(2, 6)
  factor: 1 + r_pct/100
  growth: factor^t
  answer: p * growth

question: "A quantity starts at {p} and grows by {r_pct} percent each year. What is its value after {t} years?"

answer: answer
answer_type: numeric

solution:
  - "The exponential growth formula is {math(N(t) = N_0 * (1 + r)^t)}, where {math(r)} is the growth rate as a decimal."
  - "Here {math(N_0)} = {p} and {math(r)} = {r_pct}/100, so {math(1 + r)} = {factor}."
  - "After {t} years, {math(N(t))} = {p} times {factor}^{t} = {p} times {growth}."
  - "The final value is {answer}."
