topic: linear_algebra/diagonalization
difficulty: hard
calculator: scientific
variants:
  - name: default
    variables:
      lam1: nonzero(-4, -1)
      lam2: integer(1, 4)
      a: 0
      b: 1
      c: -lam1*lam2
      d: lam1 + lam2
      small_lam: min(lam1, lam2)
      large_lam: max(lam1, lam2)
      char_poly: expand((x - lam1)*(x - lam2))
    constraints:
      - lam1 != lam2
    question: The matrix {matrix_of([[a, b], [c, d]])} is diagonalizable. Find its diagonal entries {math(d_1)} and {math(d_2)}, listed in increasing order, as an ordered pair.
    answer: small_lam, large_lam
    answer_type: tuple
    solution:
      - Compute the characteristic polynomial by expanding {det_of([[a - x, b], [c, d - x]])}.
      - The characteristic polynomial is {equation(char_poly, 0)}.
      - Factoring gives eigenvalues {lam1} and {lam2}.
      - Since the eigenvalues are distinct, the matrix is diagonalizable.
      - 'Order from smallest to largest: {small_lam} and {large_lam}.'
      - The diagonal matrix is {matrix_of([[small_lam, 0], [0, large_lam]])}.
