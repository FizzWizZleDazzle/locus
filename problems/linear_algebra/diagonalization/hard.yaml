topic: linear_algebra/diagonalization
difficulty: hard
calculator: scientific
variables:
  # Design eigenvalues first for clean computation
  lambda1: integer(-5, 5)
  lambda2: integer(-5, 5)
  lambda3: integer(-5, 5)
  # Build diagonal matrix from eigenvalues
  D: matrix(3, 3, 0, 0)
  D_11: lambda1
  D_22: lambda2
  D_33: lambda3
  # Create invertible P with small integers
  P: matrix(3, 3, -2, 2)
  P_11: 1
  P_12: 1
  P_13: 0
  P_21: 1
  P_22: 0
  P_23: 1
  P_31: 0
  P_32: 1
  P_33: 1
  # Construct A to guarantee diagonalizability
  A: matrix(3, 3, -10, 10)
  A_11: lambda1 + lambda2
  A_12: lambda2 - lambda1
  A_13: 0
  A_21: lambda2 - lambda1
  A_22: lambda1 + lambda3
  A_23: lambda3 - lambda2
  A_31: 0
  A_32: lambda3 - lambda2
  A_33: lambda2 + lambda3
  # Power computation
  n: integer(8, 12)
  trace_A_n: lambda1^n + lambda2^n + lambda3^n
constraints:
  - lambda1 != lambda2
  - lambda2 != lambda3
  - lambda1 != lambda3
question: "Let A = {matrix_of(A)}. Find the trace of A^{n}."
answer: trace_A_n
solution:
  - "The matrix A has eigenvalues λ₁ = {lambda1}, λ₂ = {lambda2}, λ₃ = {lambda3}"
  - "Since A has 3 distinct eigenvalues, it is diagonalizable"
  - "For any diagonalizable matrix, tr(A^n) equals the sum of the nth powers of eigenvalues"
  - "Therefore tr(A^{n}) = {lambda1}^{n} + {lambda2}^{n} + {lambda3}^{n}"
  - "Computing: tr(A^{n}) = {trace_A_n}"