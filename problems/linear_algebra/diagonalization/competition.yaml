topic: linear_algebra/diagonalization
difficulty: competition
calculator: none
variables:
  lambda1: integer(-3, 3)
  lambda2: integer(-3, 3)
  v11: nonzero(-2, 2)
  v21: nonzero(-2, 2)
  v12: nonzero(-2, 2)
  v22: nonzero(-2, 2)
  det_P: v11*v22 - v12*v21
  a11: (lambda1*v11*v22 - lambda2*v12*v21)/det_P
  a12: (lambda2*v12*v11 - lambda1*v11*v12)/det_P
  a21: (lambda1*v21*v22 - lambda2*v22*v21)/det_P
  a22: (lambda2*v22*v11 - lambda1*v21*v12)/det_P
  trace: a11 + a22
  det: a11*a22 - a12*a21
  char_poly: x^2 - trace*x + det
  eigenvalues: solve(char_poly, x)
  answer: lambda1, lambda2
constraints:
  - lambda1 != lambda2
  - det_P != 0
question: "Find the eigenvalues of the matrix A = [{a11}, {a12}; {a21}, {a22}]"
answer: answer
answer_type: set
solution:
  - "The characteristic polynomial is det(A - xI) = 0"
  - "det([{a11} - x, {a12}; {a21}, {a22} - x]) = 0"
  - "({a11} - x)({a22} - x) - ({a12})({a21}) = 0"
  - "x^2 - ({a11} + {a22})x + ({a11}*{a22} - {a12}*{a21}) = 0"
  - "x^2 - {trace}x + {det} = 0"
  - "This gives us {char_poly} = 0"
  - "The eigenvalues are x = {lambda1} and x = {lambda2}"