topic: linear_algebra/diagonalization
difficulty: very_easy
calculator: none
variables:
  lambda1: integer(1, 5)
  lambda2: integer(1, 5)
  a: lambda1 + lambda2
  b: lambda1 * lambda2
  char_poly: x^2 - a*x + b
  answer: lambda1, lambda2
constraints:
  - lambda1 != lambda2
  - lambda1 < lambda2
question: "Find the eigenvalues of the matrix A = [[{a}, -1], [{b}, 0]]"
answer: answer
answer_type: set
solution:
  - "The characteristic polynomial is det(A - xI) = det([[{a} - x, -1], [{b}, -x]])"
  - "det = ({a} - x)(-x) - (-1)({b}) = -x({a} - x) + {b}"
  - "= -{a}x + x^2 + {b} = {char_poly}"
  - "Setting {equation(char_poly, 0)} and solving:"
  - "The eigenvalues are x = {lambda1} and x = {lambda2}"