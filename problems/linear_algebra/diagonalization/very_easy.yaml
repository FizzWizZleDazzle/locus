topic: linear_algebra/diagonalization
difficulty: very_easy
calculator: none
variables:
  lambda1: integer(-3, 3)
  lambda2: integer(-3, 3)
  D: matrix(2, 2, -5, 5)
  P: matrix(2, 2, -2, 2)
  P_inv: inverse(P)
  PD: P * D
  A: PD * P_inv
constraints:
  - lambda1 != lambda2
  - lambda1 != 0
  - lambda2 != 0
  - D[0][0] == lambda1
  - D[0][1] == 0
  - D[1][0] == 0
  - D[1][1] == lambda2
  - P[0][0] == 1
  - P[0][1] == 1
  - P[1][0] == 1
  - P[1][1] == -1
question: "Given the diagonal matrix {matrix_of(D)} and the matrix {matrix_of(P)}, compute A = PDP^(-1)."
answer: A
answer_type: matrix
solution:
  - "First find P^(-1) = {matrix_of(P_inv)}"
  - "Now compute PD = {matrix_of(PD)}"
  - "Finally, A = PD * P^(-1) = {matrix_of(A)}"