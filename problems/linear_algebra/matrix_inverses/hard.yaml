topic: linear_algebra/matrix_inverses
difficulty: hard
calculator: none
variables:
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: nonzero(-3, 3)
  d: nonzero(-3, 3)
  det: a*d - b*c
  inv_a: d/det
  inv_b: -b/det
  inv_c: -c/det
  inv_d: a/det
  answer: inv_a, inv_b, inv_c, inv_d
constraints:
  - det != 0
question: "Find the inverse of the matrix A = [[{a}, {b}], [{c}, {d}]]"
answer: answer
answer_type: tuple
solution:
  - "For a 2×2 matrix [[a, b], [c, d]], the inverse is (1/det(A)) × [[d, -b], [-c, a]]"
  - "Calculate det(A) = {a}×{d} - {b}×{c} = {det}"
  - "Since det(A) ≠ 0, the inverse exists"
  - "A⁻¹ = (1/{det}) × [[{d}, {-b}], [{-c}, {a}]]"
  - "A⁻¹ = [[{inv_a}, {inv_b}], [{inv_c}, {inv_d}]]"