topic: linear_algebra/matrix_inverses
difficulty: medium
calculator: scientific
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: integer(-5, 5)
  d: integer(-5, 5)
  A: matrix(2, 2, -5, 5)
  det: a*d - b*c
  d_over_det: d/det
  neg_b_over_det: -b/det
  neg_c_over_det: -c/det
  a_over_det: a/det
  A_inv: matrix_from_values([[d_over_det, neg_b_over_det], [neg_c_over_det, a_over_det]])
constraints:
  - abs(det) > 1
  - abs(det) <= 10
question: "Find the inverse of matrix {matrix_of(A)}."
answer: A_inv
answer_type: matrix
solution:
  - "For a 2×2 matrix, the determinant is ad - bc"
  - "Calculate det(A) = ({a})({d}) - ({b})({c}) = {det}"
  - "Since det(A) = {det} ≠ 0, the matrix is invertible"
  - "The inverse formula gives us A⁻¹ = {matrix_of(A_inv)}"