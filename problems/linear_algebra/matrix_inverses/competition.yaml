topic: linear_algebra/matrix_inverses
difficulty: competition
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(1, 3)
  d: integer(1, 3)
  det: a*d - b*c
  inv_a: d
  inv_b: -b
  inv_c: -c
  inv_d: a
  k: integer(2, 4)
  m11: k*a
  m12: k*b
  m21: k*c
  m22: k*d
  det_M: k^2 * det
  answer: 1/k^2
constraints:
  - det > 0
  - a != d
question: "Let A = [[{a}, {b}], [{c}, {d}]] and M = {k}A. If det(A) = {det}, find det(M^(-1))."
answer: answer
solution:
  - "First, find det(M). Since M = {k}A, we have M = [[{m11}, {m12}], [{m21}, {m22}]]"
  - "For a scalar multiple of a matrix: det(kA) = k^n * det(A) where n is the dimension"
  - "Since A is 2×2: det(M) = det({k}A) = {k}^2 * det(A) = {k}^2 * {det} = {det_M}"
  - "For any invertible matrix: det(M^(-1)) = 1/det(M)"
  - "Therefore: det(M^(-1)) = 1/{det_M} = {answer}"