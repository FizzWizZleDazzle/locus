topic: linear_algebra/eigenvalues
difficulty: medium
calculator: scientific
variables:
  lambda1: integer(-5, 5)
  lambda2: integer(-5, 5)
  a: (lambda1 + lambda2) - lambda1*lambda2
  b: nonzero(-3, 3)
  c: integer(-3, 3)
  d: lambda1*lambda2
  A: matrix(2, 2, -5, 5)
  trace: a + d
  det: a*d - b*c
  char_poly: expand((lambda - a)*(lambda - d) - b*c)
  answer: solve(char_poly, lambda)
constraints:
  - lambda1 != lambda2
  - abs(lambda1) + abs(lambda2) <= 8
question: "Find the eigenvalues of the matrix {matrix_of(A)}."
answer: answer
answer_type: set
solution:
  - "To find eigenvalues, solve det(λI - A) = 0"
  - "The characteristic polynomial is {equation(char_poly, 0)}"
  - "Solving this quadratic equation gives eigenvalues: {set_of(answer)}"