topic: linear_algebra/eigenvalues
difficulty: hard
calculator: scientific
variables:
  # Design 3x3 matrix with known eigenvalues by working backwards
  # Start with diagonal matrix, then apply similarity transform
  lambda1: integer(-5, 5)
  lambda2: integer(-5, 5)
  lambda3: integer(-5, 5)
  # Create invertible transformation matrix with small entries
  p11: nonzero(-2, 2)
  p12: choice(-1, 0, 1)
  p13: choice(-1, 0, 1)
  p21: choice(-1, 0, 1)
  p22: nonzero(-2, 2)
  p23: choice(-1, 0, 1)
  p31: choice(-1, 0, 1)
  p32: choice(-1, 0, 1)
  p33: nonzero(-2, 2)
  P: matrix(3, 3, -2, 2)
  D: diag(lambda1, lambda2, lambda3)
  # A = P * D * P^(-1) has eigenvalues lambda1, lambda2, lambda3
  A: P * D * inverse(P)
  # Characteristic polynomial coefficients
  char_poly: expand(det(A - t*I))
  trace_A: lambda1 + lambda2 + lambda3
  det_A: lambda1 * lambda2 * lambda3
  eigenvalues: set(lambda1, lambda2, lambda3)
constraints:
  - det(P) != 0
  - lambda1 <= lambda2
  - lambda2 <= lambda3
question: "Find all eigenvalues of the matrix {matrix_of(A)}. Verify your answer by checking that the trace equals the sum of eigenvalues and the determinant equals their product."
answer: eigenvalues
answer_type: set
solution:
  - "To find eigenvalues, solve {equation(det(A - t*I), 0)}"
  - "The characteristic polynomial is {equation(char_poly, 0)}"
  - "This factors as {equation((t - lambda1)*(t - lambda2)*(t - lambda3), 0)}"
  - "So the eigenvalues are t = {lambda1}, {lambda2}, {lambda3}"
  - "Verification: trace(A) = {trace_A} = {lambda1} + {lambda2} + {lambda3} ✓"
  - "det(A) = {det_A} = {lambda1} × {lambda2} × {lambda3} ✓"