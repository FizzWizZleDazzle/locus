topic: linear_algebra/vector_spaces
difficulty: hard
calculator: scientific
variables:
  # Design basis vectors that guarantee linear independence
  v1_1: 1
  v1_2: 0
  v1_3: 2
  v2_1: 0
  v2_2: 1
  v2_3: -1
  v3_1: 1
  v3_2: 1
  v3_3: 1
  # Target vector designed to be in span
  a: integer(1, 4)
  b: integer(-3, 3)
  c: integer(-2, 2)
  target_1: a + c
  target_2: b + c
  target_3: 2*a - b + c
  # Solution coefficients (by construction)
  c1: a
  c2: b
  c3: c
  # Verification
  combination_1: c1 + c3
  combination_2: c2 + c3
  combination_3: 2*c1 - c2 + c3
constraints:
  - a != 0
  - abs(b) + abs(c) > 0
question: "Let V be the subspace of R³ spanned by {vec([v1_1, v1_2, v1_3])}, {vec([v2_1, v2_2, v2_3])}, and {vec([v3_1, v3_2, v3_3])}. Determine if {vec([target_1, target_2, target_3])} is in V. If yes, express it as a linear combination of the basis vectors."
answer: c1
answer_type: vector
solution:
  - "To check if {vec([target_1, target_2, target_3])} is in span({vec([v1_1, v1_2, v1_3])}, {vec([v2_1, v2_2, v2_3])}, {vec([v3_1, v3_2, v3_3])}), we need to solve:"
  - "{equation(c1*v1 + c2*v2 + c3*v3, target)}"
  - "This gives the system:"
  - "c1 + c3 = {target_1}"
  - "c2 + c3 = {target_2}"
  - "2c1 - c2 + c3 = {target_3}"
  - "From the first equation: c1 = {target_1} - c3"
  - "From the second equation: c2 = {target_2} - c3"
  - "Substituting into the third equation:"
  - "2({target_1} - c3) - ({target_2} - c3) + c3 = {target_3}"
  - "This is always true by our construction"
  - "Choosing c3 = {c}, we get c1 = {a}, c2 = {b}"
  - "Therefore {vec([target_1, target_2, target_3])} = {c1}{vec([v1_1, v1_2, v1_3])} + {c2}{vec([v2_1, v2_2, v2_3])} + {c3}{vec([v3_1, v3_2, v3_3])}"