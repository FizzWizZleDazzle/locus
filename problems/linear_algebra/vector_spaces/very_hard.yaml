topic: linear_algebra/vector_spaces
difficulty: very_hard
calculator: none
variables:
  a1: nonzero(-3, 3)
  a2: nonzero(-3, 3)
  a3: nonzero(-3, 3)
  b1: nonzero(-3, 3)
  b2: nonzero(-3, 3)
  b3: nonzero(-3, 3)
  c1: nonzero(-3, 3)
  c2: nonzero(-3, 3)
  c3: nonzero(-3, 3)
  k1: integer(2, 4)
  k2: integer(-3, -1)
  k3: integer(1, 3)
  d1: k1*a1 + k2*b1 + k3*c1
  d2: k1*a2 + k2*b2 + k3*c2
  d3: k1*a3 + k2*b3 + k3*c3
  det_check: a1*(b2*c3 - b3*c2) - a2*(b1*c3 - b3*c1) + a3*(b1*c2 - b2*c1)
  answer: k1, k2, k3
constraints:
  - det_check != 0
question: "Let V be the vector space R³. Given vectors v₁ = ({a1}, {a2}, {a3}), v₂ = ({b1}, {b2}, {b3}), v₃ = ({c1}, {c2}, {c3}), and w = ({d1}, {d2}, {d3}), express w as a linear combination of v₁, v₂, and v₃. Find the coefficients (c₁, c₂, c₃) such that w = c₁v₁ + c₂v₂ + c₃v₃."
answer: answer
answer_type: tuple
solution:
  - "We need to find c₁, c₂, c₃ such that c₁({a1}, {a2}, {a3}) + c₂({b1}, {b2}, {b3}) + c₃({c1}, {c2}, {c3}) = ({d1}, {d2}, {d3})"
  - "This gives us the system: {a1}c₁ + {b1}c₂ + {c1}c₃ = {d1}"
  - "{a2}c₁ + {b2}c₂ + {c2}c₃ = {d2}"
  - "{a3}c₁ + {b3}c₂ + {c3}c₃ = {d3}"
  - "Since the vectors v₁, v₂, v₃ are linearly independent (determinant ≠ 0), this system has a unique solution"
  - "By construction, w = {k1}v₁ + {k2}v₂ + {k3}v₃"
  - "Therefore, c₁ = {k1}, c₂ = {k2}, c₃ = {k3}"