topic: linear_algebra/vector_spaces
difficulty: competition
calculator: none
variables:
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: nonzero(-3, 3)
  v1_x: a
  v1_y: 0
  v1_z: b
  v2_x: 0
  v2_y: a
  v2_z: c
  v3_x: b
  v3_y: c
  v3_z: 0
  det_coeff: a*a*b + b*c*c
  k: nonzero(2, 4)
  target_x: k*a
  target_y: k*a
  target_z: k*(b + c)
  c1: k
  c2: k
  c3: 0
  answer: c1, c2, c3
constraints:
  - a != b
  - b != c
question: "Let V be the subspace of R³ spanned by the vectors v₁ = ({v1_x}, {v1_y}, {v1_z}), v₂ = ({v2_x}, {v2_y}, {v2_z}), and v₃ = ({v3_x}, {v3_y}, {v3_z}). Express the vector w = ({target_x}, {target_y}, {target_z}) as a linear combination of v₁, v₂, v₃. Give your answer as the ordered triple (c₁, c₂, c₃) where w = c₁v₁ + c₂v₂ + c₃v₃."
answer: answer
answer_type: tuple
solution:
  - "We need to find c₁, c₂, c₃ such that c₁({v1_x}, {v1_y}, {v1_z}) + c₂({v2_x}, {v2_y}, {v2_z}) + c₃({v3_x}, {v3_y}, {v3_z}) = ({target_x}, {target_y}, {target_z})"
  - "This gives us the system: {c1}·{a} + {c3}·{b} = {target_x}, {c2}·{a} + {c3}·{c} = {target_y}, {c1}·{b} + {c2}·{c} = {target_z}"
  - "From the first equation: {c1}·{a} = {target_x} since c₃ = 0, so c₁ = {c1}"
  - "From the second equation: {c2}·{a} = {target_y} since c₃ = 0, so c₂ = {c2}"
  - "Verify with third equation: {c1}·{b} + {c2}·{c} = {k}·{b} + {k}·{c} = {k}({b} + {c}) = {target_z} ✓"
  - "Therefore (c₁, c₂, c₃) = ({c1}, {c2}, {c3})"