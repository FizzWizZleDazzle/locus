topic: linear_algebra/subspaces
difficulty: easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  lhs: a*x + b*y
  ans: "Yes"
question: "Let {math(S)} be the set of all vectors {math((x, y))} in {math(R^2)} satisfying {equation(lhs, 0)}. Is {math(S)} a subspace of {math(R^2)}? Answer Yes or No."
answer: ans
answer_type: word
solution:
  - "We verify the three subspace axioms for {math(S)}."
  - "Axiom 1 (contains zero vector): Substituting {math((x,y) = (0,0))} gives {math(0 = 0)}, which is true. So the zero vector is in {math(S)}."
  - "Axiom 2 (closed under addition): Let {math((x_1, y_1))} and {math((x_2, y_2))} be in {math(S)}, so {equation(a*x_1 + b*y_1, 0)} and {equation(a*x_2 + b*y_2, 0)}. Adding these two equations gives {equation(a*(x_1+x_2) + b*(y_1+y_2), 0)}, so the sum is in {math(S)}."
  - "Axiom 3 (closed under scalar multiplication): Let {math((x,y))} be in {math(S)} and let {math(k)} be any scalar. Multiplying the equation by {math(k)} gives {equation(a*(k*x) + b*(k*y), 0)}, so the scaled vector is also in {math(S)}."
  - "All three axioms hold, so {math(S)} is a subspace of {math(R^2)}."
