topic: linear_algebra/row_reduction
difficulty: competition
calculator: none
variables:
  # Design a 4x5 augmented matrix that reduces to a specific clean form
  # Work backwards: start with RREF, then apply row operations in reverse
  
  # The RREF form we want (with parameters s, t)
  s: integer(-3, 3)
  t: integer(-3, 3)
  
  # Build the original matrix by applying inverse row operations
  # Start with a matrix that has a known clean RREF
  r1: integer(1, 4)
  r2: integer(1, 4)
  r3: integer(-4, 4)
  r4: integer(-4, 4)
  
  # Construct matrix elements individually
  m11: 1
  m12: 0
  m13: r1
  m14: 0
  m15: s
  m21: 0
  m22: 1
  m23: r2
  m24: 0
  m25: t
  m31: r3
  m32: r4
  m33: r1*r3 + r2*r4 + 1
  m34: 1
  m35: s*r3 + t*r4
  m41: 2*r3
  m42: 2*r4
  m43: 2*(r1*r3 + r2*r4)
  m44: 0
  m45: 2*(s*r3 + t*r4)
  
  # Create the matrix using the matrix constructor
  M: matrix(4, 5, -9, 9)
  
  # The rank is 3 by construction (row 4 is 2×row 3 except in column 4)
  answer: 3
  
constraints:
  - r3 != 0
  - r4 != 0
  - s != t

question: "Find the rank of the augmented matrix [[{m11}, {m12}, {m13}, {m14}, {m15}], [{m21}, {m22}, {m23}, {m24}, {m25}], [{m31}, {m32}, {m33}, {m34}, {m35}], [{m41}, {m42}, {m43}, {m44}, {m45}]] by reducing it to row echelon form."

answer: answer
answer_type: integer

solution:
  - "Start with the augmented matrix [[{m11}, {m12}, {m13}, {m14}, {m15}], [{m21}, {m22}, {m23}, {m24}, {m25}], [{m31}, {m32}, {m33}, {m34}, {m35}], [{m41}, {m42}, {m43}, {m44}, {m45}]]"
  - "Rows 1 and 2 are already in echelon form with leading 1s"
  - "To eliminate below row 1: R3 → R3 - {r3}R1 gives row 3 as [0, {r4}, {r2*r4 + 1}, 1, {t*r4}]"
  - "To eliminate below row 2: R3 → R3 - {r4}R2 gives row 3 as [0, 0, 1, 1, 0]"
  - "For row 4: R4 → R4 - {2*r3}R1 gives [0, {2*r4}, 0, 0, 0]"
  - "Then R4 → R4 - {2*r4}R2 gives [0, 0, 0, 0, 0]"
  - "The matrix in row echelon form has 3 non-zero rows"
  - "Therefore, the rank is {answer}"