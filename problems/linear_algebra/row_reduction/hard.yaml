topic: linear_algebra/row_reduction
difficulty: hard
calculator: none
variables:
  # Design backward: start with solution values
  x_val: integer(-5, 5)
  y_val: integer(-5, 5)
  z_val: integer(-5, 5)
  # Create coefficient matrix
  a11: nonzero(-3, 3)
  a12: integer(-3, 3)
  a13: integer(-3, 3)
  a21: integer(-3, 3)
  a22: nonzero(-3, 3)
  a23: integer(-3, 3)
  a31: integer(-3, 3)
  a32: integer(-3, 3)
  a33: nonzero(-3, 3)
  # Build RHS by matrix multiplication
  b1: a11*x_val + a12*y_val + a13*z_val
  b2: a21*x_val + a22*y_val + a23*z_val
  b3: a31*x_val + a32*y_val + a33*z_val
  # Create augmented matrix
  A: matrix(3, 4, -20, 20)
  # Solution vector
  solution_vec: matrix(3, 1, -5, 5)
constraints:
  - a11*a22 - a12*a21 != 0
  - abs(b1) <= 20
  - abs(b2) <= 20
question: "Use row reduction to solve the system with augmented matrix {matrix_of(A)} = [[{a11}, {a12}, {a13}, {b1}], [{a21}, {a22}, {a23}, {b2}], [{a31}, {a32}, {a33}, {b3}]]. Express your answer as a column vector."
answer: solution_vec
answer_type: matrix
solution:
  - "Start with augmented matrix [[{a11}, {a12}, {a13}, {b1}], [{a21}, {a22}, {a23}, {b2}], [{a31}, {a32}, {a33}, {b3}]]"
  - "Use row operations to reduce to row echelon form"
  - "Continue to reduced row echelon form"
  - "The RREF will have the form [I | b] where b is the solution"
  - "Reading off the solution: x = {x_val}, y = {y_val}, z = {z_val}"
  - "Solution vector: [[{x_val}], [{y_val}], [{z_val}]]"