topic: linear_algebra/row_reduction
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(1, 5)
  c: integer(1, 9)
  d: integer(1, 9)
  answer: 1, b/a, 0, 1
constraints:
  - a != b
  - c != d
question: "Row reduce the matrix [[{a}, {b}], [0, {d}]] to reduced row echelon form."
answer: answer
answer_type: tuple
solution:
  - "Start with [[{a}, {b}], [0, {d}]]"
  - "Divide row 1 by {a}: [[1, {b/a}], [0, {d}]]"
  - "Divide row 2 by {d}: [[1, {b/a}], [0, 1]]"