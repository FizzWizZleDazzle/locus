topic: linear_algebra/row_reduction
difficulty: very_hard
calculator: none
variables:
  x: integer(1, 3)
  y: integer(-2, 2)
  z: integer(-3, 3)
  a11: nonzero(-2, 2)
  a12: nonzero(-3, 3)
  a13: nonzero(-2, 2)
  b1: a11*x + a12*y + a13*z
  a21: nonzero(-2, 2)
  a22: nonzero(-3, 3)
  a23: nonzero(-2, 2)
  b2: a21*x + a22*y + a23*z
  a31: nonzero(-2, 2)
  a32: nonzero(-3, 3)
  a33: nonzero(-2, 2)
  b3: a31*x + a32*y + a33*z
  answer: x, y, z
constraints:
  - a11*a22 != a12*a21
  - a11*a33 != a13*a31
question: "Use row reduction to solve the system:\n{system(a11*x + a12*y + a13*z = b1, a21*x + a22*y + a23*z = b2, a31*x + a32*y + a33*z = b3)}"
answer: answer
answer_type: tuple
solution:
  - "Write the augmented matrix: [{a11} {a12} {a13} | {b1}], [{a21} {a22} {a23} | {b2}], [{a31} {a32} {a33} | {b3}]"
  - "Perform row operations to get row echelon form"
  - "Continue to reduced row echelon form"
  - "Read off the solution: x = {x}, y = {y}, z = {z}"