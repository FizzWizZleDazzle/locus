topic: linear_algebra/linear_independence
difficulty: very_hard
calculator: none
variables:
  # Design 3 vectors where v3 = av1 + bv2 for specific a,b
  a: integer(-3, 3)
  b: integer(-3, 3)
  # Base vectors with small components
  v1_1: integer(-4, 4)
  v1_2: integer(-4, 4)
  v1_3: integer(-4, 4)
  v2_1: integer(-4, 4)
  v2_2: integer(-4, 4)
  v2_3: integer(-4, 4)
  # Construct dependent vector
  v3_1: a * v1_1 + b * v2_1
  v3_2: a * v1_2 + b * v2_2
  v3_3: a * v1_3 + b * v2_3
  # Fourth vector guaranteed independent
  v4_1: integer(-3, 3)
  v4_2: integer(-3, 3)
  v4_3: integer(-3, 3)
  v4_4: integer(1, 5)
  answer: 3
constraints:
  - abs(a) + abs(b) > 0
  - v1_1^2 + v1_2^2 + v1_3^2 > 0
  - v2_1^2 + v2_2^2 + v2_3^2 > 0
question: "Consider the vectors v1 = ({v1_1}, {v1_2}, {v1_3}, 0), v2 = ({v2_1}, {v2_2}, {v2_3}, 0), v3 = ({v3_1}, {v3_2}, {v3_3}, 0), v4 = ({v4_1}, {v4_2}, {v4_3}, {v4_4}) in R^4. Find the dimension of span(v1, v2, v3, v4)."
answer: answer
solution:
  - "Form the matrix A with columns v1, v2, v3, v4"
  - "Row reduce to find rank(A). Since v3 = {a}v1 + {b}v2, the first three columns are linearly dependent."
  - "The fourth vector has a non-zero component in the 4th dimension, making it independent of the span of v1, v2, v3."
  - "Therefore rank(A) = 3, so dim(span(v1, v2, v3, v4)) = {answer}"