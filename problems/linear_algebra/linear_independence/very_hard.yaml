topic: linear_algebra/linear_independence
difficulty: very_hard
calculator: none
variables:
  # Design 3 vectors where v3 is in span of v1, v2 for dependence
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: nonzero(-3, 3)
  d: nonzero(-3, 3)
  # Parameters for linear combination
  k1: nonzero(-2, 2)
  k2: nonzero(-2, 2)
  # v3 components as linear combination of v1 and v2
  v3_1: k1*a + k2*c
  v3_2: k1*b + k2*d
  v3_3: k2
  v3_4: k1
  # Fourth vector independent of span(v1, v2)
  e: nonzero(-3, 3)
  # Matrix for rank calculation
  M: matrix(4, 4, -10, 10)
  answer: 3
constraints:
  - a*d - b*c != 0  # Ensures v1, v2 are independent
  - k1 != k2  # Non-trivial combination
question: "Consider the vectors v1 = ({a}, {b}, 0, 1), v2 = ({c}, {d}, 1, 0), v3 = ({v3_1}, {v3_2}, {v3_3}, {v3_4}), and v4 = (0, 0, {e}, {e}) in R^4. Determine the dimension of the span of these vectors."
answer: answer
solution:
  - "Form the matrix A with these vectors as columns."
  - "To find dim(span), we need the rank of A."
  - "Row reduce to find pivot columns. Notice that v3 = {k1}v1 + {k2}v2."
  - "So v3 is a linear combination of v1 and v2."
  - "Check that v1, v2, and v4 are linearly independent (no vector is a combination of the others)."
  - "Therefore, the rank is 3, so dim(span) = {answer}."