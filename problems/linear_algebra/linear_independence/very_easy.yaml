topic: linear_algebra/linear_independence
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(1, 5)
  v1_str: "[a, 0]"
  v2_str: "[0, b]"
  answer: "Yes, they are linearly independent"
question: "Are the vectors {vec(v1_str)} and {vec(v2_str)} linearly independent?"
answer: answer
answer_type: text
solution:
  - "To check linear independence, we need to see if c₁{vec(v1_str)} + c₂{vec(v2_str)} = {vec([0, 0])} has only the trivial solution c₁ = c₂ = 0"
  - "Setting up the equation: c₁[{a}, 0] + c₂[0, {b}] = [0, 0]"
  - "This gives us: [c₁·{a}, 0] + [0, c₂·{b}] = [0, 0]"
  - "So we need: c₁·{a} = 0 and c₂·{b} = 0"
  - "Since {a} ≠ 0 and {b} ≠ 0, we must have c₁ = 0 and c₂ = 0"
  - "Therefore, the vectors are linearly independent"