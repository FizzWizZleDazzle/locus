topic: linear_algebra/linear_independence
difficulty: competition
calculator: none
variables:
  k: integer(-5, 5)
  v1_x: 1
  v1_y: 0
  v1_z: k
  v2_x: 0
  v2_y: 1
  v2_z: k
  v3_x: k
  v3_y: k
  v3_z: 1
  det: v1_x*(v2_y*v3_z - v2_z*v3_y) - v1_y*(v2_x*v3_z - v2_z*v3_x) + v1_z*(v2_x*v3_y - v2_y*v3_x)
  simplified_det: 1 - 2*k^2
  answer: sqrt(2)/2, -sqrt(2)/2
question: "For what value(s) of k are the vectors v₁ = (1, 0, k), v₂ = (0, 1, k), and v₃ = (k, k, 1) linearly dependent?"
answer: answer
answer_type: set
solution:
  - "Vectors are linearly dependent when their determinant equals zero"
  - "Form the matrix with vectors as columns: [[1, 0, k], [0, 1, k], [k, k, 1]]"
  - "Calculate the determinant: {det}"
  - "Simplify: {simplified_det}"
  - "Set equal to zero: {equation(simplified_det, 0)}"
  - "Solve: 1 - 2k² = 0, so k² = 1/2"
  - "Therefore k = ±√(1/2) = ±√2/2"