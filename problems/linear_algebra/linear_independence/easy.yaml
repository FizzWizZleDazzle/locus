  - name: independent
    variables:
      a1: nonzero(-5, 5)
      a2: nonzero(-5, 5)
      b1: nonzero(-5, 5)
      b2: nonzero(-5, 5)
      ratio1: a2 * b1
      ratio2: a1 * b2
    constraints:
      - ratio1 != ratio2
    question: "Are the vectors {vec([a1, a2])} and {vec([b1, b2])} linearly independent? Answer true or false."
    answer: "true"
    answer_type: boolean
    solution:
      - "Two vectors are linearly independent if and only if neither is a scalar multiple of the other."
      - "Check whether {vec([b1, b2])} is a scalar multiple of {vec([a1, a2])}: we would need {math(b1 / a1 = b2 / a2)}, i.e. {math(a2 * b1 = a1 * b2)}."
      - "Here {ratio1} is not equal to {ratio2}, so no such scalar exists."
      - "The vectors are linearly independent, so the answer is true."
