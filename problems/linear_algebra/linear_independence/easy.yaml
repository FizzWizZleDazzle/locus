topic: linear_algebra/linear_independence
difficulty: easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: integer(-5, 5)
  v1: "[1, 0, a]"
  v2: "[0, 1, b]"
  v3: "[c, 0, 1]"
  det_val: 1 - a*c
  answer: choice("linearly independent", "linearly dependent")
constraints:
  - abs(det_val) <= 10
  - "a != 0 or b != 0 or c != 0"
question: "Determine whether the vectors {vec(v1)}, {vec(v2)}, {vec(v3)} are linearly independent or linearly dependent."
answer: answer
solution:
  - "Form a matrix with the vectors as columns: {matrix_of([[1, 0, c], [0, 1, 0], [a, b, 1]])}"
  - "Calculate the determinant: {det_val}"
  - "Since the determinant is {det_val}, which is {'nonzero' if det_val != 0 else 'zero'}, the vectors are {answer}"