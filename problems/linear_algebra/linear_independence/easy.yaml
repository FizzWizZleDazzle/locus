topic: linear_algebra/linear_independence
difficulty: easy
calculator: none
variables:
  a1: nonzero(-5, 5)
  a2: nonzero(-5, 5)
  k: nonzero(-4, 4)
  b1: k * a1
  b2: k * a2
question: "Are the vectors {vec([a1, a2])} and {vec([b1, b2])} linearly independent? Answer true or false."
answer: "false"
answer_type: boolean
solution:
  - "Two vectors are linearly independent if and only if neither is a scalar multiple of the other."
  - "Check whether {vec([b1, b2])} is a scalar multiple of {vec([a1, a2])}."
  - "We see that {vec([b1, b2])} = {k} {vec([a1, a2])}, so the vectors are linearly dependent."
  - "The answer is false."

variants:
