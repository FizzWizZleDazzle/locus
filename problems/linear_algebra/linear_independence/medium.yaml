question: "Consider the vectors {vec(v1)}, {vec(v2)}, and {vec(v3)}. These vectors are linearly dependent. Find the value of the scalar k such that {vec(v3)} = k({vec(v1)} + {vec(v2)})."
answer: answer
solution:
  - "For linear dependence, we need {vec(v3)} = k{vec(v1)} + m{vec(v2)} for some scalars k, m."
  - "Let's check if {vec(v3)} = k({vec(v1)} + {vec(v2)}) for some k."
  - "{vec(v1)} + {vec(v2)} = {vec(v1)} + {vec(v2)} = {vec(sum_v1_v2)}"
  - "We need {vec(v3)} = k{vec(sum_v1_v2)}"
  - "From the first component: {v3_1} = k(1), so k = {c}"
  - "Verify: k({vec(v1)} + {vec(v2)}) = {c}{vec(sum_v1_v2)} = {vec(v3)} ✓"
  - "Therefore k = {answer}"