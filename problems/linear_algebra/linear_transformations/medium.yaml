topic: linear_algebra/linear_transformations
difficulty: medium
calculator: none
variables:
  a: nonzero(-3, 3)
  b: integer(-3, 3)
  c: integer(-3, 3)
  d: nonzero(-3, 3)
  x_val: integer(-4, 4)
  y_val: integer(-4, 4)
  T_x: a*x_val + b*y_val
  T_y: c*x_val + d*y_val
  answer: T_x, T_y
constraints:
  - a*d - b*c != 0
question: "Let T be the linear transformation defined by T(x,y) = ({a}x + {b}y, {c}x + {d}y). Find T({x_val}, {y_val})."
answer: answer
answer_type: tuple
solution:
  - "Apply the transformation T to the point ({x_val}, {y_val})"
  - "T({x_val}, {y_val}) = ({a}({x_val}) + {b}({y_val}), {c}({x_val}) + {d}({y_val}))"
  - "T({x_val}, {y_val}) = ({a*x_val} + {b*y_val}, {c*x_val} + {d*y_val})"
  - "T({x_val}, {y_val}) = ({T_x}, {T_y})"