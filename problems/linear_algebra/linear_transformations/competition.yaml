topic: linear_algebra/linear_transformations
difficulty: competition
calculator: none
variables:
  a: choice(2, 3, 4)
  b: choice(1, 2, 3)
  c: choice(1, 2, 3)
  d: choice(2, 3, 4)
  det: a*d - b*c
  k: choice(2, 3, 4)
  trace: a + d
  char_poly: x^2 - trace*x + det
  eigenvalues: solve(char_poly, x)
  v1_x: 1
  v1_y: 0
  v2_x: 0
  v2_y: 1
  Tv1_x: a*v1_x + b*v1_y
  Tv1_y: c*v1_x + d*v1_y
  Tv2_x: a*v2_x + b*v2_y
  Tv2_y: c*v2_x + d*v2_y
  kTv1_x: k*Tv1_x
  kTv1_y: k*Tv1_y
  kTv2_x: k*Tv2_x
  kTv2_y: k*Tv2_y
  kA_a: k*a
  kA_b: k*b
  kA_c: k*c
  kA_d: k*d
  det_kA: kA_a*kA_d - kA_b*kA_c
  answer: k^2
constraints:
  - det > 0
  - a != d
question: "Let T be the linear transformation with matrix A = [[{a}, {b}], [{c}, {d}]]. If det(kA) = {det_kA}, what is the value of k^n where n is the dimension of the transformation?"
answer: answer
answer_type: numeric
solution:
  - "For a 2×2 matrix A, we know that det(kA) = k^2 · det(A)"
  - "First find det(A) = {a}·{d} - {b}·{c} = {det}"
  - "So det(kA) = k^2 · {det} = {det_kA}"
  - "This gives us k^2 = {det_kA}/{det} = {answer}"
  - "Since n = 2 (dimension), we need k^n = k^2 = {answer}"