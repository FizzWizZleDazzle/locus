topic: linear_algebra/linear_transformations
difficulty: very_hard
calculator: none
variables:
  a11: nonzero(-3, 3)
  a12: nonzero(-3, 3)
  a21: nonzero(-3, 3)
  a22: nonzero(-3, 3)
  det: a11*a22 - a12*a21
  v1: integer(-2, 2)
  v2: integer(-2, 2)
  w1: a11*v1 + a12*v2
  w2: a21*v1 + a22*v2
  eigenvalue: integer(2, 5)
  e1: eigenvalue - a22
  e2: a12
  scale: nonzero(1, 3)
  eigenvector1: scale*e1
  eigenvector2: scale*e2
  answer: eigenvector1, eigenvector2
constraints:
  - det != 0
  - v1 != 0
question: "Let T be the linear transformation with matrix A = [[{a11}, {a12}], [{a21}, {a22}]]. If T maps ({v1}, {v2}) to ({w1}, {w2}), find an eigenvector of A corresponding to eigenvalue {eigenvalue}."
answer: answer
answer_type: tuple
solution:
  - "First verify that T({v1}, {v2}) = ({w1}, {w2}) by computing A times the vector"
  - "To find eigenvector v for eigenvalue λ = {eigenvalue}, solve (A - λI)v = 0"
  - "A - {eigenvalue}I = [[{a11} - {eigenvalue}, {a12}], [{a21}, {a22} - {eigenvalue}]]"
  - "This gives us [[{a11 - eigenvalue}, {a12}], [{a21}, {a22 - eigenvalue}]]"
  - "For the first row: ({a11 - eigenvalue})x + {a12}y = 0"
  - "Taking x = {e1} and y = {e2}, we get ({a11 - eigenvalue})({e1}) + {a12}({e2}) = 0"
  - "Any scalar multiple works, so ({eigenvector1}, {eigenvector2}) is an eigenvector"