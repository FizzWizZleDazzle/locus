topic: linear_algebra/matrix_arithmetic
difficulty: medium
calculator: none
variables:
  a11: integer(-5, 5)
  a12: integer(-5, 5)
  a21: integer(-5, 5)
  a22: integer(-5, 5)
  b11: integer(-5, 5)
  b12: integer(-5, 5)
  b21: integer(-5, 5)
  b22: integer(-5, 5)
  c11: a11 + b11
  c12: a12 + b12
  c21: a21 + b21
  c22: a22 + b22
  answer: c11, c12, c21, c22
constraints:
  - a11 != 0
  - b11 != 0
question: "Add the matrices A = [[{a11}, {a12}], [{a21}, {a22}]] and B = [[{b11}, {b12}], [{b21}, {b22}]]. Give your answer as four values: top-left, top-right, bottom-left, bottom-right."
answer: answer
answer_type: tuple
solution:
  - "To add matrices, add corresponding entries"
  - "Top-left: {a11} + {b11} = {c11}"
  - "Top-right: {a12} + {b12} = {c12}"
  - "Bottom-left: {a21} + {b21} = {c21}"
  - "Bottom-right: {a22} + {b22} = {c22}"
  - "Result: [[{c11}, {c12}], [{c21}, {c22}]]"