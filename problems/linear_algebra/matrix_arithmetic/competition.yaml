topic: linear_algebra/matrix_arithmetic
difficulty: competition
calculator: none
variables:
  a11: integer(-3, 3)
  a12: integer(-3, 3)
  a21: integer(-3, 3)
  a22: integer(-3, 3)
  det_A: a11*a22 - a12*a21
  b11: integer(-3, 3)
  b12: integer(-3, 3)
  b21: integer(-3, 3)
  b22: integer(-3, 3)
  det_B: b11*b22 - b12*b21
  c11: a11*b11 + a12*b21
  c12: a11*b12 + a12*b22
  c21: a21*b11 + a22*b21
  c22: a21*b12 + a22*b22
  det_C: c11*c22 - c12*c21
  k: choice(2, 3, 4, 5)
  d11: k*a11
  d12: k*a12
  d21: k*a21
  d22: k*a22
  det_D: d11*d22 - d12*d21
  answer: det_C - det_D
constraints:
  - det_A != 0
  - det_B != 0
question: "Let A = [[{a11}, {a12}], [{a21}, {a22}]] and B = [[{b11}, {b12}], [{b21}, {b22}]]. If C = AB and D = {k}A, find det(C) - det(D)."
answer: answer
answer_type: numeric
solution:
  - "First compute C = AB:"
  - "c11 = {a11}·{b11} + {a12}·{b21} = {c11}"
  - "c12 = {a11}·{b12} + {a12}·{b22} = {c12}"
  - "c21 = {a21}·{b11} + {a22}·{b21} = {c21}"
  - "c22 = {a21}·{b12} + {a22}·{b22} = {c22}"
  - "So C = [[{c11}, {c12}], [{c21}, {c22}]]"
  - "det(C) = {c11}·{c22} - {c12}·{c21} = {det_C}"
  - "For D = {k}A = [[{d11}, {d12}], [{d21}, {d22}]]"
  - "det(D) = {d11}·{d22} - {d12}·{d21} = {det_D}"
  - "Note: det({k}A) = {k}²·det(A) = {k}²·{det_A} = {det_D}"
  - "Therefore det(C) - det(D) = {det_C} - {det_D} = {answer}"