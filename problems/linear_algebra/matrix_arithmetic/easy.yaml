topic: linear_algebra/matrix_arithmetic
difficulty: easy
calculator: none
variables:
  A: matrix(2, 2, -5, 5)
  B: matrix(2, 2, -5, 5)
  C: A + B
  answer: C
constraints:
  - abs(A[0,0] + B[0,0]) <= 10
  - abs(A[1,1] + B[1,1]) <= 10
question: "Calculate {matrix_of(A)} + {matrix_of(B)}"
answer: answer
answer_type: matrix
solution:
  - "Add corresponding entries of the matrices"
  - "Top left: {A[0,0]} + {B[0,0]} = {C[0,0]}"
  - "Top right: {A[0,1]} + {B[0,1]} = {C[0,1]}"
  - "Bottom left: {A[1,0]} + {B[1,0]} = {C[1,0]}"
  - "Bottom right: {A[1,1]} + {B[1,1]} = {C[1,1]}"
  - "Result: {matrix_of(C)}"