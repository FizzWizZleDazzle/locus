topic: linear_algebra/matrix_arithmetic
difficulty: very_hard
calculator: none
variables:
  a11: nonzero(-4, 4)
  a12: integer(-3, 3)
  a21: integer(-3, 3)
  a22: nonzero(-4, 4)
  b11: nonzero(-4, 4)
  b12: integer(-3, 3)
  b21: integer(-3, 3)
  b22: nonzero(-4, 4)
  c11: a11*b11 + a12*b21
  c12: a11*b12 + a12*b22
  c21: a21*b11 + a22*b21
  c22: a21*b12 + a22*b22
  det_c: c11*c22 - c12*c21
  inv_c11: c22/det_c
  inv_c12: -c12/det_c
  inv_c21: -c21/det_c
  inv_c22: c11/det_c
  trace_c: c11 + c22
  answer: trace_c
constraints:
  - a11*a22 != a12*a21
  - b11*b22 != b12*b21
question: "Let A = [[{a11}, {a12}], [{a21}, {a22}]] and B = [[{b11}, {b12}], [{b21}, {b22}]]. Find the trace of AB."
answer: answer
answer_type: numeric
solution:
  - "First compute the matrix product AB"
  - "Row 1, Col 1: ({a11})({b11}) + ({a12})({b21}) = {c11}"
  - "Row 1, Col 2: ({a11})({b12}) + ({a12})({b22}) = {c12}"
  - "Row 2, Col 1: ({a21})({b11}) + ({a22})({b21}) = {c21}"
  - "Row 2, Col 2: ({a21})({b12}) + ({a22})({b22}) = {c22}"
  - "So AB = [[{c11}, {c12}], [{c21}, {c22}]]"
  - "The trace is the sum of diagonal elements: {c11} + {c22} = {answer}"