topic: linear_algebra/matrix_arithmetic
difficulty: very_hard
calculator: none
variables:
  A: matrix(3, 3, -3, 3)
  B: matrix(3, 3, -3, 3)
  C: matrix(3, 3, -3, 3)
  AB: A * B
  BC: B * C
  ABC_left: AB * C
  ABC_right: A * BC
  trace_AB: trace(AB)
  trace_BC: trace(BC)
  det_A: det(A)
  det_B: det(B)
  det_C: det(C)
  det_product: det_A * det_B * det_C
  det_ABC: det(ABC_left)
  answer: det_ABC - det_product
constraints:
  - det_A != 0
  - det_B != 0
  - det_C != 0
question: "Given matrices A = {matrix_of(A)}, B = {matrix_of(B)}, and C = {matrix_of(C)}, verify that det(ABC) = det(A)·det(B)·det(C) by computing det(ABC) - det(A)·det(B)·det(C)."
answer: answer
solution:
  - "First compute the individual determinants:"
  - "det(A) = {det_A}"
  - "det(B) = {det_B}"
  - "det(C) = {det_C}"
  - "So det(A)·det(B)·det(C) = {det_A} · {det_B} · {det_C} = {det_product}"
  - "Now compute ABC by associativity (AB)C:"
  - "AB = {matrix_of(AB)}"
  - "ABC = (AB)C = {matrix_of(ABC_left)}"
  - "det(ABC) = {det_ABC}"
  - "Therefore det(ABC) - det(A)·det(B)·det(C) = {det_ABC} - {det_product} = {answer}"
  - "This confirms the multiplicative property of determinants."