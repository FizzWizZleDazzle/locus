topic: linear_algebra/matrix_arithmetic
difficulty: very_easy
calculator: none
variables:
  a11: integer(1, 5)
  a12: integer(1, 5)
  a21: integer(1, 5)
  a22: integer(1, 5)
  b11: integer(1, 5)
  b12: integer(1, 5)
  b21: integer(1, 5)
  b22: integer(1, 5)
  c11: a11 + b11
  c12: a12 + b12
  c21: a21 + b21
  c22: a22 + b22
  answer: c11, c12, c21, c22
question: "Find A + B where A = [[{a11}, {a12}], [{a21}, {a22}]] and B = [[{b11}, {b12}], [{b21}, {b22}]]"
answer: answer
answer_type: tuple
solution:
  - "Add corresponding elements:"
  - "Top left: {a11} + {b11} = {c11}"
  - "Top right: {a12} + {b12} = {c12}"
  - "Bottom left: {a21} + {b21} = {c21}"
  - "Bottom right: {a22} + {b22} = {c22}"
  - "Result: [[{c11}, {c12}], [{c21}, {c22}]]"