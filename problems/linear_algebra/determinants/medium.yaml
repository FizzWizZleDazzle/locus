topic: linear_algebra/determinants
difficulty: medium
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: integer(-5, 5)
  d: integer(-5, 5)
  M: matrix(2, 2, -5, 5)
  det_val: a*d - b*c
constraints:
  - det_val != 0
  - abs(det_val) <= 20
question: "Find the determinant of {matrix_of(M)}"
answer: det_val
solution:
  - "For a 2×2 matrix {matrix_of(M)}, the determinant is ad - bc"
  - "det = ({a})({d}) - ({b})({c})"
  - "det = {a*d} - {b*c}"
  - "det = {det_val}"