topic: linear_algebra/determinants
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  a: k
  b: k + 1
  c: k + 2
  d: k + 3
  det_original: a*d - b*c
  det_swapped: c*b - d*a
  det_scaled: 2*a*d - 2*b*c
  det_row_op: (a + 2*c)*d - (b + 2*d)*c
  answer: det_original
constraints:
  - k > 0
question: "Consider the matrix A = [[{a}, {b}], [{c}, {d}]]. Find det(A)."
answer: answer
answer_type: numeric
solution:
  - "For a 2×2 matrix [[a, b], [c, d]], det = ad - bc"
  - "det(A) = ({a})({d}) - ({b})({c})"
  - "det(A) = {a*d} - {b*c}"
  - "det(A) = {det_original}"
  - "Note: det(A) = -2, and we can verify that swapping rows gives det = {det_swapped} = -det(A)"
  - "Also, scaling row 1 by 2 gives a new determinant of {det_scaled} = 2·det(A)"
  - "Adding 2·(row 2) to row 1 preserves the determinant: {det_row_op} = det(A)"