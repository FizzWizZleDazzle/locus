topic: linear_algebra/determinants
difficulty: easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: integer(-5, 5)
  d: integer(-5, 5)
  answer: a*d - b*c
constraints:
  - a != 0
  - d != 0
question: "Find the determinant of the matrix [[{a}, {b}], [{c}, {d}]]"
answer: answer
answer_type: numeric
solution:
  - "For a 2x2 matrix [[a, b], [c, d]], the determinant is ad - bc"
  - "det = ({a})({d}) - ({b})({c})"
  - "det = {a*d} - {b*c}"
  - "det = {answer}"