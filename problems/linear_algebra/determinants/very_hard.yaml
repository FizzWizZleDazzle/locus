topic: linear_algebra/determinants
difficulty: very_hard
calculator: scientific
variables:
  # Design 4x4 matrix with known determinant structure
  # Upper triangular block with controlled determinant
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: integer(-4, 4)
  d: integer(-4, 4)
  
  # Lower block designed to create clean cofactor expansion
  p: nonzero(-2, 2)
  q: nonzero(-2, 2)
  
  # Build matrix with specific structure for clean computation
  M: matrix(4, 4, -5, 5)
  
  # Override specific entries to create structure
  M11: a
  M12: b
  M13: c
  M14: d
  M21: 0
  M22: a*b
  M23: b*c
  M24: c*d
  M31: p
  M32: 0
  M33: p*q
  M34: 0
  M41: q
  M42: p*q
  M43: 0
  M44: q
  
  # Cofactor expansion along first column gives clean factorization
  det_upper_3x3: a*b*(p*q*q - b*c*q)
  det_lower_3x3: p*(a*b*q - c*d*p)
  
  answer: a*det_upper_3x3 - p*det_lower_3x3
  
constraints:
  - a != b
  - p != q
  - abs(answer) <= 200
  
question: "Compute the determinant of the matrix {matrix_of(M)}"
answer: answer
solution:
  - "Use cofactor expansion along the first column of {matrix_of(M)}"
  - "The (1,1) cofactor is the determinant of the 3×3 matrix obtained by removing row 1 and column 1"
  - "The (3,1) cofactor is the determinant of the 3×3 matrix obtained by removing row 3 and column 1"
  - "After computing these 3×3 determinants using further cofactor expansion:"
  - "det(M) = {a} × ({det_upper_3x3}) - {p} × ({det_lower_3x3})"
  - "det(M) = {answer}"