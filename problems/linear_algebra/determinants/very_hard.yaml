topic: linear_algebra/determinants
difficulty: very_hard
calculator: none
variables:
  a11: nonzero(-3, 3)
  a12: integer(-3, 3)
  a13: integer(-3, 3)
  a21: integer(-3, 3)
  a22: nonzero(-3, 3)
  a23: integer(-3, 3)
  a31: integer(-3, 3)
  a32: integer(-3, 3)
  a33: nonzero(-3, 3)
  minor11: a22*a33 - a23*a32
  minor12: a21*a33 - a23*a31
  minor13: a21*a32 - a22*a31
  det: a11*minor11 - a12*minor12 + a13*minor13
  answer: det
constraints:
  - det != 0
question: "Find the determinant of the matrix A = [[{a11}, {a12}, {a13}], [{a21}, {a22}, {a23}], [{a31}, {a32}, {a33}]]"
answer: answer
answer_type: numeric
solution:
  - "Use cofactor expansion along the first row"
  - "det(A) = {a11} · |[{a22}, {a23}], [{a32}, {a33}]| - {a12} · |[{a21}, {a23}], [{a31}, {a33}]| + {a13} · |[{a21}, {a22}], [{a31}, {a32}]|"
  - "Calculate the 2×2 determinants:"
  - "|[{a22}, {a23}], [{a32}, {a33}]| = ({a22})({a33}) - ({a23})({a32}) = {minor11}"
  - "|[{a21}, {a23}], [{a31}, {a33}]| = ({a21})({a33}) - ({a23})({a31}) = {minor12}"
  - "|[{a21}, {a22}], [{a31}, {a32}]| = ({a21})({a32}) - ({a22})({a31}) = {minor13}"
  - "det(A) = ({a11})({minor11}) - ({a12})({minor12}) + ({a13})({minor13}) = {answer}"