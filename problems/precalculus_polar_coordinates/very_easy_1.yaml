topic: precalculus/polar_coordinates
difficulty: very_easy
calculator: none
variables:
  r: integer(1, 8)
  angle_choice: choice(0, 30, 45, 60, 90, 120, 135, 150, 180)
  theta: angle_choice * pi / 180
  x: r * cos(theta)
  y: r * sin(theta)
  x_clean: simplify(x)
  y_clean: simplify(y)
question: "Convert the polar coordinates ({r}, {angle_choice}°) to rectangular coordinates (x, y)."
answer: x_clean
answer_type: coordinate_pair
solution:
  - "Use x = r cos(θ) and y = r sin(θ)"
  - "x = {r} cos({angle_choice}°) = {x_clean}"
  - "y = {r} sin({angle_choice}°) = {y_clean}"
  - "The rectangular coordinates are ({x_clean}, {y_clean})"