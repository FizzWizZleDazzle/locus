topic: arithmetic/ratios_proportions
difficulty: medium
calculator: none
variables:
  # Design backwards: pick a clean ratio first
  ratio_num: integer(2, 5)
  ratio_den: integer(3, 7)
  # Pick a multiplier to scale up
  k: integer(4, 12)
  # Build the proportion parts
  a: ratio_num * k
  b: ratio_den * k
  # Pick another multiplier for second ratio
  m: integer(3, 9)
  c: ratio_num * m
  d: ratio_den * m
  # The unknown we're solving for
  answer: d
constraints:
  - ratio_num < ratio_den
  - k != m
  - gcd(ratio_num, ratio_den) == 1
question: "If {a} : {b} = {c} : x, find the value of x."
answer: answer
solution:
  - "Set up the proportion: {a}/{b} = {c}/x"
  - "Cross multiply: {a} × x = {b} × {c}"
  - "{a}x = {b*c}"
  - "x = {b*c}/{a}"
  - "x = {answer}"