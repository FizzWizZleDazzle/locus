topic: linear_algebra/diagonalization
difficulty: medium
calculator: scientific
variables:
  lambda1: integer(-5, 5)
  lambda2: integer(-5, 5)
  P: matrix(2, 2, -3, 3)
  P_inv: inverse(P)
  D_diag: diagonal(lambda1, lambda2)
  A: P * D_diag * P_inv
  A_simplified: simplify(A)
  char_poly: expand((lambda1 - x) * (lambda2 - x))
  eigenvalues: solve(char_poly, x)
constraints:
  - lambda1 != lambda2
  - abs(lambda1) + abs(lambda2) > 0
  - det(P) != 0
question: "Find the eigenvalues of the matrix {matrix_of(A_simplified)}."
answer: eigenvalues
answer_type: set
solution:
  - "To find eigenvalues, solve {equation(det_of(A_simplified - x*I), 0)}"
  - "The characteristic polynomial is {equation(det_of(A_simplified - x*I), char_poly)}"
  - "This factors as {equation((lambda1 - x)*(lambda2 - x), 0)}"
  - "Therefore the eigenvalues are {set_of(eigenvalues)}"