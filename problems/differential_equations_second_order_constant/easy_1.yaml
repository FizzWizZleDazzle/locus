topic: differential_equations/second_order_constant
difficulty: easy
calculator: none
variables:
  r1: integer(-5, 5)
  r2: integer(-5, 5)
  characteristic: (r - r1) * (r - r2)
  expanded_char: expand(characteristic)
  a: -r1 - r2
  b: r1 * r2
  diff_eq: y'' + a * y' + b * y
  solution: C1 * e^(r1 * x) + C2 * e^(r2 * x)
constraints:
  - r1 != r2
  - r1 != 0
  - r2 != 0
question: "Find the general solution to the differential equation {equation(diff_eq, 0)}"
answer: solution
answer_type: expression
solution:
  - "Write the characteristic equation: {equation(expanded_char, 0)}"
  - "Factor: {equation(characteristic, 0)}"
  - "The roots are r = {r1} and r = {r2}"
  - "Since we have two distinct real roots, the general solution is:"
  - "y = {solution}"