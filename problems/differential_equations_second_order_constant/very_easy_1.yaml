topic: differential_equations/second_order_constant
difficulty: very_easy
calculator: none
variables:
  r1: integer(-5, 5)
  r2: integer(-5, 5)
  char_poly: (r - r1) * (r - r2)
  expanded_char: expand(char_poly)
  a: -r1 - r2
  b: r1 * r2
  diff_eq: y'' + a * y' + b * y
constraints:
  - r1 != r2
  - r1 != 0
  - r2 != 0
question: "Find the general solution to {equation(diff_eq, 0)}"
answer: diff_eq
answer_type: expression
solution:
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "Factor: {equation(char_poly, 0)}"
  - "So r = {r1} or r = {r2}"
  - "Since the roots are distinct, the general solution is y = C₁e^({r1}x) + C₂e^({r2}x)"