topic: calculus/antiderivatives
difficulty: hard
calculator: scientific
variables:
  # Backward design: pick F(x) = p*x^(n+1) + q*x^(m+1) first
  n: integer(2, 4)
  m: integer(0, 1)
  p: nonzero(-3, 3)
  q: nonzero(-3, 3)
  # Derive f = F'(x) coefficients
  a: (n + 1) * p
  b: (m + 1) * q
  # f(x) and F(x) without C
  f: a*x^n + b*x^m
  F_no_C: p*x^(n+1) + q*x^(m+1)
  # Initial condition
  x0: integer(1, 3)
  k: integer(-8, 8)
  # F(x0) without C
  F_at_x0: evaluate(F_no_C, x, x0)
  # C = k - F(x0)
  answer: k - F_at_x0
  # For solution display: negate F_at_x0 to avoid double-negative
  neg_F_at_x0: -F_at_x0

constraints:
  - n != m

question: "Find the value of the constant {math(C)} in the antiderivative {math(F(x))} = {F_no_C} + {math(C)} of {f}, given that {math(F(x_0))} = {k} when {math(x_0)} = {x0}."

answer: answer

solution:
  - "The given antiderivative form is {math(F(x))} = {F_no_C} + {math(C)}."
  - "Apply the initial condition {math(F(x_0) = k)}: substitute {math(x)} = {x0}."
  - "This gives {equation(F_at_x0 + C, k)}, so {equation(C, k + neg_F_at_x0)}."
  - "Therefore {math(C)} = {answer}."
