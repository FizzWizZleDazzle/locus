topic: calculus/antiderivatives
difficulty: hard
calculator: none
variables:
  a: nonzero(-6, 6)
  b: nonzero(-8, 8)
  c: nonzero(-5, 5)
  n: choice(2, 3, 4)
  m: choice(2, 3)
  f: a * x^n + b * x^m + c * x
  F: integral(f, x)
  k: integer(-10, 10)
  answer: F + k
constraints:
  - n != m
  - abs(a) != abs(b)
question: "Find the most general antiderivative of {f}."
answer: answer
solution:
  - "To find the antiderivative, integrate each term separately"
  - "For {a * x^n}: {integral_of(a * x^n, x)} = {a * x^(n+1) / (n+1)}"
  - "For {b * x^m}: {integral_of(b * x^m, x)} = {b * x^(m+1) / (m+1)}"
  - "For {c * x}: {integral_of(c * x, x)} = {c * x^2 / 2}"
  - "Combining all terms: F(x) = {F}"
  - "The most general antiderivative includes an arbitrary constant: {answer}"