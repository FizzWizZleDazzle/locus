topic: calculus/antiderivatives
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-4, 4)
  b: nonzero(-3, 3)
  c: integer(-5, 5)
  d: nonzero(-2, 2)
  f: a * sin(b * x) + c * x^3 + d / x^2
  answer: integral(f, x)
constraints:
  - a != b
  - c != 0
question: "Find the antiderivative of {f}"
answer: answer
solution:
  - "Split the integral: {integral_of(f, x)} = {integral_of(a * sin(b * x), x)} + {integral_of(c * x^3, x)} + {integral_of(d / x^2, x)}"
  - "For {integral_of(a * sin(b * x), x)}, use substitution u = {b}x, du = {b}dx"
  - "This gives -{a}/{b} * cos({b}x)"
  - "For {integral_of(c * x^3, x)}, use power rule: {c}/4 * x^4"
  - "For {integral_of(d / x^2, x)} = {integral_of(d * x^(-2), x)}, use power rule: -{d}/x"
  - "Combining all terms: {answer} + C"