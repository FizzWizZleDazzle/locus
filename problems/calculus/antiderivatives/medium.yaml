topic: calculus/antiderivatives
difficulty: medium
calculator: none

variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  n: integer(2, 5)
  m: integer(1, 3)
  f: a*x^n + b*x^m
  anti_term1: a*x^(n+1)/(n+1)
  anti_term2: b*x^(m+1)/(m+1)
  answer: integral(f, x)

constraints:
  - n != m

question: "Find {integral_of(f, x)}. Include the constant of integration {math(C)}."

answer: answer

solution:
  - "Apply the Power Rule to each term: raise the exponent by 1 and divide by the new exponent."
  - "First term: {anti_term1}"
  - "Second term: {anti_term2}"
  - "Result: {answer} + C"
