topic: calculus/antiderivatives
difficulty: medium
calculator: none
variables:
  a: nonzero(-6, 6)
  b: nonzero(-8, 8)
  n: integer(2, 5)
  f: a * x^n + b * x
  F: integral(f, x)
  c: integer(-5, 5)
  answer: F + c
constraints:
  - a != b
question: "Find the most general antiderivative of {f}."
answer: answer
solution:
  - "To find the antiderivative of {f}, integrate each term"
  - "For the first term: {integral_of(a * x^n, x)} = {a * x^(n+1) / (n+1)}"
  - "For the second term: {integral_of(b * x, x)} = {b * x^2 / 2}"
  - "The most general antiderivative is {F} + C"
  - "where C is an arbitrary constant"