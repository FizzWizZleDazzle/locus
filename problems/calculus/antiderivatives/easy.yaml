topic: calculus/antiderivatives
difficulty: easy
calculator: none

variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  n: integer(2, 5)
  m: integer(1, 3)
  f: a*x^n + b*x^m
  answer: integral(f, x)

constraints:
  - n != m

question: "Find the general antiderivative {math(F(x))} of {f}. Include the constant of integration {math(C)}."

answer: answer

solution:
  - "Apply the power rule for antiderivatives: the antiderivative of {math(x^k)} is {math(x^(k+1)/(k+1))} + C."
  - "Integrate each term separately:"
  - "{integral_of(f, x)} = {answer} + C"
