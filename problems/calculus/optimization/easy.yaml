topic: calculus/optimization
difficulty: easy
calculator: none
variables:
  a: integer(2, 8)
  b: integer(10, 30)
  f: a * x^2 - b * x
  df: derivative(f, x)
  critical_x: b / (2 * a)
  answer: evaluate(f, x, critical_x)
constraints:
  - mod(b, 2) == 0
  - mod(b, a) == 0
question: "Find the minimum value of {f}."
answer: answer
solution:
  - "To find the minimum, take the derivative: {derivative_of(f, x)} = {df}"
  - "Set the derivative equal to zero: {equation(df, 0)}"
  - "Solve for x: x = {critical_x}"
  - "Since the coefficient of x^2 is positive ({a}), this is a minimum"
  - "Substitute x = {critical_x} into {f}"
  - "Minimum value = {answer}"