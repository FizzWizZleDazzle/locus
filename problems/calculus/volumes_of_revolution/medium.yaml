topic: calculus/volumes_of_revolution
difficulty: medium
calculator: scientific
variables:
  a: integer(1, 4)
  b: integer(2, 5)
  c: integer(0, 3)
  f: a * x^2 + c
  lower: 0
  upper: b
  integrand: simplify(3.14159 * (f)^2)
  answer: evaluate(integral(integrand, x), x, upper) - evaluate(integral(integrand, x), x, lower)
constraints:
  - b > a
question: "Find the volume of the solid formed by revolving the region bounded by {equation(y, f)}, the x-axis, x = {lower}, and x = {upper} about the x-axis. Use π ≈ 3.14159."
answer: answer
solution:
  - "Using the disk method: V = π ∫[{lower},{upper}] ({f})^2 dx"
  - "V = π ∫[{lower},{upper}] ({a}x^2 + {c})^2 dx"
  - "Expand: ({a}x^2 + {c})^2 = {expand((a*x^2 + c)^2)}"
  - "V = π {integral_of(expand((a*x^2 + c)^2), x)} from {lower} to {upper}"
  - "Evaluate at bounds to get V = {answer}"