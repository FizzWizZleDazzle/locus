topic: calculus/volumes_of_revolution
difficulty: hard
calculator: scientific
variants:
  - name: default
    variables:
      a: nonzero(1, 3)
      a_sq: a^2
      R_sq: a_sq * x
      r_sq: a_sq * x^4
      diff: R_sq - r_sq
      antideriv: integral(diff, x)
      int_val: definite_integral(diff, x, 0, 1)
      answer: pi * int_val
    question: Find the volume of the solid obtained by rotating the region bounded by {math(y = a*sqrt(x))} and {math(y = a*x^2)} about the {math(x)}-axis.
    answer: answer
    answer_type: expression
    solution:
      - The two curves intersect where {math(a*sqrt(x) = a*x^2)}, giving {math(x)} = 0 and {math(x)} = 1.
      - On [0, 1], the outer radius is {math(R(x) = a*sqrt(x))} and the inner radius is {math(r(x) = a*x^2)}.
      - 'By the washer method: {math(V)} = {definite_integral_of(pi*(R_sq - r_sq), x, 0, 1)}.'
      - 'Simplify: {math(V)} = {math(pi)} {definite_integral_of(diff, x, 0, 1)}.'
      - 'Antiderivative: {antideriv} + C.'
      - 'Evaluate from 0 to 1: {math(V)} = {math(pi)} times {int_val} = {answer}.'
