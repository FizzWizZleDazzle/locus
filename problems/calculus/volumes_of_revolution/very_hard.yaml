topic: calculus/volumes_of_revolution
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 4)
  b: integer(1, 3)
  c: integer(1, 2)
  f: a*sqrt(x)
  g: b*x + c
  x_int: (c/(a - b))^2
  x_lo: 0
  x_hi: x_int
  outer: f
  inner: g
  outer_sq: a^2 * x
  inner_sq: b^2*x^2 + 2*b*c*x + c^2
  integrand: outer_sq - inner_sq
  expanded: a^2*x - b^2*x^2 - 2*b*c*x - c^2
  simplified: -b^2*x^2 + (a^2 - 2*b*c)*x - c^2
  antideriv: -b^2*x^3/3 + (a^2 - 2*b*c)*x^2/2 - c^2*x
  F_hi_1: evaluate(antideriv, x, x_hi)
  F_lo_1: evaluate(antideriv, x, x_lo)
  def_integral: F_hi_1 - F_lo_1
  answer: pi * def_integral
constraints:
  - a > b
  - b > 0
question: "Find the volume of the solid obtained by rotating the region bounded by {equation(y, f)} and {equation(y, g)} about the x-axis."
answer: answer
solution:
  - "Find intersection: {equation(f, g)} gives {equation(a*sqrt(x), b*x + c)}"
  - "Square both sides: {equation(a^2*x, (b*x + c)^2)}"
  - "Expand: {equation(a^2*x, b^2*x^2 + 2*b*c*x + c^2)}"
  - "Rearrange: {equation(b^2*x^2 + (2*b*c - a^2)*x + c^2, 0)}"
  - "Factor: {equation(x*(b^2*x + 2*b*c - a^2) + c^2, 0)}"
  - "Since {equation(f, g)} at x = 0 gives {equation(0, c)}, we need the other intersection"
  - "Solving gives x = {x_hi}"
  - "For x in [0, {x_hi}], {f} ≥ {g} (since {equation(a*sqrt(x), b*x + c)} at small x)"
  - "Volume = π{definite_integral_of((f)^2 - (g)^2, x, x_lo, x_hi)}"
  - "= π{definite_integral_of(outer_sq - inner_sq, x, x_lo, x_hi)}"
  - "= π{definite_integral_of(simplified, x, x_lo, x_hi)}"
  - "= π[{antideriv}] from {x_lo} to {x_hi}"
  - "= π({F_hi_1} - {F_lo_1})"
  - "= π({def_integral})"
  - "= {answer}"