topic: calculus/volumes_of_revolution
difficulty: competition
calculator: none
variables:
  a: choice(1, 2, 3, 4)
  b: choice(1, 2, 3)
  n: choice(2, 4, 6)
  f: a*x^n
  g: b*x^(n/2)
  f_squared: (a*x^n)^2
  g_squared: (b*x^(n/2))^2
  diff: expand(f_squared - g_squared)
  F: integral(diff, x)
  x_intersect: (b/a)^(2/n)
  F_at_intersect: evaluate(F, x, x_intersect)
  F_at_zero: evaluate(F, x, 0)
  volume_factor: F_at_intersect - F_at_zero
  answer: pi * volume_factor
constraints:
  - a > b
question: "Find the volume of the solid obtained by rotating the region bounded by {equation(y, f)} and {equation(y, g)} about the x-axis."
answer: answer
answer_type: expression
solution:
  - "Find intersection points: {equation(f, g)} gives {equation(a*x^n, b*x^(n/2))}"
  - "This yields {equation(x^(n/2), b/a)}, so x = 0 and x = {x_intersect}"
  - "For 0 < x < {x_intersect}, we have {g} > {f} since {equation(b*x^(n/2), a*x^n)} when x < {x_intersect}"
  - "Volume = {definite_integral_of(pi*(g^2 - f^2), x, 0, x_intersect)}"
  - "= {definite_integral_of(pi*diff, x, 0, x_intersect)}"
  - "= pi * [{F}] from 0 to {x_intersect}"
  - "= {answer}"