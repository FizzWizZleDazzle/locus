topic: calculus/related_rates
difficulty: competition
calculator: none
variables:
  r_rate: choice(2, 3, 4, 6)
  r_initial: choice(12, 15, 18, 24)
  V_initial: evaluate(4/3 * 3.14159 * r_initial^3, r_initial, r_initial)
  dV_dt: evaluate(4 * 3.14159 * r_initial^2 * r_rate, r_initial, r_initial)
  answer: round(dV_dt, 0)
constraints:
  - r_rate * r_initial < 100
  - mod(r_initial, 3) == 0
question: "A spherical balloon is being inflated. When its radius is {r_initial} cm, the radius is increasing at {r_rate} cm/s. At what rate is the volume increasing at this instant? Use π ≈ 3.14159 and round to the nearest cubic cm per second."
answer: answer
solution:
  - "Volume of sphere: V = (4/3)πr³"
  - "Differentiate with respect to time: dV/dt = 4πr² · dr/dt"
  - "Given: r = {r_initial} cm, dr/dt = {r_rate} cm/s"
  - "Substitute: dV/dt = 4π({r_initial})²({r_rate})"
  - "dV/dt = 4π · {evaluate(r_initial^2, r_initial, r_initial)} · {r_rate}"
  - "dV/dt ≈ {answer} cm³/s"