topic: calculus/related_rates
difficulty: hard
calculator: scientific
variables:
  r_rate: choice(2, 3, 4, 5)
  h_rate: choice(1, 2, 3)
  r_val: choice(6, 8, 10, 12)
  h_val: choice(4, 5, 8, 10)
  V: r_val^2 * h_val
  dV_dt: 2 * r_val * h_val * r_rate + r_val^2 * h_rate
constraints:
  - r_val % 2 == 0
  - h_val != r_val
  - dV_dt < 1000
question: "A right circular cylinder has radius r and height h, both changing with time. At the instant when r = {r_val} cm and h = {h_val} cm, the radius is increasing at {r_rate} cm/s and the height is increasing at {h_rate} cm/s. Find the rate of change of the volume at this instant."
answer: dV_dt
solution:
  - "Volume of a cylinder: V = πr²h"
  - "Differentiate with respect to time using the product rule:"
  - "dV/dt = π(2r(dr/dt)h + r²(dh/dt))"
  - "Substitute the given values:"
  - "dV/dt = π(2({r_val})({r_rate})({h_val}) + ({r_val})²({h_rate}))"
  - "dV/dt = π({dV_dt})"
  - "The volume is increasing at {dV_dt}π cm³/s"