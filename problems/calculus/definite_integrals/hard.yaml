topic: calculus/definite_integrals
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: nonzero(-3, 3)
  f: a*x^3 - b*x^2 + c*x
  lower: integer(-2, 0)
  upper: integer(1, 3)
  antiderivative: (a/4)*x^4 - (b/3)*x^3 + (c/2)*x^2
  upper_val: evaluate(antiderivative, x, upper)
  lower_val: evaluate(antiderivative, x, lower)
  answer: upper_val - lower_val
constraints:
  - upper > lower
  - abs(answer) <= 100
question: "Evaluate {definite_integral_of(f, x, lower, upper)}"
answer: answer
solution:
  - "Find the antiderivative of {f}"
  - "The antiderivative is F(x) = {antiderivative}"
  - "Apply the fundamental theorem: F({upper}) - F({lower})"
  - "F({upper}) = {upper_val}"
  - "F({lower}) = {lower_val}"
  - "Therefore {definite_integral_of(f, x, lower, upper)} = {upper_val} - {lower_val} = {answer}"