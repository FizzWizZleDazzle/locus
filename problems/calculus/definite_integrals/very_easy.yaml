topic: calculus/definite_integrals
difficulty: very_easy
calculator: none
variables:
  c: nonzero(-5, 5)
  a: integer(0, 3)
  b: integer(4, 7)
  f: c
  antiderivative: c * x
  upper_value: evaluate(antiderivative, x, b)
  lower_value: evaluate(antiderivative, x, a)
  answer: upper_value - lower_value
constraints:
  - b > a
question: "Evaluate {definite_integral_of(f, x, a, b)}"
answer: answer
solution:
  - "The function {f} is a constant"
  - "The antiderivative is {antiderivative}"
  - "Evaluate at the bounds: F({b}) - F({a}) = {upper_value} - {lower_value}"
  - "Result: {answer}"