topic: calculus/definite_integrals
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  n: integer(3, 6)
  a: integer(-3, -1)
  b: integer(1, 3)
  f: k * x^n
  antiderivative: (k / (n + 1)) * x^(n + 1)
  upper_val: evaluate(antiderivative, x, b)
  lower_val: evaluate(antiderivative, x, a)
  answer: upper_val - lower_val
constraints:
  - b > 0
  - a < 0
  - abs(a) != b
question: "Evaluate {definite_integral_of(f, x, a, b)}"
answer: answer
solution:
  - "Find the antiderivative of {f}"
  - "The antiderivative is {antiderivative}"
  - "Evaluate at the bounds: F({b}) - F({a})"
  - "F({b}) = {upper_val}"
  - "F({a}) = {lower_val}"
  - "Therefore {definite_integral_of(f, x, a, b)} = {upper_val} - {lower_val} = {answer}"