topic: calculus/definite_integrals
difficulty: medium
calculator: none

variables:
  a_coeff: choice(3, 6, -3, -6)
  b_coeff: choice(2, 4, -2, -4)
  lo: integer(0, 2)
  hi: integer(3, 5)
  f: a_coeff*x^2 + b_coeff*x
  F: integral(f, x)
  F_hi: evaluate(F, x, hi)
  F_lo: evaluate(F, x, lo)
  diff: F_hi - F_lo
  answer: diff

question: "Evaluate {definite_integral_of(f, x, lo, hi)}."

answer: answer
answer_type: numeric

solution:
  - "Find the antiderivative: {equation(integral_of(f, x), F)} + C"
  - "Apply the Fundamental Theorem of Calculus and evaluate at {hi} and {lo}."
  - "At {math(x = hi)}: {equation(F, F_hi)}"
  - "At {math(x = lo)}: {equation(F, F_lo)}"
  - "Result: {F_hi} - {F_lo} = {answer}"
