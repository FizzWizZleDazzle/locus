topic: calculus/curve_sketching
difficulty: very_hard
calculator: graphing
variables:
  a: nonzero(-3, 3)
  b: integer(-4, 4)
  c: integer(-4, 4)
  f: a*x^3 + b*x^2 + c*x
  f_prime: derivative(f, x)
  f_double_prime: derivative(f_prime, x)
  critical_points: solve(f_prime, x)
  inflection_x: solve(f_double_prime, x)
  inflection_y: evaluate(f, x, inflection_x)
  y_intercept: evaluate(f, x, 0)
  local_behavior: a
constraints:
  - a != 0
  - b*b - 3*a*c >= 0
question: "Analyze the function {f}. Find all critical points, inflection points, and describe the end behavior. Determine intervals of increase/decrease and concavity."
answer: critical_points
solution:
  - "Given function: f(x) = {f}"
  - "First derivative: f'(x) = {f_prime}"
  - "Setting f'(x) = 0 to find critical points: {f_prime} = 0"
  - "Critical points: x = {critical_points}"
  - "Second derivative: f''(x) = {f_double_prime}"
  - "Setting f''(x) = 0 for inflection point: {f_double_prime} = 0"
  - "Inflection point at x = {inflection_x}, y = {inflection_y}"
  - "End behavior: As x → ∞, f(x) → {local_behavior}∞; As x → -∞, f(x) → {local_behavior}(-∞)"
  - "The function has y-intercept at (0, {y_intercept})"
  - "f''(x) > 0 when x > {inflection_x} (concave up), f''(x) < 0 when x < {inflection_x} (concave down)"