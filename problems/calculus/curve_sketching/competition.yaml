topic: calculus/curve_sketching
difficulty: competition
calculator: graphing
variables:
  a: choice(2, 3, 4, 6)
  k: choice(1, 2, 3)
  f: x^3 - a*k*x
  f_prime: derivative(f, x)
  f_double_prime: derivative(f_prime, x)
  critical_points: solve(f_prime, x)
  x1: -sqrt(a*k/3)
  x2: sqrt(a*k/3)
  y1: evaluate(f, x, x1)
  y2: evaluate(f, x, x2)
  inflection_x: 0
  inflection_y: 0
  concave_up_intervals: "(-∞, 0) ∪ (0, ∞)"
  concave_down_intervals: "∅"
  local_max_x: x1
  local_max_y: y1
  local_min_x: x2
  local_min_y: y2
  answer: abs(y1 - y2)
constraints:
  - a*k % 3 == 0
question: "Consider the function {equation(f(x), f)}. Find the vertical distance between the local maximum and local minimum."
answer: answer
solution:
  - "Find critical points by solving {equation(f_prime, 0)}"
  - "Critical points occur at x = {x1} and x = {x2}"
  - "Use second derivative test: {f_double_prime}"
  - "At x = {x1}: f''(x) < 0, so local maximum at ({local_max_x}, {local_max_y})"
  - "At x = {x2}: f''(x) > 0, so local minimum at ({local_min_x}, {local_min_y})"
  - "Vertical distance = |{local_max_y} - ({local_min_y})| = {answer}"