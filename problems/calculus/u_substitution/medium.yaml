topic: calculus/u_substitution
difficulty: medium
calculator: none
variables:
  a: nonzero(-4, 4)
  b: nonzero(-3, 3)
  inner: a*x + b
  power: integer(2, 5)
  integrand: inner^power
  u: inner
  du: a
  f_u: u^power
  F_u: integral(f_u, u)
  coeff: power + 1
  F_x_num: inner^coeff
  F_x_denom: a * coeff
  answer: F_x_num / F_x_denom
constraints:
  - a != b
question: "Find {integral_of(integrand, x)}"
answer: answer
solution:
  - "Let u = {u}, then du = {du} dx"
  - "So dx = du/{du}"
  - "The integral becomes {integral_of(f_u, u)} · (1/{du})"
  - "= (1/{du}) · {F_u}"
  - "Substituting back u = {inner}:"
  - "= {answer} + C"