topic: calculus/u_substitution
difficulty: medium
calculator: none

variables:
  a: nonzero(-4, 4)
  b: nonzero(-4, 4)
  c: nonzero(-5, 5)
  n: integer(2, 5)
  f: a*(b*x + c)^n
  f_expanded: expand(f)
  antideriv: integral(f_expanded, x)
  n1: n + 1
  coeff: a / (b * n1)
  answer: antideriv

question: "Use u-substitution to evaluate {integral_of(f, x)}. Express your answer without the substitution variable."
answer: answer
answer_type: expression

solution:
  - "Let {math(u = b*x + c)}, so {math(du = b*dx)}."
  - "The integral becomes {math(a/b)} {integral_of(u^n, u)}."
  - "Integrating: {coeff} {math(u^n1)} + C."
  - "Substitute back {math(u = b*x + c)} and expand to obtain {answer} + C."
