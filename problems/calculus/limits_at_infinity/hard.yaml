topic: calculus/limits_at_infinity
difficulty: hard
calculator: none

variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-6, 6)
  d: nonzero(-6, 6)
  num: a*x^3 + b*x
  den: c*x^3 + d*x^2
  answer: a/c

constraints:
  - a != c

question: "Evaluate {limit_of(num/den, x, infinity)}."

answer: answer
answer_type: numeric

solution:
  - "Identify the highest power of {math(x)} in both numerator and denominator: {math(x^3)}."
  - "Divide every term in the numerator and denominator by {math(x^3)}."
  - "The expression becomes {math((a + b/x^2)/(c + d/x))}."
  - "As {math(x)} grows without bound, the terms {math(b/x^2)} and {math(d/x)} both tend to 0."
  - "The limit reduces to the ratio of leading coefficients: {answer}."
