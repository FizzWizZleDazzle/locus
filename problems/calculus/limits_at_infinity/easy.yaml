topic: calculus/limits_at_infinity
difficulty: easy
calculator: none
variants:
  - name: default
    variables:
      a: nonzero(-5, 5)
      b: integer(-8, 8)
      c: nonzero(-5, 5)
      d: integer(-8, 8)
      n: integer(1, 3)
      num: a*x^n + b
      den: c*x^n + d
      answer: a/c
    question: Evaluate {limit_of(num/den, x, infinity)}.
    answer: answer
    answer_type: numeric
    solution:
      - The numerator and denominator both have degree {n}, so divide every term by {math(x^n)}.
      - As {math(x \to \infty)}, all terms with {math(x)} in the denominator vanish.
      - Only the leading coefficients remain, giving {equation(limit_of(num/den, x, infinity), answer)}.
