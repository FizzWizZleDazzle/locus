topic: calculus/limits_at_infinity
difficulty: very_easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: nonzero(-5, 5)
  f: (a*x + b) / (c*x)
  simplified: a/c
  answer: simplified
constraints:
  - mod(a, c) != 0
question: "Find {limit_of(f, x, infinity)}"
answer: answer
solution:
  - "For rational functions, divide numerator and denominator by highest power of x"
  - "Rewrite as {limit_of((a + b/x) / c, x, infinity)}"
  - "As x approaches infinity, b/x approaches 0"
  - "Therefore {limit_of(f, x, infinity)} = {answer}"