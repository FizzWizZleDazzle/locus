topic: calculus/limits_at_infinity
difficulty: very_easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: nonzero(-5, 5)
  d: integer(-8, 8)
  numerator: a * x + b
  denominator: c * x + d
  f: numerator / denominator
  answer: a / c
constraints:
  - a % c != 0 or c == 1 or c == -1
question: "Find {limit_of(f, x, infinity)}"
answer: answer
solution:
  - "For rational functions, when the degree of numerator equals degree of denominator, the limit at infinity is the ratio of leading coefficients"
  - "The leading coefficient of {numerator} is {a}"
  - "The leading coefficient of {denominator} is {c}"
  - "Therefore, {limit_of(f, x, infinity)} = {answer}"