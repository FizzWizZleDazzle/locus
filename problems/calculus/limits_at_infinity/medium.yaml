topic: calculus/limits_at_infinity
difficulty: medium
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-8, 8)
  c: nonzero(-8, 8)
  d: nonzero(-5, 5)
  numerator: a * x^2 + b * x + c
  denominator: d * x^2 + 3
  f: numerator / denominator
  answer: a / d
constraints:
  - gcd(abs(a), abs(d)) == 1
question: "Find {limit_of(f, x, infinity)}"
answer: answer
solution:
  - "For rational functions, when the degrees of numerator and denominator are equal, the limit at infinity is the ratio of leading coefficients"
  - "The numerator {numerator} has degree 2 with leading coefficient {a}"
  - "The denominator {denominator} has degree 2 with leading coefficient {d}"
  - "Therefore, {limit_of(f, x, infinity)} = {answer}"