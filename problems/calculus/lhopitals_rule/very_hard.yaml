topic: calculus/lhopitals_rule
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-4, 4)
  b: nonzero(-4, 4)
  c: nonzero(-4, 4)
  k: integer(2, 4)
  numerator: (x - a)^k * (x - b)
  denominator: (x - a) * (x - c)
  f: numerator / denominator
  num_expanded: expand(numerator)
  den_expanded: expand(denominator)
  num_derivative: derivative(numerator, x)
  den_derivative: derivative(denominator, x)
  num_at_a: evaluate(num_derivative, x, a)
  den_at_a: evaluate(den_derivative, x, a)
  answer: simplify(num_at_a / den_at_a)
constraints:
  - a != b
  - a != c
  - den_at_a != 0
question: "Evaluate {limit_of(f, x, a)} where f(x) = {equation(num_expanded, den_expanded)}"
answer: answer
solution:
  - "Since both numerator and denominator equal 0 when x = {a}, we have an indeterminate form 0/0"
  - "Factor the numerator: {num_expanded} = {numerator}"
  - "Factor the denominator: {den_expanded} = {denominator}"
  - "Cancel the common factor (x - {a}) to get {equation((x - a)^(k-1) * (x - b), x - c)}"
  - "However, since k = {k} > 1, we still have 0/0 when x = {a}"
  - "Apply L'Hôpital's rule to the original expression"
  - "Numerator derivative: {derivative_of(num_expanded, x)} = {num_derivative}"
  - "Denominator derivative: {derivative_of(den_expanded, x)} = {den_derivative}"
  - "Evaluate at x = {a}: {equation(num_at_a, den_at_a)} = {answer}"