topic: calculus/lhopitals_rule
difficulty: hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  d: integer(2, 4)
  numerator: (x - a) * (x^d - a^d)
  denominator: (x - a) * (b*x + c)
  f_expanded: expand(numerator) / expand(denominator)
  num_derivative: derivative(numerator, x)
  den_derivative: derivative(denominator, x)
  num_at_a: evaluate(num_derivative, x, a)
  den_at_a: evaluate(den_derivative, x, a)
  answer: simplify(num_at_a / den_at_a)
constraints:
  - b*a + c != 0
  - abs(answer) <= 20
question: "Find {limit_of(f_expanded, x, a)}"
answer: answer
solution:
  - "Direct substitution gives 0/0, so we apply L'Hôpital's rule"
  - "The original expression factors as {numerator} / {denominator}"
  - "Taking derivatives: numerator' = {num_derivative}"
  - "denominator' = {den_derivative}"
  - "Evaluating at x = {a}: numerator' = {num_at_a}, denominator' = {den_at_a}"
  - "Therefore {limit_of(f_expanded, x, a)} = {answer}"