topic: calculus/lhopitals_rule
difficulty: hard
calculator: none

variables:
  a: nonzero(2, 5)
  numer: exp(a*x) - 1 - a*x
  denom: x^2
  numer_d1: derivative(numer, x)
  denom_d1: derivative(denom, x)
  numer_d2: derivative(numer_d1, x)
  denom_d2: derivative(denom_d1, x)
  answer: a^2/2

question: "Evaluate {limit_of(numer/denom, x, 0)}. Apply LHopital's rule as many times as needed."

answer: answer
answer_type: numeric

solution:
  - "Direct substitution at {math(x = 0)} gives 0/0, so the limit is indeterminate."
  - "Apply LHopital's rule once: {equation(derivative_of(numer, x), numer_d1)} and {equation(derivative_of(denom, x), denom_d1)}."
  - "The new limit {limit_of(numer_d1/denom_d1, x, 0)} is still 0/0."
  - "Apply LHopital's rule again: {equation(nth_derivative_of(numer, x, 2), numer_d2)} and {equation(nth_derivative_of(denom, x, 2), denom_d2)}."
  - "Now {limit_of(numer_d2/denom_d2, x, 0)} = {answer}."
