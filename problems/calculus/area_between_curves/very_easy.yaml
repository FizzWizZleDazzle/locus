topic: calculus/area_between_curves
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  f: a*x
  g: b*x^2
  x1: 0
  x2: choice(1, 2)
  f_minus_g: f - g
  integrand: expand(f_minus_g)
  antideriv: integral(integrand, x)
  F_upper: evaluate(antideriv, x, x2)
  F_lower: evaluate(antideriv, x, x1)
  answer: F_upper - F_lower
constraints:
  - a > b
question: "Find the area between {equation(y, f)} and {equation(y, g)} from {equation(x, x1)} to {equation(x, x2)}."
answer: answer
solution:
  - "The upper curve is {equation(y, f)} and the lower curve is {equation(y, g)}"
  - "Area = {definite_integral_of(f - g, x, x1, x2)}"
  - "Integrand: {integrand}"
  - "Antiderivative: {antideriv}"
  - "Evaluate at bounds: {F_upper} - {F_lower} = {answer}"