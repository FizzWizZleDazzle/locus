topic: calculus/area_between_curves
difficulty: medium
calculator: none
variables:
  a: integer(2, 4)
  b: integer(1, 3)
  f: a*x
  g: b*x^2
  x1: 0
  x2: a/b
  integrand: f - g
  antideriv: integral(integrand, x)
  F_upper: evaluate(antideriv, x, x2)
  F_lower: evaluate(antideriv, x, x1)
  answer: F_upper - F_lower
constraints:
  - a > b
question: "Find the area between the curves {equation(y, f)} and {equation(y, g)} from their points of intersection."
answer: answer
solution:
  - "Find intersection points by solving {equation(f, g)}"
  - "Factor: {equation(x*(a - b*x), 0)}"
  - "So x = {x1} or x = {x2}"
  - "Since {f} is above {g} on this interval, the area is {definite_integral_of(f - g, x, x1, x2)}"
  - "Integrate: {definite_integral_of(integrand, x, x1, x2)} = {antideriv} evaluated from {x1} to {x2}"
  - "= {F_upper} - {F_lower} = {answer}"