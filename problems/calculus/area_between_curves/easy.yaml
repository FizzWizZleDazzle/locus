topic: calculus/area_between_curves
difficulty: easy
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  x1: 0
  x2: integer(2, 4)
  f: a * x
  g: b * x^2
  diff: f - g
  factored: expand(diff)
  integrand: f - g
  antideriv: integral(integrand, x)
  F_upper: evaluate(antideriv, x, x2)
  F_lower: evaluate(antideriv, x, x1)
  answer: F_upper - F_lower
constraints:
  - a > b
question: "Find the area between {equation(y, f)} and {equation(y, g)} from x = {x1} to x = {x2}."
answer: answer
solution:
  - "The upper curve is {equation(y, f)} and the lower curve is {equation(y, g)}"
  - "Area = {definite_integral_of(integrand, x, x1, x2)}"
  - "Find the antiderivative: {integral_of(integrand, x)} = {antideriv}"
  - "Evaluate at x = {x2}: {F_upper}"
  - "Evaluate at x = {x1}: {F_lower}"
  - "Area = {F_upper} - {F_lower} = {answer}"