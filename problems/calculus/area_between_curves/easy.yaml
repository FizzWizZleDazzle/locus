topic: calculus/area_between_curves
difficulty: easy
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(2, 5)
  f: a * x^2
  g: b * x + c
  x1: 0
  x2: 2
  f_integral: integral(f, x)
  g_integral: integral(g, x)
  f_area: evaluate(f_integral, x, x2) - evaluate(f_integral, x, x1)
  g_area: evaluate(g_integral, x, x2) - evaluate(g_integral, x, x1)
  answer: g_area - f_area
constraints:
  - g_area > f_area
  - answer > 0
question: "Find the area between the curves {equation(f, a * x^2)} and {equation(g, b * x + c)} from x = {x1} to x = {x2}, where the line is above the parabola."
answer: answer
solution:
  - "The area between curves is {integral_of(g - f, x)} from {x1} to {x2}"
  - "First find {integral_of(g, x)} = {g_integral}"
  - "Evaluate from {x1} to {x2}: {g_area}"
  - "Next find {integral_of(f, x)} = {f_integral}"
  - "Evaluate from {x1} to {x2}: {f_area}"
  - "Area between curves = {g_area} - {f_area} = {answer}"