topic: calculus/derivative_rules
difficulty: competition
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  n: integer(3, 5)
  m: integer(2, 4)
  f: a * x^n + b * x^m + c * ln(x)
  g: x^2 + 1
  h: f / g
  h_derivative: derivative(h, x)
  h_at_1: evaluate(h_derivative, x, 1)
  answer: h_at_1
constraints:
  - n > m
  - a != b
question: "Let {equation(h(x), h)}. Find h'(1)."
answer: answer
solution:
  - "Use the quotient rule: {derivative_of(u/v, x)} = (u'v - uv')/v^2"
  - "Here u = {f} and v = {g}"
  - "Find u': {derivative_of(f, x)} = {derivative(f, x)}"
  - "Find v': {derivative_of(g, x)} = {derivative(g, x)}"
  - "Apply quotient rule: {derivative_of(h, x)} = {h_derivative}"
  - "Evaluate at x = 1: h'(1) = {answer}"