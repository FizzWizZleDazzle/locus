topic: calculus/integration_by_parts
difficulty: easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  u: a * x
  dv: b * e^x
  du: derivative(u, x)
  v: integral(dv, x)
  integrand: u * dv
  uv: u * v
  vdu: v * du
  integral_vdu: integral(vdu, x)
  answer: uv - integral_vdu
constraints:
  - a != b
question: "Find {integral_of(integrand, x)} using integration by parts"
answer: answer
solution:
  - "Use integration by parts: {integral_of(u * dv, x)} = uv - {integral_of(v * du, x)}"
  - "Let u = {u}, so du = {du} dx"
  - "Let dv = {dv} dx, so v = {v}"
  - "Apply the formula: ({u})({v}) - {integral_of(vdu, x)}"
  - "= {uv} - {integral_vdu}"
  - "= {answer} + C"