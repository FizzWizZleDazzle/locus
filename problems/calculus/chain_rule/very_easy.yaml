topic: calculus/chain_rule
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  inner: a * x + b
  outer_exp: integer(2, 4)
  f: inner^outer_exp
  answer: derivative(f, x)
question: "Find {derivative_of(f, x)}"
answer: answer
solution:
  - "Let u = {inner}, then f(x) = u^{outer_exp}"
  - "By the chain rule: {derivative_of(f, x)} = {derivative_of(u^outer_exp, u)} · {derivative_of(inner, x)}"
  - "{derivative_of(u^outer_exp, u)} = {outer_exp} · u^{outer_exp - 1} = {outer_exp} · ({inner})^{outer_exp - 1}"
  - "{derivative_of(inner, x)} = {a}"
  - "Therefore: {derivative_of(f, x)} = {answer}"