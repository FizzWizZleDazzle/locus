topic: calculus/chain_rule
difficulty: hard
calculator: none
variables:
  a: nonzero(-4, 4)
  b: integer(2, 5)
  c: nonzero(-3, 3)
  inner: a * x^b + c
  m: integer(3, 6)
  outer_form: u^m
  f: (a * x^b + c)^m
  du_dx: derivative(inner, x)
  df_du: m * u^(m-1)
  answer: derivative(f, x)
constraints:
  - a != -c
  - gcd(abs(a*b), abs(m)) == 1
question: "Find {derivative_of(f, x)} where f(x) = {f}"
answer: answer
solution:
  - "Let u = {inner}, so f(x) = {outer_form}"
  - "By the chain rule: {derivative_of(f, x)} = {derivative_of(f, u)} · {derivative_of(u, x)}"
  - "{derivative_of(u, x)} = {du_dx}"
  - "{derivative_of(f, u)} = {df_du}"
  - "Therefore: {derivative_of(f, x)} = ({df_du}) · ({du_dx})"
  - "Substituting u = {inner}: {derivative_of(f, x)} = {answer}"