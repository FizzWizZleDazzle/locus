topic: calculus/chain_rule
difficulty: hard
calculator: none
variables:
  a: nonzero(-4, 4)
  b: integer(2, 5)
  c: nonzero(-6, 6)
  d: integer(2, 4)
  inner: a * x + b
  outer_base: c * u^d
  f: evaluate(outer_base, u, inner)
  f_expanded: expand(f)
  inner_derivative: derivative(inner, x)
  outer_derivative: derivative(outer_base, u)
  answer: simplify(evaluate(outer_derivative, u, inner) * inner_derivative)
constraints:
  - a != c
  - b != d
question: "Let f(x) = {f_expanded}. Find {derivative_of(f, x)} using the chain rule."
answer: answer
solution:
  - "Identify the composition: f(x) = g(h(x)) where h(x) = {inner} and g(u) = {outer_base}"
  - "Find h'(x): {derivative_of(inner, x)} = {inner_derivative}"
  - "Find g'(u): {derivative_of(outer_base, u)} = {outer_derivative}"
  - "Apply chain rule: f'(x) = g'(h(x)) · h'(x)"
  - "Substitute h(x) = {inner} into g'(u): g'(h(x)) = {evaluate(outer_derivative, u, inner)}"
  - "Therefore: {derivative_of(f, x)} = {evaluate(outer_derivative, u, inner)} · {inner_derivative} = {answer}"