topic: calculus/chain_rule
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-4, 4)
  b: integer(2, 5)
  c: nonzero(-3, 3)
  inner: a * x^b + c
  m: integer(3, 6)
  outer_expr: u^m
  f: evaluate(outer_expr, u, inner)
  f_expanded: expand(f)
  du_dx: derivative(inner, x)
  dy_du: m * u^(m-1)
  dy_du_subst: evaluate(dy_du, u, inner)
  answer: simplify(dy_du_subst * du_dx)
constraints:
  - a != -c
  - gcd(abs(a), b) == 1
question: "Let f(x) = {f_expanded}. Find {derivative_of(f, x)} using the chain rule."
answer: answer
solution:
  - "Recognize f(x) = ({inner})^{m}"
  - "Let u = {inner}, so f(x) = u^{m}"
  - "By chain rule: {derivative_of(f, x)} = {derivative_of(u^{m}, u)} · {derivative_of(u, x)}"
  - "{derivative_of(u^{m}, u)} = {m}u^{m-1}"
  - "{derivative_of(u, x)} = {derivative_of(inner, x)} = {du_dx}"
  - "Substituting u = {inner}: {derivative_of(f, x)} = {m}({inner})^{m-1} · {du_dx}"
  - "Therefore: {derivative_of(f, x)} = {answer}"