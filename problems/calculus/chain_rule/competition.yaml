topic: calculus/chain_rule
difficulty: competition
calculator: none
variables:
  k: choice(2, 3, 4)
  m: choice(2, 3)
  inner: k*x^m
  n: choice(2, 3)
  f: (k*x^m)^n
  du_dx: derivative(inner, x)
  dy_du: n*u^(n-1)
  dy_du_subst: n*(k*x^m)^(n-1)
  answer: n*(k*x^m)^(n-1) * k*m*x^(m-1)
constraints:
  - k != m
  - m != n
question: "Let f(x) = {f}. Find {derivative_of(f(x), x)} using the chain rule."
answer: answer
solution:
  - "Let u = {inner}, so f(x) = u^{n}"
  - "By the chain rule: {derivative_of(f, x)} = {derivative_of(y, u)} · {derivative_of(u, x)}"
  - "{derivative_of(u, x)} = {du_dx}"
  - "{derivative_of(y, u)} = {dy_du}"
  - "Substituting u = {inner}: {derivative_of(y, u)} = {dy_du_subst}"
  - "Therefore: {derivative_of(f, x)} = {dy_du_subst} · {du_dx} = {answer}"