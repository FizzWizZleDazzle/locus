topic: calculus/continuity
difficulty: hard
calculator: none
variants:
  - name: default
    variables:
      c1: integer(1, 3)
      gap: integer(2, 4)
      c2: c1 + gap
      a_sol: nonzero(-4, 4)
      b_sol: integer(-5, 5)
      left_const: a_sol*c1 + b_sol - c1^2
      right_const: a_sol*c2 + b_sol - c2^2
      left_piece: x^2 + left_const
      right_piece: x^2 + right_const
      val_c1: a_sol*c1 + b_sol
      val_c2: a_sol*c2 + b_sol
      diff_vals: val_c2 - val_c1
      ans_pair: (a_sol, b_sol)
    question: 'Let {math(f(x))} be defined by: {math(f(x) = left_piece)} for {math(x < c1)}, {math(f(x) = a*x + b)} for {math(c1 <= x < c2)}, and {math(f(x) = right_piece)} for {math(x >= c2)}. Find the constants {math(a)} and {math(b)} such that {math(f)} is continuous everywhere. Enter your answer as the ordered pair {math((a, b))}.'
    answer: a_sol, b_sol
    answer_type: tuple
    solution:
      - 'For continuity at {math(x = c1)}, the left and middle pieces must agree: {equation(c1^2 + left_const, a*c1 + b)}, giving the equation {equation(a*c1 + b, val_c1)}.'
      - 'For continuity at {math(x = c2)}, the middle and right pieces must agree: {equation(a*c2 + b, c2^2 + right_const)}, giving the equation {equation(a*c2 + b, val_c2)}.'
      - 'Subtracting the first equation from the second eliminates {math(b)}: {equation(a*gap, diff_vals)}, so {equation(a, a_sol)}.'
      - 'Substituting {equation(a, a_sol)} into the first equation: {equation(a_sol*c1 + b, val_c1)}, so {equation(b, b_sol)}.'
      - Therefore {equation(math((a, b)), ans_pair)}.
