topic: calculus/implicit_differentiation
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  equation: a*x^3 + b*x^2*y + c*x*y^2 + d*y^3
  dx_coeff: 3*a*x^2 + 2*b*x*y + c*y^2
  dy_coeff: b*x^2 + 2*c*x*y + 3*d*y^2
  numerator: -dx_coeff
  denominator: dy_coeff
  answer: simplify(numerator/denominator)
constraints:
  - a != b
  - c != d
  - b != c
question: "Find dy/dx if {equation(equation, 0)}."
answer: answer
solution:
  - "Differentiate both sides with respect to x: {equation(3*a*x^2 + 2*b*x*y + b*x^2*(dy/dx) + c*y^2 + 2*c*x*y*(dy/dx) + 3*d*y^2*(dy/dx), 0)}"
  - "Factor out dy/dx: {equation(dx_coeff + dy_coeff*(dy/dx), 0)}"
  - "Solve for dy/dx: {equation(dy/dx, answer)}"