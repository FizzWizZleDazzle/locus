topic: calculus/implicit_differentiation
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 4)
  d: integer(1, 3)
  eq: x^a + x*y^b = c*y^d
  # Differentiate implicitly
  dx_terms: a*x^(a-1) + y^b
  dy_terms: b*x*y^(b-1) - c*d*y^(d-1)
  # Pick a clean evaluation point
  x0: 1
  y0: 1
  # Evaluate derivatives at (1,1)
  dx_at_point: a + 1
  dy_at_point: b - c*d
  answer: -dx_at_point/dy_at_point
constraints:
  - b != c*d  # Ensure denominator is nonzero
  - a != b    # Variety in exponents
question: "Given the implicit equation {equation(eq, 0)}, find dy/dx at the point (1, 1)."
answer: answer
solution:
  - "Differentiate both sides with respect to x: {equation(dx_terms + dy_terms * derivative(y, x), 0)}"
  - "Solve for dy/dx: dy/dx = -{dx_terms}/{dy_terms}"
  - "At (1, 1): dy/dx = -{dx_at_point}/{dy_at_point}"
  - "dy/dx = {answer}"