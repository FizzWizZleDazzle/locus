topic: calculus/implicit_differentiation
difficulty: medium
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(10, 30)
  equation: a*x^2 + b*y^2 = c
  dy_dx: -a*x / (b*y)
constraints:
  - mod(c, a) == 0
  - mod(c, b) == 0
question: "Find {derivative_of(y, x)} for the equation {equation(a*x^2 + b*y^2, c)}"
answer: dy_dx
solution:
  - "Differentiate both sides with respect to x"
  - "Using implicit differentiation: {a}·2x + {b}·2y·{derivative_of(y, x)} = 0"
  - "Simplify: {a}x + {b}y·{derivative_of(y, x)} = 0"
  - "Solve for {derivative_of(y, x)}: {derivative_of(y, x)} = {dy_dx}"