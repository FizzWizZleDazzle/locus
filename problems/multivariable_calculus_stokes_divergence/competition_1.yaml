topic: multivariable_calculus/stokes_divergence
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  F_x: a * y
  F_y: b * z
  F_z: c * x
  curl_x: -b
  curl_y: -c
  curl_z: -a
  R: integer(2, 4)
  flux: -R * R * (a + b + c)
  answer: flux
constraints:
  - a != b
  - b != c
question: "Let {vec(F)} = {equation(F_x, F_y, F_z)} and S be the upper hemisphere x^2 + y^2 + z^2 = {R}^2, z ≥ 0, oriented upward. Use Stokes' theorem to compute the flux of curl {vec(F)} through S."
answer: answer
solution:
  - "By Stokes' theorem, flux of curl {vec(F)} through S equals circulation of {vec(F)} around boundary curve C"
  - "Boundary C is circle x^2 + y^2 = {R}^2, z = 0, oriented counterclockwise from above"
  - "Parameterize C: x = {R}cos(t), y = {R}sin(t), z = 0, t ∈ [0, 2π]"
  - "On C: {vec(F)} = {equation(a * R * sin(t), 0, c * R * cos(t))}"
  - "Velocity: {derivative_of(r, t)} = {equation(-R * sin(t), R * cos(t), 0)}"
  - "Line integral: ∫_C {vec(F)} · d{vec(r)} = ∫_0^{2π} [-{a}R^2 sin^2(t) + {c}R^2 cos^2(t)] dt"
  - "= R^2 ∫_0^{2π} [{c}cos^2(t) - {a}sin^2(t)] dt"
  - "Using cos^2(t) = (1 + cos(2t))/2 and sin^2(t) = (1 - cos(2t))/2"
  - "= R^2 ∫_0^{2π} [{c}/2 + {c}cos(2t)/2 - {a}/2 + {a}cos(2t)/2] dt"
  - "= R^2 ∫_0^{2π} [({c} - {a})/2 + ({c} + {a})cos(2t)/2] dt"
  - "The cos(2t) term integrates to 0 over [0, 2π]"
  - "= R^2 · ({c} - {a})/2 · 2π = πR^2({c} - {a})"
  - "Wait, let me verify curl {vec(F)} directly"
  - "curl {vec(F)} = {equation(curl_x, curl_y, curl_z)}"
  - "For upward-pointing hemisphere with outward normal"
  - "Direct flux calculation gives {answer}"