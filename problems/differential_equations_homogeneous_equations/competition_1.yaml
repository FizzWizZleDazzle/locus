topic: differential_equations/homogeneous_equations
difficulty: competition
calculator: none
variables:
  k1: integer(2, 5)
  k2: integer(2, 5)
  r1: -k1
  r2: k2
  sum: r1 + r2
  product: r1 * r2
  char_eq: lambda^2 - sum * lambda + product
  expanded_char: expand(char_eq)
  general_solution: C1 * e^(r1 * x) + C2 * e^(r2 * x)
  c1_val: integer(1, 4)
  c2_val: integer(1, 4)
  particular: c1_val * e^(r1 * x) + c2_val * e^(r2 * x)
  y_0: c1_val + c2_val
  y_prime_0: c1_val * r1 + c2_val * r2
  diff_eq: y'' - sum * y' + product * y
constraints:
  - k1 != k2
  - k1 + k2 <= 7
question: "Solve the initial value problem {equation(diff_eq, 0)} with y(0) = {y_0} and y'(0) = {y_prime_0}."
answer: particular
solution:
  - "The differential equation {equation(diff_eq, 0)} has characteristic equation {equation(expanded_char, 0)}"
  - "Using the quadratic formula: λ = {r1}, {r2}"
  - "General solution: y = {general_solution}"
  - "Apply initial condition y(0) = {y_0}: C1 + C2 = {y_0}"
  - "Find y' = {derivative_of(general_solution, x)}"
  - "Apply initial condition y'(0) = {y_prime_0}: {r1}C1 + {r2}C2 = {y_prime_0}"
  - "Solving the system: C1 = {c1_val}, C2 = {c2_val}"
  - "Therefore y = {particular}"