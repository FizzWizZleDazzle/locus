topic: calculus/continuity
difficulty: very_easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: integer(1, 5)
  f_left: a * x + b
  f_right: a * c + b
  g: x^2 + c
  answer: f_right
constraints:
  - a != 0
question: "Let f(x) = {f_left} for x < {c} and f(x) = {g} for x ≥ {c}. Find the value that f({c}) must equal for f to be continuous at x = {c}."
answer: answer
solution:
  - "For f to be continuous at x = {c}, we need the left and right limits to equal f({c})"
  - "Left limit: As x approaches {c} from the left, f(x) = {f_left}"
  - "So the left limit is {a}({c}) + {b} = {answer}"
  - "Right limit: As x approaches {c} from the right, f(x) = {g}"
  - "So the right limit is ({c})^2 + {c} = {evaluate(g, x, c)}"
  - "For continuity, we need f({c}) = {answer}"