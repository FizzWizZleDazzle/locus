topic: algebra1/compound_inequalities
difficulty: easy
calculator: none
variables:
  a: integer(-8, 8)
  b: integer(2, 10)
  c: integer(-8, 8)
  d: integer(2, 10)
  left_bound: a - b
  right_bound: c + d
  answer_left: left_bound + b
  answer_right: right_bound - d
constraints:
  - left_bound < right_bound
  - answer_left < answer_right
question: "Solve the compound inequality: {left_bound} < x - {b} < {right_bound}"
answer: answer_left
answer_type: compound_inequality
solution:
  - "Start with {left_bound} < x - {b} < {right_bound}"
  - "Add {b} to all parts: {left_bound} + {b} < x < {right_bound} + {b}"
  - "Simplify: {answer_left} < x < {answer_right}"
  - "Solution: x is between {answer_left} and {answer_right}"