topic: algebra1/compound_inequalities
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(6, 12)
  d: integer(2, 5)
  e: integer(8, 15)
  left_num: a*x + b
  left_denom: d
  left_side: left_num / left_denom
  middle: x - c
  right_side: e - x
  left_ineq_num: a*x + b - d*x + c*d
  left_ineq_denom: d
  left_simplified_num: (a - d)*x + b + c*d
  left_bound_num: -b - c*d
  left_bound_denom: a - d
  right_ineq: x - c - e + x
  right_simplified: 2*x - c - e
  right_bound: (c + e) / 2
  answer_left: left_bound_num / left_bound_denom
  answer_right: right_bound
constraints:
  - a > d
  - mod(c + e, 2) == 0
  - mod(b + c*d, a - d) == 0
question: "Solve the compound inequality: {equation(left_side, middle)} < {right_side}"
answer: answer_left
answer_type: interval
solution:
  - "Start with {equation(left_side, middle)} < {right_side}"
  - "This means {left_side} ≤ {middle} AND {middle} < {right_side}"
  - "First inequality: {equation(left_num / d, x - c)}"
  - "Multiply both sides by {d}: {left_num} ≤ {d}({middle})"
  - "{left_num} ≤ {d}x - {c*d}"
  - "{left_simplified_num} ≤ 0"
  - "Since {a - d} > 0, divide: x ≥ {answer_left}"
  - "Second inequality: {middle} < {right_side}"
  - "x - {c} < {e} - x"
  - "2x < {c + e}"
  - "x < {answer_right}"
  - "Solution: [{answer_left}, {answer_right})"