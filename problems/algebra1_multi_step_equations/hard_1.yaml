topic: algebra1/multi_step_equations
difficulty: hard
calculator: none
variables:
  # Design backward: want final answer x = 3
  x_val: 3
  # Build equation that yields x = 3
  a: nonzero(-8, 8)
  b: nonzero(-12, 12)
  c: nonzero(-15, 15)
  d: nonzero(-10, 10)
  # Construct both sides to be equal when x = 3
  left_const: a * x_val + b
  right_const: c * x_val + d
  # Build the equation
  left: a * x + b
  right: c * x + d
  # Solve for x (will be 3 by construction)
  answer: (d - b) / (a - c)
constraints:
  - a != c
  - left_const == right_const
question: "Solve for x: {equation(left, right)}"
answer: answer
solution:
  - "Start with {equation(left, right)}"
  - "Subtract {b} from both sides: {equation(a * x, right - b)}"
  - "Simplify right side: {equation(a * x, c * x + (d - b))}"
  - "Subtract {c}x from both sides: {equation(a * x - c * x, d - b)}"
  - "Factor left side: {equation((a - c) * x, d - b)}"
  - "Divide both sides by {a - c}: x = {answer}"