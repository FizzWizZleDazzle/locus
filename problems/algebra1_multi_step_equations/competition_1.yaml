topic: algebra1/multi_step_equations
difficulty: competition
calculator: none
variables:
  # Design backward: want final answer x = 7
  x_val: 7
  # Build equation that yields x = 7
  a: integer(3, 9)
  b: integer(2, 8)
  c: integer(15, 40)
  # Create equation: a(bx - c) + d = e(fx + g)
  d: integer(10, 30)
  e: integer(2, 6)
  f: integer(3, 8)
  # Calculate g to ensure x = 7 is the solution
  left_at_7: a * (b * 7 - c) + d
  right_without_g: e * f * 7
  g_calc: (left_at_7 - right_without_g) / e
  g: round(g_calc, 0)
  # Build the equation
  left_side: a * (b * x - c) + d
  right_side: e * (f * x + g)
  # Verify and solve
  expanded_left: expand(left_side)
  expanded_right: expand(right_side)
  answer: solve(expanded_left - expanded_right, x)
constraints:
  - abs(g_calc - g) < 0.01  # Ensure g is essentially an integer
  - a != e  # Avoid trivial cases
  - b * a != e * f  # Ensure non-zero x coefficient after expansion
question: "Solve for x: {equation(left_side, right_side)}"
answer: answer
solution:
  - "Start with {equation(left_side, right_side)}"
  - "Expand the left side: {equation(expanded_left, right_side)}"
  - "Expand the right side: {equation(expanded_left, expanded_right)}"
  - "Move all terms to one side: {equation(expanded_left - expanded_right, 0)}"
  - "Combine like terms and solve for x"
  - "x = {answer}"