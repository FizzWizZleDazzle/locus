topic: calculus/definite_integrals
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(-3, 3)
  d: nonzero(-4, 4)
  f: a*x^3 - b*x^2 + c*x + d
  antiderivative: (a/4)*x^4 - (b/3)*x^3 + (c/2)*x^2 + d*x
  lower: integer(-2, 0)
  upper: integer(1, 3)
  F_upper: evaluate(antiderivative, x, upper)
  F_lower: evaluate(antiderivative, x, lower)
  answer: F_upper - F_lower
constraints:
  - a != b
  - upper > lower + 1
  - abs(answer) <= 100
question: "Evaluate {definite_integral_of(f, x, lower, upper)}"
answer: answer
solution:
  - "Find the antiderivative of {f}"
  - "The antiderivative is F(x) = {antiderivative}"
  - "Apply the fundamental theorem: {definite_integral_of(f, x, lower, upper)} = F({upper}) - F({lower})"
  - "F({upper}) = {F_upper}"
  - "F({lower}) = {F_lower}"
  - "Therefore, {definite_integral_of(f, x, lower, upper)} = {F_upper} - {F_lower} = {answer}"