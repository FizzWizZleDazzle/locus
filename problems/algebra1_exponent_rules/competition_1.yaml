topic: algebra1/exponent_rules
difficulty: competition
calculator: none
variables:
  base: prime(2, 7)
  a: integer(3, 8)
  b: integer(2, 6)
  c: integer(1, 4)
  expr1: base^(a*x + b)
  expr2: base^(c*x - b)
  product: expr1 * expr2
  simplified: base^((a+c)*x)
  answer: a + c
constraints:
  - a > c
  - b > c
  - a + c <= 10
question: "If {equation(product, simplified)}, find the value of {equation(a + c, '?')}"
answer: answer
solution:
  - "Start with {equation(product, simplified)}"
  - "Expand the left side: {equation(expr1 * expr2, simplified)}"
  - "Using exponent rules: {equation(base^(a*x + b) * base^(c*x - b), base^((a*x + b) + (c*x - b)))}"
  - "Simplify the exponent: {equation(base^(a*x + b + c*x - b), base^((a+c)*x))}"
  - "This equals {simplified}, so the exponents must be equal"
  - "Therefore {equation((a+c)*x, (a+c)*x)}"
  - "So {equation(a + c, answer)}"