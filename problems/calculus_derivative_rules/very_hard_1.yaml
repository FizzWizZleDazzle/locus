topic: calculus/derivative_rules
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  n: integer(2, 4)
  m: integer(2, 4)
  f: a * x^n * ln(x)
  g: b * x^m
  h: c * sin(x)
  product: f * (g + h)
  expanded: expand(product)
  answer: derivative(expanded, x)
constraints:
  - n != m
  - abs(a) != abs(b)
  - abs(b) != abs(c)
question: "Find {derivative_of(expanded, x)} where the function is {equation(y, expanded)}"
answer: answer
solution:
  - "We have {equation(y, expanded)}"
  - "This is the product of {f} and {equation(g + h, g + h)}"
  - "Using the product rule: {derivative_of(f * (g + h), x)} = {derivative_of(f, x)} * (g + h) + f * {derivative_of(g + h, x)}"
  - "First find {derivative_of(f, x)} using the product rule on {f}:"
  - "{derivative_of(a * x^n * ln(x), x)} = {derivative(f, x)}"
  - "Next find {derivative_of(g + h, x)} = {derivative_of(g, x)} + {derivative_of(h, x)}"
  - "{derivative_of(g, x)} = {derivative(g, x)}"
  - "{derivative_of(h, x)} = {derivative(h, x)}"
  - "So {derivative_of(g + h, x)} = {derivative(g + h, x)}"
  - "Applying the product rule and simplifying:"
  - "{derivative_of(expanded, x)} = {answer}"