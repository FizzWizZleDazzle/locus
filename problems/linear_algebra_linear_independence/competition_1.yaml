topic: linear_algebra/linear_independence
difficulty: competition
calculator: none
variables:
  # Design vectors to have a specific linear dependence
  k: nonzero(-3, 3)
  # Base vectors with clean coordinates
  a1: integer(-4, 4)
  a2: integer(-4, 4)
  a3: integer(-4, 4)
  b1: integer(-4, 4)
  b2: integer(-4, 4)
  b3: integer(-4, 4)
  # Third vector is a linear combination of first two
  c1: a1 + k * b1
  c2: a2 + k * b2
  c3: a3 + k * b3
  # The answer vector
  answer_c1: 1
  answer_c2: k
  answer_c3: -1
constraints:
  - a1^2 + a2^2 + a3^2 > 0
  - b1^2 + b2^2 + b3^2 > 0
  - a1*b2 != a2*b1
question: "The vectors {vec([a1, a2, a3])}, {vec([b1, b2, b3])}, and {vec([c1, c2, c3])} are linearly dependent. Find constants c₁, c₂, c₃ (not all zero) such that c₁{vec([a1, a2, a3])} + c₂{vec([b1, b2, b3])} + c₃{vec([c1, c2, c3])} = 0. Express your answer as the vector [c₁, c₂, c₃] where c₃ = -1."
answer: answer_c1, answer_c2, answer_c3
answer_type: vector
solution:
  - "Since the vectors are linearly dependent, there exist constants c₁, c₂, c₃ (not all zero) such that the linear combination equals zero"
  - "Notice that {vec([c1, c2, c3])} = {vec([a1, a2, a3])} + {k}{vec([b1, b2, b3])}"
  - "This means the third vector is a linear combination of the first two"
  - "Rearranging: {vec([a1, a2, a3])} + {k}{vec([b1, b2, b3])} - {vec([c1, c2, c3])} = 0"
  - "Therefore [c₁, c₂, c₃] = [{answer_c1}, {answer_c2}, {answer_c3}]"