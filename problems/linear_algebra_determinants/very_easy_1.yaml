topic: linear_algebra/determinants
difficulty: very_easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(-5, 5)
  c: integer(-5, 5)
  d: integer(-5, 5)
  M: matrix(2, 2, -5, 5)
  answer: a * d - b * c
constraints:
  - answer != 0
question: "Find the determinant of {matrix_of(M)}"
answer: answer
solution:
  - "For a 2×2 matrix {matrix_of(M)}, the determinant is ad - bc"
  - "det(M) = ({a})({d}) - ({b})({c})"
  - "det(M) = {answer}"