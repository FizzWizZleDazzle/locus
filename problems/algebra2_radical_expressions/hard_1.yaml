topic: algebra2/radical_expressions
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  a_squared: a^2
  b_squared: b^2
  c_squared: c^2
  d_squared: d^2
  expr1: sqrt(a_squared * c_squared * x) + sqrt(b_squared * c_squared * x)
  expr2: sqrt(d_squared * x)
  full_expr: expr1 - expr2
  factor1: a + b
  factor2: c
  factor3: d
  simplified: (factor1 * factor2 - factor3) * sqrt(x)
  answer: simplified
constraints:
  - a != b
  - (a + b) * c > d
question: "Simplify the expression {full_expr}, assuming x > 0."
answer: answer
solution:
  - "Start with {full_expr}"
  - "Factor out perfect squares from each radical:"
  - "{sqrt(a_squared * c_squared * x)} = {a * c * sqrt(x)}"
  - "{sqrt(b_squared * c_squared * x)} = {b * c * sqrt(x)}"
  - "{sqrt(d_squared * x)} = {d * sqrt(x)}"
  - "Substitute: {a * c * sqrt(x)} + {b * c * sqrt(x)} - {d * sqrt(x)}"
  - "Factor out {sqrt(x)}: ({a * c} + {b * c} - {d}) * {sqrt(x)}"
  - "Factor out {c} from first two terms: ({c}({a} + {b}) - {d}) * {sqrt(x)}"
  - "Simplify: ({factor1 * factor2} - {factor3}) * {sqrt(x)}"
  - "Final answer: {answer}"