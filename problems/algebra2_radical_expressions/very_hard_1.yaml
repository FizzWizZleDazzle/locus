topic: algebra2/radical_expressions
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  a_squared: a^2
  b_squared: b^2
  c_squared: c^2
  d_squared: d^2
  expr1: sqrt(a_squared * x^3) + sqrt(b_squared * x^3) - sqrt(c_squared * x^3)
  expr2: sqrt(d_squared * x)
  full_expr: (sqrt(a_squared * x^3) + sqrt(b_squared * x^3) - sqrt(c_squared * x^3)) / sqrt(d_squared * x)
  coeff: a + b - c
  answer: coeff * sqrt(x) / d
constraints:
  - a + b > c
  - gcd(abs(coeff), d) == 1
question: "Simplify {equation(full_expr, ?)} for x > 0."
answer: answer
solution:
  - "Factor out perfect squares from each radical in the numerator"
  - "{sqrt(a_squared * x^3)} = {a} * {sqrt(x^3)} = {a} * x * {sqrt(x)}"
  - "{sqrt(b_squared * x^3)} = {b} * x * {sqrt(x)}"
  - "{sqrt(c_squared * x^3)} = {c} * x * {sqrt(x)}"
  - "Numerator becomes: ({a} + {b} - {c}) * x * {sqrt(x)} = {coeff} * x * {sqrt(x)}"
  - "Denominator: {sqrt(d_squared * x)} = {d} * {sqrt(x)}"
  - "Divide: {equation(coeff * x * sqrt(x) / (d * sqrt(x)), coeff * x / d)}"
  - "Cancel {sqrt(x)}: {equation(coeff * x / d, answer)}"