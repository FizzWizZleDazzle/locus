topic: algebra1/linear_inequalities
difficulty: medium
calculator: none
variables:
  a: nonzero(-8, 8)
  b: integer(-12, 12)
  c: integer(-12, 12)
  d: nonzero(-6, 6)
  left: a*x + b
  right: c*x + d
  coeff: a - c
  constant: d - b
  x_val: constant / coeff
  answer: simplify(x_val)
constraints:
  - coeff != 0
  - mod(constant, coeff) == 0
  - coeff > 0
question: "Solve the inequality {equation(left, '>' + str(right))} for x."
answer: answer
answer_type: inequality
solution:
  - "Start with {equation(left, '>' + str(right))}"
  - "Subtract {c}x from both sides: {equation(str(a) + 'x - ' + str(c) + 'x + ' + str(b), '>' + str(d))}"
  - "Simplify: {equation(str(coeff) + 'x + ' + str(b), '>' + str(d))}"
  - "Subtract {b} from both sides: {equation(str(coeff) + 'x', '>' + str(constant))}"
  - "Divide both sides by {coeff}: x > {answer}"