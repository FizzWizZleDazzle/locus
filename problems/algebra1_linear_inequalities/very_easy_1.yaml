topic: algebra1/linear_inequalities
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 8)
  b: integer(-10, 10)
  c: integer(-20, 20)
  inequality: a*x + b < c
  rhs: c - b
  answer: x < rhs/a
constraints:
  - mod(rhs, a) == 0
question: "Solve the inequality {inequality} for x."
answer: answer
solution:
  - "Start with {inequality}"
  - "Subtract {b} from both sides: {a}x < {rhs}"
  - "Divide both sides by {a}: x < {rhs}/{a}"
  - "Simplify: {answer}"