topic: algebra1/linear_inequalities
difficulty: hard
calculator: none
variables:
  a: nonzero(-8, 8)
  b: nonzero(-12, 12)
  c: nonzero(-8, 8)
  d: integer(-20, 20)
  left: a * x + b
  right: c * x + d
  moved: (a - c) * x
  constant: d - b
  coeff: a - c
  answer: solve(left > right, x)
constraints:
  - a != c
  - mod(d - b, a - c) == 0
  - abs(coeff) <= 10
question: "Solve the inequality {equation(left, '>')} {right} for x."
answer: answer
answer_type: inequality
solution:
  - "Start with {equation(left, '>')} {right}"
  - "Subtract {c}x from both sides: {equation(moved, '>')} {constant}"
  - "Since the coefficient is {coeff}:"
  - "If {coeff} > 0, divide by {coeff}: x > {constant}/{coeff}"
  - "If {coeff} < 0, divide by {coeff} and flip: x < {constant}/{coeff}"
  - "The solution is {answer}"