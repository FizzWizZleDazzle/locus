topic: algebra1/linear_inequalities
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  m: integer(3, 8)
  n: integer(2, 6)
  p: integer(1, 4)
  left: k * (m * x - n)
  right: p * (k * m * x + n)
  expanded_left: expand(left)
  expanded_right: expand(right)
  simplified: simplify(expanded_left - expanded_right)
  solution_expr: solve(simplified < 0, x)
  bound: n / (k * m * (p - 1))
constraints:
  - p > 1
  - gcd(n, k * m * (p - 1)) == 1
question: "Find all values of x such that {equation(left, right)} when the inequality {equation(expanded_left, expanded_right)} is reversed."
answer: solution_expr
answer_type: interval
solution:
  - "Start with {equation(left, right)}"
  - "Expand both sides: {equation(expanded_left, expanded_right)}"
  - "Since we want the reversed inequality, we need {equation(expanded_left, expanded_right)} to be false"
  - "This means we need: {expanded_left} < {expanded_right}"
  - "Subtract {expanded_right} from both sides: {simplified} < 0"
  - "Factor: {k * m * (1 - p) * x - n * (1 + p)} < 0"
  - "Since {k * m * (1 - p)} = {evaluate(k * m * (1 - p), x, 0)} < 0, divide by it and flip the inequality"
  - "x > {bound}"
  - "Therefore x ∈ {solution_expr}"