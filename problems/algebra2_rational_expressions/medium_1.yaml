topic: algebra2/rational_expressions
difficulty: medium
calculator: none
variables:
  a: integer(2, 8)
  b: integer(-8, -2)
  c: integer(2, 8)
  numerator: (x - a) * (x - b)
  denominator: (x - b) * (x - c)
  expanded_num: expand(numerator)
  expanded_den: expand(denominator)
  simplified: (x - a) / (x - c)
  answer: simplified
constraints:
  - a != c
  - b != c
  - abs(a - b) > 2
question: "Simplify the rational expression {equation(expanded_num, expanded_den)}"
answer: answer
solution:
  - "Factor the numerator: {expanded_num} = {numerator}"
  - "Factor the denominator: {expanded_den} = {denominator}"
  - "The expression becomes {equation(numerator, denominator)}"
  - "Cancel the common factor (x - {b})"
  - "Simplified form: {simplified}"
  - "Note: x ≠ {b} and x ≠ {c}"