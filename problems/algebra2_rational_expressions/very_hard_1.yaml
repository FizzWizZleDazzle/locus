topic: algebra2/rational_expressions
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  num1: (x - a) * (x + b)
  den1: (x - c) * (x + d)
  num2: (x - c) * (x - a)
  den2: (x + b) * (x + d)
  f1: num1 / den1
  f2: num2 / den2
  product_num: num1 * num2
  product_den: den1 * den2
  simplified_num: (x - a)^2 * (x - c)
  simplified_den: (x + d)^2 * (x + b)
  answer: simplified_num / simplified_den
constraints:
  - a != c
  - b != d
  - a + b != c + d
question: "Simplify the product {f1} · {f2} and state all restrictions on x."
answer: answer
solution:
  - "Multiply the rational expressions: {f1} · {f2}"
  - "Numerator: {num1} · {num2} = {product_num}"
  - "Denominator: {den1} · {den2} = {product_den}"
  - "Factor completely:"
  - "Numerator = (x - {a})(x + {b})(x - {c})(x - {a})"
  - "Denominator = (x - {c})(x + {d})(x + {b})(x + {d})"
  - "Cancel common factor (x - {c}) from numerator and denominator"
  - "Cancel common factor (x + {b}) from numerator and denominator"
  - "Result: {answer}"
  - "Restrictions: x ≠ {c}, x ≠ -{d}, x ≠ -{b}"