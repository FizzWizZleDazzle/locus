topic: precalculus/function_composition
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(-4, 4)
  c: integer(2, 5)
  d: integer(-4, 4)
  k: integer(2, 4)
  f: a*x + b
  g: c*x^2 + d
  h: x^k
  fog: simplify(evaluate(f, x, g))
  gof: simplify(evaluate(g, x, f))
  foh: simplify(evaluate(f, x, h))
  hof: simplify(evaluate(h, x, f))
  goh: simplify(evaluate(g, x, h))
  hog: simplify(evaluate(h, x, g))
  sum_coeffs: a*c^k + c*a^2 + a*c
  answer: sum_coeffs
constraints:
  - a != c
  - abs(b) != abs(d)
  - gcd(a, c) == 1
question: "Let f(x) = {f}, g(x) = {g}, and h(x) = {h}. Find the sum of the leading coefficient of (f ∘ h)(x), the coefficient of x^2 in (g ∘ f)(x), and the coefficient of x in (f ∘ g)(x)."
answer: answer
solution:
  - "First, compute (f ∘ h)(x) = f(h(x)) = f({h}) = {foh}"
  - "The leading coefficient of (f ∘ h)(x) is {a}"
  - "Next, compute (g ∘ f)(x) = g(f(x)) = g({f}) = {gof}"
  - "Expanding: {gof} has coefficient {c*a^2} for x^2"
  - "Finally, compute (f ∘ g)(x) = f(g(x)) = f({g}) = {fog}"
  - "The coefficient of x in (f ∘ g)(x) is {a*c}"
  - "Sum: {a} + {c*a^2} + {a*c} = {answer}"