topic: arithmetic/addition
difficulty: hard
calculator: none
variables:
  a: integer(100, 999)
  b: integer(100, 999)
  c: integer(100, 999)
  carry1: floor((mod(a, 10) + mod(b, 10) + mod(c, 10)) / 10)
  carry2: floor((floor(a/10) % 10 + floor(b/10) % 10 + floor(c/10) % 10 + carry1) / 10)
  answer: a + b + c
constraints:
  - mod(a, 10) + mod(b, 10) + mod(c, 10) >= 20
  - carry2 >= 1
question: "Calculate: {a} + {b} + {c}"
answer: answer
solution:
  - "Add the ones place: {mod(a, 10)} + {mod(b, 10)} + {mod(c, 10)} = {mod(a, 10) + mod(b, 10) + mod(c, 10)}"
  - "This gives {mod(answer, 10)} in the ones place and carry {carry1}"
  - "Add the tens place with carry: {floor(a/10) % 10} + {floor(b/10) % 10} + {floor(c/10) % 10} + {carry1} = {floor(a/10) % 10 + floor(b/10) % 10 + floor(c/10) % 10 + carry1}"
  - "This gives {floor(answer/10) % 10} in the tens place and carry {carry2}"
  - "Add the hundreds place with carry: {floor(a/100)} + {floor(b/100)} + {floor(c/100)} + {carry2} = {floor(a/100) + floor(b/100) + floor(c/100) + carry2}"
  - "Therefore: {a} + {b} + {c} = {answer}"