topic: arithmetic/addition
difficulty: medium
calculator: none
variables:
  a: integer(100, 999)
  b: integer(100, 999)
  carry_ones: floor((mod(a, 10) + mod(b, 10)) / 10)
  carry_tens: floor((mod(floor(a/10), 10) + mod(floor(b/10), 10) + carry_ones) / 10)
  answer: a + b
constraints:
  - mod(a, 10) + mod(b, 10) >= 10
  - carry_tens == 1
question: "Calculate: {a} + {b}"
answer: answer
solution:
  - "Add the ones place: {mod(a, 10)} + {mod(b, 10)} = {mod(a, 10) + mod(b, 10)}, write {mod(mod(a, 10) + mod(b, 10), 10)} and carry {carry_ones}"
  - "Add the tens place: {mod(floor(a/10), 10)} + {mod(floor(b/10), 10)} + {carry_ones} = {mod(floor(a/10), 10) + mod(floor(b/10), 10) + carry_ones}, write {mod(mod(floor(a/10), 10) + mod(floor(b/10), 10) + carry_ones, 10)} and carry {carry_tens}"
  - "Add the hundreds place: {floor(a/100)} + {floor(b/100)} + {carry_tens} = {floor(a/100) + floor(b/100) + carry_tens}"
  - "Therefore: {a} + {b} = {answer}"