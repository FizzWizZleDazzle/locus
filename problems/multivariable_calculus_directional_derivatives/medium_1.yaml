topic: multivariable_calculus/directional_derivatives
difficulty: medium
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(-3, 3)
  d: integer(-3, 3)
  f: a*x^2 + b*y^2 + c*x + d*y
  px: integer(-2, 2)
  py: integer(-2, 2)
  vx: choice(-1, 1, 2, -2)
  vy_options: choice(1, 2)
  vy: choice(-vy_options, vy_options)
  v_norm_squared: vx^2 + vy^2
  v_norm: sqrt(v_norm_squared)
  fx: derivative(f, x)
  fy: derivative(f, y)
  fx_at_p: evaluate(fx, x, px)
  fy_at_p: evaluate(fy, y, py)
  fx_final: evaluate(fx_at_p, y, py)
  fy_final: evaluate(fy_at_p, x, px)
  dot_product: fx_final * vx + fy_final * vy
  answer: simplify(dot_product / v_norm)
constraints:
  - vx != 0 or vy != 0
  - abs(fx_final) <= 20
  - abs(fy_final) <= 20
question: "Find the directional derivative of {f} at the point ({px}, {py}) in the direction of the vector {vec([vx, vy])}."
answer: answer
solution:
  - "First, find the gradient of f(x,y) = {f}"
  - "∇f = ({fx}, {fy})"
  - "At point ({px}, {py}): ∇f = ({fx_final}, {fy_final})"
  - "Normalize the direction vector {vec([vx, vy])}"
  - "||v|| = {v_norm}"
  - "Unit vector: u = {vec([vx, vy])} / {v_norm}"
  - "Directional derivative = ∇f · u = ({fx_final}, {fy_final}) · {vec([vx, vy])} / {v_norm}"
  - "= {dot_product} / {v_norm} = {answer}"