topic: multivariable_calculus/directional_derivatives
difficulty: very_hard
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(-3, 3)
  d: integer(-3, 3)
  f: a*x^2*y + b*x*y^2 + c*x + d*y
  fx: derivative(f, x)
  fy: derivative(f, y)
  x0: integer(-2, 2)
  y0: integer(-2, 2)
  fx_at_point: evaluate(fx, x, x0, y, y0)
  fy_at_point: evaluate(fy, x, x0, y, y0)
  u1: choice(-1, 1, 2)
  u2: choice(-2, -1, 1, 2)
  norm_squared: u1^2 + u2^2
  norm: sqrt(norm_squared)
  v1: u1/norm
  v2: u2/norm
  directional_deriv: fx_at_point * v1 + fy_at_point * v2
  answer: simplify(directional_deriv)
constraints:
  - u1^2 + u2^2 in [1, 2, 4, 5, 8]
  - x0 != 0 or y0 != 0
question: "Let f(x,y) = {f}. Find the directional derivative of f at the point ({x0}, {y0}) in the direction of the vector {vec([u1, u2])}."
answer: answer
solution:
  - "First, find the gradient of f(x,y) = {f}"
  - "∂f/∂x = {fx}"
  - "∂f/∂y = {fy}"
  - "Evaluate the gradient at ({x0}, {y0}):"
  - "∇f({x0}, {y0}) = ({fx_at_point}, {fy_at_point})"
  - "Normalize the direction vector {vec([u1, u2])}:"
  - "||v|| = sqrt({u1}^2 + {u2}^2) = sqrt({norm_squared}) = {norm}"
  - "Unit vector: u = ({v1}, {v2})"
  - "The directional derivative is ∇f · u:"
  - "D_u f = {fx_at_point} · {v1} + {fy_at_point} · {v2}"
  - "D_u f = {answer}"