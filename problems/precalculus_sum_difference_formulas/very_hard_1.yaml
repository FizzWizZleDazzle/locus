topic: precalculus/sum_difference_formulas
difficulty: very_hard
calculator: none
variables:
  # Pick angles that give exact trig values
  angle1: choice(30, 45, 60)
  angle2: choice(30, 45, 60)
  # Convert to radians for internal calculation
  a1_rad: angle1 * pi / 180
  a2_rad: angle2 * pi / 180
  # Calculate individual trig values
  sin_a1: sin(a1_rad)
  cos_a1: cos(a1_rad)
  sin_a2: sin(a2_rad)
  cos_a2: cos(a2_rad)
  # Apply sum formula: sin(A+B) = sin(A)cos(B) + cos(A)sin(B)
  sin_sum: sin_a1 * cos_a2 + cos_a1 * sin_a2
  # Apply difference formula: cos(A-B) = cos(A)cos(B) + sin(A)sin(B)
  cos_diff: cos_a1 * cos_a2 + sin_a1 * sin_a2
  # Combined expression
  answer: sin_sum - cos_diff
  # For display
  sum_angle: angle1 + angle2
  diff_angle: abs(angle1 - angle2)
constraints:
  - angle1 != angle2
question: "Evaluate sin({sum_angle}°) - cos({diff_angle}°) exactly without a calculator."
answer: answer
solution:
  - "Use sum formula: sin({angle1}° + {angle2}°) = sin({angle1}°)cos({angle2}°) + cos({angle1}°)sin({angle2}°)"
  - "sin({angle1}°) = {sin_a1}, cos({angle1}°) = {cos_a1}"
  - "sin({angle2}°) = {sin_a2}, cos({angle2}°) = {cos_a2}"
  - "So sin({sum_angle}°) = ({sin_a1})({cos_a2}) + ({cos_a1})({sin_a2}) = {sin_sum}"
  - "Use difference formula: cos({angle1}° - {angle2}°) = cos({angle1}°)cos({angle2}°) + sin({angle1}°)sin({angle2}°)"
  - "So cos({diff_angle}°) = ({cos_a1})({cos_a2}) + ({sin_a1})({sin_a2}) = {cos_diff}"
  - "Therefore sin({sum_angle}°) - cos({diff_angle}°) = {sin_sum} - {cos_diff} = {answer}"