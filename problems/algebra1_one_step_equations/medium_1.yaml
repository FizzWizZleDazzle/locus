topic: algebra1/one_step_equations
difficulty: medium
calculator: none
variables:
  a: nonzero(-12, 12)
  b: integer(-20, 20)
  c: integer(-15, 15)
  product: a * c
  equation_form: choice("ax + b = c", "ax - b = c", "ax = b + c", "b - ax = c")
  x_value: solve(a*x + b - c, x)
constraints:
  - abs(a) > 1
  - abs(c - b) % a == 0
  - x_value != 0
question: "Solve for x: {equation(a*x + b, c)}"
answer: x_value
solution:
  - "Start with {equation(a*x + b, c)}"
  - "Subtract {b} from both sides: {equation(a*x, c - b)}"
  - "Divide both sides by {a}: {equation(x, x_value)}"
  - "Therefore, x = {x_value}"