topic: arithmetic/mixed_numbers
difficulty: easy
calculator: none
variables:
  whole1: integer(1, 4)
  num1: integer(1, 3)
  den: integer(4, 6)
  whole2: integer(1, 3)
  num2: integer(1, 3)
  improper1: whole1 * den + num1
  improper2: whole2 * den + num2
  sum_improper: improper1 + improper2
  answer_whole: floor(sum_improper / den)
  answer_num: mod(sum_improper, den)
  answer: answer_whole + answer_num/den
constraints:
  - num1 < den
  - num2 < den
question: "Add: {whole1} {num1}/{den} + {whole2} {num2}/{den}"
answer: answer
solution:
  - "Convert to improper fractions: {whole1} {num1}/{den} = {improper1}/{den}"
  - "And {whole2} {num2}/{den} = {improper2}/{den}"
  - "Add: {improper1}/{den} + {improper2}/{den} = {sum_improper}/{den}"
  - "Convert back: {sum_improper}/{den} = {answer_whole} {answer_num}/{den}"
  - "Answer: {answer}"