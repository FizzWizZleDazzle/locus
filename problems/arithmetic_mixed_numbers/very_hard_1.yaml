topic: arithmetic/mixed_numbers
difficulty: very_hard
calculator: none
variables:
  # Design backwards: pick denominators that create interesting reduction
  d1: choice(8, 12, 16, 20, 24)
  d2: choice(6, 9, 10, 15, 18)
  # Pick whole parts that make borrowing necessary
  w1: integer(3, 7)
  w2: integer(5, 9)
  # Pick numerators to force borrowing in subtraction
  n1: integer(1, 3)
  n2_offset: integer(3, 5)
  n2: d2 - n2_offset
  # Convert to improper fractions for calculation
  improper1: w1 * d1 + n1
  improper2: w2 * d2 + n2
  # Find common denominator and subtract
  gcd_val: gcd(d1, d2)
  lcm: d1 * d2 / gcd_val
  num1_scaled: improper1 * (lcm / d1)
  num2_scaled: improper2 * (lcm / d2)
  diff_num: num1_scaled - num2_scaled
  # Simplify the result
  g: gcd(abs(diff_num), lcm)
  final_num: diff_num / g
  final_den: lcm / g
  # Convert back to mixed number
  abs_final_num: abs(final_num)
  whole: floor(abs_final_num / final_den)
  remainder: mod(abs_final_num, final_den)
  neg_whole: -whole
  neg_remainder: -remainder
  answer: neg_whole - remainder/final_den
constraints:
  - gcd_val > 1
  - w2 > w1
  - gcd(n2, d2) == 1
question: "Calculate: {w1} {n1}/{d1} - {w2} {n2}/{d2}"
answer: answer
solution:
  - "Convert to improper fractions: {improper1}/{d1} - {improper2}/{d2}"
  - "Find LCM of {d1} and {d2}: {lcm}"
  - "Rewrite with common denominator: {num1_scaled}/{lcm} - {num2_scaled}/{lcm}"
  - "Subtract: {diff_num}/{lcm}"
  - "Simplify by dividing by {g}: {final_num}/{final_den}"
  - "Convert to mixed number: {answer}"