topic: arithmetic/mixed_numbers
difficulty: medium
calculator: none
variables:
  w1: integer(2, 5)
  n1: integer(1, 7)
  d: integer(4, 8)
  w2: integer(1, 4)
  n2: integer(1, 7)
  improper1: w1 * d + n1
  improper2: w2 * d + n2
  sum_num: improper1 + improper2
  whole_part: floor(sum_num / d)
  remainder: mod(sum_num, d)
  answer: whole_part + remainder / d
constraints:
  - n1 < d
  - n2 < d
  - remainder > 0
question: "Add the mixed numbers: {w1} {n1}/{d} + {w2} {n2}/{d}"
answer: answer
solution:
  - "Convert to improper fractions: {w1} {n1}/{d} = {improper1}/{d}"
  - "And {w2} {n2}/{d} = {improper2}/{d}"
  - "Add the fractions: {improper1}/{d} + {improper2}/{d} = {sum_num}/{d}"
  - "Convert back to mixed number: {sum_num} ÷ {d} = {whole_part} remainder {remainder}"
  - "Final answer: {whole_part} {remainder}/{d}"