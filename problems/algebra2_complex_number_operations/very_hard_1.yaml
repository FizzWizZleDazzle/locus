topic: algebra2/complex_number_operations
difficulty: very_hard
calculator: none
variables:
  a: integer(-5, 5)
  b: nonzero(-5, 5)
  c: integer(-5, 5)
  d: nonzero(-5, 5)
  z1: a + b*i
  z2: c + d*i
  product: expand(z1 * z2)
  real_part: a*c - b*d
  imag_part: a*d + b*c
  z1_squared: expand(z1^2)
  z2_conj: c - d*i
  quotient_num: expand(z1 * z2_conj)
  quotient_den: c^2 + d^2
  quotient_real: (a*c + b*d) / quotient_den
  quotient_imag: (b*c - a*d) / quotient_den
  answer: quotient_real + quotient_imag*i
constraints:
  - abs(real_part) <= 20
  - abs(imag_part) <= 20
  - mod(a*c + b*d, quotient_den) == 0 and mod(b*c - a*d, quotient_den) == 0
question: "Given z₁ = {z1} and z₂ = {z2}, compute (z₁ · z₂ · z̄₁) / |z₂|² where z̄₁ is the conjugate of z₁."
answer: answer
solution:
  - "First find z̄₁ = {a} - {b}i"
  - "Calculate z₁ · z₂ = {product}"
  - "Now multiply by z̄₁: ({product})({a} - {b}i)"
  - "Expanding: {quotient_num}"
  - "Calculate |z₂|² = {c}² + {d}² = {quotient_den}"
  - "Therefore: ({quotient_num}) / {quotient_den} = {answer}"