topic: algebra2/complex_number_operations
difficulty: medium
calculator: none
variables:
  a: integer(-8, 8)
  b: nonzero(-8, 8)
  c: integer(-8, 8)
  d: nonzero(-8, 8)
  z1: a + b*i
  z2: c + d*i
  product: expand(z1 * z2)
  real_part: a*c - b*d
  imag_part: a*d + b*c
  answer: real_part + imag_part*i
constraints:
  - abs(real_part) <= 50
  - abs(imag_part) <= 50
question: "Find the product of {z1} and {z2}. Express your answer in the form a + bi."
answer: answer
solution:
  - "To multiply complex numbers, use (a + bi)(c + di) = ac - bd + (ad + bc)i"
  - "Multiply: ({a} + {b}i)({c} + {d}i)"
  - "Real part: ({a})({c}) - ({b})({d}) = {real_part}"
  - "Imaginary part: ({a})({d}) + ({b})({c}) = {imag_part}"
  - "Therefore: {answer}"