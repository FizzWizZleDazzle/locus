topic: algebra1/two_step_equations
difficulty: competition
calculator: none
variables:
  solution: integer(-20, 20)
  multiplier: choice(2, 3, 4, 5, 6, 7, 8, 9, 10, 12, 15, 20)
  addend: integer(-50, 50)
  rhs: multiplier * solution + addend
  numerator: rhs - addend
  fraction_form: numerator / multiplier
constraints:
  - solution != 0
  - addend != 0
  - mod(numerator, multiplier) == 0
question: "Solve for x: {equation(multiplier * x + addend, rhs)}"
answer: solution
solution:
  - "Start with {equation(multiplier * x + addend, rhs)}"
  - "Subtract {addend} from both sides: {equation(multiplier * x, numerator)}"
  - "Divide both sides by {multiplier}: {equation(x, fraction_form)}"
  - "Simplify: x = {solution}"