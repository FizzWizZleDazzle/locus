topic: calculus/curve_sketching
difficulty: very_hard
calculator: graphing
variables:
  a: choice(2, 3, 4)
  b: choice(1, 2, 3)
  c: nonzero(-4, 4)
  d: integer(-8, 8)
  f: a*x^4 - 4*a*b*x^3 + 6*a*b^2*x^2 + c*x + d
  f_prime: derivative(f, x)
  f_double_prime: derivative(f_prime, x)
  critical_points: solve(f_prime, x)
  inflection_candidates: solve(f_double_prime, x)
  x_test: 0
  y_intercept: evaluate(f, x, 0)
  end_behavior_sign: a
constraints:
  - critical_points != []
  - inflection_candidates != []
  - end_behavior_sign > 0
question: "Analyze the function {equation(f(x), f)} by finding all critical points, inflection points, intervals of increase/decrease, intervals of concavity, and sketch the curve. Include the y-intercept and end behavior."
answer: critical_points
solution:
  - "First, find the derivative: {derivative_of(f, x)} = {f_prime}"
  - "Set {equation(f_prime, 0)} and solve for critical points"
  - "Critical points occur at x = {critical_points}"
  - "Second derivative: {derivative_of(f_prime, x)} = {f_double_prime}"
  - "Set {equation(f_double_prime, 0)} for inflection candidates"
  - "Potential inflection points at x = {inflection_candidates}"
  - "The y-intercept is f(0) = {y_intercept}"
  - "Since the leading coefficient is {end_behavior_sign} > 0, as x → ±∞, f(x) → +∞"
  - "Test intervals around critical points for increasing/decreasing behavior"
  - "Test concavity by checking sign of {f_double_prime} in each interval"
  - "Use this information to sketch: U-shaped quartic with critical points at {critical_points}"