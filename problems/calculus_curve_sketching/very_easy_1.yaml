topic: calculus/curve_sketching
difficulty: very_easy
calculator: none
variables:
  a: nonzero(-3, 3)
  b: integer(-4, 4)
  f: a * x^2 + b
  vertex_x: 0
  vertex_y: b
  direction: choice("upward", "downward")
constraints:
  - a > 0 if direction == "upward" else a < 0
question: "Sketch the parabola {f}. What are the coordinates of the vertex?"
answer: vertex_x
solution:
  - "The function {f} is a parabola in the form ax^2 + b"
  - "For this form, the vertex is always at x = 0"
  - "When x = 0, y = {vertex_y}"
  - "Since a = {a}, the parabola opens {direction}"
  - "The vertex is at (0, {vertex_y})"