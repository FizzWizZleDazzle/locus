topic: multivariable_calculus/partial_derivatives
difficulty: easy
calculator: none
variables:
  a: integer(2, 8)
  b: integer(2, 8)
  c: integer(-5, 5)
  f: a*x^2 + b*y^2 + c*x*y
  fx: derivative(f, x)
  fy: derivative(f, y)
  x0: integer(-3, 3)
  y0: integer(-3, 3)
  answer: evaluate(fx, x, x0)
constraints:
  - a != b
question: "Let f(x, y) = {f}. Find the partial derivative with respect to x at the point ({x0}, {y0})."
answer: answer
solution:
  - "Find the partial derivative with respect to x by treating y as a constant"
  - "{derivative_of(f, x)} = {fx}"
  - "Evaluate at x = {x0}: {fx} = {answer}"