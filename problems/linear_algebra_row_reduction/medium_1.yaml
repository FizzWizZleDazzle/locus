topic: linear_algebra/row_reduction
difficulty: medium
calculator: none
variables:
  # Design backward: start with RREF form, then work backward
  a: integer(1, 5)
  b: integer(-4, 4)
  # Create row operations to work backward to original matrix
  r1_mult: integer(2, 4)
  r2_mult: integer(2, 4)
  r1_add: integer(-3, 3)
  # Build original matrix elements
  a11: r1_mult
  a12: r1_add * r2_mult
  a13: r1_mult * a + r1_add * b
  a21: 0
  a22: r2_mult
  a23: r2_mult * b
  # The RREF form we're working toward
  rref_11: 1
  rref_12: 0
  rref_13: a
  rref_21: 0
  rref_22: 1
  rref_23: b
constraints:
  - a != 0
  - b != 0
  - r1_add != 0
question: "Use row reduction to find the reduced row echelon form of the augmented matrix [[{a11}, {a12}, {a13}], [{a21}, {a22}, {a23}]]."
answer: rref_13
answer_type: matrix
solution:
  - "Start with the augmented matrix [[{a11}, {a12}, {a13}], [{a21}, {a22}, {a23}]]"
  - "Divide row 1 by {r1_mult}: R1 → (1/{r1_mult})R1"
  - "This gives row 1 as [1, {r1_add}, {a} + {r1_add}·{b}/{r1_mult}]"
  - "Divide row 2 by {r2_mult}: R2 → (1/{r2_mult})R2"
  - "This gives row 2 as [0, 1, {b}]"
  - "Eliminate above the pivot in column 2: R1 → R1 - {r1_add}R2"
  - "Final RREF: [[1, 0, {a}], [0, 1, {b}]]"