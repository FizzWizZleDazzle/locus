topic: linear_algebra/row_reduction
difficulty: very_hard
calculator: none
variables:
  # Design backward: start with solution values
  x_val: integer(-5, 5)
  y_val: integer(-5, 5)
  z_val: integer(-5, 5)
  w_val: nonzero(-5, 5)
  
  # Build augmented matrix using matrix sampler
  A: matrix(4, 4, -10, 10)
  
  # Compute RHS vector components
  b1: x_val + 2*y_val + z_val - w_val
  b2: y_val - 3*z_val + 2*w_val
  b3: z_val + w_val
  b4: 2*w_val
  
  # Override A to have the specific structure we need
  a11: 1
  a12: 2
  a13: 1
  a14: -1
  a21: 0
  a22: 1
  a23: -3
  a24: 2
  a31: 0
  a32: 0
  a33: 1
  a34: 1
  a41: 0
  a42: 0
  a43: 0
  a44: 2
  
constraints:
  - abs(b1) <= 10
  - abs(b2) <= 10

question: "Use row reduction to solve the system with augmented matrix [[{a11}, {a12}, {a13}, {a14} | {b1}], [{a21}, {a22}, {a23}, {a24} | {b2}], [{a31}, {a32}, {a33}, {a34} | {b3}], [{a41}, {a42}, {a43}, {a44} | {b4}]]"
answer: x_val
answer_type: vector

solution:
  - "Start with augmented matrix [[{a11}, {a12}, {a13}, {a14} | {b1}], [{a21}, {a22}, {a23}, {a24} | {b2}], [{a31}, {a32}, {a33}, {a34} | {b3}], [{a41}, {a42}, {a43}, {a44} | {b4}]]"
  - "R4 → (1/2)R4 gives pivot in position (4,4)"
  - "R3 → R3 - R4 eliminates below pivot in column 4"
  - "R2 → R2 - 2R4 eliminates above pivot in column 4"
  - "R1 → R1 + R4 eliminates above pivot in column 4"
  - "R2 → R2 + 3R3 eliminates above pivot in column 3"
  - "R1 → R1 - R3 eliminates above pivot in column 3"
  - "R1 → R1 - 2R2 eliminates above pivot in column 2"
  - "RREF form has solution x = {x_val}, y = {y_val}, z = {z_val}, w = {w_val}"