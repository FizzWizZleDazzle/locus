topic: linear_algebra/row_reduction
difficulty: easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(-3, 3)
  c: integer(-4, 4)
  d: integer(1, 4)
  M: matrix(2, 2, -5, 5)
  M_11: a
  M_12: b
  M_21: 0
  M_22: d
  b_over_a: b/a
  rref_M: matrix(2, 2, 0, 1)
  rref_M_11: 1
  rref_M_12: b_over_a
  rref_M_21: 0
  rref_M_22: 1
constraints:
  - M[0][0] == a
  - M[0][1] == b
  - M[1][0] == 0
  - M[1][1] == d
  - rref_M[0][0] == 1
  - rref_M[0][1] == b_over_a
  - rref_M[1][0] == 0
  - rref_M[1][1] == 1
question: "Find the reduced row echelon form of {matrix_of(M)}."
answer: rref_M
answer_type: matrix
solution:
  - "Start with {matrix_of(M)}"
  - "Divide row 1 by {a} to get leading 1"
  - "Divide row 2 by {d} to get leading 1"
  - "The result is {matrix_of(rref_M)}"