topic: algebra2/rational_equations
difficulty: competition
calculator: none
variables:
  a: integer(2, 8)
  b: integer(2, 8)
  c: integer(2, 8)
  d: integer(2, 8)
  k: integer(2, 6)
  left_num: a*x + b
  left_den: c*x + d
  right_num: k*(c*x + d) - (a*x + b)
  right_den: (c*x + d)*(x - 1)
  cross_product: (a*x + b)*(x - 1) - k
  expanded: expand(cross_product)
  answer: solve(expanded, x)
constraints:
  - a*d != b*c
  - c != 0
  - abs(answer) <= 20
question: "Solve for x: {equation((a*x + b)/(c*x + d), k/(x - 1))}"
answer: answer
solution:
  - "Start with {equation((a*x + b)/(c*x + d), k/(x - 1))}"
  - "Cross multiply: {equation((a*x + b)*(x - 1), k*(c*x + d))}"
  - "Expand left side: {equation(expand((a*x + b)*(x - 1)), k*(c*x + d))}"
  - "Expand right side: {equation(expand((a*x + b)*(x - 1)), expand(k*(c*x + d)))}"
  - "Move all terms to one side: {equation(expanded, 0)}"
  - "Solve for x: x = {answer}"
  - "Check that x ≠ {-d/c} and x ≠ 1 to avoid division by zero"