topic: algebra2/rational_equations
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(2, 6)
  d: integer(1, 3)
  k: integer(2, 8)
  left_num: a*x + b
  left_den: x - d
  right_num: c*x - k
  right_den: x + d
  cross_left: (a*x + b)*(x + d)
  cross_right: (c*x - k)*(x - d)
  expanded_left: expand(cross_left)
  expanded_right: expand(cross_right)
  combined: expand(cross_left - cross_right)
  answer: solve(combined, x)
constraints:
  - a != c
  - abs(answer) <= 20
  - answer != d and answer != -d
question: "Solve the equation {equation((left_num)/(left_den), (right_num)/(right_den))} for x."
answer: answer
solution:
  - "Start with {equation((left_num)/(left_den), (right_num)/(right_den))}"
  - "Cross multiply: {equation(cross_left, cross_right)}"
  - "Expand left side: {expanded_left}"
  - "Expand right side: {expanded_right}"
  - "Move all terms to one side: {equation(combined, 0)}"
  - "Solve for x: x = {answer}"
  - "Check that x = {answer} doesn't make any denominator zero"
  - "Since {answer} ≠ {d} and {answer} ≠ {-d}, the solution is valid"