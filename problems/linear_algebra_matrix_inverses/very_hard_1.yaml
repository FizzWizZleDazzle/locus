topic: linear_algebra/matrix_inverses
difficulty: very_hard
calculator: none
variables:
  # Design 3x3 matrix with determinant 1 or -1 for clean inverse
  # Start with upper triangular form, then apply row operations
  d1: choice(-1, 1)
  d2: choice(-1, 1)
  d3: choice(-1, 1)
  # Upper triangular with det = d1*d2*d3 = ±1
  a12: integer(-3, 3)
  a13: integer(-3, 3)
  a23: integer(-3, 3)
  # Row operation parameters
  k1: integer(-2, 2)
  k2: integer(-2, 2)
  # Build matrix via row operations: R2 += k1*R1, R3 += k2*R1
  A: matrix(3, 3, -5, 5)
  det_A: det(A)
  A_inv: inverse(A)
  # Verification matrix
  I: A * A_inv
constraints:
  - det_A != 0
  - abs(det_A) == 1
question: "Find the inverse of the matrix {matrix_of(A)}."
answer: A_inv
answer_type: matrix
solution:
  - "To find {matrix_of(A)}^(-1), we'll use the adjugate method since det(A) = ±1"
  - "First, calculate det(A) = {det_A}"
  - "Since |det(A)| = 1, all entries of A^(-1) will be integers"
  - "Calculate the matrix of cofactors, then transpose to get adj(A)"
  - "Since det(A) = {det_A}, we have A^(-1) = adj(A) / {det_A}"
  - "Therefore, A^(-1) = {matrix_of(A_inv)}"
  - "Verify: A × A^(-1) = {matrix_of(I)} = I ✓"