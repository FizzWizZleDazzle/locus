topic: linear_algebra/matrix_inverses
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(0, 3)
  c: integer(0, 3)
  d: integer(1, 5)
  M: matrix(2, 2, -5, 5)
  det: a * d - b * c
  M_inv_num: matrix(2, 2, -10, 10)
  answer: M_inv_num / det
constraints:
  - det != 0
  - abs(det) <= 3
  - M[0][0] == a && M[0][1] == b && M[1][0] == c && M[1][1] == d
  - M_inv_num[0][0] == d && M_inv_num[0][1] == -b && M_inv_num[1][0] == -c && M_inv_num[1][1] == a
question: "Find the inverse of the matrix {matrix_of(M)}."
answer: answer
answer_type: matrix
solution:
  - "For a 2×2 matrix, calculate the determinant: det = {a}·{d} - {b}·{c} = {det}"
  - "Since det = {det} ≠ 0, the matrix is invertible"
  - "The inverse formula gives us {matrix_of(M_inv_num)} divided by {det}"
  - "Therefore, the inverse is {matrix_of(answer)}"