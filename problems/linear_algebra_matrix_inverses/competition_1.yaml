topic: linear_algebra/matrix_inverses
difficulty: competition
calculator: none
variables:
  # Design 2x2 matrix with determinant 1 for clean inverse
  a: integer(-3, 3)
  d: integer(-3, 3)
  b: nonzero(-2, 2)
  c: nonzero(-2, 2)
  det_val: a*d - b*c
  # Adjust d to ensure det = 1
  d_adj: (1 + b*c)/a
  A: matrix(2, 2, -10, 10)
  # For 2x2 matrix with det=1, inverse is [[d, -b], [-c, a]]
  A_inv: matrix(2, 2, -10, 10)
  # Create challenging problem: find matrix X where AXA = A^(-1)
  X: A_inv * A_inv * A_inv
  answer: X
constraints:
  - a != 0
  - abs(a*d - b*c) <= 4
  - is_integer(d_adj)
question: "Let A = {matrix_of(A)}. Find the matrix X such that AXA = A^(-1)."
answer: answer
answer_type: matrix
solution:
  - "First find A^(-1). For A = {matrix_of(A)}, det(A) = {a}·{d_adj} - {b}·{c} = {det_val}"
  - "Since det(A) = 1, A^(-1) = {matrix_of(A_inv)}"
  - "From AXA = A^(-1), multiply both sides by A^(-1) on the left: XA = A^(-2)"
  - "Multiply by A^(-1) on the right: X = A^(-3)"
  - "A^(-2) = A^(-1) · A^(-1) = {matrix_of(A_inv)} · {matrix_of(A_inv)}"
  - "X = A^(-3) = A^(-2) · A^(-1) = {matrix_of(X)}"