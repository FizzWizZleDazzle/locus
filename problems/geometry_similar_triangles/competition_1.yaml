topic: geometry/similar_triangles
difficulty: competition
calculator: none
variables:
  # Design backward: pick scale factor first, then build triangles
  k: choice(2, 3, 4, 5)
  # First triangle with clean side lengths
  a1: choice(3, 4, 5, 6, 8)
  b1: choice(4, 5, 6, 8, 10)
  c1: choice(5, 6, 8, 10, 12)
  # Second triangle scaled by k
  a2: k * a1
  b2: k * b1
  c2: k * c1
  # Areas scale by k^2
  area1: 15
  area2: k * k * area1
  # Competition twist: find side given area ratio
  ratio: area2 / area1
  answer: a2
constraints:
  - a1 < b1
  - b1 < c1
  - c1 < a1 + b1
question: "Two similar triangles have corresponding sides in the ratio {a1}:{a2}. If the area of the smaller triangle is {area1} square units and the larger triangle has sides of length {a2}, {b2}, and {c2}, what is the length of the shortest side of the larger triangle?"
answer: answer
solution:
  - "The triangles are similar with scale factor k = {a2}/{a1} = {k}"
  - "For similar triangles, the ratio of areas equals the square of the scale factor"
  - "Area ratio = {area2}/{area1} = {ratio} = k^2 = {k}^2"
  - "This confirms our scale factor k = {k}"
  - "The shortest side of the larger triangle corresponds to the shortest side of the smaller triangle"
  - "Since {a1} < {b1} < {c1}, the shortest side is {a1}"
  - "Therefore, the shortest side of the larger triangle is {k} × {a1} = {answer}"