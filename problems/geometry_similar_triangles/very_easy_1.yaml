topic: geometry/similar_triangles
difficulty: very_easy
calculator: none
variables:
  scale: integer(2, 4)
  a1: integer(3, 8)
  b1: integer(4, 10)
  c1: integer(5, 12)
  a2: a1 * scale
  b2: b1 * scale
  c2: c1 * scale
  answer: c2
constraints:
  - a1 < b1
  - b1 < c1
question: "Triangle ABC has sides of length {a1}, {b1}, and {c1}. Triangle DEF is similar to triangle ABC with sides of length {a2}, {b2}, and ?. Find the length of the third side."
answer: answer
solution:
  - "Since the triangles are similar, all corresponding sides have the same ratio"
  - "The ratio is {a2}/{a1} = {scale}"
  - "Therefore, the third side = {c1} × {scale} = {answer}"