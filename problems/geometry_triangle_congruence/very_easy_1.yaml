topic: geometry/triangle_congruence
difficulty: very_easy
calculator: none
variables:
  side1: integer(3, 8)
  side2: integer(4, 9)
  side3: integer(5, 10)
  angle: choice(30, 45, 60, 90)
constraints:
  - side1 < side2
  - side2 < side3
  - side1 + side2 > side3
question: "Triangle ABC has sides AB = {side1} cm, BC = {side2} cm, and AC = {side3} cm. Triangle DEF has sides DE = {side1} cm, EF = {side2} cm, and DF = {side3} cm. Are these triangles congruent? Answer 1 for yes, 0 for no."
answer: 1
solution:
  - "Triangle ABC has sides: {side1} cm, {side2} cm, {side3} cm"
  - "Triangle DEF has sides: {side1} cm, {side2} cm, {side3} cm"
  - "All three corresponding sides are equal"
  - "By SSS (Side-Side-Side) congruence, the triangles are congruent"
  - "Answer: {1}"