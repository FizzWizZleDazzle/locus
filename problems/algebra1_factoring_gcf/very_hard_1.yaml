topic: algebra1/factoring_gcf
difficulty: very_hard
calculator: none
variables:
  g: prime(5, 13)
  p1: prime(2, 7)
  p2: prime(2, 7)
  p3: prime(2, 7)
  a: g * p1
  b: g * p2
  c: g * p3
  expr: a*x^3 + b*x^2 + c*x
  factored: g*x*(p1*x^2 + p2*x + p3)
  inner: p1*x^2 + p2*x + p3
constraints:
  - p1 != p2
  - p2 != p3
  - p1 != p3
question: "Factor out the greatest common factor from {expr}"
answer: factored
solution:
  - "Find the GCF of the coefficients: {a}, {b}, and {c}"
  - "Factor each coefficient: {a} = {g} × {p1}, {b} = {g} × {p2}, {c} = {g} × {p3}"
  - "The GCF of the coefficients is {g}"
  - "Each term also contains at least one factor of x"
  - "The GCF of the entire expression is {g}x"
  - "Factor out {g}x: {expr} = {g}x({inner})"
  - "Answer: {factored}"