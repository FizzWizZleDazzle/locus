topic: algebra1/factoring_gcf
difficulty: competition
calculator: none
variables:
  g: prime(2, 13)
  p1: prime(2, 19)
  p2: prime(2, 19)
  p3: prime(2, 19)
  a: g * p1 * p2
  b: g * p1 * p3
  c: g * p2 * p3
  gcf: g * p1 * p2 * p3
  expr: a*x^3 + b*x^2 + c*x
  factored_inner: p1*p2*x^2 + p1*p3*x + p2*p3
  answer: gcf * x * factored_inner
constraints:
  - p1 != p2
  - p2 != p3
  - p1 != p3
question: "Factor {expr} completely by first finding the GCF of all terms."
answer: answer
solution:
  - "Find the GCF of the coefficients {a}, {b}, and {c}"
  - "Factor {a} = {g} × {p1} × {p2}"
  - "Factor {b} = {g} × {p1} × {p3}"
  - "Factor {c} = {g} × {p2} × {p3}"
  - "GCF of coefficients = {g}"
  - "All terms have at least x, so GCF of entire expression = {g}x"
  - "Factor out {g}x: {expr} = {g}x({factored_inner})"
  - "Check if the remaining expression factors further"
  - "Notice each term in {factored_inner} contains exactly two of the primes {p1}, {p2}, {p3}"
  - "This is {p1}{p2}x^2 + {p1}{p3}x + {p2}{p3} = ({p1}x + {p3})({p2}x + {p1})"
  - "Therefore: {expr} = {answer}"