topic: algebra1/systems_elimination
difficulty: competition
calculator: none
variables:
  x_val: integer(-5, 5)
  y_val: integer(-5, 5)
  a1: nonzero(-4, 4)
  b1: nonzero(-4, 4)
  c1: a1 * x_val + b1 * y_val
  a2: nonzero(-4, 4)
  b2: nonzero(-4, 4)
  c2: a2 * x_val + b2 * y_val
  det: a1 * b2 - a2 * b1
  sum_answer: x_val + y_val
constraints:
  - abs(det) >= 3
  - gcd(abs(a1), abs(b1)) == 1
  - gcd(abs(a2), abs(b2)) == 1
question: "Solve the system {system(equation(a1*x + b1*y, c1), equation(a2*x + b2*y, c2))}. Find the value of x + y."
answer: sum_answer
solution:
  - "Given system: {equation(a1*x + b1*y, c1)} and {equation(a2*x + b2*y, c2)}"
  - "Multiply first equation by {a2}: {equation(a2*a1*x + a2*b1*y, a2*c1)}"
  - "Multiply second equation by {a1}: {equation(a1*a2*x + a1*b2*y, a1*c2)}"
  - "Subtract to eliminate x: {equation((a2*b1 - a1*b2)*y, a2*c1 - a1*c2)}"
  - "Since {det} ≠ 0, we can solve for y = {y_val}"
  - "Substitute back: {a1}x + {b1}({y_val}) = {c1}"
  - "Solve for x = {x_val}"
  - "Therefore x + y = {x_val} + {y_val} = {sum_answer}"