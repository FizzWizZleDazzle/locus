topic: algebra1/systems_elimination
difficulty: easy
calculator: none
variables:
  x_val: integer(1, 5)
  y_val: integer(1, 5)
  a1: integer(1, 4)
  b1: integer(1, 4)
  c1: a1 * x_val + b1 * y_val
  a2: integer(1, 4)
  b2: integer(1, 4)
  c2: a2 * x_val + b2 * y_val
  eq1: a1 * x + b1 * y
  eq2: a2 * x + b2 * y
constraints:
  - a1 * b2 != a2 * b1
  - abs(a1 * b2 - a2 * b1) >= 2
question: "Solve the system using elimination: {system(equation(eq1, c1), equation(eq2, c2))}"
answer: x_val
answer_type: coordinate
solution:
  - "Given system: {equation(eq1, c1)} and {equation(eq2, c2)}"
  - "Multiply first equation by {a2}: {equation(a2 * eq1, a2 * c1)}"
  - "Multiply second equation by {a1}: {equation(a1 * eq2, a1 * c2)}"
  - "Subtract to eliminate x: {equation((a2 * b1 - a1 * b2) * y, a2 * c1 - a1 * c2)}"
  - "Solve for y: y = {y_val}"
  - "Substitute back into first equation: {equation(a1 * x + b1 * y_val, c1)}"
  - "Solve for x: x = {x_val}"
  - "Solution: ({x_val}, {y_val})"