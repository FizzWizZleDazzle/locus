topic: algebra1/systems_elimination
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  d: nonzero(-5, 5)
  x_val: integer(-8, 8)
  y_val: integer(-8, 8)
  e: a * x_val + b * y_val
  f: c * x_val + d * y_val
  eq1: a * x + b * y
  eq2: c * x + d * y
  det: a * d - b * c
constraints:
  - det != 0
  - abs(det) <= 10
  - gcd(abs(a), abs(b)) == 1
question: "Solve the system {system(equation(eq1, e), equation(eq2, f))} using elimination."
answer: x_val
answer_type: coordinate
solution:
  - "Given system: {equation(eq1, e)} and {equation(eq2, f)}"
  - "Multiply first equation by {d}: {equation(d * eq1, d * e)}"
  - "Multiply second equation by {b}: {equation(b * eq2, b * f)}"
  - "Subtract to eliminate y: {equation((a * d - b * c) * x, d * e - b * f)}"
  - "Since {det} ≠ 0, divide: x = {x_val}"
  - "Substitute back: {a} · {x_val} + {b} · y = {e}"
  - "Solve for y: y = {y_val}"
  - "Solution: ({x_val}, {y_val})"