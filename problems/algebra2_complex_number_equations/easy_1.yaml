topic: algebra2/complex_number_equations
difficulty: easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(1, 5)
  c: integer(1, 5)
  d: integer(1, 5)
  lhs: (a + b*i) + z
  rhs: c + d*i
  answer: (c - a) + (d - b)*i
constraints:
  - a != c
  - b != d
question: "Solve for z: {equation(lhs, rhs)}"
answer: answer
solution:
  - "We have {equation((a + b*i) + z, c + d*i)}"
  - "Subtract {a + b*i} from both sides"
  - "z = {c + d*i} - ({a + b*i})"
  - "z = {c} - {a} + ({d} - {b})i"
  - "z = {answer}"