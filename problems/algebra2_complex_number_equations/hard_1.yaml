topic: algebra2/complex_number_equations
difficulty: hard
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  d: integer(1, 4)
  real_part: a*c - b*d
  imag_part: a*d + b*c
  z1: complex(a, b)
  z2: complex(c, d)
  product: z1 * z2
  k: integer(10, 30)
  rhs: complex(k, 0)
  w: rhs / z2
  w_real: k*c / (c^2 + d^2)
  w_imag: -k*d / (c^2 + d^2)
  answer: complex(w_real, w_imag)
constraints:
  - gcd(c, d) == 1
  - mod(k, c^2 + d^2) == 0
question: "Solve for w in the equation {equation(w * z2, rhs)}, where {equation(z2, complex(c, d))}."
answer: answer
answer_type: complex
solution:
  - "Given: {equation(w * z2, rhs)} where {equation(z2, complex(c, d))}"
  - "To solve for w, divide both sides by {z2}: {equation(w, rhs / z2)}"
  - "We need to compute {equation(w, k / complex(c, d))}"
  - "Multiply numerator and denominator by the conjugate {complex(c, -d)}:"
  - "{equation(w, (k * complex(c, -d)) / (complex(c, d) * complex(c, -d)))}"
  - "The denominator becomes: {c}² + {d}² = {c^2 + d^2}"
  - "The numerator becomes: {k}({c} - {d}i) = {k*c} - {k*d}i"
  - "Therefore: {equation(w, complex(w_real, w_imag))}"