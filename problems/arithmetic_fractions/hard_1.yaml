topic: arithmetic/fractions
difficulty: hard
calculator: none
variables:
  a: integer(1, 9)
  b: integer(2, 12)
  c: integer(1, 9)
  d: integer(2, 12)
  e: integer(1, 9)
  f: integer(2, 12)
  gcd_bd: gcd(b, d)
  gcd_bf: gcd(b, f)
  gcd_df: gcd(d, f)
  lcm_bdf: b * d * f / (gcd_bd * gcd_bf * gcd_df / gcd(gcd_bd, gcd_bf, gcd_df))
  num1: a * lcm_bdf / b
  num2: c * lcm_bdf / d
  num3: e * lcm_bdf / f
  final_num: num1 - num2 + num3
  gcd_final: gcd(abs(final_num), lcm_bdf)
  answer_num: final_num / gcd_final
  answer_den: lcm_bdf / gcd_final
  answer: answer_num / answer_den
constraints:
  - gcd(a, b) == 1
  - gcd(c, d) == 1
  - gcd(e, f) == 1
question: "Calculate: {a}/{b} - {c}/{d} + {e}/{f}"
answer: answer
solution:
  - "Find the least common denominator of {b}, {d}, and {f}"
  - "LCD = {lcm_bdf}"
  - "Convert each fraction: {a}/{b} = {num1}/{lcm_bdf}, {c}/{d} = {num2}/{lcm_bdf}, {e}/{f} = {num3}/{lcm_bdf}"
  - "Perform the operations: {num1}/{lcm_bdf} - {num2}/{lcm_bdf} + {num3}/{lcm_bdf} = {final_num}/{lcm_bdf}"
  - "Simplify by dividing by {gcd_final}: {answer_num}/{answer_den}"