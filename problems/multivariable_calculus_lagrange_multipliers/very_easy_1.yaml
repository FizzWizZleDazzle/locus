topic: multivariable_calculus/lagrange_multipliers
difficulty: very_easy
calculator: none
variables:
  k: integer(2, 5)
  c: integer(10, 20)
  f: x^2 + y^2
  g: x + y
  lambda_val: k
  x_val: evaluate(c/2, c, c)
  y_val: evaluate(c/2, c, c)
  answer: evaluate(f, x, x_val, y, y_val)
constraints:
  - mod(c, 2) == 0
question: "Use Lagrange multipliers to minimize {f} subject to the constraint {equation(g, c)}."
answer: answer
solution:
  - "Set up the Lagrangian: L = {f} - λ({g} - {c})"
  - "Find critical points by solving ∇L = 0"
  - "∂L/∂x = 2x - λ = 0, so x = λ/2"
  - "∂L/∂y = 2y - λ = 0, so y = λ/2"
  - "From constraint: x + y = {c}, so λ/2 + λ/2 = {c}"
  - "Therefore λ = {c} and x = y = {evaluate(c/2, c, c)}"
  - "The minimum value is {answer}"