topic: multivariable_calculus/lagrange_multipliers
difficulty: competition
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(10, 30)
  k: integer(2, 4)
  constraint_val: k * c
  x_opt: c / k
  y_opt: c / k
  answer: evaluate(a * x^2 + b * y^2, [x, y], [x_opt, y_opt])
constraints:
  - a != b
  - mod(c, k) == 0
question: "Find the minimum value of f(x,y) = {a}x^2 + {b}y^2 subject to the constraint x + y = {constraint_val}."
answer: answer
solution:
  - "Set up Lagrangian: L = {a}x^2 + {b}y^2 - λ(x + y - {constraint_val})"
  - "Take partial derivatives and set to zero:"
  - "∂L/∂x = 2·{a}x - λ = 0"
  - "∂L/∂y = 2·{b}y - λ = 0"
  - "∂L/∂λ = -(x + y - {constraint_val}) = 0"
  - "From first two equations: 2·{a}x = 2·{b}y"
  - "So y = ({a}/{b})x"
  - "Substitute into constraint: x + ({a}/{b})x = {constraint_val}"
  - "x(1 + {a}/{b}) = {constraint_val}"
  - "x({b} + {a})/{b} = {constraint_val}"
  - "x = {b}·{constraint_val}/({a} + {b}) = {x_opt}"
  - "y = {a}·{constraint_val}/({a} + {b}) = {y_opt}"
  - "Minimum value: f({x_opt}, {y_opt}) = {a}·({x_opt})^2 + {b}·({y_opt})^2 = {answer}"