topic: algebra1/multi_step_equations
difficulty: very_hard
calculator: none
variables:
  # Design backward: want final answer x = 3
  x_val: 3
  # Build equation that yields x = 3
  a: nonzero(-8, 8)
  b: nonzero(-12, 12)
  c: nonzero(-15, 15)
  d: nonzero(-10, 10)
  # Construct left side: a(x + b) - c
  left_expanded: a * x_val + a * b - c
  # Right side must equal left when x = 3
  right: left_expanded + d * x_val
  # The equation to solve
  left_expr: a * (x + b) - c
  right_expr: right + d * x
constraints:
  - a != d  # Ensure we don't get 0x after collecting terms
  - abs(a - d) >= 2  # Avoid coefficient 1 or -1 for more complexity
question: "Solve for x: {equation(left_expr, right_expr)}"
answer: x_val
solution:
  - "Start with {equation(left_expr, right_expr)}"
  - "Expand the left side: {equation(a * x + a * b - c, right + d * x)}"
  - "Simplify: {equation(a * x + a * b - c, right + d * x)}"
  - "Move all x terms to the left: {equation(a * x - d * x, right - a * b + c)}"
  - "Factor out x: {equation((a - d) * x, right - a * b + c)}"
  - "Since {right - a * b + c} = {evaluate(right - a * b + c, x, x_val)}"
  - "We have {equation((a - d) * x, evaluate(right - a * b + c, x, x_val))}"
  - "Divide both sides by {a - d}: x = {x_val}"