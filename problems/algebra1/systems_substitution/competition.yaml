topic: algebra1/systems_substitution
difficulty: competition
calculator: none
variables:
  # Design backwards: pick solution first
  x_val: integer(-12, 12)
  y_val: integer(-12, 12)
  # Build coefficients to make the system challenging but solvable
  a: nonzero(-8, 8)
  b: nonzero(-8, 8)
  c: nonzero(-8, 8)
  d: nonzero(-8, 8)
  # Create right-hand sides that guarantee our solution
  e: a * x_val + b * y_val
  f: c * x_val + d * y_val
  # Competition twist: ask for a specific expression
  answer: 3 * x_val + 2 * y_val
constraints:
  - a * d - b * c != 0  # System has unique solution
  - abs(a) != abs(b)    # Avoid trivial coefficients
  - abs(c) != abs(d)    # Avoid trivial coefficients
question: "Solve the system {system(a*x + b*y = e, c*x + d*y = f)} and find the value of 3x + 2y."
answer: answer
solution:
  - "From the first equation: {equation(a*x + b*y, e)}"
  - "Solve for x: x = {equation((e - b*y)/a, (e - b*y)/a)}"
  - "Substitute into the second equation: {equation(c*((e - b*y)/a) + d*y, f)}"
  - "Simplify: {equation((c*e - c*b*y)/a + d*y, f)}"
  - "Multiply through by {a}: {equation(c*e - c*b*y + a*d*y, a*f)}"
  - "Collect y terms: {equation((a*d - c*b)*y, a*f - c*e)}"
  - "Since {a*d - c*b} ≠ 0, we get y = {y_val}"
  - "Substitute back: x = {equation((e - b*y_val)/a, x_val)}"
  - "Therefore, 3x + 2y = 3({x_val}) + 2({y_val}) = {answer}"