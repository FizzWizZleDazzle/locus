topic: algebra1/systems_substitution
difficulty: hard
calculator: none
variables:
  # Design backwards: pick solution first
  x_val: integer(-8, 8)
  y_val: integer(-8, 8)
  # Build first equation: ax + by = c where (x_val, y_val) satisfies it
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: a * x_val + b * y_val
  # Build second equation: dx + ey = f where (x_val, y_val) satisfies it
  d: nonzero(-5, 5)
  e: nonzero(-5, 5)
  f: d * x_val + e * y_val
  # The equations
  eq1: a * x + b * y
  eq2: d * x + e * y
  # Solution expressions
  y_expr: (c - a * x) / b
  substituted: d * x + e * ((c - a * x) / b)
  simplified: simplify(substituted)
constraints:
  - a * e != b * d  # Non-parallel lines
  - abs(c) <= 20    # Keep constants manageable
  - abs(f) <= 20
question: "Solve the system using substitution: {system(equation(eq1, c), equation(eq2, f))}"
answer: x_val
answer_type: ordered_pair
solution:
  - "From the first equation {equation(eq1, c)}, solve for y:"
  - "y = {y_expr}"
  - "Substitute into the second equation {equation(eq2, f)}:"
  - "{equation(simplified, f)}"
  - "Solve for x: x = {x_val}"
  - "Substitute back: y = {y_val}"
  - "Solution: ({x_val}, {y_val})"