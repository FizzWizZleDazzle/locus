topic: algebra1/systems_substitution
difficulty: very_hard
calculator: none
variables:
  # Design backward: pick solution first
  x_val: integer(-5, 5)
  y_val: integer(-5, 5)
  # Build a challenging system with these as solutions
  a: nonzero(-4, 4)
  b: nonzero(-4, 4)
  c: nonzero(-4, 4)
  d: nonzero(-4, 4)
  # First equation: ax + by = result1
  result1: a * x_val + b * y_val
  # Second equation: cx^2 + dy = result2 (nonlinear for difficulty)
  result2: c * x_val^2 + d * y_val
  # Build the system
  eq1: a * x + b * y
  eq2: c * x^2 + d * y
  # Solve for y from first equation
  y_expr: (result1 - a * x) / b
  # Substitute into second equation
  substituted: c * x^2 + d * ((result1 - a * x) / b)
  expanded: expand(substituted)
  # This should equal result2
  final_eq: expanded - result2
  simplified: expand(b * final_eq)
  # Answer as ordered pair
  answer: (x_val, y_val)
constraints:
  - x_val != 0
  - y_val != 0
  - a * d - b * c != 0
question: "Solve the system of equations: {system(equation(eq1, result1), equation(eq2, result2))}"
answer: answer
answer_type: tuple
solution:
  - "From the first equation {equation(eq1, result1)}, solve for y:"
  - "y = {y_expr}"
  - "Substitute this expression for y into the second equation {equation(eq2, result2)}:"
  - "{equation(substituted, result2)}"
  - "Multiply through by {b} to clear the fraction:"
  - "{equation(simplified, 0)}"
  - "This simplifies to a quadratic in x. One solution is x = {x_val}"
  - "Substitute x = {x_val} back into y = {y_expr}:"
  - "y = {y_val}"
  - "Therefore the solution is ({x_val}, {y_val})"