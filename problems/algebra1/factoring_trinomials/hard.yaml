topic: algebra1/factoring_trinomials
difficulty: hard
calculator: none
variables:
  p: prime(2, 7)
  q: prime(2, 7)
  r: nonzero(-5, 5)
  s: nonzero(-5, 5)
  a: p * q
  b: p * s + q * r
  c: r * s
  expanded: a * x^2 + b * x + c
  factored: p * q * (x + r/p) * (x + s/q)
  answer: expand((p * x + r) * (q * x + s))
constraints:
  - p != q
  - abs(r) != abs(s)
  - gcd(p, r) == 1 and gcd(q, s) == 1
question: "Factor completely: {expanded}"
answer: answer
solution:
  - "We need to factor {expanded} where the leading coefficient is {a} = {p} × {q}"
  - "Look for factors of ac = {a} × {c} = {evaluate(a * c, x, 0)}"
  - "We need two numbers that multiply to {evaluate(a * c, x, 0)} and add to {b}"
  - "These numbers are {evaluate(p * s, x, 0)} and {evaluate(q * r, x, 0)}"
  - "Rewrite: {equation(expanded, a * x^2 + p * s * x + q * r * x + c)}"
  - "Group: {equation(expanded, p * x * (q * x + s) + r * (q * x + s))}"
  - "Factor: {equation(expanded, answer)}"