topic: algebra1/graphing_lines
difficulty: medium
calculator: none
variants:
  - name: default
    variables:
      m: nonzero(-5, 5)
      x1: nonzero(-4, 4)
      y1: integer(-6, 6)
      b: y1 - m*x1
      mx1: m*x1
      f: m*x + b
    constraints:
      - m != 1
      - m != -1
    question: A line has slope {m} and passes through the point ({x1}, {y1}). What is the y-intercept of the line?
    answer: b
    answer_type: numeric
    solution:
      - Use slope-intercept form {math(y = m*x + b)} with slope {m} and unknown y-intercept {math(b)}.
      - 'Substitute the point ({x1}, {y1}): {y1} = ({m})({x1}) + {math(b)}.'
      - Compute ({m})({x1}) = {mx1}, so {y1} = {mx1} + {math(b)}.
      - 'Subtract {mx1} from both sides: {math(b)} = {y1} - ({mx1}) = {b}.'
      - The y-intercept is {b}.
    diagram:
      type: coordinate_plane
      x_range:
        - -6
        - 6
      y_range:
        - -8
        - 8
      grid: true
      elements:
        - line:
            slope: m
            intercept: b
            color: blue
            label: f
        - point:
            x: x1
            y: y1
            label: P
