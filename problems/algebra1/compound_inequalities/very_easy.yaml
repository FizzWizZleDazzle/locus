topic: algebra1/compound_inequalities
difficulty: very_easy
calculator: none
variables:
  a: integer(-5, 5)
  b: integer(2, 8)
  left: a - b
  right: a + b
  answer_left: left
  answer_right: right
constraints:
  - a > 0
question: "Solve the compound inequality: {equation(left, '<')} x {equation('<', right)}"
answer: answer_left, answer_right
answer_type: tuple
solution:
  - "We have {equation(left, '<')} x {equation('<', right)}"
  - "This means x > {left} and x < {right}"
  - "In interval notation: ({left}, {right})"
  - "The solution is all numbers between {left} and {right}"