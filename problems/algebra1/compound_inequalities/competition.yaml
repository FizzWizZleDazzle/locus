topic: algebra1/compound_inequalities
difficulty: competition
calculator: none
variables:
  # Design backwards: want solution interval with clean integer endpoints
  # Pick center and half-width to guarantee integer boundaries
  center: integer(-5, 5)
  half_width: integer(2, 6)
  left_bound: center - half_width
  right_bound: center + half_width
  
  # Build coefficients that will produce our desired interval
  # For ax + b < c and dx + e > f, we need specific relationships
  a: integer(2, 5)
  d: integer(2, 5)
  
  # Build the constants to force our interval
  b: integer(-10, 10)
  e: integer(-10, 10)
  
  # c and f are constructed to give us the exact bounds we want
  c: a * right_bound + b
  f: d * left_bound + e
  
  # The compound inequality system
  ineq1: a * x + b < c
  ineq2: d * x + e > f
  
  # For display
  left_side1: a * x + b
  left_side2: d * x + e
  
constraints:
  - a != d  # Different coefficients for complexity
  - half_width >= 3  # Non-trivial interval width

question: "Solve the compound inequality: {left_side1} < {c} and {left_side2} > {f}"
answer: left_bound, right_bound
answer_type: tuple
solution:
  - "Solve the first inequality: {left_side1} < {c}"
  - "Subtract {b}: {a}x < {c - b}"
  - "Divide by {a}: x < {right_bound}"
  - "Solve the second inequality: {left_side2} > {f}"
  - "Subtract {e}: {d}x > {f - e}"
  - "Divide by {d}: x > {left_bound}"
  - "Combining both: {left_bound} < x < {right_bound}"
  - "The solution is the interval ({left_bound}, {right_bound})"