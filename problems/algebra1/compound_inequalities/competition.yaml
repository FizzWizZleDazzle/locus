topic: algebra1/compound_inequalities
difficulty: competition
calculator: none
variables:
  # Design backwards: want solution interval [a, b]
  a: integer(-8, 3)
  b: integer(-5, 8)
  # Build inequalities that have exactly this solution
  m1: integer(2, 5)
  m2: integer(2, 5)
  c1: m1 * a - 3
  c2: m2 * b + 3
  # The compound inequality system
  ineq1: m1 * x - 3 >= c1
  ineq2: m2 * x + 3 <= c2
  # Solution process
  simplified1: x >= a
  simplified2: x <= b
  answer: a
  answer_upper: b
constraints:
  - m1 != m2
  - b - a >= 3
  - a < b
question: "Find all values of x that satisfy both {equation(ineq1, 0)} and {equation(ineq2, 0)}. Express your answer as an interval."
answer: answer
answer_type: interval
solution:
  - "Solve the first inequality: {equation(ineq1, 0)}"
  - "Add 3 to both sides: m1·x ≥ {c1} + 3"
  - "Divide by {m1}: x ≥ {a}"
  - "Solve the second inequality: {equation(ineq2, 0)}"
  - "Subtract 3 from both sides: m2·x ≤ {c2} - 3"
  - "Divide by {m2}: x ≤ {b}"
  - "Combining both: {a} ≤ x ≤ {b}"
  - "Solution interval: [{a}, {b}]"