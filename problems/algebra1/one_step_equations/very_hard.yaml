topic: algebra1/one_step_equations
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-12, 12)
  b: nonzero(-12, 12)
  c: nonzero(-12, 12)
  numerator: a * b
  equation_form: choice("multiply", "divide")
  lhs_multiply: c * x
  lhs_divide: x / c
  x_value_multiply: numerator / c
  x_value_divide: numerator * c
  lhs: lhs_multiply if equation_form == "multiply" else lhs_divide
  answer: x_value_multiply if equation_form == "multiply" else x_value_divide
constraints:
  - mod(numerator, c) == 0
  - abs(answer) <= 100
question: "Solve for x: {equation(lhs, numerator)}"
answer: answer
solution:
  - "We have {equation(lhs, numerator)}"
  - "If {equation_form} equation: isolate x"
  - "Multiply form: divide both sides by {c} to get x = {numerator}/{c} = {x_value_multiply}"
  - "Divide form: multiply both sides by {c} to get x = {numerator} × {c} = {x_value_divide}"
  - "Therefore, x = {answer}"