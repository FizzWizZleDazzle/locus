topic: algebra1/one_step_equations
difficulty: hard
calculator: none
variables:
  answer: nonzero(-15, 15)
  a: choice(-12, -9, -6, -4, -3, 3, 4, 6, 9, 12)
  b: a * answer
  equation_form: choice(1, 2, 3, 4)
  lhs: a * x
  rhs: b
constraints:
  - answer != 1
  - answer != -1
question: "Solve for x: {equation(lhs, rhs)}"
answer: answer
answer_type: numeric
solution:
  - "We have {equation(lhs, rhs)}"
  - "Divide both sides by {a}: {equation(x, b/a)}"
  - "Therefore, x = {answer}"