topic: algebra1/one_step_equations
difficulty: medium
calculator: none
variants:
  - name: addition
    variables:
      b: nonzero(-12, 12)
      answer: integer(-10, 10)
      c: answer + b
    question: 'Solve for {math(x)}: {equation(x + b, c)}'
    answer: answer
    answer_type: numeric
    solution:
      - Start with {equation(x + b, c)}.
      - Subtract {b} from both sides.
      - 'Solution: {equation(x, answer)}'
  - name: subtraction
    variables:
      b: integer(1, 12)
      answer: integer(-10, 10)
      c: answer - b
    question: 'Solve for {math(x)}: {equation(x - b, c)}'
    answer: answer
    answer_type: numeric
    solution:
      - Start with {equation(x - b, c)}.
      - Add {b} to both sides.
      - 'Solution: {equation(x, answer)}'
  - name: multiplication
    variables:
      a: nonzero(-8, 8)
      answer: nonzero(-10, 10)
      c: a * answer
    constraints:
      - a != 1
    question: 'Solve for {math(x)}: {equation(a*x, c)}'
    answer: answer
    answer_type: numeric
    solution:
      - Start with {equation(a*x, c)}.
      - Divide both sides by {a}.
      - 'Solution: {equation(x, answer)}'
  - name: division
    variables:
      a: nonzero(-8, 8)
      answer: nonzero(-10, 10)
      c: answer / a
    constraints:
      - a != 1
    question: 'Solve for {math(x)}: {equation(x/a, c)}'
    answer: answer
    answer_type: numeric
    solution:
      - Start with {equation(x/a, c)}.
      - Multiply both sides by {a}.
      - 'Solution: {equation(x, answer)}'
