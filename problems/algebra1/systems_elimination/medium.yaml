topic: algebra1/systems_elimination
difficulty: medium
calculator: none
variables:
  x_val: integer(-5, 5)
  y_val: integer(-5, 5)
  a1: nonzero(-4, 4)
  b1: nonzero(-4, 4)
  c1: a1 * x_val + b1 * y_val
  a2: nonzero(-4, 4)
  b2: nonzero(-4, 4)
  c2: a2 * x_val + b2 * y_val
  eq1: a1 * x + b1 * y
  eq2: a2 * x + b2 * y
constraints:
  - a1 * b2 != a2 * b1
  - abs(a1) != abs(a2)
question: "Solve the system using elimination: {system(equation(eq1, c1), equation(eq2, c2))}"
answer: x_val
answer_type: coordinate
solution:
  - "Given system: {equation(eq1, c1)} and {equation(eq2, c2)}"
  - "To eliminate y, multiply first equation by {b2} and second by {b1}"
  - "This gives: {equation(a1 * b2 * x + b1 * b2 * y, c1 * b2)} and {equation(a2 * b1 * x + b1 * b2 * y, c2 * b1)}"
  - "Subtract second from first: {equation((a1 * b2 - a2 * b1) * x, c1 * b2 - c2 * b1)}"
  - "So x = {x_val}"
  - "Substitute into first equation: {equation(a1 * x_val + b1 * y, c1)}"
  - "Solving for y: y = {y_val}"
  - "Solution: ({x_val}, {y_val})"