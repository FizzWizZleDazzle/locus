topic: algebra1/systems_elimination
difficulty: very_hard
calculator: none
variables:
  x: integer(-3, 3)
  y: integer(-3, 3)
  a1: choice(3, 5, 7)
  b1: choice(2, 4, 6)
  c1: a1*x + b1*y
  a2: choice(2, 4, 6)
  b2: choice(3, 5, 7)
  c2: a2*x + b2*y
  answer: x, y
constraints:
  - a1*b2 != a2*b1
question: "Solve the system using elimination: {system(a1*x + b1*y = c1, a2*x + b2*y = c2)}"
answer: answer
answer_type: tuple
solution:
  - "Given system: {equation(a1*x + b1*y, c1)} and {equation(a2*x + b2*y, c2)}"
  - "Multiply first equation by {b2}: {equation(a1*b2*x + b1*b2*y, c1*b2)}"
  - "Multiply second equation by {b1}: {equation(a2*b1*x + b1*b2*y, c2*b1)}"
  - "Subtract to eliminate y: {equation((a1*b2 - a2*b1)*x, c1*b2 - c2*b1)}"
  - "Solve for x: x = {x}"
  - "Substitute x = {x} into first equation: {equation(a1*x + b1*y, c1)}"
  - "Solve for y: y = {y}"
  - "Solution: ({x}, {y})"