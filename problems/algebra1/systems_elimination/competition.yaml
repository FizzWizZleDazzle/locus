topic: algebra1/systems_elimination
difficulty: competition
calculator: none
variables:
  x: integer(1, 9)
  y: integer(1, 9)
  k: integer(2, 5)
  a1: k
  b1: k + 1
  c1: a1*x + b1*y
  a2: k + 1
  b2: k
  c2: a2*x + b2*y
  sum_coeffs: a1 + b1 + a2 + b2
  sum_constants: c1 + c2
  answer: x + y
constraints:
  - x != y
question: "Consider the system of equations {system(a1*x + b1*y = c1, a2*x + b2*y = c2)}. If the sum of all coefficients equals {sum_coeffs} and the sum of the constants equals {sum_constants}, find x + y."
answer: answer
answer_type: numeric
solution:
  - "Given system: {equation(a1*x + b1*y, c1)} and {equation(a2*x + b2*y, c2)}"
  - "Notice that a1 = {a1}, b1 = {b1}, a2 = {a2}, b2 = {b2}"
  - "Add the equations: {equation((a1 + a2)*x + (b1 + b2)*y, c1 + c2)}"
  - "This gives: {equation((2*k + 1)*x + (2*k + 1)*y, sum_constants)}"
  - "Factor: {equation((2*k + 1)*(x + y), sum_constants)}"
  - "Since 2k + 1 = {2*k + 1}, we get: {equation(x + y, sum_constants/(2*k + 1))}"
  - "Therefore, x + y = {answer}"