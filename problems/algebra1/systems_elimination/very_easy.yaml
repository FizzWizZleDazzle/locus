topic: algebra1/systems_elimination
difficulty: very_easy
calculator: none
variables:
  x_val: integer(1, 5)
  y_val: integer(1, 5)
  a1: integer(1, 3)
  b1: integer(1, 3)
  c1: a1 * x_val + b1 * y_val
  a2: integer(1, 3)
  b2: integer(1, 3)
  c2: a2 * x_val + b2 * y_val
  eq1: a1 * x + b1 * y
  eq2: a2 * x + b2 * y
constraints:
  - a1 * b2 != a2 * b1
question: "Solve the system using elimination: {system(equation(eq1, c1), equation(eq2, c2))}"
answer: x_val
answer_type: coordinate
solution:
  - "Given system: {equation(eq1, c1)} and {equation(eq2, c2)}"
  - "Multiply first equation by {b2}: {equation(a1 * b2 * x + b1 * b2 * y, c1 * b2)}"
  - "Multiply second equation by {b1}: {equation(a2 * b1 * x + b1 * b2 * y, c2 * b1)}"
  - "Subtract to eliminate y: {equation((a1 * b2 - a2 * b1) * x, c1 * b2 - c2 * b1)}"
  - "Solve for x: x = {x_val}"
  - "Substitute back: {equation(a1 * x_val + b1 * y, c1)}"
  - "Solve for y: y = {y_val}"
  - "Solution: ({x_val}, {y_val})"