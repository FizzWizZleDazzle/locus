topic: algebra1/slope_and_intercept
difficulty: very_easy
calculator: none
variables:
  m: integer(-5, 5)
  b: integer(-8, 8)
  f: m * x + b
  x1: integer(-3, 3)
  y1: evaluate(f, x, x1)
  x2: integer(-3, 3)
  y2: evaluate(f, x, x2)
constraints:
  - m != 0
  - x1 != x2
question: "A line passes through the points ({x1}, {y1}) and ({x2}, {y2}). Find the slope of this line."
answer: m
solution:
  - "Use the slope formula: slope = (y₂ - y₁)/(x₂ - x₁)"
  - "slope = ({y2} - {y1})/({x2} - {x1})"
  - "slope = ({y2} - {y1})/({x2} - {x1})"
  - "slope = {m}"