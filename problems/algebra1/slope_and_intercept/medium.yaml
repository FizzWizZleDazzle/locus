topic: algebra1/slope_and_intercept
difficulty: medium
calculator: none
variables:
  m: nonzero(-6, 6)
  x1: integer(-5, 5)
  y1: integer(-8, 8)
  x2: integer(-5, 5)
  y2: y1 + m*(x2 - x1)
  b: y1 - m*x1
  equation: m*x + b
  answer: m, b
constraints:
  - x1 != x2
  - m != 1
question: "A line passes through the points ({x1}, {y1}) and ({x2}, {y2}). Find the slope and y-intercept of the line."
answer: answer
answer_type: tuple
solution:
  - "Calculate the slope: m = (y2 - y1)/(x2 - x1)"
  - "m = ({y2} - {y1})/({x2} - {x1}) = {y2 - y1}/{x2 - x1} = {m}"
  - "Use point-slope form with ({x1}, {y1}): y - {y1} = {m}(x - {x1})"
  - "Expand: y - {y1} = {m}x - {m*x1}"
  - "Solve for y: y = {m}x + {b}"
  - "The slope is {m} and the y-intercept is {b}"