topic: algebra1/slope_and_intercept
difficulty: medium
calculator: none
variables:
  m: nonzero(-5, 5)
  b: integer(-8, 8)
  x1: integer(-4, 4)
  x2: integer(-4, 4)
  y1: m * x1 + b
  y2: m * x2 + b
  slope: (y2 - y1) / (x2 - x1)
  y_intercept: b
constraints:
  - x1 != x2
  - abs(x2 - x1) >= 2
question: "A line passes through the points ({x1}, {y1}) and ({x2}, {y2}). Find the slope and y-intercept of this line."
answer: slope
answer_type: expression
solution:
  - "Use the slope formula: m = {equation((y2 - y1), (x2 - x1))}"
  - "Substitute the points: m = {equation((y2 - y1), (x2 - x1))}"
  - "Calculate: m = {slope}"
  - "Use point-slope form with point ({x1}, {y1}): y - {y1} = {slope}(x - {x1})"
  - "Expand: y = {slope}x + {y_intercept}"
  - "The slope is {slope} and the y-intercept is {y_intercept}"