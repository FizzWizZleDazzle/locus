topic: algebra1/linear_inequalities
difficulty: hard
calculator: none
variables:
  a: nonzero(-6, 6)
  b: nonzero(-8, 8)
  c: nonzero(-6, 6)
  d: integer(-12, 12)
  numerator: d - b
  denominator: a - c
  x_boundary: numerator / denominator
  left_side: a * x + b
  right_side: c * x + d
constraints:
  - a != c
  - mod(numerator, denominator) == 0
  - denominator > 0
question: "Solve the inequality {equation(left_side, '>' + str(right_side))}"
answer: x_boundary
answer_type: boundary_value
solution:
  - "Start with {equation(left_side, '>' + str(right_side))}"
  - "Subtract {c}x from both sides: {equation(left_side + ' - ' + str(c) + 'x', '>' + str(right_side) + ' - ' + str(c) + 'x')}"
  - "Simplify: {equation(str(a - c) + 'x + ' + str(b), '>' + str(d))}"
  - "Subtract {b} from both sides: {equation(str(a - c) + 'x', '>' + str(d - b))}"
  - "Divide both sides by {denominator}: {equation('x', '>' + str(x_boundary))}"
  - "The solution is x > {x_boundary}"