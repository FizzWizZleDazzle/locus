topic: algebra1/linear_inequalities
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-8, 8)
  b: nonzero(-8, 8)
  c: nonzero(-8, 8)
  d: nonzero(-8, 8)
  k: integer(-10, 10)
  left: a*x + b
  right: c*x + d
  combined: (a - c)*x
  rhs: d - b
  coeff: a - c
  boundary: rhs / coeff
  ineq1_dir: choice("<", ">")
  ineq2_dir: choice("<", ">")
  answer: solve(combined > rhs, x) if ineq1_dir == ">" and ineq2_dir == ">" and coeff > 0 else solve(combined < rhs, x) if ineq1_dir == "<" and ineq2_dir == "<" and coeff > 0 else solve(combined < rhs, x) if ineq1_dir == ">" and ineq2_dir == ">" and coeff < 0 else solve(combined > rhs, x)
constraints:
  - coeff != 0
  - mod(rhs, coeff) == 0
  - abs(boundary) <= 20
question: "Solve the system of inequalities: {equation(left, ineq1_dir + ' ' + str(k))} and {equation(right, ineq2_dir + ' ' + str(k))}"
answer: answer
answer_type: interval
solution:
  - "From the first inequality: {equation(left, ineq1_dir + ' ' + str(k))}"
  - "Subtract {k} from both sides: {equation(left + ' - ' + str(k), ineq1_dir + ' 0')}"
  - "From the second inequality: {equation(right, ineq2_dir + ' ' + str(k))}"
  - "Subtract {k} from both sides: {equation(right + ' - ' + str(k), ineq2_dir + ' 0')}"
  - "Since both expressions must have the same sign, we need {equation(left + ' - ' + str(k), ineq1_dir + ' 0')} and {equation(right + ' - ' + str(k), ineq2_dir + ' 0')}"
  - "This means {left} and {right} must both be {ineq1_dir} {k}"
  - "From {equation(left, ineq1_dir + ' ' + str(k))}: {equation(combined, ineq1_dir + ' ' + str(rhs))}"
  - "Since {coeff} {'> 0' if coeff > 0 else '< 0'}, dividing by {coeff} {'preserves' if coeff > 0 else 'reverses'} the inequality"
  - "x {answer}"