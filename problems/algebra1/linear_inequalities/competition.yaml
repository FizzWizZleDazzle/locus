topic: algebra1/linear_inequalities
difficulty: competition
calculator: none
variables:
  # Design backwards: want solution x > (d-b)/(a-c) where this simplifies to a clean integer
  # Pick values so numerator is divisible by denominator
  k: integer(2, 7)
  m: integer(3, 8)
  # Set up so (d-b)/(a-c) = k
  a: m + 1
  c: 1
  b: integer(-5, -1)
  d: k * (a - c) + b
  # Build the compound inequality
  left: a * x + b
  right: c * x + d
  middle: 2 * k * x - 3
  # Solution will be x > k and x < (3 + k*m)/(2*k - m - 1)
  num: 3 + k * m
  den: 2 * k - m - 1
  upper_bound: num / den
constraints:
  - 2 * k > m + 1  # ensures den > 0
  - mod(num, den) == 0  # ensures upper_bound is integer
question: "Solve the compound inequality {left} < {middle} < {right}"
answer: k, upper_bound
answer_type: tuple
solution:
  - "Split into two inequalities: {equation(left, '<', middle)} and {equation(middle, '<', right)}"
  - "First inequality: {a}x + {b} < {2*k}x - 3"
  - "Rearranging: {a}x - {2*k}x < -3 - {b}"
  - "This gives: {a - 2*k}x < {-3 - b}"
  - "Since {a - 2*k} < 0, flip the inequality: x > {k}"
  - "Second inequality: {2*k}x - 3 < {c}x + {d}"
  - "Rearranging: {2*k - c}x < {d + 3}"
  - "This gives: x < {upper_bound}"
  - "Solution: {k} < x < {upper_bound}"