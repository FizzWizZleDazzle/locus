topic: algebra1/quadratic_formula
difficulty: very_easy
calculator: none
variables:
  r1: integer(1, 5)
  r2: integer(-5, -1)
  f: (x - r1) * (x - r2)
  expanded: expand(f)
  a_coef: 1
  b_coef: -(r1 + r2)
  c_coef: r1 * r2
  discriminant: b_coef^2 - 4*a_coef*c_coef
  answer: solve(expanded, x)
question: "Use the quadratic formula to solve {equation(expanded, 0)}"
answer: answer
answer_type: set
solution:
  - "The quadratic formula is x = (-b ± √(b² - 4ac)) / 2a"
  - "From {equation(expanded, 0)}, we have a = {a_coef}, b = {b_coef}, c = {c_coef}"
  - "Calculate the discriminant: b² - 4ac = ({b_coef})² - 4({a_coef})({c_coef}) = {discriminant}"
  - "Apply the formula: x = (-({b_coef}) ± √{discriminant}) / 2({a_coef})"
  - "x = ({r1} + {r2} ± √{discriminant}) / 2"
  - "Since √{discriminant} = {abs_of(r1 - r2)}, we get:"
  - "x = {r1} or x = {r2}"