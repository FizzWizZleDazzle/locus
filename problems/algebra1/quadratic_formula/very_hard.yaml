topic: algebra1/quadratic_formula
difficulty: very_hard
calculator: none
variables:
  p: prime(11, 29)
  q: prime(11, 29)
  k: nonzero(-3, 3)
  a: k
  b: -k * (p + q)
  c: k * p * q
  f: a * x^2 + b * x + c
  discriminant: b^2 - 4*a*c
  sqrt_disc: sqrt(discriminant)
  r1: (-b - sqrt_disc) / (2*a)
  r2: (-b + sqrt_disc) / (2*a)
  answer: solve(f, x)
constraints:
  - p != q
  - discriminant > 0
question: "Solve {equation(f, 0)} for x."
answer: answer
answer_type: set
solution:
  - "We have the quadratic equation {equation(f, 0)}"
  - "Using the quadratic formula with a = {a}, b = {b}, c = {c}"
  - "The discriminant is {b}² - 4({a})({c}) = {discriminant}"
  - "Since the discriminant equals {discriminant} = ({p} - {q})²k², we have √{discriminant} = {sqrt_disc}"
  - "Therefore x = ({-b} ± {sqrt_disc}) / (2 · {a})"
  - "This gives us x = {r1} or x = {r2}"
  - "Simplifying: x = {p} or x = {q}"