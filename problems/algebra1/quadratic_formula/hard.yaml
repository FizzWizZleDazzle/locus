topic: algebra1/quadratic_formula
difficulty: hard
calculator: none

variables:
  a: choice(2, 3, 4)
  r1: nonzero(-5, 5)
  r2: nonzero(-5, 5)
  f: a*(x - r1)*(x - r2)
  expanded: expand(f)
  b_coeff: -a*(r1 + r2)
  c_coeff: a*r1*r2
  disc: a^2*(r1 - r2)^2
  disc_sqrt: sqrt(disc)
  answer: solve(expanded, x)

constraints:
  - r1 != r2

question: "Use the quadratic formula to solve {equation(expanded, 0)} for {math(x)}."

answer: answer
answer_type: set

solution:
  - "Identify coefficients: {equation(math(A), a)}, {equation(math(B), b_coeff)}, {equation(math(C), c_coeff)}."
  - "Compute the discriminant: {equation(math(B^2 - 4*A*C), disc)}."
  - "The square root of the discriminant is {disc_sqrt}."
  - "Apply the quadratic formula: {math(x)} = {math((-b_coeff + disc_sqrt) / (2*a))} or {math(x)} = {math((-b_coeff - disc_sqrt) / (2*a))}."
  - "The solutions are {equation(math(x), r1)} and {equation(math(x), r2)}."
