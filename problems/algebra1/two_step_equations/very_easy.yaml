topic: algebra1/two_step_equations
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 9)
  x_val: integer(1, 6)
  c: a * x_val + b
  answer: x_val
constraints:
  - c <= 30
question: "Solve for x: {equation(a*x + b, c)}"
answer: answer
solution:
  - "Start with {equation(a*x + b, c)}"
  - "Subtract {b} from both sides: {equation(a*x, c - b)}"
  - "Divide both sides by {a}: {equation(x, answer)}"