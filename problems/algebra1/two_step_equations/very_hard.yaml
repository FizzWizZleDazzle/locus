topic: algebra1/two_step_equations
difficulty: very_hard
calculator: none
variables:
  x: integer(-12, 12)
  a: nonzero(-15, 15)
  b: choice(-24, -18, -12, 12, 18, 24)
  c: a*x + b
  d: nonzero(-8, 8)
  e: choice(2, 3, 4, 5, 6)
  f: d*x/e
  g: c - f
  answer: x
constraints:
  - a != d
question: "Solve for x: {equation(c, f + g)}"
answer: answer
solution:
  - "Start with {equation(c, f + g)}"
  - "Substitute: {equation(a*x + b, d*x/e + g)}"
  - "Subtract {g} from both sides: {equation(a*x + b - g, d*x/e)}"
  - "Simplify left side: {equation(a*x + b - g, d*x/e)}"
  - "Since {g} = {c} - {f} = {g}, we get: {equation(a*x - d*x/e, 0)}"
  - "Factor out x: {equation(x*(a - d/e), 0)}"
  - "Since {a} - {d}/{e} ≠ 0, we have x = {answer}"