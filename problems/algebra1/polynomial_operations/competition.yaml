topic: algebra1/polynomial_operations
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  p: (a*x + b)^3
  q: (c*x - d)^2
  r: x^2 + 1
  expanded_p: expand(p)
  expanded_q: expand(q)
  product: expand(expanded_q * r)
  final: expand(expanded_p - product)
  answer: evaluate(final, x, 1)
constraints:
  - a != c
  - b != d
  - gcd(a, b) == 1
question: "Let P(x) = {expanded_p}, Q(x) = {expanded_q}, and R(x) = {r}. Find the value of P(x) - Q(x)·R(x) when x = 1."
answer: answer
solution:
  - "First, we need to find Q(x)·R(x)"
  - "Q(x)·R(x) = {expanded_q} · {r}"
  - "Expanding: Q(x)·R(x) = {product}"
  - "Now compute P(x) - Q(x)·R(x)"
  - "P(x) - Q(x)·R(x) = {expanded_p} - ({product})"
  - "Simplifying: P(x) - Q(x)·R(x) = {final}"
  - "Evaluating at x = 1: {answer}"