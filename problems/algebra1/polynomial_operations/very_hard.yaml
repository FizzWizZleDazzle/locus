topic: algebra1/polynomial_operations
difficulty: very_hard
calculator: none
variables:
  a1: nonzero(-4, 4)
  b1: nonzero(-3, 3)
  c1: integer(-5, 5)
  a2: nonzero(-3, 3)
  b2: nonzero(-4, 4)
  c2: integer(-5, 5)
  p: a1*x^2 + b1*x + c1
  q: a2*x^2 + b2*x + c2
  product: expand(p * q)
  x_val: choice(-2, -1, 1, 2)
  p_at_x: evaluate(p, x, x_val)
  q_at_x: evaluate(q, x, x_val)
  answer: p_at_x * q_at_x
constraints:
  - a1 != a2
  - b1 != b2
question: "Given {equation(p(x), p)} and {equation(q(x), q)}, find {equation(p(x_val) * q(x_val), ?)}"
answer: answer
answer_type: numeric
solution:
  - "First evaluate p({x_val}): {equation(p(x_val), p_at_x)}"
  - "Next evaluate q({x_val}): {equation(q(x_val), q_at_x)}"
  - "Therefore {equation(p(x_val) * q(x_val), p_at_x * q_at_x)}"
  - "= {answer}"