topic: algebra1/factoring_gcf
difficulty: very_easy
calculator: none
variables:
  gcf: integer(2, 6)
  a: integer(2, 5)
  b: integer(2, 5)
  first_coef: gcf * a
  second_coef: gcf * b
  expression: first_coef * x + second_coef
  factored: gcf * (a * x + b)
constraints:
  - a != b
question: "Factor out the greatest common factor from {expression}."
answer: factored
solution:
  - "Find the GCF of {first_coef} and {second_coef}"
  - "Both {first_coef} and {second_coef} are divisible by {gcf}"
  - "Factor out {gcf}: {equation(expression, factored)}"