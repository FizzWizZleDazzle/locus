topic: algebra1/factoring_gcf
difficulty: hard
calculator: none
variables:
  g: integer(2, 12)
  a: integer(2, 8)
  b: integer(2, 8)
  c: integer(2, 8)
  coef1: g * a
  coef2: g * b
  coef3: g * c
  expr: coef1 * x^2 + coef2 * x * y + coef3 * y^2
  factored_inner: a * x^2 + b * x * y + c * y^2
  answer: g
constraints:
  - a != b
  - b != c
  - mod(a + b + c, 2) == 1
question: "Find the greatest common factor of all terms in {expr}"
answer: answer
solution:
  - "Identify the coefficients: {coef1}, {coef2}, and {coef3}"
  - "Find the GCF of {coef1}, {coef2}, and {coef3}"
  - "Factor {coef1} = {g} × {a}"
  - "Factor {coef2} = {g} × {b}"
  - "Factor {coef3} = {g} × {c}"
  - "The GCF is {g}"
  - "Check: {expr} = {g}({factored_inner})"