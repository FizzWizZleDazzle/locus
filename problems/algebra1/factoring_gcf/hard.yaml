topic: algebra1/factoring_gcf
difficulty: hard
calculator: none
variables:
  g: integer(2, 12)
  a: integer(2, 8)
  b: integer(2, 8)
  c: integer(2, 8)
  coef1: g * a
  coef2: g * b
  coef3: g * c
  expr: coef1 * x^2 + coef2 * x * y + coef3 * y^2
  factored_inside: a * x^2 + b * x * y + c * y^2
  answer: g * (factored_inside)
constraints:
  - gcd(gcd(a, b), c) == 1
  - a != b
  - b != c
question: "Factor out the greatest common factor from {expr}"
answer: answer
solution:
  - "Find the GCF of the coefficients {coef1}, {coef2}, and {coef3}"
  - "The GCF is {g}"
  - "Factor out {g}: {equation(expr, answer)}"
  - "Verify: {g} × {factored_inside} = {expr}"