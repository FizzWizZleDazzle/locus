topic: algebra1/factoring_gcf
difficulty: easy
calculator: none
variables:
  gcf: integer(2, 6)
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  coef1: gcf * a
  coef2: gcf * b
  coef3: gcf * c
  expression: coef1*x^2 + coef2*x + coef3
  factored_inner: a*x^2 + b*x + c
  answer: gcf * factored_inner
constraints:
  - a != b
  - b != c
question: "Factor out the greatest common factor from {expression}"
answer: answer
solution:
  - "Find the GCF of the coefficients {coef1}, {coef2}, and {coef3}"
  - "The GCF is {gcf}"
  - "Factor out {gcf}: {equation(expression, answer)}"