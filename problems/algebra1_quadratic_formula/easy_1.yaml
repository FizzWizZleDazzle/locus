topic: algebra1/quadratic_formula
difficulty: easy
calculator: none
variables:
  r1: integer(-5, 5)
  r2: integer(-5, 5)
  a: integer(1, 3)
  f: a * (x - r1) * (x - r2)
  expanded: expand(f)
  roots: solve(expanded, x)
constraints:
  - r1 != r2
  - abs(r1 - r2) >= 2
question: "Solve the equation {equation(expanded, 0)} for x."
answer: roots
answer_type: set
solution:
  - "We have the quadratic equation {equation(expanded, 0)}"
  - "Using the quadratic formula with a = {a}, we can find the roots"
  - "The factored form is {equation(f, 0)}"
  - "Setting each factor to zero: x - {r1} = 0 or x - {r2} = 0"
  - "Therefore x = {r1} or x = {r2}"