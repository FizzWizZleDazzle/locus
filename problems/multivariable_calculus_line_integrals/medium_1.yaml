topic: multivariable_calculus/line_integrals
difficulty: medium
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  d: integer(1, 4)
  F_x: a * x + b * y
  F_y: c * x - d * y
  t_start: 0
  t_end: 1
  x_t: 2 * t
  y_t: 3 * t
  dx_dt: derivative(x_t, t)
  dy_dt: derivative(y_t, t)
  F_x_param: evaluate(F_x, x, x_t)
  F_x_param_y: evaluate(F_x_param, y, y_t)
  F_y_param: evaluate(F_y, x, x_t)
  F_y_param_y: evaluate(F_y_param, y, y_t)
  integrand: F_x_param_y * dx_dt + F_y_param_y * dy_dt
  integrand_simplified: simplify(integrand)
  answer: integral(integrand_simplified, t)
  final_answer: evaluate(answer, t, t_end) - evaluate(answer, t, t_start)
constraints:
  - a != c
  - b != d
question: "Evaluate the line integral {integral_of(F_x dx + F_y dy, C)} where F = ({F_x}, {F_y}) and C is the line segment from (0, 0) to (2, 3)."
answer: final_answer
solution:
  - "Parameterize the line segment: x = {x_t}, y = {y_t} for t in [0, 1]"
  - "Compute derivatives: dx/dt = {dx_dt}, dy/dt = {dy_dt}"
  - "Substitute into F: F(x(t), y(t)) = ({F_x_param_y}, {F_y_param_y})"
  - "The line integral becomes: {integral_of(integrand_simplified, t)} from 0 to 1"
  - "Integrate: {answer}"
  - "Evaluate: {final_answer}"