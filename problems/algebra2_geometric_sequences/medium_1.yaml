topic: algebra2/geometric_sequences
difficulty: medium
calculator: scientific
variables:
  a1: choice(2, 3, 4, 5, 6, 8, 9, 10, 12)
  r: choice(2, 3, 4, 5, 1/2, 1/3, 1/4, 1/5)
  n: integer(4, 7)
  an: a1 * r^(n-1)
  sum_n: a1 * (r^n - 1) / (r - 1)
  simplified_sum: simplify(sum_n)
constraints:
  - r != 1
question: "A geometric sequence has first term {a1} and common ratio {r}. Find the sum of the first {n} terms."
answer: simplified_sum
solution:
  - "For a geometric sequence with first term a₁ = {a1} and common ratio r = {r}:"
  - "The sum of the first n terms is S_n = a₁(rⁿ - 1)/(r - 1)"
  - "Substituting n = {n}:"
  - "S_{n} = {a1} × ({r}^{n} - 1) / ({r} - 1)"
  - "S_{n} = {a1} × ({r^n} - 1) / ({r - 1})"
  - "S_{n} = {simplified_sum}"