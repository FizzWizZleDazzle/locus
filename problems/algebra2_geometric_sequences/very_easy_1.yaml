topic: algebra2/geometric_sequences
difficulty: very_easy
calculator: none
variables:
  a1: integer(1, 10)
  r: choice(2, 3, 4, 5)
  n: integer(3, 5)
  term: a1 * r^(n-1)
question: "A geometric sequence has first term {a1} and common ratio {r}. Find the {n}th term."
answer: term
solution:
  - "The formula for the nth term of a geometric sequence is a_n = a_1 * r^(n-1)"
  - "Here, a_1 = {a1}, r = {r}, and n = {n}"
  - "So a_{n} = {a1} * {r}^({n}-1)"
  - "= {a1} * {r}^{evaluate(n-1, n, n)}"
  - "= {a1} * {evaluate(r^(n-1), r, r)}"
  - "= {term}"