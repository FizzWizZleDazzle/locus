topic: arithmetic/percentages
difficulty: very_hard
calculator: none
variables:
  original: choice(125, 250, 375, 625, 875)
  first_percent: choice(20, 25, 40, 50, 80)
  second_percent: choice(20, 25, 40, 50, 80)
  third_percent: choice(20, 25, 40, 50, 80)
  after_first: original * (100 + first_percent) / 100
  after_second: after_first * (100 - second_percent) / 100
  final: after_second * (100 + third_percent) / 100
  net_change: final - original
  net_percent: (final - original) * 100 / original
  answer: net_percent
constraints:
  - first_percent != second_percent
  - second_percent != third_percent
  - abs(net_percent) >= 5
question: "A stock starts at ${original}. It increases by {first_percent}%, then decreases by {second_percent}%, then increases by {third_percent}%. What is the overall percentage change from the original price?"
answer: answer
solution:
  - "Start: ${original}"
  - "After {first_percent}% increase: ${original} × {100 + first_percent}/100 = ${after_first}"
  - "After {second_percent}% decrease: ${after_first} × {100 - second_percent}/100 = ${after_second}"
  - "After {third_percent}% increase: ${after_second} × {100 + third_percent}/100 = ${final}"
  - "Net change: ${final} - ${original} = ${net_change}"
  - "Percentage change: {net_change}/{original} × 100% = {answer}%"