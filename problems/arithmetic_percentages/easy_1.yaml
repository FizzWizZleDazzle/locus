topic: arithmetic/percentages
difficulty: easy
calculator: none
variables:
  original: choice(20, 25, 40, 50, 80, 100, 200, 250)
  percent: choice(10, 20, 25, 50)
  increase: original * percent / 100
  answer: original + increase
question: "A store item costs ${original}. If the price increases by {percent}%, what is the new price?"
answer: answer
solution:
  - "Calculate the increase: {percent}% of ${original}"
  - "Increase = {original} × {percent}/100 = ${increase}"
  - "New price = ${original} + ${increase} = ${answer}"