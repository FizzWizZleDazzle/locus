topic: calculus/implicit_differentiation
difficulty: medium
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  equation: x^2 + a*x*y + b*y^2 = c
  # Implicit differentiation: 2x + a*y + a*x*dy/dx + 2*b*y*dy/dx = 0
  # Solving for dy/dx: dy/dx = -(2x + a*y)/(a*x + 2*b*y)
  x0: integer(1, 3)
  y0: integer(1, 3)
  # At point (x0, y0): dy/dx = -(2*x0 + a*y0)/(a*x0 + 2*b*y0)
  numerator: -(2*x0 + a*y0)
  denominator: a*x0 + 2*b*y0
  answer: numerator/denominator
constraints:
  - x0^2 + a*x0*y0 + b*y0^2 == c  # Point must be on the curve
  - denominator != 0  # Avoid division by zero
question: "Find {derivative_of(y, x)} at the point ({x0}, {y0}) if {equation(equation, c)}."
answer: answer
solution:
  - "Differentiate both sides with respect to x: 2x + a*y + a*x*{derivative_of(y, x)} + 2*b*y*{derivative_of(y, x)} = 0"
  - "Factor out {derivative_of(y, x)}: 2x + a*y + (a*x + 2*b*y)*{derivative_of(y, x)} = 0"
  - "Solve for {derivative_of(y, x)}: {derivative_of(y, x)} = -(2x + a*y)/(a*x + 2*b*y)"
  - "At ({x0}, {y0}): {derivative_of(y, x)} = -(2*{x0} + {a}*{y0})/({a}*{x0} + 2*{b}*{y0})"
  - "{derivative_of(y, x)} = {numerator}/{denominator} = {answer}"