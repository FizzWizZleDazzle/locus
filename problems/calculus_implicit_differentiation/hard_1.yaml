topic: calculus/implicit_differentiation
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  d: integer(2, 5)
  f: a*x^3 + b*x*y^2 - c*y^3
  constant: d*a
  x0: integer(1, 3)
  y0: integer(1, 3)
  f_at_point: evaluate(f, x, x0, y, y0)
  dx_term: 3*a*x0^2 + b*y0^2
  dy_term: 2*b*x0*y0 - 3*c*y0^2
  answer: -dx_term / dy_term
constraints:
  - dy_term != 0
  - f_at_point == constant
  - gcd(abs(dx_term), abs(dy_term)) == 1
question: "Find dy/dx at the point ({x0}, {y0}) if {equation(f, constant)}."
answer: answer
solution:
  - "Given: {equation(f, constant)}"
  - "Differentiate both sides with respect to x:"
  - "3ax^2 + by^2 + 2bxy(dy/dx) - 3cy^2(dy/dx) = 0"
  - "At ({x0}, {y0}): {dx_term} + {dy_term}(dy/dx) = 0"
  - "Solve for dy/dx: dy/dx = {answer}"