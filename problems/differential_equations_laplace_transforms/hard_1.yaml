topic: differential_equations/laplace_transforms
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(1, 3)
  f: c * exp(a * t) * cos(b * t)
  laplace_f: c * (s - a) / ((s - a)^2 + b^2)
  partial_1: c / (2 * b) * 1 / (s - a - b * i)
  partial_2: c / (2 * b) * 1 / (s - a + b * i)
  answer: simplify(laplace_f)
constraints:
  - a != b
  - a > b
question: "Find the Laplace transform of {f}. Express your answer as a single rational function."
answer: answer
solution:
  - "We need to find L[{f}]"
  - "Using the shifting theorem: L[e^(at)g(t)] = G(s-a)"
  - "First find L[cos(bt)] = s/(s^2 + b^2)"
  - "Apply shifting: L[e^({a}t)cos({b}t)] = (s-{a})/((s-{a})^2 + {b}^2)"
  - "Multiply by constant {c}: L[{f}] = {c} * (s-{a})/((s-{a})^2 + {b}^2)"
  - "Expanding the denominator: (s-{a})^2 + {b}^2 = s^2 - {evaluate(2*a, a, a)}s + {evaluate(a^2 + b^2, a, a)}"
  - "Therefore: L[{f}] = {answer}"