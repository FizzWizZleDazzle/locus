topic: differential_equations/laplace_transforms
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 3)
  d: integer(1, 3)
  f: c * exp(a * t) * sin(b * t) + d * exp(a * t) * cos(b * t)
  s_shift: s - a
  denominator: s_shift^2 + b^2
  F_numerator: c * b + d * s_shift
  F: F_numerator / denominator
  answer: simplify(F)
constraints:
  - a != b
  - c != d
question: "Find the Laplace transform of {f}."
answer: answer
solution:
  - "We have f(t) = {f}"
  - "Factor out the exponential: f(t) = exp({a}t)[{c}sin({b}t) + {d}cos({b}t)]"
  - "Using the shifting theorem: L[exp(at)g(t)] = G(s-a)"
  - "First find L[{c}sin({b}t) + {d}cos({b}t)]"
  - "L[sin({b}t)] = {b}/(s^2 + {b}^2) and L[cos({b}t)] = s/(s^2 + {b}^2)"
  - "So L[{c}sin({b}t) + {d}cos({b}t)] = ({c} · {b} + {d} · s)/(s^2 + {b}^2)"
  - "Now shift by {a}: replace s with (s - {a})"
  - "L[f(t)] = ({F_numerator})/({denominator})"
  - "Therefore L[f(t)] = {answer}"