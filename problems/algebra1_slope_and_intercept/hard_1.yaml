topic: algebra1/slope_and_intercept
difficulty: hard
calculator: none
variables:
  x1: integer(-8, -1)
  x2: integer(1, 8)
  m: choice(-3, -2, -1, 1, 2, 3)
  b: integer(-5, 5)
  y1: m * x1 + b
  y2: m * x2 + b
  slope_num: y2 - y1
  slope_den: x2 - x1
  answer: m
constraints:
  - x1 != x2
  - y1 != y2
question: "A line passes through the points ({x1}, {y1}) and ({x2}, {y2}). What is the slope of this line?"
answer: answer
solution:
  - "Use the slope formula: m = (y₂ - y₁)/(x₂ - x₁)"
  - "Substitute the given points: m = ({y2} - {y1})/({x2} - {x1})"
  - "Simplify the numerator: m = {slope_num}/({x2} - {x1})"
  - "Simplify the denominator: m = {slope_num}/{slope_den}"
  - "Therefore, the slope is {answer}"