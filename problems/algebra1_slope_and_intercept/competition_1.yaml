topic: algebra1/slope_and_intercept
difficulty: competition
calculator: none
variables:
  x1: integer(-8, 8)
  y1: integer(-8, 8)
  x2: integer(-8, 8)
  y2: integer(-8, 8)
  m_num: y2 - y1
  m_den: x2 - x1
  m: m_num / m_den
  b: y1 - m * x1
  line: m * x + b
  x3: integer(-8, 8)
  y3: evaluate(line, x, x3)
  x4: integer(-8, 8)
  y4: evaluate(line, x, x4)
  perpendicular_m: -m_den / m_num
  perpendicular_b: y3 - perpendicular_m * x3
  perpendicular_line: perpendicular_m * x + perpendicular_b
  intersection_x: solve(line - perpendicular_line, x)
  intersection_y: evaluate(line, x, intersection_x)
  distance_squared: (x4 - intersection_x)^2 + (y4 - intersection_y)^2
  answer: sqrt(distance_squared)
constraints:
  - x1 != x2
  - m_num != 0
  - x3 != x4
question: "A line passes through points ({x1}, {y1}) and ({x2}, {y2}). A perpendicular line passes through ({x3}, {y3}). Find the distance from point ({x4}, {y4}) to the perpendicular line."
answer: answer
solution:
  - "Find the slope of the first line: m = {m_num}/{m_den} = {m}"
  - "The perpendicular line has slope {perpendicular_m}"
  - "Using point-slope form through ({x3}, {y3}): y - {y3} = {perpendicular_m}(x - {x3})"
  - "Simplifying: {equation(perpendicular_line, y)}"
  - "The distance from ({x4}, {y4}) to this line uses the formula d = |ax + by + c|/√(a² + b²)"
  - "Rewriting the line in standard form and applying the formula gives distance = {answer}"