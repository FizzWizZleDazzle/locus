topic: geometry/circle_theorems
difficulty: very_easy
calculator: none
variables:
  r: integer(3, 10)
  diameter: 2 * r
  area: 3.14159 * r^2
  area_rounded: round(area, 0)
question: "A circle has radius {r}. Find its diameter."
answer: diameter
solution:
  - "The diameter of a circle is twice its radius"
  - "Diameter = 2 × radius"
  - "Diameter = 2 × {r} = {diameter}"