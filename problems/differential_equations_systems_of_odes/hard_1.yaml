topic: differential_equations/systems_of_odes
difficulty: hard
calculator: none
variables:
  a: integer(-4, 4)
  b: integer(-4, 4)
  c: integer(-4, 4)
  d: integer(-4, 4)
  A: matrix(2, 2, -4, 4)
  det: a*d - b*c
  trace: a + d
  discriminant: trace^2 - 4*det
  sqrt_disc: sqrt(discriminant)
  lambda1: (trace + sqrt_disc)/2
  lambda2: (trace - sqrt_disc)/2
  v1_x: b
  v1_y: lambda1 - a
  v2_x: b
  v2_y: lambda2 - a
  c1: 2
  c2: -1
  x_gen: c1 * v1_x * exp(lambda1 * t) + c2 * v2_x * exp(lambda2 * t)
  y_gen: c1 * v1_y * exp(lambda1 * t) + c2 * v2_y * exp(lambda2 * t)
  x0: evaluate(x_gen, t, 0)
  y0: evaluate(y_gen, t, 0)
constraints:
  - det > 0
  - discriminant > 0
  - b != 0
question: "Solve the system {system(derivative_of(x, t) = a*x + b*y, derivative_of(y, t) = c*x + d*y)} with initial conditions x(0) = {x0}, y(0) = {y0}."
answer: x_gen
answer_type: expression
solution:
  - "Write the system in matrix form: {derivative_of(vec([x, y]), t)} = {matrix_of(A)}{vec([x, y])}"
  - "Find eigenvalues by solving {equation(det_of([[a - lambda, b], [c, d - lambda]]), 0)}"
  - "This gives {equation(lambda^2 - trace*lambda + det, 0)}"
  - "Using the quadratic formula: λ₁ = {lambda1}, λ₂ = {lambda2}"
  - "For λ₁ = {lambda1}, eigenvector v₁ = {vec([v1_x, v1_y])}"
  - "For λ₂ = {lambda2}, eigenvector v₂ = {vec([v2_x, v2_y])}"
  - "General solution: {vec([x, y])} = c₁{vec([v1_x, v1_y])}e^({lambda1}t) + c₂{vec([v2_x, v2_y])}e^({lambda2}t)"
  - "Apply initial conditions: {x0} = c₁({v1_x}) + c₂({v2_x}) and {y0} = c₁({v1_y}) + c₂({v2_y})"
  - "Solving this system gives c₁ = {c1}, c₂ = {c2}"
  - "Therefore x(t) = {x_gen}"