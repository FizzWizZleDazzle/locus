topic: precalculus/graphing_trig
difficulty: medium
calculator: scientific
variables:
  A: choice(1, 2, 3, 4)
  B: choice(1, 2, 3, 4)
  C: choice(0, 1, 2, 3, -1, -2, -3)
  period: 2*pi/B
  f: A*sin(B*x) + C
  max_val: A + C
  min_val: -A + C
  answer: (A, period, (min_val, max_val))
constraints:
  - A != B
  - abs(C) <= A
question: "Find the amplitude, period, and range of {f}."
answer: answer
answer_type: tuple
solution:
  - "For {f}, identify A = {A}, B = {B}, C = {C}"
  - "Amplitude = |A| = {A}"
  - "Period = 2π/B = 2π/{B} = {period}"
  - "Maximum value = A + C = {A} + {C} = {max_val}"
  - "Minimum value = -A + C = -{A} + {C} = {min_val}"
  - "Range: [{min_val}, {max_val}]"