topic: geometry/surface_area
difficulty: competition
calculator: scientific
variables:
  # Design backward: start with clean dimensions that yield integer surface area
  # Use Pythagorean triple (3,4,5) scaled up for the pyramid
  scale: choice(2, 3, 4)
  base_side: scale * 4
  half_base: base_side / 2
  # Height chosen so slant heights are integers via Pythagorean theorem
  pyramid_height: scale * 3
  # Slant height = sqrt(height^2 + half_base^2) = sqrt((3s)^2 + (2s)^2) = sqrt(9s^2 + 4s^2) = sqrt(13s^2) = s*sqrt(13)
  # Actually, let's use height that gives integer slant height
  height: scale * 5
  slant_height: sqrt(height^2 + half_base^2)
  # For a square pyramid: SA = base^2 + 4*(1/2 * base * slant_height)
  base_area: base_side^2
  lateral_area: 2 * base_side * slant_height
  total_surface_area: base_area + lateral_area
  # Add a rectangular prism attached to one face
  prism_width: base_side
  prism_depth: scale * 2
  prism_height: scale * 3
  # Prism SA excluding the face attached to pyramid
  prism_surface_area: 2 * prism_depth * prism_height + 2 * prism_width * prism_height + prism_width * prism_depth
  answer: total_surface_area + prism_surface_area
constraints:
  - slant_height == scale * sqrt(41)  # Ensures clean calculation
question: "A square pyramid has base side length {base_side} and height {height}. A rectangular prism with dimensions {prism_width} × {prism_depth} × {prism_height} is attached to one of the triangular faces of the pyramid (the entire triangular face is covered). Find the total surface area of the composite solid."
answer: answer
solution:
  - "First, find the slant height of the pyramid using the Pythagorean theorem"
  - "Half of base diagonal to apex: slant height = sqrt({height}^2 + {half_base}^2) = {slant_height}"
  - "Surface area of pyramid = base area + lateral area"
  - "Base area = {base_side}^2 = {base_area}"
  - "Lateral area = 4 × (1/2 × {base_side} × {slant_height}) = {lateral_area}"
  - "Total pyramid surface area = {total_surface_area}"
  - "Surface area of rectangular prism (excluding attached face):"
  - "2 × ({prism_depth} × {prism_height}) + 2 × ({prism_width} × {prism_height}) + {prism_width} × {prism_depth} = {prism_surface_area}"
  - "Total surface area = {total_surface_area} + {prism_surface_area} = {answer}"