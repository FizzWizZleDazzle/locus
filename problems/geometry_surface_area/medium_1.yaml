topic: geometry/surface_area
difficulty: medium
calculator: scientific
variables:
  shape: choice(1, 2, 3)
  # Box dimensions - pick from small integers that give clean surface areas
  length: choice(3, 4, 5, 6)
  width: choice(2, 3, 4, 5)
  height: choice(2, 3, 4, 6)
  # Cylinder - use values that make 2πr factor out nicely
  radius: choice(2, 3, 4, 5)
  cyl_height: choice(5, 6, 8, 10)
  # Surface area formulas
  box_area: 2 * (length * width + length * height + width * height)
  cylinder_area: 2 * 3.14159 * radius * (radius + cyl_height)
  sphere_area: 4 * 3.14159 * radius^2
  answer: choice(box_area, cylinder_area, sphere_area)
constraints:
  - shape == 1 implies answer == box_area
  - shape == 2 implies answer == cylinder_area
  - shape == 3 implies answer == sphere_area
question: "A {choice('rectangular box', 'cylinder', 'sphere')} has dimensions: {choice('length ' + str(length) + ' cm, width ' + str(width) + ' cm, height ' + str(height) + ' cm', 'radius ' + str(radius) + ' cm, height ' + str(cyl_height) + ' cm', 'radius ' + str(radius) + ' cm')}. Find its surface area. Round to the nearest whole number."
answer: answer
solution:
  - "For a {choice('rectangular box', 'cylinder', 'sphere')}:"
  - "{choice('Surface area = 2(lw + lh + wh)', 'Surface area = 2πr(r + h)', 'Surface area = 4πr²')}"
  - "{choice('= 2(' + str(length) + '×' + str(width) + ' + ' + str(length) + '×' + str(height) + ' + ' + str(width) + '×' + str(height) + ')', '= 2π×' + str(radius) + '×(' + str(radius) + ' + ' + str(cyl_height) + ')', '= 4π×' + str(radius) + '²')}"
  - "= {answer} cm²"