topic: linear_algebra/matrix_arithmetic
difficulty: medium
calculator: none
variables:
  A: matrix(2, 2, -5, 5)
  B: matrix(2, 2, -5, 5)
  k: nonzero(-4, 4)
  C: k * A - B
  answer: C
constraints:
  - det(A) != 0
  - det(B) != 0
  - abs(det(C)) <= 50
question: "Let A = {matrix_of(A)} and B = {matrix_of(B)}. Calculate {k}A - B."
answer: answer
answer_type: matrix
solution:
  - "First compute {k}A by multiplying each entry of A by {k}:"
  - "{k}A = {matrix_of(k * A)}"
  - "Now subtract B from {k}A:"
  - "{k}A - B = {matrix_of(k * A)} - {matrix_of(B)}"
  - "= {matrix_of(C)}"