topic: linear_algebra/matrix_arithmetic
difficulty: very_easy
calculator: none
variables:
  A: matrix(2, 2, -3, 3)
  B: matrix(2, 2, -3, 3)
  answer: A + B
constraints:
  - abs(det(A)) > 0
  - abs(det(B)) > 0
question: "Find {matrix_of(A)} + {matrix_of(B)}"
answer: answer
answer_type: matrix
solution:
  - "Add corresponding entries of the matrices"
  - "Top row: ({A[0,0]}) + ({B[0,0]}) = {answer[0,0]}, ({A[0,1]}) + ({B[0,1]}) = {answer[0,1]}"
  - "Bottom row: ({A[1,0]}) + ({B[1,0]}) = {answer[1,0]}, ({A[1,1]}) + ({B[1,1]}) = {answer[1,1]}"
  - "Result: {matrix_of(answer)}"