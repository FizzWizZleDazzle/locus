topic: arithmetic/order_of_operations
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(3, 7)
  c: integer(2, 4)
  d: integer(2, 5)
  e: integer(1, 3)
  f: integer(4, 8)
  term1: a * b^2
  term2: c * d
  term3: e * f
  numerator: term1 - term2
  answer: numerator / term3
constraints:
  - mod(numerator, term3) == 0
  - b != c
  - numerator > 0
question: "Evaluate: {a} × {b}² - {c} × {d} ÷ ({e} × {f})"
answer: answer
solution:
  - "First, calculate the exponent: {b}² = {b^2}"
  - "Next, perform multiplications from left to right:"
  - "  • {a} × {b^2} = {term1}"
  - "  • {c} × {d} = {term2}"
  - "  • {e} × {f} = {term3}"
  - "Now we have: {term1} - {term2} ÷ {term3}"
  - "Division has higher precedence than subtraction:"
  - "  • {term2} ÷ {term3} = {term2/term3}"
  - "Finally: {term1} - {term2/term3} = {answer}"