topic: precalculus/inverse_functions
difficulty: very_hard
calculator: scientific
variables:
  a: nonzero(-5, 5)
  b: nonzero(-8, 8)
  c: nonzero(-8, 8)
  d: nonzero(-5, 5)
  f: (a*x + b)/(c*x + d)
  det: a*d - b*c
  f_inv: (d*x - b)/(-c*x + a)
  x0: integer(-10, 10)
  y0: evaluate(f, x, x0)
  x1: evaluate(f_inv, x, y0)
  comp1: evaluate(f, x, evaluate(f_inv, x, 3))
  comp2: evaluate(f_inv, x, evaluate(f, x, -2))
constraints:
  - det != 0
  - c*x0 + d != 0
  - abs(det) > 2
question: "Let f(x) = {f}. Find the inverse function f^(-1)(x) and verify that {equation(f_inv, f^(-1)(x))} is correct by showing that (f ∘ f^(-1))(3) = 3 and (f^(-1) ∘ f)(-2) = -2."
answer: f_inv
solution:
  - "To find the inverse of f(x) = {f}, set y = {f}"
  - "Solve for x: y({c}x + {d}) = {a}x + {b}"
  - "Expand: {c}xy + {d}y = {a}x + {b}"
  - "Collect x terms: {c}xy - {a}x = {b} - {d}y"
  - "Factor: x({c}y - {a}) = {b} - {d}y"
  - "Therefore: x = ({b} - {d}y)/({c}y - {a})"
  - "Swap x and y: f^(-1)(x) = ({b} - {d}x)/({c}x - {a}) = {f_inv}"
  - "Verify: (f ∘ f^(-1))(3) = f(f^(-1)(3)) = f({evaluate(f_inv, x, 3)}) = {comp1} = 3 ✓"
  - "And: (f^(-1) ∘ f)(-2) = f^(-1)(f(-2)) = f^(-1)({evaluate(f, x, -2)}) = {comp2} = -2 ✓"