topic: precalculus/inverse_functions
difficulty: very_easy
calculator: none
variables:
  m: nonzero(-5, 5)
  b: integer(-8, 8)
  f: m * x + b
  y_val: integer(-10, 10)
  x_val: (y_val - b) / m
  answer: x_val
constraints:
  - abs(m) > 1
  - mod(y_val - b, m) == 0
question: "If f(x) = {f}, find the value of x such that f(x) = {y_val}."
answer: answer
solution:
  - "We need to solve f(x) = {y_val}"
  - "Substitute: {equation(f, y_val)}"
  - "Subtract {b} from both sides: {m}x = {y_val} - {b}"
  - "Divide by {m}: x = {answer}"