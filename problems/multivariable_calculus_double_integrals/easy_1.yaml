topic: multivariable_calculus/double_integrals
difficulty: easy
calculator: none
variables:
  a: integer(1, 4)
  b: integer(1, 4)
  c: integer(0, 3)
  d: integer(0, 3)
  k: integer(2, 6)
  f: k * x * y
  inner_result: evaluate(integral(f, y), y, d) - evaluate(integral(f, y), y, c)
  answer: evaluate(integral(inner_result, x), x, b) - evaluate(integral(inner_result, x), x, a)
constraints:
  - a < b
  - c < d
question: "Evaluate the double integral {definite_integral_of(definite_integral_of(f, y, c, d), x, a, b)}"
answer: answer
solution:
  - "First integrate with respect to y: {definite_integral_of(f, y, c, d)}"
  - "The antiderivative of {f} with respect to y is {k}xy²/2"
  - "Evaluating from y = {c} to y = {d}: {k}x({d}²/2 - {c}²/2) = {inner_result}"
  - "Now integrate with respect to x: {definite_integral_of(inner_result, x, a, b)}"
  - "The result is {answer}"