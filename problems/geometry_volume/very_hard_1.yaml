topic: geometry/volume
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: pick dimensions that create a clean relationship
  r_outer: integer(5, 10)
  thickness: integer(1, 3)
  r_inner: r_outer - thickness
  h: integer(8, 15)
  
  # Volume of hollow cylinder = π(R² - r²)h
  outer_area: r_outer^2
  inner_area: r_inner^2
  area_diff: outer_area - inner_area
  volume_exact: area_diff * h * pi
  
  # For display: show the exact symbolic form
  volume_symbolic: area_diff * h
  
  # Additional complexity: material cost calculation
  density: choice(2.7, 7.8, 8.9)  # aluminum, steel, copper g/cm³
  cost_per_kg: choice(3, 5, 8)
  
  # Convert volume to mass (cm³ to kg needs /1000)
  mass_grams: volume_exact * density
  mass_kg: mass_grams / 1000
  total_cost: mass_kg * cost_per_kg
  
  answer: volume_symbolic
constraints:
  - r_inner > 0
  - thickness < r_outer / 2
question: "A hollow cylindrical pipe has outer radius {r_outer} cm, inner radius {r_inner} cm, and height {h} cm. Find the volume of material used to make the pipe in terms of π."
answer: answer
solution:
  - "Volume of hollow cylinder = Volume of outer cylinder - Volume of inner cylinder"
  - "Volume = π(R² - r²)h where R is outer radius, r is inner radius"
  - "R² = {r_outer}² = {outer_area}"
  - "r² = {r_inner}² = {inner_area}"
  - "R² - r² = {outer_area} - {inner_area} = {area_diff}"
  - "Volume = π × {area_diff} × {h} = {answer}π cm³"