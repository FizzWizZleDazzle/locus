topic: geometry/volume
difficulty: very_easy
calculator: none
variables:
  length: integer(2, 8)
  width: integer(2, 8)
  height: integer(2, 8)
  volume: length * width * height
constraints:
  - volume <= 100
question: "Find the volume of a rectangular box with length {length} units, width {width} units, and height {height} units."
answer: volume
solution:
  - "Volume of a rectangular box = length × width × height"
  - "Volume = {length} × {width} × {height}"
  - "Volume = {volume} cubic units"