topic: algebra2/logarithmic_equations
difficulty: hard
calculator: scientific
variables:
  k: integer(2, 5)
  m: integer(2, 4)
  base: choice(2, 3, 5)
  power: k * m
  c: base^k
  d: base^m
  answer: power
constraints:
  - k != m
question: "Solve for x: {equation(log(c * x, base) + log(d, base), log(x^2, base))}"
answer: answer
solution:
  - "Start with {equation(log(c * x, base) + log(d, base), log(x^2, base))}"
  - "Use logarithm property: {equation(log(c * x * d, base), log(x^2, base))}"
  - "Since {c} = {base}^{k} and {d} = {base}^{m}, we have {equation(log(base^k * x * base^m, base), log(x^2, base))}"
  - "Simplify: {equation(log(base^(k + m) * x, base), log(x^2, base))}"
  - "This gives us: {equation(k + m + log(x, base), 2 * log(x, base))}"
  - "Rearranging: {equation(k + m, log(x, base))}"
  - "Since k = {k} and m = {m}, we have {equation(power, log(x, base))}"
  - "Therefore: x = {base}^{power}"
  - "Check: x = {answer}"