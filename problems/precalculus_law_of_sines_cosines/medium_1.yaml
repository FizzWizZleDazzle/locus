topic: precalculus/law_of_sines_cosines
difficulty: medium
calculator: scientific
variables:
  # Design backward: pick angles that give clean sine/cosine values
  A: choice(30, 45, 60)
  B: choice(30, 45, 60)
  C: 180 - A - B
  # Pick a clean side length
  a: integer(5, 12)
  # Use law of sines to find b (will be clean due to angle choices)
  b: a * sin(B * pi / 180) / sin(A * pi / 180)
  b_rounded: round(b, 2)
  # Use law of sines to find c
  c: a * sin(C * pi / 180) / sin(A * pi / 180)
  answer: round(c, 2)
constraints:
  - A != B  # Different angles for variety
  - C > 0   # Valid triangle
  - C != 90 # Avoid right triangle (too simple)
question: "In triangle ABC, angle A = {A}°, angle B = {B}°, and side a = {a}. Find the length of side c."
answer: answer
solution:
  - "First, find angle C: C = 180° - {A}° - {B}° = {C}°"
  - "Apply the Law of Sines: {equation('a/sin(A)', 'c/sin(C)')}"
  - "Substitute known values: {equation(a + '/sin(' + A + '°)', 'c/sin(' + C + '°)')}"
  - "Solve for c: c = {a} × sin({C}°) / sin({A}°)"
  - "Calculate: c = {answer}"