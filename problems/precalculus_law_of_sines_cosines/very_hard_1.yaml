topic: precalculus/law_of_sines_cosines
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: pick angles that give clean sine/cosine values
  A: choice(30, 45, 60, 120, 135)
  B: choice(30, 45, 60, 120, 135)
  C: 180 - A - B
  # Pick a clean side length
  a: integer(5, 15)
  # Use law of sines to get other sides
  b: a * sin(B * pi / 180) / sin(A * pi / 180)
  c: a * sin(C * pi / 180) / sin(A * pi / 180)
  # Now use law of cosines to verify: c² = a² + b² - 2ab*cos(C)
  lhs: c^2
  rhs: a^2 + b^2 - 2*a*b*cos(C * pi / 180)
  # Round to handle floating point
  verification: round(lhs - rhs, 6)
  answer: round(c, 2)
constraints:
  - C > 0
  - C < 180
  - abs(verification) < 0.001
question: "In triangle ABC, angle A = {A}°, angle B = {B}°, and side a = {a}. Find the length of side c."
answer: answer
solution:
  - "First find angle C: C = 180° - {A}° - {B}° = {C}°"
  - "Apply the Law of Sines: {equation('a/sin(A)', 'c/sin(C)')}"
  - "Substitute: {equation(a + '/sin(' + A + '°)', 'c/sin(' + C + '°)')}"
  - "Solve for c: c = {a} × sin({C}°) / sin({A}°)"
  - "c = {a} × {round(sin(C * pi / 180), 4)} / {round(sin(A * pi / 180), 4)}"
  - "c = {answer}"