topic: linear_algebra/vector_spaces
difficulty: medium
calculator: scientific
variables:
  v1: matrix(3, 1, -5, 5)
  v2: matrix(3, 1, -5, 5)
  v3: matrix(3, 1, -5, 5)
  M: matrix(3, 3, -5, 5)
  det_value: det(M)
  answer: choice("linearly independent", "linearly dependent")
constraints:
  - abs(det_value) > 0.1 if answer == "linearly independent" else abs(det_value) < 0.1
question: "Determine whether the vectors {vec(v1)}, {vec(v2)}, and {vec(v3)} are linearly independent or linearly dependent."
answer: answer
solution:
  - "To check linear independence, we form a matrix with the vectors as columns: {matrix_of(M)}"
  - "Calculate the determinant: {det_of(M)} = {det_value}"
  - "Since the determinant is {'non-zero' if answer == 'linearly independent' else 'zero'}, the vectors are {answer}"
  - "{'The vectors span a 3-dimensional subspace of R³' if answer == 'linearly independent' else 'The vectors lie in a plane or line in R³'}"