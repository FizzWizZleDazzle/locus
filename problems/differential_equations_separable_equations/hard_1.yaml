topic: differential_equations/separable_equations
difficulty: hard
calculator: none
variables:
  k: nonzero(-4, 4)
  c: integer(1, 5)
  n: integer(2, 4)
  initial_y: integer(1, 3)
  f: k * x^n
  g: c * y
  rhs: f / g
  separated_lhs: c * y
  separated_rhs: k * x^n
  integrated_lhs: (c * y^2) / 2
  integrated_rhs: (k * x^(n+1)) / (n+1)
  general_solution: y^2 = (2*k*x^(n+1))/(c*(n+1)) + C
  C_value: initial_y^2 - (2*k)/(c*(n+1))
  answer: sqrt((2*k*x^(n+1))/(c*(n+1)) + C_value)
constraints:
  - k > 0
  - mod(2*k, c*(n+1)) == 0
question: "Solve the differential equation {equation(derivative_of(y, x), rhs)} with initial condition y(1) = {initial_y}."
answer: answer
solution:
  - "Start with {equation(derivative_of(y, x), rhs)}"
  - "Separate variables: {equation(separated_lhs * derivative_of(y, x), separated_rhs)}"
  - "Integrate both sides: {equation(integral_of(separated_lhs, y), integral_of(separated_rhs, x))}"
  - "This gives: {equation(integrated_lhs, integrated_rhs + C)}"
  - "Simplify: {general_solution}"
  - "Apply initial condition y(1) = {initial_y}:"
  - "Substitute x = 1, y = {initial_y} to find C = {C_value}"
  - "Therefore: y = {answer}"