topic: geometry/right_triangle_trig
difficulty: very_hard
calculator: scientific
variables:
  # Use Pythagorean triple (5,12,13) scaled by factor k
  k: choice(2, 3, 4)
  a: 5 * k
  b: 12 * k
  c: 13 * k
  # Pick which sides are given based on scenario
  scenario: choice(1, 2, 3)
  # Angle theta opposite to side a
  sin_theta: a / c
  cos_theta: b / c
  tan_theta: a / b
  # Second angle phi (complementary)
  sin_phi: b / c
  cos_phi: a / c
  tan_phi: b / a
  # Expression to evaluate
  numerator: sin_theta * cos_phi + cos_theta * sin_phi
  denominator: 1 - tan_theta * tan_phi
  answer: simplify(numerator / denominator)
constraints:
  - k > 1
question: "In a right triangle with hypotenuse {c} and legs {a} and {b}, let θ be the angle opposite the side of length {a}, and φ be the angle opposite the side of length {b}. Evaluate: {equation(sin(θ)cos(φ) + cos(θ)sin(φ), 1 - tan(θ)tan(φ))}"
answer: answer
solution:
  - "Given: right triangle with sides {a}, {b}, and hypotenuse {c}"
  - "Since θ is opposite to side {a}: sin(θ) = {a}/{c} = {sin_theta}, cos(θ) = {b}/{c} = {cos_theta}, tan(θ) = {a}/{b} = {tan_theta}"
  - "Since φ is opposite to side {b}: sin(φ) = {b}/{c} = {sin_phi}, cos(φ) = {a}/{c} = {cos_phi}, tan(φ) = {b}/{a} = {tan_phi}"
  - "Numerator: sin(θ)cos(φ) + cos(θ)sin(φ) = ({sin_theta})({cos_phi}) + ({cos_theta})({sin_phi}) = {numerator}"
  - "Denominator: 1 - tan(θ)tan(φ) = 1 - ({tan_theta})({tan_phi}) = {denominator}"
  - "Therefore: {equation(numerator, denominator)} = {answer}"