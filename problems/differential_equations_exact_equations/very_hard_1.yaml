topic: differential_equations/exact_equations
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  M: a*x^2*y + b*x*y^2
  N: a*x^2*y + c*x*y^2
  M_y: derivative(M, y)
  N_x: derivative(N, x)
  F: integral(M, x)
  g_prime: N - derivative(F, y)
  g: integral(g_prime, y)
  solution: F + g
  answer: simplify(solution)
constraints:
  - a != b
  - a != c
  - b != c
question: "Solve the exact differential equation {equation(M*dx + N*dy, 0)}"
answer: answer
answer_type: expression
solution:
  - "Check exactness: {derivative_of(M, y)} = {M_y} and {derivative_of(N, x)} = {N_x}"
  - "Since {M_y} = {N_x}, the equation is exact"
  - "Find F such that {derivative_of(F, x)} = {M}: F = {integral_of(M, x)} = {F}"
  - "Now {derivative_of(F, y)} = {derivative(F, y)}"
  - "We need {derivative_of(F, y)} + {derivative_of(g(y), y)} = {N}"
  - "So {derivative_of(g(y), y)} = {N} - {derivative(F, y)} = {g_prime}"
  - "Thus g(y) = {integral_of(g_prime, y)} = {g}"
  - "The solution is F(x,y) + g(y) = C: {equation(answer, C)}"