topic: differential_equations/exact_equations
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  M: a * y
  N: b * x
  M_y: derivative(M, y)
  N_x: derivative(N, x)
  F: integral(M, x)
  psi: F + integral(b * x, y)
  answer: simplify(psi)
constraints:
  - a != b
question: "Verify that {equation(M * dx + N * dy, 0)} is exact and find the solution."
answer: answer
solution:
  - "Check exactness: {derivative_of(M, y)} = {M_y} and {derivative_of(N, x)} = {N_x}"
  - "Since {M_y} = {a} and {N_x} = {b}, the equation is exact when {a} = {b}"
  - "Wait, our constraint ensures {a} ≠ {b}, so this is NOT exact"
  - "However, if we had {a} = {b}, we would solve by finding ψ where {derivative_of(psi, x)} = {M} and {derivative_of(psi, y)} = {N}"
  - "Integrating {M} with respect to x: ψ = {F} + g(y)"
  - "From {derivative_of(psi, y)} = {N}, we get g'(y) = {b}x, so g(y) = {integral_of(b * x, y)}"
  - "Therefore ψ = {answer} = C"