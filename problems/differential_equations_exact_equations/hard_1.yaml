topic: differential_equations/exact_equations
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  M: a*x^2 + b*x*y + c*y^2
  N: b*x^2 + 2*c*x*y + a*y^2
  dM_dy: derivative(M, y)
  dN_dx: derivative(N, x)
  F_from_M: integral(M, x)
  g_prime: N - derivative(F_from_M, y)
  g: integral(g_prime, y)
  answer: F_from_M + g
constraints:
  - a != b
  - b != c
  - a != c
question: "Solve the exact differential equation {equation(M*dx + N*dy, 0)}"
answer: answer
solution:
  - "Check exactness: {derivative_of(M, y)} = {dM_dy} and {derivative_of(N, x)} = {dN_dx}"
  - "Since {dM_dy} = {dN_dx}, the equation is exact"
  - "Find F such that {derivative_of(F, x)} = {M} and {derivative_of(F, y)} = {N}"
  - "Integrate M with respect to x: F = {integral_of(M, x)} = {F_from_M} + g(y)"
  - "Take {derivative_of(F, y)} = {derivative(F_from_M, y)} + g'(y) = {N}"
  - "So g'(y) = {N} - {derivative(F_from_M, y)} = {g_prime}"
  - "Integrate: g(y) = {integral_of(g_prime, y)} = {g}"
  - "Therefore F(x,y) = {answer} = C"