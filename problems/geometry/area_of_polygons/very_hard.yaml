topic: geometry/area_of_polygons
difficulty: very_hard
calculator: scientific
variables:
  # Design a trapezoid where parallel sides and height create clean area
  # Work backwards: want area = 84, so pick factors that work nicely
  a: 15  # longer parallel side
  b: 9   # shorter parallel side  
  h: 7   # height chosen so (a+b)*h/2 = (15+9)*7/2 = 24*7/2 = 168/2 = 84
  # Now create a composite figure: trapezoid with triangular cutout
  # Triangle vertices chosen to create area = 12 (clean subtraction)
  t_base: 6
  t_height: 4
  # Derived values
  trap_area: (a + b) * h / 2
  triangle_area: t_base * t_height / 2
  answer: trap_area - triangle_area
constraints:
  - a > b
  - h > 0
  - t_base < b  # triangle fits within trapezoid
question: "A trapezoid has parallel sides of length {a} and {b}, with height {h}. A triangular region with base {t_base} and height {t_height} is cut out from inside the trapezoid. Find the area of the remaining polygon."
answer: answer
solution:
  - "First, find the area of the trapezoid using the formula A = (b₁ + b₂)h/2"
  - "Area of trapezoid = ({a} + {b}) × {h} / 2 = {trap_area}"
  - "Next, find the area of the triangular cutout: A = bh/2"
  - "Area of triangle = {t_base} × {t_height} / 2 = {triangle_area}"
  - "The remaining area is the trapezoid area minus the triangle area"
  - "Remaining area = {trap_area} - {triangle_area} = {answer}"