topic: geometry/triangle_congruence
difficulty: easy
calculator: none

variables:
  a: integer(3, 12)
  b: integer(3, 12)
  c: integer(3, 12)
  thm: SSS

constraints:
  - a != b
  - b != c

question: "Triangle ABC has sides AB = {a}, BC = {b}, and CA = {c}. Triangle DEF has sides DE = {a}, EF = {b}, and FD = {c}. Which congruence theorem proves that triangle ABC is congruent to triangle DEF?"
answer: thm
answer_type: word

solution:
  - "Identify the corresponding sides: AB = DE = {a}, BC = EF = {b}, CA = FD = {c}."
  - "All three pairs of corresponding sides are congruent."
  - "By the Side-Side-Side ({thm}) theorem, triangle ABC is congruent to triangle DEF."
