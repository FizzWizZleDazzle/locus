topic: geometry/triangle_congruence
difficulty: very_easy
calculator: none
variables:
  side1: integer(3, 8)
  side2: integer(4, 9)
  side3: integer(5, 10)
  angle: choice(30, 45, 60, 90)
constraints:
  - side1 < side2
  - side2 < side3
  - side1 + side2 > side3
question: "Two triangles have sides of length {side1}, {side2}, and {side3}. Are they congruent by SSS (Side-Side-Side)?"
answer: "Yes"
solution:
  - "SSS Congruence: If three sides of one triangle equal three sides of another triangle, the triangles are congruent."
  - "Both triangles have sides {side1}, {side2}, and {side3}."
  - "Since all three corresponding sides are equal, the triangles are congruent by SSS."
  - "Answer: Yes"