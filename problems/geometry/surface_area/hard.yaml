topic: geometry/surface_area
difficulty: hard
calculator: scientific

variables:
  r: choice(2, 3, 4, 5)
  h: choice(5, 6, 8, 10)
  r2: r*r
  lateral: 2*pi*r*h
  bases: 2*pi*r2
  answer: lateral + bases

question: "Find the total surface area of a closed cylinder with radius {r} cm and height {h} cm. Express your answer in terms of {math(pi)}."

answer: answer
answer_type: expression

solution:
  - "A closed cylinder consists of a curved lateral surface and two circular bases."
  - "The lateral surface area is {math(2*pi*r*h)} = {lateral}."
  - "Each circular base has area {math(pi*r^2)} = {pi*r2}, so two bases contribute {bases}."
  - "Total surface area: {lateral} + {bases} = {answer} square cm."
