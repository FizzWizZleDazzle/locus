topic: geometry/surface_area
difficulty: competition
calculator: scientific
variables:
  # Design a rectangular box where unfolding creates interesting relationships
  # Pick dimensions that create Pythagorean relationships when unfolded
  a: choice(3, 5, 8, 12)
  b: choice(4, 12, 15, 16)
  c: choice(5, 13, 17, 20)
  # Create a box with a square hole through one dimension
  hole_side: integer(1, 3)
  # Surface area includes exterior and interior of the hole
  exterior_area: 2*(a*b + a*c + b*c)
  hole_area: 4*hole_side*c
  removed_area: 2*hole_side*hole_side
  total_area: exterior_area + hole_area - removed_area
  # For the competition twist: diagonal distance on unfolded net
  net_diagonal: sqrt((2*a + 2*c)^2 + (b + 2*c)^2)
  answer: total_area
constraints:
  - hole_side < min(a, b)/2
  - mod(a + b + c, 5) == 0
question: "A rectangular prism with dimensions {a} × {b} × {c} has a square hole with side length {hole_side} drilled completely through its smallest face, perpendicular to that face. Find the total surface area of the resulting solid, including the interior walls of the hole."
answer: answer
solution:
  - "Original box surface area: 2({a}×{b} + {a}×{c} + {b}×{c}) = {exterior_area}"
  - "The hole goes through the {a}×{b} faces (smallest area)"
  - "Interior hole surface area: 4 walls × {hole_side} × {c} = {hole_area}"
  - "Area removed from top and bottom faces: 2 × {hole_side}² = {removed_area}"
  - "Total surface area: {exterior_area} + {hole_area} - {removed_area} = {answer}"