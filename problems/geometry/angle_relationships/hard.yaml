topic: geometry/angle_relationships
difficulty: hard
calculator: none

variables:
  x_ans: integer(8, 20)
  coeff: choice(2, 3)
  coeff2: choice(2, 3)
  adj: integer(5, 15)
  adj2: integer(5, 15)
  coeff_sum: coeff + coeff2
  p: coeff_sum * x_ans + adj + adj2
  angle_b: 180 - p
  angle_c_val: coeff * x_ans + adj
  angle_d_val: coeff2 * x_ans + adj2
  rhs_const: p - adj - adj2
  inner_const: evaluate(angle_b + adj + adj2, x, 0)

question: "Lines {math(l_1)} and {math(l_2)} are parallel. Two transversals intersect both lines, forming a triangle between the parallel lines. One interior angle of the triangle is co-interior with an exterior angle of {p} degrees (formed at the parallel line). The other two interior angles of the triangle measure {math(coeff*x + adj)} degrees and {math(coeff2*x + adj2)} degrees. Find {math(x)}."
answer: x_ans
answer_type: numeric
solution:
  - "Co-interior angles between parallel lines are supplementary, so they sum to 180 degrees."
  - "The interior angle of the triangle at that vertex = 180 - {p} = {angle_b} degrees."
  - "Apply the Triangle Angle Sum: the three interior angles must sum to 180 degrees."
  - "{angle_b} + ({math(coeff*x + adj)}) + ({math(coeff2*x + adj2)}) = 180"
  - "{math(coeff_sum*x)} + {inner_const} = 180"
  - "{math(coeff_sum*x)} = {rhs_const}"
  - "{math(x)} = {x_ans}"

diagram:
  type: coordinate_plane
  x_range: [-1, 8]
  y_range: [-1, 6]
  grid: false
  elements:
    - line: {slope: 0, intercept: 5, color: blue, label: "l_1", style: solid}
    - line: {slope: 0, intercept: 1, color: blue, label: "l_2", style: solid}
    - line: {slope: -1, intercept: 7, color: black, style: solid}
    - line: {slope: 1, intercept: -1, color: black, style: solid}
