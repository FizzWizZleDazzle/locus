topic: geometry/angle_relationships
difficulty: medium
calculator: none
variables:
  multiplier: choice(2, 3, 4)
  parts: multiplier + 1
  angle1: 180 / parts
  angle2: multiplier * angle1
  answer: angle2
question: "Two supplementary angles are in the ratio 1:{multiplier}. Find the measure of the larger angle in degrees."
answer: answer
solution:
  - "Let the smaller angle be x degrees"
  - "Then the larger angle is {multiplier}x degrees"
  - "Since they are supplementary: x + {multiplier}x = 180°"
  - "Combining terms: {multiplier + 1}x = 180°"
  - "Solving for x: x = {angle1}°"
  - "The larger angle is {multiplier} × {angle1}° = {answer}°"