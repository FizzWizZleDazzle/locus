topic: geometry/angle_relationships
difficulty: very_easy
calculator: none
variables:
  angle1: choice(30, 45, 60, 90, 120, 135, 150)
  angle2: 180 - angle1
question: "Two angles form a straight line. If one angle measures {angle1} degrees, what is the measure of the other angle?"
answer: angle2
solution:
  - "Angles on a straight line sum to 180 degrees"
  - "If one angle is {angle1} degrees, the other angle is 180 - {angle1} = {angle2} degrees"