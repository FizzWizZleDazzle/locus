topic: geometry/perimeter
difficulty: very_hard
calculator: scientific
variables:
  # Design a complex polygon by combining shapes with integer dimensions
  # Start with a rectangle with a semicircular cutout and triangular extensions
  rect_width: integer(12, 20)
  rect_height: integer(8, 15)
  # Semicircle radius must divide rect_width evenly for clean placement
  radius: integer(2, 4)
  # Triangle dimensions chosen to create Pythagorean triples
  tri_base: integer(3, 6)
  tri_height: integer(4, 8)
  # Derived measurements
  tri_hyp: sqrt(tri_base^2 + tri_height^2)
  semicircle_arc: radius * 3.14159
  # Total perimeter calculation
  top_edge: rect_width - 2*radius
  bottom_edge: rect_width
  left_edge: rect_height - tri_height
  right_edge: rect_height - tri_height  
  answer: round(top_edge + bottom_edge + 2*left_edge + 2*tri_hyp + semicircle_arc, 2)
constraints:
  - rect_width >= 4*radius  # Ensures semicircle fits properly
  - mod(tri_base^2 + tri_height^2, 1) == 0  # Ensures integer hypotenuse
question: "A complex figure consists of a {rect_width} by {rect_height} rectangle with modifications: a semicircular cutout of radius {radius} is removed from the center of the top edge, and identical right triangles with base {tri_base} and height {tri_height} extend from the middle of each vertical side. Find the perimeter of this figure. Round to 2 decimal places."
answer: answer
solution:
  - "Break down the perimeter into segments:"
  - "Top edge (with semicircle cutout): {rect_width} - 2×{radius} = {top_edge}"
  - "Semicircular arc: π×{radius} = {semicircle_arc}"
  - "Bottom edge: {bottom_edge}"
  - "Left vertical edge (reduced by triangle): {rect_height} - {tri_height} = {left_edge}"
  - "Right vertical edge (reduced by triangle): {rect_height} - {tri_height} = {right_edge}"
  - "Triangle hypotenuse: √({tri_base}² + {tri_height}²) = {tri_hyp}"
  - "Total perimeter: {top_edge} + {semicircle_arc} + {bottom_edge} + 2×{left_edge} + 2×{tri_hyp}"
  - "Perimeter = {answer}"