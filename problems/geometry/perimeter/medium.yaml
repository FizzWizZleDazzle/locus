topic: geometry/perimeter
difficulty: medium
calculator: scientific
variants:
  - name: default
    variables:
      a: integer(3, 8)
      b: integer(3, 8)
      c: integer(1, 3)
      d: integer(1, 3)
      width: a + c
      height: b + d
      answer: 2*a + 2*b + 2*c + 2*d
    constraints:
      - a > c
      - b > d
    question: An L-shaped figure has an outer width of {width} cm and an outer height of {height} cm. A rectangular notch of width {c} cm and height {d} cm is cut from the top-right corner. Find the perimeter of the L-shaped figure.
    answer: answer
    solution:
      - Label the six sides of the L-shape.
      - 'Bottom side: {width} cm'
      - 'Right side (partial height): {b} cm'
      - 'Inner horizontal step: {c} cm'
      - 'Inner vertical step: {d} cm'
      - 'Top side (partial width): {a} cm'
      - 'Left side (full height): {height} cm'
      - Perimeter = {width} + {b} + {c} + {d} + {a} + {height} = {answer} cm
    diagram:
      type: polygon
      vertices:
        - x: 0
          y: 0
        - x: width
          y: 0
        - x: width
          y: b
        - x: a
          y: b
        - x: a
          y: height
        - x: 0
          y: height
      labels:
        bottom: width
        right_partial: b
        inner_h: c
        inner_v: d
        top_partial: a
        left: height
