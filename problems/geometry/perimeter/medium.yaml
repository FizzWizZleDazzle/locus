topic: geometry/perimeter
difficulty: medium
calculator: none
variables:
  shape: choice(1, 2, 3)
  # Rectangle with integer dimensions
  rect_length: integer(5, 12)
  rect_width: integer(3, 8)
  rect_perimeter: 2 * (rect_length + rect_width)
  # Triangle with integer sides forming valid triangle
  tri_a: integer(4, 10)
  tri_b: integer(5, 11)
  tri_c: integer(6, 12)
  tri_perimeter: tri_a + tri_b + tri_c
  # Regular hexagon with integer side
  hex_side: integer(3, 8)
  hex_perimeter: 6 * hex_side
  # Select appropriate values based on shape
  side1: choice(rect_length, tri_a, hex_side)
  side2: choice(rect_width, tri_b, hex_side)
  side3: choice(rect_length, tri_c, hex_side)
  answer: choice(rect_perimeter, tri_perimeter, hex_perimeter)
constraints:
  - rect_length > rect_width
  - tri_a + tri_b > tri_c
  - tri_a + tri_c > tri_b
question: "A {choice('rectangle', 'triangle', 'regular hexagon')} has {choice('length ' + str(side1) + ' and width ' + str(side2), 'sides of length ' + str(side1) + ', ' + str(side2) + ', and ' + str(side3), 'side length ' + str(side1))}. Find its perimeter."
answer: answer
solution:
  - "{choice('Rectangle perimeter = 2(length + width)', 'Triangle perimeter = sum of all three sides', 'Regular hexagon perimeter = 6 × side length')}"
  - "{choice('P = 2(' + str(side1) + ' + ' + str(side2) + ')', 'P = ' + str(side1) + ' + ' + str(side2) + ' + ' + str(side3), 'P = 6 × ' + str(side1))}"
  - "P = {answer}"