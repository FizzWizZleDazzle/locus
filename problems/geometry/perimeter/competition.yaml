topic: geometry/perimeter
difficulty: competition
calculator: none
variables:
  # Design backwards: want perimeter 60 with integer sides
  # Use 3-4-5 triangle scaled up by factor k
  k: choice(4, 5, 6, 8)
  a: 3 * k
  b: 4 * k
  c: 5 * k
  # Create a quadrilateral by "cutting" the triangle
  # Split side c into two parts that sum to c
  cut: integer(2, 10)
  side1: cut
  side2: c - cut
  # The quadrilateral has sides: a, b, side1, side2
  perimeter: a + b + side1 + side2
constraints:
  - cut > c/4  # Ensure reasonable split
  - cut < 3*c/4
question: "A right triangle with legs {a} and {b} is cut by a line parallel to one leg, creating a quadrilateral. If the cut divides the hypotenuse into segments of length {side1} and {side2}, find the perimeter of the quadrilateral."
answer: perimeter
solution:
  - "The original triangle has legs {a} and {b}, so hypotenuse = {c}"
  - "The cut creates a quadrilateral with four sides:"
  - "- Two sides from the original triangle: {a} and {b}"
  - "- Two segments from the cut hypotenuse: {side1} and {side2}"
  - "Perimeter = {a} + {b} + {side1} + {side2} = {perimeter}"