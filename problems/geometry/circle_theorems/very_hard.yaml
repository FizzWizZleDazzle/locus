topic: geometry/circle_theorems
difficulty: very_hard
calculator: scientific
variables:
  # Use Pythagorean triple for clean calculations
  triple_choice: choice(1, 2, 3, 4)
  a: choice(5, 8, 7, 9)
  b: choice(12, 15, 24, 40)
  c: choice(13, 17, 25, 41)
  # Circle with center at origin, radius c
  radius: c
  # Point P outside circle at distance from center
  px: a + c
  py: 0
  # Tangent points found by construction
  # For tangent from (px, 0) to circle x^2 + y^2 = c^2
  # Tangent length is sqrt(px^2 - c^2) = sqrt((a+c)^2 - c^2) = sqrt(a^2 + 2ac) 
  # But we want clean answer, so use power of a point theorem
  # Power = px^2 - radius^2 = (a+c)^2 - c^2 = a^2 + 2ac
  power: a * a + 2 * a * c
  tangent_length: sqrt(power)
  # For secant through center, it intersects at (-c, 0) and (c, 0)
  # Secant segments from P: (px - c) and (px + c)
  near_segment: px - c
  far_segment: px + c
  # Power of a point: tangent^2 = near * far
  # We verify: a^2 + 2ac = a * (a + 2c) ✓
  answer: tangent_length
constraints:
  - triple_choice <= 4
question: "A circle has center at the origin and radius {radius}. Point P is at ({px}, {py}). A tangent is drawn from P to the circle, and a secant is drawn from P through the center of the circle. If the secant intersects the circle at two points with distances {near_segment} and {far_segment} from P, find the length of the tangent from P to the circle."
answer: answer
solution:
  - "By the power of a point theorem, if a tangent and secant are drawn from an external point, then (tangent length)² = (near distance) × (far distance)"
  - "The secant through the center from P({px}, {py}) intersects the circle at the nearest point (-{radius}, 0) and farthest point ({radius}, 0)"
  - "Distance from P to near point: {px} - (-{radius}) = {px} + {radius} = {near_segment}"
  - "Distance from P to far point: {px} - {radius} = {far_segment}"
  - "By the power of a point theorem: (tangent length)² = {far_segment} × {near_segment} = {a} × {far_segment} = {power}"
  - "Therefore, tangent length = √{power} = {answer}"