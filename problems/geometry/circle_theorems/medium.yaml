topic: geometry/circle_theorems
difficulty: medium
calculator: none

variables:
  half_central: integer(20, 80)
  central: half_central * 2
  answer: half_central

diagram:
  type: circle
  center: O
  radius: r
  elements:
    - central_angle: {vertex: O, sides: [A, B], label: central}
    - inscribed_angle: {vertex: P, sides: [A, B], label: "?"}

question: "In the diagram, arc {math(AB)} is subtended by a central angle of {central} degrees at centre {math(O)} and by an inscribed angle at point {math(P)} on the circle. Find the inscribed angle, in degrees."
answer: answer
answer_type: numeric
solution:
  - "By the Inscribed Angle Theorem, the inscribed angle is half the central angle subtending the same arc."
  - "Inscribed angle = {central} / 2 = {answer} degrees."
