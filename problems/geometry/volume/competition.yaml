topic: geometry/volume
difficulty: competition
calculator: scientific
variables:
  # Design backward: Want volume = 1000 = 10^3
  # So edge = 10, giving 10^3 = 1000
  edge: 10
  small_cube_edge: integer(1, 3)
  volume: edge^3
  small_volume: small_cube_edge^3
  num_small_cubes: volume / small_volume
  # Now carve out a cross-shaped tunnel
  tunnel_width: integer(2, 4)
  tunnel_depth: edge
  # Cross has 3 segments of tunnel_width × tunnel_width × edge
  # But center segment is counted 3 times, so subtract 2 copies
  tunnel_volume: 3 * tunnel_width^2 * edge - 2 * tunnel_width^3
  remaining_volume: volume - tunnel_volume
  answer: remaining_volume
constraints:
  - tunnel_width < edge / 2
  - mod(edge, small_cube_edge) == 0
question: "A cube with edge length {edge} cm has a cross-shaped tunnel carved through it. The tunnel passes through the center of the cube along all three axes, with each arm of the cross having a square cross-section of {tunnel_width} cm × {tunnel_width} cm. What is the volume of the remaining solid in cubic centimeters?"
answer: answer
solution:
  - "Original cube volume: {edge}^3 = {volume} cm³"
  - "The tunnel consists of three rectangular prisms, each {tunnel_width} × {tunnel_width} × {edge}"
  - "Volume of each prism: {tunnel_width}^2 × {edge} = {evaluate(tunnel_width^2 * edge, tunnel_width, tunnel_width)} cm³"
  - "However, the three prisms share a common {tunnel_width} × {tunnel_width} × {tunnel_width} cube at the center"
  - "This center cube is counted 3 times but should only be counted once"
  - "Center cube volume: {tunnel_width}^3 = {evaluate(tunnel_width^3, tunnel_width, tunnel_width)} cm³"
  - "Total tunnel volume: 3 × {evaluate(tunnel_width^2 * edge, tunnel_width, tunnel_width)} - 2 × {evaluate(tunnel_width^3, tunnel_width, tunnel_width)} = {tunnel_volume} cm³"
  - "Remaining volume: {volume} - {tunnel_volume} = {answer} cm³"