topic: geometry/volume
difficulty: medium
calculator: scientific
variants:
  - name: default
    variables:
      r: choice(2, 3, 4, 5, 6)
      h: choice(4, 6, 8, 10, 12)
      r2: r*r
      answer: pi*r2*h/3
    question: Find the volume of a cone with base radius {r} cm and height {h} cm. Express your answer in terms of {math(pi)}.
    answer: answer
    answer_type: expression
    solution:
      - The volume of a cone is {math(V = (1/3)*pi*R^2*H)}, where {math(R)} is the base radius and {math(H)} is the height.
      - 'Substitute {math(R)} = {r} cm: {math(R^2)} = {r2}.'
      - 'Multiply by {math(H)} = {h}: {math(R^2*H)} = {r2*h}.'
      - 'Divide by 3 and include {math(pi)}: {math(V)} = {answer} cubic cm.'
