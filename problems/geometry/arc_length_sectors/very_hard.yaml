topic: geometry/arc_length_sectors
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: pick r and theta that give clean arc length
  # Arc length = r * theta, so choose factors
  r: choice(6, 8, 9, 10, 12, 15)
  # Pick theta as fraction of pi to get clean answers
  theta_num: choice(1, 2, 3, 4, 5)
  theta_den: choice(3, 4, 6)
  theta: theta_num * pi / theta_den
  arc_length: r * theta
  # Sector area = (1/2) * r^2 * theta
  sector_area: r * r * theta / 2
  # For complexity: add a second sector
  scale: choice(2, 3, 4)
  r2: r * scale
  arc_length2: r2 * theta
  sector_area2: r2 * r2 * theta / 2
  # Ratio of areas
  area_ratio: sector_area2 / sector_area
  answer: area_ratio
constraints:
  - theta_num < theta_den
  - mod(theta_num * theta_den, 2) == 0 or mod(theta_den, 2) == 0
question: "Two sectors have the same central angle of {theta} radians. The first sector has radius {r} units and arc length {arc_length} units. The second sector has arc length {arc_length2} units. Find the ratio of the area of the second sector to the area of the first sector."
answer: answer
solution:
  - "Since both sectors have the same central angle {theta} radians, we can find the radius of the second sector"
  - "Arc length = radius × angle, so {arc_length2} = r₂ × {theta}"
  - "Therefore r₂ = {arc_length2} / {theta} = {r2} units"
  - "Area of first sector = (1/2) × {r}² × {theta} = {sector_area} square units"
  - "Area of second sector = (1/2) × {r2}² × {theta} = {sector_area2} square units"
  - "Ratio = {sector_area2} / {sector_area} = {answer}"