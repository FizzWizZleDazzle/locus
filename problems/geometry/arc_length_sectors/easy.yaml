topic: geometry/arc_length_sectors
difficulty: easy
calculator: scientific
variants:
  - name: default
    variables:
      r: integer(2, 12)
      angle: choice(30, 45, 60, 90, 120, 180)
      arc_len: (angle / 360) * 2 * pi * r
      sect_frac: angle / 360
      circ: 2 * pi * r
    question: A circle has radius {r}. Find the arc length of a sector with central angle {angle} degrees. Express your answer in terms of {math(pi)}.
    answer: arc_len
    solution:
      - Arc length = (central angle / 360) x 2{math(pi)} x r.
      - The sector is {sect_frac} of the full circle.
      - Full circumference = 2{math(pi)}({r}) = {circ}.
      - Arc length = {sect_frac} x {circ} = {arc_len}.
