topic: geometry/arc_length_sectors
difficulty: medium
calculator: scientific
variables:
  # Backward design: pick radius and angle that give clean arc length
  # Arc length = radius * angle (in radians)
  # For clean answers, use common angles: π/6, π/4, π/3, π/2, 2π/3, 3π/4, 5π/6, π
  angle_choice: choice(1, 2, 3, 4, 5, 6)
  radius: choice(6, 8, 9, 12, 15, 18)
  angle_num: choice(1, 1, 1, 2, 3, 5)
  angle_den: choice(6, 4, 3, 3, 4, 6)
  angle_radians: angle_num * 3.14159 / angle_den
  arc_length: radius * angle_radians
  angle_degrees: angle_num * 180 / angle_den
  sector_area: 0.5 * radius * radius * angle_radians
  answer: arc_length
constraints:
  - angle_num <= angle_den
  - mod(radius, 3) == 0
question: "A circular sector has radius {radius} cm and central angle {angle_degrees}°. Find the arc length of the sector. Round to 2 decimal places."
answer: answer
solution:
  - "Convert angle to radians: {angle_degrees}° = {angle_degrees} × π/180 = {angle_num}π/{angle_den} radians"
  - "Arc length formula: s = rθ where r is radius and θ is angle in radians"
  - "s = {radius} × {angle_num}π/{angle_den}"
  - "s = {radius} × {angle_num} × 3.14159 / {angle_den}"
  - "s = {answer} cm"