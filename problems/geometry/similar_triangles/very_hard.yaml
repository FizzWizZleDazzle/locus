topic: geometry/similar_triangles
difficulty: very_hard
calculator: scientific
variables:
  # First triangle has sides that form a Pythagorean triple
  a1: choice(5, 8, 7, 20)
  b1: choice(12, 15, 24, 21)
  c1: choice(13, 17, 25, 29)
  # Scale factor chosen to create another Pythagorean triple
  k: choice(2, 3, 4)
  # Second triangle sides (scaled)
  a2: k * a1
  b2: k * b1
  c2: k * c1
  # Unknown side in first triangle
  x: a1
  # Known sides for setting up proportion
  known1: b1
  known2: b2
  # Corresponding unknown in second triangle
  y: a2
  # Area calculations
  area1: (a1 * b1) / 2
  area2: (a2 * b2) / 2
  area_ratio: area2 / area1
  k_squared: k * k
constraints:
  - a1 < b1
  - b1 < c1
question: "Two similar right triangles have corresponding sides in ratio {k}:1. The first triangle has legs {b1} and x, with hypotenuse {c1}. The second triangle has the corresponding leg to {b1} equal to {known2}. If the area of the second triangle is {area2}, find x."
answer: x
solution:
  - "Since triangles are similar with ratio {k}:1, all corresponding sides are in this ratio"
  - "First triangle has legs {b1} and x, hypotenuse {c1}"
  - "Using Pythagorean theorem: x² + {b1}² = {c1}²"
  - "x² + {known1}² = {c1}²"
  - "x² = {c1}² - {known1}²"
  - "x² = {eval(c1*c1)} - {eval(known1*known1)}"
  - "x² = {eval(c1*c1 - known1*known1)}"
  - "x = {x}"
  - "Verify: area of first triangle = ½ × {x} × {b1} = {area1}"
  - "Area of second triangle = {k}² × {area1} = {k_squared} × {area1} = {area2} ✓"