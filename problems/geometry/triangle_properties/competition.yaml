topic: geometry/triangle_properties
difficulty: competition
calculator: none
variables:
  # Use a 3-4-5 right triangle scaled by k
  k: integer(2, 5)
  a: 3 * k
  b: 4 * k
  c: 5 * k
  # Area is guaranteed integer by construction
  area: (a * b) / 2
  # Inradius formula for right triangle: r = (a + b - c) / 2
  inradius: (a + b - c) / 2
  # Circumradius formula for right triangle: R = c / 2
  circumradius: c / 2
  # The beautiful ratio for right triangles
  ratio: circumradius / inradius
  answer: ratio
constraints:
  - a < b
  - b < c
question: "A right triangle has legs of length {a} and {b}, with hypotenuse {c}. Find the ratio of its circumradius to its inradius."
answer: answer
solution:
  - "For a right triangle with legs a and b and hypotenuse c:"
  - "The inradius r = (a + b - c) / 2"
  - "r = ({a} + {b} - {c}) / 2 = {inradius}"
  - "The circumradius R = c / 2"
  - "R = {c} / 2 = {circumradius}"
  - "Therefore R / r = {circumradius} / {inradius} = {answer}"