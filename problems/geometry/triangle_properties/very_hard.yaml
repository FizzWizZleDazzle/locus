topic: geometry/triangle_properties
difficulty: very_hard
calculator: scientific
variables:
  # Use a 5-12-13 Pythagorean triple scaled by k for clean calculations
  k: integer(2, 5)
  a: 5 * k
  b: 12 * k
  c: 13 * k
  # Height from right angle to hypotenuse has clean formula: (a*b)/c
  h: (a * b) / c
  # Inradius of right triangle: (a + b - c) / 2
  r: (a + b - c) / 2
  # Area using multiple methods
  area_base: (a * b) / 2
  area_height: (c * h) / 2
  # Angle at vertex opposite side a
  sin_A: a / c
  cos_A: b / c
  # Medial triangle (connecting midpoints) has area 1/4 of original
  medial_area: area_base / 4
  # Distance from incenter to vertices
  dist_to_C: r * sqrt(2)
  answer: medial_area
constraints:
  - a < b
  - b < c
question: "A right triangle has legs of length {a} and {b}. The medial triangle is formed by connecting the midpoints of all three sides. Find the area of the medial triangle."
answer: answer
solution:
  - "First, find the area of the original right triangle: {equation(Area, (a * b) / 2)}"
  - "Area = {area_base}"
  - "The medial triangle has area equal to 1/4 of the original triangle's area"
  - "This is a well-known property: when you connect the midpoints of any triangle, the resulting triangle has 1/4 the area"
  - "Medial triangle area = {area_base} / 4 = {answer}"