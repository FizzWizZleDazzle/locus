topic: geometry/right_triangle_trig
difficulty: medium
calculator: scientific
variables:
  angle_deg: choice(30, 45, 60)
  angle_rad: angle_deg * 3.14159 / 180
  adjacent: choice(3, 4, 5, 6, 8, 10, 12)
  opposite: adjacent * tan(angle_rad)
  hypotenuse: adjacent / cos(angle_rad)
  opp_rounded: round(opposite, 1)
  hyp_rounded: round(hypotenuse, 1)
constraints:
  - angle_deg != 45
question: "A right triangle has an angle of {angle_deg}° and an adjacent side of length {adjacent}. Find the length of the opposite side (round to 1 decimal place)."
answer: opp_rounded
solution:
  - "In a right triangle with angle θ = {angle_deg}° and adjacent side = {adjacent}"
  - "Use tan(θ) = opposite/adjacent"
  - "opposite = adjacent × tan(θ)"
  - "opposite = {adjacent} × tan({angle_deg}°)"
  - "opposite = {adjacent} × {round(tan(angle_rad), 4)}"
  - "opposite = {opp_rounded}"