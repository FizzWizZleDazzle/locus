topic: geometry/right_triangle_trig
difficulty: very_hard
calculator: scientific
variables:
  # Use Pythagorean triple (5,12,13) scaled by factor k
  k: choice(2, 3, 4)
  a: 5 * k
  b: 12 * k
  c: 13 * k
  # Place triangle in coordinate system with right angle at origin
  # One vertex at (a,0), other at (0,b), hypotenuse from (a,0) to (0,b)
  angle_rad: atan(b/a)
  angle_deg: round(angle_rad * 180 / 3.14159, 1)
  # Additional derived values
  area: a * b / 2
  perimeter: a + b + c
  # Height to hypotenuse using area formula
  h: 2 * area / c
  h_simplified: simplify(h)
constraints:
  - k > 1
question: "A right triangle has vertices at (0,0), ({a},0), and (0,{b}). Find the perpendicular distance from the right angle vertex to the hypotenuse."
answer: h_simplified
solution:
  - "The triangle has legs of length {a} and {b}"
  - "Using the Pythagorean theorem: hypotenuse = sqrt({a}^2 + {b}^2) = {c}"
  - "Area of triangle = (1/2) × base × height = (1/2) × {a} × {b} = {area}"
  - "The area can also be expressed as (1/2) × hypotenuse × height_to_hypotenuse"
  - "So {area} = (1/2) × {c} × h"
  - "Solving for h: h = 2 × {area} / {c} = {h_simplified}"