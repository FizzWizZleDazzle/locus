topic: geometry/right_triangle_trig
difficulty: hard
calculator: scientific
variables:
  # Use Pythagorean triple (5,12,13) scaled by factor k
  k: choice(2, 3, 4)
  base_a: 5
  base_b: 12
  base_c: 13
  # Scale the triple
  a: k * base_a
  b: k * base_b
  c: k * base_c
  # Pick which angle to ask about
  angle_type: choice(1, 2)
  # Define the angle based on choice
  opposite: choice(a, b)
  adjacent: choice(b, a)
  # Trig ratios (always clean fractions by construction)
  sin_val: opposite / c
  cos_val: adjacent / c
  tan_val: opposite / adjacent
  # Pick which trig function to find
  func: choice(1, 2, 3)
  answer: choice(sin_val, cos_val, tan_val)
constraints:
  - angle_type == 1 or angle_type == 2
  - func >= 1 and func <= 3
question: "A right triangle has legs of length {a} and {b}. Find {choice('sin θ', 'cos θ', 'tan θ')} where θ is the angle opposite the leg of length {opposite}."
answer: answer
solution:
  - "First find the hypotenuse using the Pythagorean theorem"
  - "c² = {a}² + {b}² = {evaluate(a^2, a, a)} + {evaluate(b^2, b, b)} = {evaluate(a^2 + b^2, a, a)}"
  - "c = {c}"
  - "For angle θ opposite the leg of length {opposite}:"
  - "opposite = {opposite}, adjacent = {adjacent}, hypotenuse = {c}"
  - "{choice('sin θ = opposite/hypotenuse', 'cos θ = adjacent/hypotenuse', 'tan θ = opposite/adjacent')} = {answer}"