topic: geometry/pythagorean_theorem
difficulty: hard
calculator: scientific
variants:
  - name: default
    variables:
      m: integer(2, 5)
      n: integer(1, 4)
      leg_a: m*m - n*n
      leg_b: 2*m*n
      hyp: m*m + n*n
      perimeter: leg_a + leg_b + hyp
      area: leg_a * leg_b / 2
      answer: hyp
    constraints:
      - m > n
    question: A right triangle has legs of length {leg_a} cm and {leg_b} cm. Find the length of the hypotenuse.
    answer: answer
    answer_type: numeric
    solution:
      - 'Apply the Pythagorean theorem: {math(a^2 + b^2 = c^2)}, where {math(c)} is the hypotenuse.'
      - Compute {math(a^2)} = {leg_a*leg_a} and {math(b^2)} = {leg_b*leg_b}.
      - 'Sum: {math(a^2 + b^2)} = {leg_a*leg_a + leg_b*leg_b}.'
      - 'Take the positive square root: {math(c)} = {hyp} cm.'
      - 'Verify: this is a primitive Pythagorean triple generated by {math(m)} = {m} and {math(n)} = {n}.'
    diagram:
      type: triangle
      vertices:
        - A
        - B
        - C
      sides:
        AC: leg_a
        BC: leg_b
        AB: hyp
      right_angle: C
