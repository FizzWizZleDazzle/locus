topic: geometry/pythagorean_theorem
difficulty: competition
calculator: scientific
variables:
  # Use Pythagorean quadruples (a,b,c,d) where a^2 + b^2 + c^2 = d^2
  # This guarantees integer space diagonal by construction
  m: integer(2, 5)
  n: integer(1, 4)
  p: integer(1, 3)
  # Generate quadruple using known formula
  a: m^2 + n^2 - p^2
  b: 2*m*n
  c: 2*m*p
  d: m^2 + n^2 + p^2
  # Box dimensions
  length: a
  width: b
  height: c
  # Derived values
  face_diagonal_sq: length^2 + width^2
  face_diagonal: sqrt(face_diagonal_sq)
  space_diagonal: d
  # Surface area calculation
  surface_area: 2*(length*width + length*height + width*height)
  answer: surface_area
constraints:
  - m > n
  - m > p
  - a > 0
question: "A rectangular box has dimensions {length} × {width} × {height}. The space diagonal (from one corner to the opposite corner through the interior) has length {space_diagonal}. Find the total surface area of the box."
answer: answer
solution:
  - "Let the box have dimensions {length} × {width} × {height}"
  - "The space diagonal d satisfies: d^2 = length^2 + width^2 + height^2"
  - "We have: {space_diagonal}^2 = {length}^2 + {width}^2 + {height}^2"
  - "Verify: {space_diagonal}^2 = {eval_space_diagonal_sq} where eval_space_diagonal_sq: length^2 + width^2 + height^2"
  - "Surface area = 2(lw + lh + wh)"
  - "Surface area = 2({length}×{width} + {length}×{height} + {width}×{height})"
  - "Surface area = {answer}"