topic: geometry/pythagorean_theorem
difficulty: medium
calculator: scientific

variables:
  k: integer(1, 4)
  leg_a: 3*k
  leg_b: 4*k
  hyp: 5*k
  leg_a2: leg_a^2
  hyp2: hyp^2
  diff: hyp2 - leg_a2
  answer: sqrt(diff)

question: "A right triangle has a hypotenuse of {hyp} cm and one leg of {leg_a} cm. Find the length of the other leg."

answer: answer
answer_type: numeric

diagram:
  type: triangle
  vertices: [A, B, C]
  sides: {AB: hyp, BC: leg_a, AC: answer}
  right_angle: A

solution:
  - "Apply the Pythagorean theorem: {math(a^2 + b^2 = c^2)}, where {math(c)} is the hypotenuse."
  - "Rearrange to isolate the unknown leg {math(b)}: subtract {math(a^2)} from both sides."
  - "{math(b^2)} = {hyp2} - {leg_a2} = {diff}"
  - "Take the positive square root: {math(b)} = {answer} cm."
