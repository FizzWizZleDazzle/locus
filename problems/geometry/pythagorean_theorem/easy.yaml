topic: geometry/pythagorean_theorem
difficulty: easy
calculator: scientific

variables:
  k: integer(1, 3)
  leg1: 3*k
  leg2: 4*k
  leg1_sq: leg1^2
  leg2_sq: leg2^2
  c2: leg1_sq + leg2_sq
  answer: sqrt(c2)

question: "A right triangle has legs of length {leg1} and {leg2}. Find the length of the hypotenuse."

answer: answer

solution:
  - "Apply the Pythagorean theorem: {math(a^2 + b^2 = c^2)}"
  - "Substitute the leg lengths: {leg1_sq} + {leg2_sq} = {c2}"
  - "Take the square root: {math(c)} = {answer}"

