topic: geometry/pythagorean_theorem
difficulty: easy
calculator: none
variables:
  scale: integer(1, 4)
  base_a: choice(3, 5, 8, 7)
  base_b: choice(4, 12, 15, 24)
  a: scale * base_a
  b: scale * base_b
  c_squared: a^2 + b^2
  c: sqrt(c_squared)
constraints:
  - is_integer(c)
  - a < b
question: "A right triangle has legs of length {a} and {b}. Find the length of the hypotenuse."
answer: c
solution:
  - "Use the Pythagorean theorem: a² + b² = c²"
  - "Substitute the given values: {a}² + {b}² = c²"
  - "Calculate: {c_squared} = c²"
  - "Take the square root: c = {c}"