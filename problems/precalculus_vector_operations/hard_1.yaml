topic: precalculus/vector_operations
difficulty: hard
calculator: scientific
variables:
  a1: integer(-5, 5)
  a2: integer(-5, 5)
  a3: integer(-5, 5)
  b1: integer(-5, 5)
  b2: integer(-5, 5)
  b3: integer(-5, 5)
  c1: a2*b3 - a3*b2
  c2: a3*b1 - a1*b3
  c3: a1*b2 - a2*b1
  dot_uc: a1*c1 + a2*c2 + a3*c3
  dot_vc: b1*c1 + b2*c2 + b3*c3
  mag_squared: c1^2 + c2^2 + c3^2
constraints:
  - mag_squared > 0
  - abs(c1) <= 20 and abs(c2) <= 20 and abs(c3) <= 20
question: "Find the cross product of u = ({a1}, {a2}, {a3}) and v = ({b1}, {b2}, {b3})."
answer: c1
answer_type: vector
solution:
  - "The cross product u × v is computed as:"
  - "First component: ({a2})({b3}) - ({a3})({b2}) = {c1}"
  - "Second component: ({a3})({b1}) - ({a1})({b3}) = {c2}"
  - "Third component: ({a1})({b2}) - ({a2})({b1}) = {c3}"
  - "Therefore, u × v = ({c1}, {c2}, {c3})"
  - "Verify: u · (u × v) = {dot_uc} = 0 ✓"
  - "Verify: v · (u × v) = {dot_vc} = 0 ✓"