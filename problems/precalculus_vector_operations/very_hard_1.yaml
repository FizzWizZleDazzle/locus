topic: precalculus/vector_operations
difficulty: very_hard
calculator: scientific
variables:
  a1: integer(-5, 5)
  a2: integer(-5, 5)
  a3: integer(-5, 5)
  b1: integer(-5, 5)
  b2: integer(-5, 5)
  b3: integer(-5, 5)
  c1: integer(-5, 5)
  c2: integer(-5, 5)
  c3: integer(-5, 5)
  cross1: a2*b3 - a3*b2
  cross2: a3*b1 - a1*b3
  cross3: a1*b2 - a2*b1
  answer: cross1*c1 + cross2*c2 + cross3*c3
constraints:
  - abs(a1) + abs(a2) + abs(a3) > 0
  - abs(b1) + abs(b2) + abs(b3) > 0
  - abs(c1) + abs(c2) + abs(c3) > 0
question: "Given vectors {vec(a)} = ({a1}, {a2}, {a3}), {vec(b)} = ({b1}, {b2}, {b3}), and {vec(c)} = ({c1}, {c2}, {c3}), find ({vec(a)} × {vec(b)}) · {vec(c)}."
answer: answer
solution:
  - "First compute the cross product {vec(a)} × {vec(b)}:"
  - "{vec(a)} × {vec(b)} = ({cross1}, {cross2}, {cross3})"
  - "Now compute the dot product with {vec(c)}:"
  - "({vec(a)} × {vec(b)}) · {vec(c)} = ({cross1}, {cross2}, {cross3}) · ({c1}, {c2}, {c3})"
  - "= {answer}"
  - "This is the scalar triple product, which gives the volume of the parallelepiped formed by the three vectors."