topic: calculus/chain_rule
difficulty: medium
calculator: none
variables:
  a: nonzero(-4, 4)
  b: integer(-3, 3)
  c: nonzero(-3, 3)
  inner: a * x + b
  outer_exp: integer(2, 4)
  f: (inner)^outer_exp
  f_expanded: expand(f)
  df_dx: derivative(f, x)
  answer: simplify(df_dx)
constraints:
  - abs(a) <= 3
  - outer_exp <= 3
question: "Find {derivative_of(f_expanded, x)}"
answer: answer
solution:
  - "Rewrite as {f} where u = {inner}"
  - "Apply chain rule: {derivative_of(f, x)} = {derivative_of(u^outer_exp, u)} · {derivative_of(inner, x)}"
  - "= {outer_exp} · ({inner})^{outer_exp - 1} · {a}"
  - "= {answer}"