topic: calculus/limits_at_infinity
difficulty: easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: nonzero(-5, 5)
  d: integer(-8, 8)
  numerator: a * x + b
  denominator: c * x + d
  f: numerator / denominator
  answer: a / c
constraints:
  - a != c
question: "Find {limit_of(f, x, infinity)}"
answer: answer
solution:
  - "For rational functions, divide numerator and denominator by highest power of x"
  - "Divide both by x: {limit_of((a + b/x)/(c + d/x), x, infinity)}"
  - "As x approaches infinity, b/x and d/x approach 0"
  - "Therefore {limit_of(f, x, infinity)} = {answer}"