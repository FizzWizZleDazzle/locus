topic: calculus/limits_at_infinity
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(2, 6)
  d: nonzero(-3, 3)
  k: a * c
  numerator: a * x^3 + b * x^2 + d
  denominator: c * x^3 - k * x + 1
  answer: a / c
constraints:
  - a != c
  - gcd(a, c) == 1
question: "Evaluate {limit_of(numerator / denominator, x, infinity)}"
answer: answer
solution:
  - "For rational functions, {limit_of(f(x)/g(x), x, infinity)} depends on the leading terms"
  - "Leading term of numerator: {a}x^3"
  - "Leading term of denominator: {c}x^3"
  - "Since degrees are equal, the limit is the ratio of leading coefficients"
  - "{limit_of(numerator / denominator, x, infinity)} = {a}/{c} = {answer}"