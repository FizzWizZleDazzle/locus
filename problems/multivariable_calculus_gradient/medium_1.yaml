topic: multivariable_calculus/gradient
difficulty: medium
calculator: none
variables:
  a: integer(2, 6)
  b: integer(2, 6)
  c: integer(-5, 5)
  f: a * x^2 + b * y^2 + c * x * y
  grad_x: derivative(f, x)
  grad_y: derivative(f, y)
  x0: integer(-3, 3)
  y0: integer(-3, 3)
  grad_x_val: evaluate(grad_x, x, x0)
  grad_y_val: evaluate(grad_y, y, y0)
  answer_x: evaluate(grad_x_val, y, y0)
  answer_y: evaluate(grad_y_val, y, y0)
constraints:
  - a != b
  - c != 0
question: "Find the gradient vector of {equation(f, a * x^2 + b * y^2 + c * x * y)} at the point ({x0}, {y0})."
answer: answer_x
solution:
  - "The gradient is {vec(∇f)} = ({derivative_of(f, x)}, {derivative_of(f, y)})"
  - "Compute partial derivatives:"
  - "{derivative_of(f, x)} = {grad_x}"
  - "{derivative_of(f, y)} = {grad_y}"
  - "At point ({x0}, {y0}):"
  - "{derivative_of(f, x)} = {answer_x}"
  - "{derivative_of(f, y)} = {answer_y}"
  - "Therefore {vec(∇f)}({x0}, {y0}) = ({answer_x}, {answer_y})"