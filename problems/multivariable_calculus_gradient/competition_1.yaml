topic: multivariable_calculus/gradient
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  f: a*x^3*y^2 + b*x^2*y^3 + c*x*y
  fx: derivative(f, x)
  fy: derivative(f, y)
  x0: integer(-2, 2)
  y0: integer(-2, 2)
  fx_at_point: evaluate(fx, x, x0)
  fy_at_point: evaluate(fy, y, y0)
  grad_at_point: evaluate(fx_at_point, y, y0)
  grad_at_point_y: evaluate(fy_at_point, x, x0)
  g: x^2 + y^2 - 1
  gx: derivative(g, x)
  gy: derivative(g, y)
  lambda_num: -grad_at_point * gy - grad_at_point_y * gx
  lambda_den: gx^2 + gy^2
  lambda_val: evaluate(lambda_num, x, x0)
  lambda_val_den: evaluate(lambda_den, x, x0)
  lambda_final: evaluate(lambda_val, y, y0)
  lambda_den_final: evaluate(lambda_val_den, y, y0)
  answer: lambda_final / lambda_den_final
constraints:
  - x0 != 0
  - y0 != 0
  - x0^2 + y0^2 != 1
question: "Let {equation(f(x,y), f)}. Find the value of λ such that {equation(∇f, λ∇g)} at the point ({x0}, {y0}), where {equation(g(x,y), g)}."
answer: answer
solution:
  - "First, compute the gradient of f:"
  - "{equation(∂f/∂x, fx)}"
  - "{equation(∂f/∂y, fy)}"
  - "At point ({x0}, {y0}):"
  - "{equation(∂f/∂x, grad_at_point)}"
  - "{equation(∂f/∂y, grad_at_point_y)}"
  - "Next, compute the gradient of g:"
  - "{equation(∂g/∂x, gx)}"
  - "{equation(∂g/∂y, gy)}"
  - "At point ({x0}, {y0}):"
  - "{equation(∂g/∂x, 2*x0)}"
  - "{equation(∂g/∂y, 2*y0)}"
  - "For {equation(∇f, λ∇g)}, we need:"
  - "{equation(grad_at_point, λ * 2*x0)}"
  - "{equation(grad_at_point_y, λ * 2*y0)}"
  - "From either equation, we get {equation(λ, answer)}"