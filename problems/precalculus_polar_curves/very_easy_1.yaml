topic: precalculus/polar_curves
difficulty: very_easy
calculator: graphing
variables:
  a: integer(2, 8)
  r_expr: a * cos(theta)
  diameter: 2 * a
  area_val: (pi * a^2) / 2
  answer: area_val
question: "Find the area enclosed by the polar curve r = {r_expr}."
answer: answer
solution:
  - "The curve r = {r_expr} is a circle with diameter {a}"
  - "When theta = 0, r = {a}. When theta = π/2, r = 0. When theta = π, r = -{a}"
  - "This traces a circle passing through the origin with center at ({evaluate(a/2, a, a)}, 0)"
  - "The radius of this circle is {evaluate(a/2, a, a)}"
  - "Area = π × radius² = π × ({evaluate(a/2, a, a)})² = {answer}"