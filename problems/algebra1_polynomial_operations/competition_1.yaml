topic: algebra1/polynomial_operations
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(-4, -1)
  c: integer(1, 3)
  d: integer(-3, -1)
  p: (a*x + b)^3
  q: (c*x + d)^2
  expanded_p: expand(p)
  expanded_q: expand(q)
  product: expand(p * q)
  coeff_x4: a^3 * c
  coeff_x3: 3*a^2*b*c + a^3*d
  coeff_sum: coeff_x4 + coeff_x3
constraints:
  - a != -b
  - c != -d
  - abs(coeff_sum) <= 50
question: "Let P(x) = {expanded_p} and Q(x) = {expanded_q}. Find the sum of the coefficients of x^4 and x^3 in the expansion of P(x) · Q(x)."
answer: coeff_sum
solution:
  - "We have P(x) = {equation(p, expanded_p)}"
  - "And Q(x) = {equation(q, expanded_q)}"
  - "To find specific coefficients in P(x) · Q(x), we can use the fact that P(x) = {p} and Q(x) = {q}"
  - "The x^4 term comes only from (ax)^3 · (cx)^2 = {a}^3 · {c} · x^5/x = {coeff_x4}x^4"
  - "The x^3 term comes from (ax)^3 · (d) + 3(ax)^2(b) · (cx)^2/x"
  - "This gives us {a}^3 · {d} + 3 · {a}^2 · {b} · {c} = {coeff_x3}"
  - "Therefore, the sum of coefficients is {coeff_x4} + {coeff_x3} = {coeff_sum}"