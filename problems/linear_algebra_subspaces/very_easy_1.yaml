topic: linear_algebra/subspaces
difficulty: very_easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  v1: matrix(3, 1, 0, 0)
  v2: matrix(3, 1, 0, 0)
  v3: matrix(3, 1, 0, 0)
  answer: "no"
constraints:
  - a != b
  - b != c
question: "Do the vectors {vec(v1)}, {vec(v2)}, and {vec(v3)} form a subspace of R³?"
answer: answer
solution:
  - "Check if the set contains the zero vector."
  - "The zero vector can only be formed if we scale all vectors by 0."
  - "0·{vec(v1)} + 0·{vec(v2)} + 0·{vec(v3)} = [0, 0, 0]"
  - "So the set contains the zero vector."
  - "However, a subspace must be closed under addition and scalar multiplication."
  - "The sum {vec(v1)} + {vec(v2)} = [{a}, {b}, 0] is not in the span of our vectors."
  - "Since each vector has zeros in two components, their span cannot produce a vector with two non-zero components."
  - "Therefore, these vectors do not form a subspace."