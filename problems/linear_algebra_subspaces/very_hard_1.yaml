topic: linear_algebra/subspaces
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: nonzero(-3, 3)
  d: nonzero(-3, 3)
  v1_1: a
  v1_2: b
  v1_3: 0
  v1_4: a - b
  v2_1: c
  v2_2: d
  v2_3: 0
  v2_4: c - d
  v3_1: a + c
  v3_2: b + d
  v3_3: 0
  v3_4: a + c - b - d
  k: nonzero(-2, 2)
  test_1: k * a
  test_2: k * b
  test_3: 1
  test_4: k * (a - b)
  dim_W: 2
  det_check: a * d - b * c
constraints:
  - det_check != 0
  - abs(a) + abs(b) <= 5
  - abs(c) + abs(d) <= 5
question: "Let W be the subspace of R^4 spanned by ({v1_1}, {v1_2}, {v1_3}, {v1_4}), ({v2_1}, {v2_2}, {v2_3}, {v2_4}), and ({v3_1}, {v3_2}, {v3_3}, {v3_4}). Determine dim(W) and whether the vector ({test_1}, {test_2}, {test_3}, {test_4}) is in W."
answer: dim_W
answer_type: integer
solution:
  - "First check if the spanning vectors are linearly independent."
  - "Notice that ({v3_1}, {v3_2}, {v3_3}, {v3_4}) = ({v1_1}, {v1_2}, {v1_3}, {v1_4}) + ({v2_1}, {v2_2}, {v2_3}, {v2_4}), so the three vectors are linearly dependent."
  - "Check if v1 and v2 are independent: set c1·v1 + c2·v2 = 0"
  - "This gives c1({a}) + c2({c}) = 0 and c1({b}) + c2({d}) = 0"
  - "Since {a}({d}) - {b}({c}) = {det_check} ≠ 0, the only solution is c1 = c2 = 0"
  - "So v1 and v2 form a basis for W, thus dim(W) = {dim_W}"
  - "For the test vector to be in W, we need c1·v1 + c2·v2 = test vector"
  - "From the third component: c1(0) + c2(0) = 1, which gives 0 = 1"
  - "This is impossible, so ({test_1}, {test_2}, {test_3}, {test_4}) is not in W"