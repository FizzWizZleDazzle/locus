topic: geometry/pythagorean_theorem
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: start with a Pythagorean triple, then scale and add complexity
  base_a: choice(3, 5, 8, 7, 9)
  base_b: choice(4, 12, 15, 24, 40)
  base_c: choice(5, 13, 17, 25, 41)
  k: choice(2, 3, 4, 5)
  # Scale the triple
  side1: k * base_a
  side2: k * base_b
  hyp: k * base_c
  # Create a 3D problem where we need Pythagorean theorem twice
  height: choice(12, 16, 20, 24)
  # First use: find diagonal of base rectangle
  base_diagonal: hyp
  # Second use: find space diagonal using base diagonal and height
  space_diagonal_squared: base_diagonal^2 + height^2
  space_diagonal: sqrt(space_diagonal_squared)
constraints:
  - space_diagonal == floor(space_diagonal)  # Ensures clean answer
question: "A rectangular box has dimensions {side1} by {side2} by {height}. Find the length of the space diagonal (the diagonal connecting opposite corners through the interior of the box)."
answer: space_diagonal
solution:
  - "To find the space diagonal, we use the Pythagorean theorem twice."
  - "First, find the diagonal of the base rectangle with sides {side1} and {side2}."
  - "Base diagonal = sqrt({side1}^2 + {side2}^2) = sqrt({evaluate(side1^2, side1, side1)} + {evaluate(side2^2, side2, side2)}) = sqrt({evaluate(side1^2 + side2^2, side1, side1)}) = {base_diagonal}"
  - "Now use this base diagonal and the height {height} to find the space diagonal."
  - "Space diagonal = sqrt({base_diagonal}^2 + {height}^2) = sqrt({evaluate(base_diagonal^2, base_diagonal, base_diagonal)} + {evaluate(height^2, height, height)}) = sqrt({space_diagonal_squared}) = {space_diagonal}"