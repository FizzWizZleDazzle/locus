topic: calculus/integration_by_parts
difficulty: very_easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(2, 5)
  u: x
  dv: a * x^b
  du: derivative(u, x)
  v: integral(dv, x)
  uv: u * v
  vdu: v * du
  integral_vdu: integral(vdu, x)
  answer: uv - integral_vdu
question: "Find {integral_of(u * dv, x)} using integration by parts"
answer: answer
solution:
  - "Using integration by parts: ∫u dv = uv - ∫v du"
  - "Let u = {u}, so du = {du} dx"
  - "Let dv = {dv} dx, so v = {v}"
  - "Therefore: {integral_of(u * dv, x)} = {uv} - {integral_of(vdu, x)}"
  - "= {uv} - {integral_vdu}"
  - "= {answer}"