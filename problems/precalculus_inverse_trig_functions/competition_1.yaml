topic: precalculus/inverse_trig_functions
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  m: integer(1, 4)
  n: integer(1, 4)
  a: k * m
  b: k * n
  c: sqrt(a^2 + b^2)
  base_angle: atan(b/a)
  f: asin(a/c) + acos(b/c) - base_angle
  simplified: simplify(f)
  answer: evaluate(simplified, x, 0)
constraints:
  - m != n
  - gcd(m, n) == 1
question: "Let {equation(sin(alpha), a/c)} and {equation(cos(beta), b/c)}, where {equation(c, sqrt(a^2 + b^2))} and α, β are acute angles. Find the exact value of {equation(alpha + beta - atan(b/a), '?')}"
answer: answer
solution:
  - "Given {equation(sin(alpha), a/c)} with {equation(c, sqrt(a^2 + b^2))}"
  - "Since α is acute, {equation(alpha, asin(a/c))}"
  - "Given {equation(cos(beta), b/c)}, and β is acute"
  - "So {equation(beta, acos(b/c))}"
  - "Note that {equation(sin(alpha), a/c)} and {equation(cos(alpha), b/c)} (from Pythagorean identity)"
  - "Similarly, {equation(sin(beta), a/c)} and {equation(cos(beta), b/c)}"
  - "This means α = β, both equal to {equation(atan(a/b), base_angle)}"
  - "Therefore {equation(alpha + beta - atan(b/a), 2*base_angle - base_angle)}"
  - "The answer is {answer}"