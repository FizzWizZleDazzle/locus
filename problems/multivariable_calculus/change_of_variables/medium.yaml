topic: multivariable_calculus/change_of_variables
difficulty: medium
calculator: none
variables:
  a: integer(2, 4)
  b: integer(2, 4)
  c: integer(1, 3)
  d: integer(1, 3)
  det_J: a*d - b*c
  u_expr: a*x + b*y
  v_expr: c*x + d*y
  f_uv: u^2 + v^2
  f_xy: expand((a*x + b*y)^2 + (c*x + d*y)^2)
  answer: abs(det_J)
constraints:
  - det_J != 0
  - abs(det_J) <= 6
question: "Consider the transformation u = {u_expr}, v = {v_expr}. Find the Jacobian determinant |J| for this transformation."
answer: answer
solution:
  - "The Jacobian matrix J has entries:"
  - "∂u/∂x = {a}, ∂u/∂y = {b}"
  - "∂v/∂x = {c}, ∂v/∂y = {d}"
  - "So J = {matrix_of([[a, b], [c, d]])}"
  - "det(J) = ({a})({d}) - ({b})({c}) = {det_J}"
  - "Therefore |J| = {answer}"