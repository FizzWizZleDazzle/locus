topic: multivariable_calculus/change_of_variables
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  u_expr: a * x + b * y
  v_expr: x - y
  det_J: abs(a + b)
  answer: det_J
constraints:
  - a != b
question: "Consider the transformation u = {u_expr}, v = {v_expr}. Find the Jacobian determinant {abs_of(J)}."
answer: answer
solution:
  - "For the transformation u = {u_expr}, v = {v_expr}"
  - "The Jacobian matrix J has entries:"
  - "∂u/∂x = {a}, ∂u/∂y = {b}"
  - "∂v/∂x = 1, ∂v/∂y = -1"
  - "det(J) = ({a})(-1) - ({b})(1) = -{a} - {b} = -{det_J}"
  - "Therefore {abs_of(J)} = {answer}"