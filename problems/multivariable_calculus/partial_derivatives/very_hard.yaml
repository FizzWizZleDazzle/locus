topic: multivariable_calculus/partial_derivatives
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-5, 5)
  c: nonzero(-5, 5)
  f: a*x^3*y^2 + b*x^2*y^3 + c*x*y
  fx: derivative(f, x)
  fy: derivative(f, y)
  fxx: derivative(fx, x)
  fyy: derivative(fy, y)
  fxy: derivative(fx, y)
  x0: nonzero(-3, 3)
  y0: nonzero(-3, 3)
  D_val: evaluate(evaluate(fxx * fyy - fxy^2, x, x0), y, y0)
  fxx_val: evaluate(evaluate(fxx, x, x0), y, y0)
  answer: D_val
constraints:
  - a != b
  - abs(x0) != abs(y0)
  - D_val != 0
question: "Let f(x,y) = {f}. Compute the discriminant D = fxx*fyy - (fxy)^2 at the point ({x0}, {y0})."
answer: answer
solution:
  - "First find the first partial derivatives:"
  - "{derivative_of(f, x)} = {fx}"
  - "{derivative_of(f, y)} = {fy}"
  - "Next find the second partial derivatives:"
  - "fxx = {derivative_of(fx, x)} = {fxx}"
  - "fyy = {derivative_of(fy, y)} = {fyy}"
  - "fxy = {derivative_of(fx, y)} = {fxy}"
  - "The discriminant is D = fxx*fyy - (fxy)^2"
  - "At ({x0}, {y0}): D = {fxx_val} * {evaluate(evaluate(fyy, x, x0), y, y0)} - ({evaluate(evaluate(fxy, x, x0), y, y0)})^2"
  - "D = {answer}"