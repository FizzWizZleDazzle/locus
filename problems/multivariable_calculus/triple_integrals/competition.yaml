topic: multivariable_calculus/triple_integrals
difficulty: competition
calculator: none
variables:
  # Design backward from clean answer 36
  # Want integral of k*xyz over [0,a]×[0,b]×[0,c] = 36
  # Triple integral gives k*a²b²c²/8 = 36, so k*a²b²c² = 288
  # Pick k=1, need a²b²c² = 288 = 2⁵×3² = 32×9
  # Use a=2, b=3, c=4 gives 4×9×16 = 576 (too big)
  # Use a=2, b=2, c=6 gives 4×4×36 = 576 (too big)
  # Use a=3, b=4, c=2 gives 9×16×4 = 576 (too big)
  # Actually 288 = 16×18, so try a=4, b=3, c=2 gives 16×9×4 = 576/2 = 288 ✗
  # Let me recalculate: ∫∫∫ xyz dV = (a²/2)(b²/2)(c²/2) = a²b²c²/8
  # So need a²b²c²/8 = 36, thus a²b²c² = 288
  # Try a=2, b=3, c=4: 4×9×16 = 576, 576/8 = 72 ✗
  # Try a=2, b=2, c=3: 4×4×9 = 144, 144/8 = 18 ✗
  # Try k=2, a=2, b=3, c=2: 2×4×9×4/8 = 2×144/8 = 36 ✓
  k: 2
  a: 2
  b: 3
  c: 2
  f: k * x * y * z
  region_desc: "[0, 2] × [0, 3] × [0, 2]"
  answer: 36
constraints:
  - k * a * a * b * b * c * c == 288
question: "Evaluate the triple integral {integral_of(f, (x,y,z))} over the region E = {region_desc}."
answer: answer
solution:
  - "Set up the iterated integral: ∫₀² ∫₀³ ∫₀² {f} dz dy dx"
  - "First integrate with respect to z: ∫₀² {k}xyz dz = {k}xy[z²/2]₀² = {k}xy(2) = {evaluate(k*2, k, k)}xy"
  - "Next integrate with respect to y: ∫₀³ {evaluate(k*2, k, k)}xy dy = {evaluate(k*2, k, k)}x[y²/2]₀³ = {evaluate(k*2, k, k)}x(9/2) = {evaluate(k*2*9/2, k, k)}x"
  - "Finally integrate with respect to x: ∫₀² {evaluate(k*2*9/2, k, k)}x dx = {evaluate(k*2*9/2, k, k)}[x²/2]₀² = {evaluate(k*2*9/2, k, k)}(2) = {answer}"