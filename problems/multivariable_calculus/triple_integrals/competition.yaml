topic: multivariable_calculus/triple_integrals
difficulty: competition
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(1, 3)
  k: integer(2, 4)
  integrand: k * x * y * z
  x_bound: a
  y_bound: b * x
  z_bound: c * x * y
  inner: evaluate(integral(integrand, z), z, z_bound) - evaluate(integral(integrand, z), z, 0)
  middle: evaluate(integral(inner, y), y, y_bound) - evaluate(integral(inner, y), y, 0)
  outer: evaluate(integral(middle, x), x, x_bound) - evaluate(integral(middle, x), x, 0)
  answer: simplify(outer)
constraints:
  - a != b
  - b != c
  - a != c
question: "Evaluate the triple integral {integral_of(integral_of(integral_of(integrand, z), y), x)} where the region is bounded by 0 ≤ x ≤ {a}, 0 ≤ y ≤ {y_bound}, and 0 ≤ z ≤ {z_bound}."
answer: answer
solution:
  - "Set up the iterated integral with bounds: 0 ≤ x ≤ {a}, 0 ≤ y ≤ {b}x, 0 ≤ z ≤ {c}xy"
  - "Inner integral: {integral_of(integrand, z)} from 0 to {c}xy"
  - "= {k}xy · z²/2 evaluated from 0 to {c}xy"
  - "= {k}xy · ({c}xy)²/2 = {k}{c}²x³y³/2"
  - "Middle integral: {integral_of({k}{c}²x³y³/2, y)} from 0 to {b}x"
  - "= {k}{c}²x³ · y⁴/8 evaluated from 0 to {b}x"
  - "= {k}{c}²x³ · ({b}x)⁴/8 = {k}{c}²{b}⁴x⁷/8"
  - "Outer integral: {integral_of({k}{c}²{b}⁴x⁷/8, x)} from 0 to {a}"
  - "= {k}{c}²{b}⁴ · x⁸/64 evaluated from 0 to {a}"
  - "= {k}{c}²{b}⁴{a}⁸/64"
  - "= {answer}"