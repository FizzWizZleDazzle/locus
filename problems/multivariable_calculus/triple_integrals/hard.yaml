topic: multivariable_calculus/triple_integrals
difficulty: hard
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(1, 3)
  f: a*x + b*y + c*z
  x_lo: 0
  x_hi: integer(1, 2)
  y_lo: 0
  y_hi: integer(1, 2)
  z_lo: 0
  z_hi: integer(1, 2)
  inner: integral(f, z)
  inner_hi: evaluate(inner, z, z_hi)
  inner_lo: evaluate(inner, z, z_lo)
  inner_result: inner_hi - inner_lo
  middle: integral(inner_result, y)
  middle_hi: evaluate(middle, y, y_hi)
  middle_lo: evaluate(middle, y, y_lo)
  middle_result: middle_hi - middle_lo
  outer: integral(middle_result, x)
  outer_hi: evaluate(outer, x, x_hi)
  outer_lo: evaluate(outer, x, x_lo)
  answer: outer_hi - outer_lo
constraints:
  - x_hi != y_hi
  - y_hi != z_hi
question: "Evaluate the triple integral of {f} over the region [0, {x_hi}] × [0, {y_hi}] × [0, {z_hi}]"
answer: answer
solution:
  - "Integrate with respect to z first: {definite_integral_of(f, z, z_lo, z_hi)}"
  - "{integral_of(f, z)} = {inner}"
  - "Evaluate bounds: {inner_hi} - {inner_lo} = {inner_result}"
  - "Integrate with respect to y: {definite_integral_of(inner_result, y, y_lo, y_hi)}"
  - "{integral_of(inner_result, y)} = {middle}"
  - "Evaluate bounds: {middle_hi} - {middle_lo} = {middle_result}"
  - "Integrate with respect to x: {definite_integral_of(middle_result, x, x_lo, x_hi)}"
  - "{integral_of(middle_result, x)} = {outer}"
  - "Evaluate bounds: {outer_hi} - {outer_lo} = {answer}"