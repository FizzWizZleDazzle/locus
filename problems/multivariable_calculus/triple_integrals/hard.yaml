topic: multivariable_calculus/triple_integrals
difficulty: hard
calculator: scientific
variants:
  - name: default
    variables:
      a: nonzero(1, 4)
      b: nonzero(1, 4)
      c: nonzero(1, 4)
      p: integer(1, 3)
      q: integer(1, 3)
      r: integer(1, 3)
      f: a*x^2 + b*y + c*z
      inner_z: a*x^2*r + b*y*r + c*r^2/2
      after_y: a*x^2*r*q + b*r*q^2/2 + c*r^2*q/2
      answer: a*r*q*p^3/3 + b*r*q^2*p/2 + c*r^2*q*p/2
    question: Evaluate the triple integral {definite_integral_of(definite_integral_of(definite_integral_of(f, z, 0, r), y, 0, q), x, 0, p)}.
    answer: answer
    answer_type: numeric
    solution:
      - Integrate with respect to {math(z)} first, holding {math(x)} and {math(y)} constant.
      - 'Inner integral: {definite_integral_of(f, z, 0, r)} = {inner_z}'
      - Now integrate with respect to {math(y)} from {math(0)} to {q}.
      - 'Middle integral: {definite_integral_of(inner_z, y, 0, q)} = {after_y}'
      - Finally integrate with respect to {math(x)} from {math(0)} to {p}.
      - 'Outer integral: {definite_integral_of(after_y, x, 0, p)} = {answer}'
