topic: multivariable_calculus/triple_integrals
difficulty: hard
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(1, 3)
  k: integer(2, 4)
  f: k * x * y * z
  x_lower: 0
  x_upper: a
  y_lower: 0
  y_upper: b
  z_lower: 0
  z_upper: c
  inner: integral(f, z)
  inner_eval: evaluate(inner, z, z_upper) - evaluate(inner, z, z_lower)
  middle: integral(inner_eval, y)
  middle_eval: evaluate(middle, y, y_upper) - evaluate(middle, y, y_lower)
  outer: integral(middle_eval, x)
  answer: evaluate(outer, x, x_upper) - evaluate(outer, x, x_lower)
constraints:
  - a != b
  - b != c
  - a != c
question: "Evaluate the triple integral {definite_integral_of(definite_integral_of(definite_integral_of(f, z, z_lower, z_upper), y, y_lower, y_upper), x, x_lower, x_upper)}"
answer: answer
solution:
  - "Set up the iterated integral with integrand {f}"
  - "First integrate with respect to z: {integral_of(f, z)} = {inner}"
  - "Evaluate from {z_lower} to {z_upper}: {inner_eval}"
  - "Next integrate with respect to y: {integral_of(inner_eval, y)} = {middle}"
  - "Evaluate from {y_lower} to {y_upper}: {middle_eval}"
  - "Finally integrate with respect to x: {integral_of(middle_eval, x)} = {outer}"
  - "Evaluate from {x_lower} to {x_upper}: {answer}"