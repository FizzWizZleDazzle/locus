topic: multivariable_calculus/triple_integrals
difficulty: very_hard
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(1, 3)
  n: integer(2, 4)
  m: integer(2, 4)
  p: integer(2, 4)
  f: a*x^n + b*y^m + c*z^p
  x_lo: 0
  x_hi: 1
  y_lo: 0
  y_hi: 1
  z_lo: 0
  z_hi: 1
  inner: integral(f, z)
  inner_hi: evaluate(inner, z, z_hi)
  inner_lo: evaluate(inner, z, z_lo)
  after_z: inner_hi - inner_lo
  middle: integral(after_z, y)
  middle_hi: evaluate(middle, y, y_hi)
  middle_lo: evaluate(middle, y, y_lo)
  after_y: middle_hi - middle_lo
  outer: integral(after_y, x)
  outer_hi: evaluate(outer, x, x_hi)
  outer_lo: evaluate(outer, x, x_lo)
  answer: outer_hi - outer_lo
constraints:
  - n != m
  - m != p
question: "Evaluate the triple integral of {f} over the unit cube [0,1]×[0,1]×[0,1]"
answer: answer
solution:
  - "Integrate with respect to z first: {definite_integral_of(f, z, z_lo, z_hi)}"
  - "The antiderivative is {inner}"
  - "Evaluating bounds: {inner_hi} - {inner_lo} = {after_z}"
  - "Integrate with respect to y: {definite_integral_of(after_z, y, y_lo, y_hi)}"
  - "The antiderivative is {middle}"
  - "Evaluating bounds: {middle_hi} - {middle_lo} = {after_y}"
  - "Integrate with respect to x: {definite_integral_of(after_y, x, x_lo, x_hi)}"
  - "The antiderivative is {outer}"
  - "Evaluating bounds: {outer_hi} - {outer_lo} = {answer}"