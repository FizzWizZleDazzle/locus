topic: multivariable_calculus/lagrange_multipliers
difficulty: hard
calculator: scientific
variables:
  # Design backward: want critical point at (2, 3) with clean multiplier
  # Constraint g = x^2 + y^2 - 13 passes through (2, 3)
  # Choose f so gradient alignment gives λ = 1
  a: integer(2, 5)
  b: integer(2, 5)
  f: a * x * y
  g: x^2 + y^2 - 13
  # At (2, 3): ∇f = (6a, 4a), ∇g = (4, 6)
  # For λ = 1: 6a = 4 and 4a = 6 won't work
  # Redesign with different approach
  k: integer(10, 20)
  f_new: x * y
  g_new: x^2 + y^2 - k
  # Critical points where y = x or y = -x
  x_crit: sqrt(k/2)
  y_crit: x_crit
  max_value: evaluate(f_new, [x, y], [x_crit, y_crit])
constraints:
  - mod(k, 2) == 0  # Ensures k/2 is integer
question: "Maximize {f_new} subject to the constraint {equation(g_new, 0)} using Lagrange multipliers."
answer: max_value
solution:
  - "Set up Lagrangian: L = {f_new} - λ({g_new})"
  - "Find critical points by solving {equation(derivative(f_new, x), λ * derivative(g_new, x))} and {equation(derivative(f_new, y), λ * derivative(g_new, y))}"
  - "This gives y = λ(2x) and x = λ(2y)"
  - "Combining: xy = 4λ^2xy, so λ = ±1/2"
  - "When λ = 1/2: y = x. Substituting into constraint: 2x^2 = {k}, so x = ±{sqrt(k/2)}"
  - "When λ = -1/2: y = -x. This also gives x = ±{sqrt(k/2)}"
  - "Evaluate f at all four critical points"
  - "Maximum occurs at ({x_crit}, {y_crit}) and (-{x_crit}, -{y_crit})"
  - "Maximum value: {max_value}"