topic: multivariable_calculus/lagrange_multipliers
difficulty: very_hard
calculator: none
variables:
  # Design backward: want critical point at (2, 1, -1) with clean multiplier
  # Constraint will be x + 2y + z = 3 (satisfied by our point)
  # Objective will be f(x,y,z) = x^2 + 2y^2 + 3z^2
  a: 1
  b: 2
  c: 3
  # Critical point coordinates
  x_crit: 2
  y_crit: 1
  z_crit: -1
  # Multiplier value (backward engineered to be clean)
  lambda_val: 2
  # Build constraint g(x,y,z) = x + 2y + z - 3
  g: x + 2*y + z - 3
  # Build objective f(x,y,z) = x^2 + 2y^2 + 3z^2
  f: a*x^2 + b*y^2 + c*z^2
  # Value at critical point
  answer: evaluate(evaluate(evaluate(f, x, x_crit), y, y_crit), z, z_crit)
constraints:
  - a < b
  - b < c
question: "Find the minimum value of {f} subject to the constraint {equation(g, 0)} using Lagrange multipliers."
answer: answer
solution:
  - "Set up the Lagrangian: L = {f} - λ({g})"
  - "Find critical points by solving ∇f = λ∇g and g = 0"
  - "∇f = (2x, 4y, 6z) and ∇g = (1, 2, 1)"
  - "From 2x = λ, 4y = 2λ, 6z = λ, we get x = λ/2, y = λ/2, z = λ/6"
  - "Substitute into constraint: λ/2 + 2(λ/2) + λ/6 = 3"
  - "Solving: λ/2 + λ + λ/6 = 3, so 3λ/6 + 6λ/6 + λ/6 = 3"
  - "10λ/6 = 3, therefore λ = {lambda_val}"
  - "Critical point: x = {x_crit}, y = {y_crit}, z = {z_crit}"
  - "The minimum value is f({x_crit}, {y_crit}, {z_crit}) = {answer}"