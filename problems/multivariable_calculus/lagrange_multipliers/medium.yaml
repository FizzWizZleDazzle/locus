topic: multivariable_calculus/lagrange_multipliers
difficulty: medium
calculator: scientific
variables:
  # Backward design: start with clean critical point (2, 3)
  # and constraint value 13 = 2^2 + 3^2
  x_opt: 2
  y_opt: 3
  # Build constraint g(x,y) = x^2 + y^2 - 13
  c: 13
  g: x^2 + y^2 - c
  # Build objective with critical point at (2, 3)
  # f(x,y) = a(x-2)^2 + b(y-3)^2 + 12
  # This has ∇f = (2a(x-2), 2b(y-3)) = λ∇g = λ(2x, 2y) at (2,3)
  # So we need 0 = λ(4) and 0 = λ(6), thus λ = 0 works
  # But for non-trivial problem, shift: f = a(x-2)^2 + b(y-3)^2 + 2x + 3y
  a: integer(1, 3)
  b: integer(1, 3)
  f_base: a*(x-2)^2 + b*(y-3)^2 + 2*x + 3*y
  f: expand(f_base)
  answer: evaluate(f, x, x_opt, y, y_opt)
constraints:
  - a != b
question: "Find the maximum value of {f} subject to the constraint {equation(g, 0)} using Lagrange multipliers."
answer: answer
solution:
  - "Set up the Lagrangian: L = {f} - λ({g})"
  - "Find critical points by solving ∇L = 0"
  - "∂L/∂x = {derivative(f, x)} - λ({derivative(g, x)}) = 0"
  - "∂L/∂y = {derivative(f, y)} - λ({derivative(g, y)}) = 0"
  - "∂L/∂λ = -{g} = 0"
  - "The critical point on the constraint circle is ({x_opt}, {y_opt})"
  - "Evaluating f at this point: f({x_opt}, {y_opt}) = {answer}"