topic: multivariable_calculus/stokes_divergence
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(2, 6)
  F_x: a * y
  F_y: -a * x + b * z
  F_z: c * y
  curl_F_x: c - b
  curl_F_y: 0
  curl_F_z: -2 * a
  R: integer(2, 4)
  flux: -2 * a * 3.14159 * R * R
  answer: flux
constraints:
  - c > b
question: "Let {vec(F)} = {equation(F_x, F_y, F_z)} and S be the upper hemisphere of radius {R} centered at the origin with outward normal. Use Stokes' theorem to evaluate the flux integral of curl {vec(F)} through S by computing the line integral around the boundary circle."
answer: answer
solution:
  - "By Stokes' theorem, flux of curl {vec(F)} through S equals line integral of {vec(F)} around boundary circle C"
  - "Boundary circle C: x^2 + y^2 = {R}^2, z = 0, oriented counterclockwise from above"
  - "Parameterize C: r(t) = ({R}cos(t), {R}sin(t), 0) for t in [0, 2π]"
  - "dr/dt = (-{R}sin(t), {R}cos(t), 0)"
  - "On C: {vec(F)} = ({a}{R}sin(t), -{a}{R}cos(t), 0)"
  - "{vec(F)} · dr/dt = -{a}{R}^2(sin^2(t) + cos^2(t)) = -{a}{R}^2"
  - "Line integral = ∫[0 to 2π] (-{a}{R}^2) dt = -2π{a}{R}^2"
  - "Therefore flux = {answer}π"