topic: multivariable_calculus/stokes_divergence
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  F_x: a * y * z
  F_y: b * x * z
  F_z: c * x * y
  curl_x: c * x - b * x
  curl_y: a * y - c * y
  curl_z: b * z - a * z
  curl_x_simp: (c - b) * x
  curl_y_simp: (a - c) * y
  curl_z_simp: (b - a) * z
  R: 2
  flux_integrand: (c - b) * x + (a - c) * y + (b - a) * z
  answer: 0
constraints:
  - a != b
  - b != c
  - a != c
question: "Let F = {vec((F_x, F_y, F_z))}. Use Stokes' theorem to evaluate the line integral of F around the boundary of the hemisphere x^2 + y^2 + z^2 = {R}^2, z ≥ 0, oriented counterclockwise when viewed from above."
answer: answer
solution:
  - "By Stokes' theorem, the line integral equals the flux of curl F through the hemisphere"
  - "First compute curl F:"
  - "curl F = {vec((curl_x_simp, curl_y_simp, curl_z_simp))}"
  - "The hemisphere has outward normal n. On the surface x^2 + y^2 + z^2 = {R}^2:"
  - "n = {vec((x/R, y/R, z/R))}"
  - "curl F · n = {flux_integrand}/{R}"
  - "By symmetry, each term integrates to 0 over the hemisphere"
  - "Therefore the flux integral = {answer}"