topic: multivariable_calculus/stokes_divergence
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  F_x: a * y
  F_y: b * z
  F_z: c * x
  curl_x: -b
  curl_y: -c
  curl_z: -a
  R: integer(2, 4)
  flux: -R * R * (a + b + c)
constraints:
  - a != b
  - b != c
  - a != c
question: "Let {vec(F)} = {equation(F_x, F_y, F_z)} and let S be the hemisphere x^2 + y^2 + z^2 = {R}^2 with z ≥ 0, oriented with normal pointing outward. Use Stokes' theorem to compute the flux {integral_of(curl F · n dS, S)}."
answer: flux
solution:
  - "By Stokes' theorem, {integral_of(curl F · n dS, S)} = {integral_of(F · dr, C)} where C is the boundary circle x^2 + y^2 = {R}^2, z = 0"
  - "First compute curl F: {vec(curl F)} = {equation(curl_x, curl_y, curl_z)}"
  - "The boundary C is oriented counterclockwise when viewed from above"
  - "Parameterize C: r(t) = ({R}cos(t), {R}sin(t), 0) for 0 ≤ t ≤ 2π"
  - "dr = (-{R}sin(t), {R}cos(t), 0) dt"
  - "On C: F = ({a}·{R}sin(t), 0, {c}·{R}cos(t))"
  - "F · dr = -{a}·{R}^2·sin^2(t) dt"
  - "{integral_of(F · dr, C)} = -{a}·{R}^2·{integral_of(sin^2(t), 0, 2π)} = -{a}·{R}^2·π"
  - "Alternatively, use divergence theorem on the solid hemisphere"
  - "div(curl F) = 0, so flux through hemisphere equals negative flux through base disk"
  - "On base disk (z = 0, normal = -k): curl F · n = {a}"
  - "Flux through base = {a}·π·{R}^2"
  - "Therefore flux through hemisphere = {flux}"