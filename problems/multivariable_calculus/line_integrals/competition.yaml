topic: multivariable_calculus/line_integrals
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 3)
  d: integer(1, 3)
  k: integer(2, 4)
  m: integer(2, 4)
  F_x: a*x + b*y
  F_y: c*x - d*y
  x_t: k*t
  y_t: m*t^2
  dx_dt: derivative(x_t, t)
  dy_dt: derivative(y_t, t)
  F_x_param: evaluate(F_x, x, x_t)
  F_y_param: evaluate(F_y, x, x_t)
  F_x_full: evaluate(F_x_param, y, y_t)
  F_y_full: evaluate(F_y_param, y, y_t)
  integrand: F_x_full * dx_dt + F_y_full * dy_dt
  integrand_expanded: expand(integrand)
  antideriv: integral(integrand_expanded, t)
  upper_val: evaluate(antideriv, t, 1)
  lower_val: evaluate(antideriv, t, 0)
  answer: upper_val - lower_val
constraints:
  - a != b
  - c != d
question: "Evaluate the line integral {integral_of(F_x dx + F_y dy, C)} where F = ({F_x}, {F_y}) and C is the curve parametrized by x = {x_t}, y = {y_t} for t ∈ [0, 1]."
answer: answer
solution:
  - "Parametrize the vector field along C: F(t) = ({F_x_full}, {F_y_full})"
  - "Compute velocity vector: r'(t) = ({dx_dt}, {dy_dt})"
  - "Form the integrand: F · r' = {integrand_expanded}"
  - "Integrate from t = 0 to t = 1: {definite_integral_of(integrand_expanded, t, 0, 1)}"
  - "Antiderivative: {antideriv}"
  - "Evaluate: [{antideriv}]₀¹ = {upper_val} - {lower_val} = {answer}"