topic: multivariable_calculus/line_integrals
difficulty: competition
calculator: none
variables:
  # Design backward: choose a vector field that gives a clean integral
  # F = (P, Q) where P = ay, Q = bx gives curl(F) = b - a
  # For conservative field, need b = a
  # For non-conservative with clean answer, pick b - a to be a nice value
  a: integer(2, 5)
  k: integer(1, 3)
  b: a + k
  # Path: line segment from origin to (m, n)
  m: integer(3, 6)
  n: integer(3, 6)
  # Vector field components
  P: a * y
  Q: b * x
  # Parameterization: r(t) = (mt, nt) for t in [0, 1]
  # dr = (m, n)dt
  # F·dr = (ant + bmt)dt = (an + bm)t dt
  # Integral from 0 to 1 of (an + bm)t dt = (an + bm)/2
  integrand_coeff: a * n + b * m
  answer: integrand_coeff / 2
constraints:
  - m != n
  - mod(integrand_coeff, 2) == 0
question: "Evaluate the line integral {integral_of(P dx + Q dy, C)} where C is the line segment from (0, 0) to ({m}, {n})."
answer: answer
solution:
  - "Parameterize C: r(t) = (mt, nt) for t ∈ [0, 1], where m = {m}, n = {n}"
  - "Then x = {m}t, y = {n}t, so dx = {m}dt, dy = {n}dt"
  - "On C: P = {a}y = {a} · {n}t = {a * n}t"
  - "On C: Q = {b}x = {b} · {m}t = {b * m}t"
  - "The line integral becomes:"
  - "∫[0 to 1] ({a * n}t · {m} + {b * m}t · {n})dt"
  - "= ∫[0 to 1] ({integrand_coeff}t)dt"
  - "= {integrand_coeff} · [t²/2] from 0 to 1"
  - "= {integrand_coeff}/2 = {answer}"