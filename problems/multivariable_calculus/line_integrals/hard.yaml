topic: multivariable_calculus/line_integrals
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  F: "(y, x)"
  C_param: "(t, t^2)"
  t_start: 0
  t_end: 2
  x_t: t
  y_t: t^2
  dx_dt: derivative(x_t, t)
  dy_dt: derivative(y_t, t)
  F_on_C: "(t^2, t)"
  integrand: simplify(t^2 * 1 + t * 2*t)
  integrand_simplified: t^2 + 2*t^2
  integrand_final: 3*t^2
  antiderivative: t^3
  answer: evaluate(antiderivative, t, t_end) - evaluate(antiderivative, t, t_start)
constraints:
  - a != b
  - answer == 8
question: "Evaluate the line integral {integral_of(F · dr, C)} where {vec(F)} = {F} and C is the curve parametrized by {vec(r)}(t) = {C_param} for t ∈ [{t_start}, {t_end}]."
answer: answer
solution:
  - "Parametrize the curve: x(t) = {x_t}, y(t) = {y_t}"
  - "Compute derivatives: dx/dt = {dx_dt}, dy/dt = {dy_dt}"
  - "On the curve, {vec(F)} = {F_on_C}"
  - "{vec(F)} · d{vec(r)} = {integrand}"
  - "Simplify: {integrand_final}"
  - "Integrate: ∫₀² {integrand_final} dt = [{antiderivative}]₀²"
  - "= {answer} - 0 = {answer}"