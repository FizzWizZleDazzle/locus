topic: multivariable_calculus/gradient
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(2, 5)
  f: a*x^3*y^2 + b*x^2*y^3 + c*x*y
  fx: derivative(f, x)
  fy: derivative(f, y)
  x0: choice(-2, -1, 1, 2)
  y0: choice(-2, -1, 1, 2)
  fx_at_point: evaluate(fx, x, x0, y, y0)
  fy_at_point: evaluate(fy, x, x0, y, y0)
  grad_magnitude_squared: fx_at_point^2 + fy_at_point^2
  answer: sqrt(grad_magnitude_squared)
question: "Let f(x,y) = {f}. Find the magnitude of the gradient vector of f at the point ({x0}, {y0})."
answer: answer
solution:
  - "First, find the partial derivatives:"
  - "{derivative_of(f, x)} = {fx}"
  - "{derivative_of(f, y)} = {fy}"
  - "Evaluate at ({x0}, {y0}):"
  - "fx({x0}, {y0}) = {fx_at_point}"
  - "fy({x0}, {y0}) = {fy_at_point}"
  - "The gradient is {vec([fx_at_point, fy_at_point])}"
  - "Magnitude: {norm([fx_at_point, fy_at_point])} = sqrt({fx_at_point}^2 + {fy_at_point}^2)"
  - "= sqrt({grad_magnitude_squared}) = {answer}"