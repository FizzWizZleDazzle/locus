topic: multivariable_calculus/gradient
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(1, 5)
  c: integer(-3, 3)
  f: a*x^2 + b*y^2 + c
  grad_x: derivative(f, x)
  grad_y: derivative(f, y)
  answer_x: 2*a*x
  answer_y: 2*b*y
question: "Find the gradient of {f}"
answer: answer_x
solution:
  - "The gradient is {vec((partial f / partial x, partial f / partial y))}"
  - "Take partial derivative with respect to x: {derivative_of(f, x)} = {answer_x}"
  - "Take partial derivative with respect to y: {derivative_of(f, y)} = {answer_y}"
  - "Therefore, gradient = {vec((answer_x, answer_y))}"