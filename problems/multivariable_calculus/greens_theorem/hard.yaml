topic: multivariable_calculus/greens_theorem
difficulty: hard
calculator: none
variables:
  a: integer(2, 4)
  b: integer(2, 4)
  P: a*x^2 - b*y
  Q: b*x + a*y^2
  dQ_dx: derivative(Q, x)
  dP_dy: derivative(P, y)
  integrand: dQ_dx - dP_dy
  r: integer(1, 3)
  area: 3.14159 * r^2
  area_rounded: round(area, 2)
  answer: round(integrand * area, 2)
constraints:
  - a != b
question: "Use Green's theorem to evaluate the line integral {integral_of(P dx + Q dy, C)} where P = {P}, Q = {Q}, and C is the circle x^2 + y^2 = {r^2} oriented counterclockwise."
answer: answer
solution:
  - "By Green's theorem: {integral_of(P dx + Q dy, C)} = {integral_of(integral_of(dQ/dx - dP/dy, dA), R)}"
  - "Calculate partial derivatives: dQ/dx = {dQ_dx}, dP/dy = {dP_dy}"
  - "So dQ/dx - dP/dy = {integrand}"
  - "The double integral becomes {integrand} times the area of the circle"
  - "Area = π({r})^2 = {area_rounded}"
  - "Therefore the integral equals {integrand} × {area_rounded} = {answer}"