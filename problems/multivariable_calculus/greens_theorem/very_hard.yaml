topic: multivariable_calculus/greens_theorem
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: choose clean circulation value first
  circulation: choice(12, 18, 24, 30, 36)
  # Pick dimensions that divide circulation nicely
  a: choice(2, 3, 4)
  b: choice(2, 3, 4)
  # Scale factors to match desired circulation
  k: circulation / (a * b)
  # Vector field F = (P, Q) where curl gives k
  P: -k * y / 2
  Q: k * x / 2
  # Rectangular region for clean computation
  region_desc: "[0, a] × [0, b]"
  curl_F: k
  area: a * b
  answer: circulation
constraints:
  - a != b
  - mod(circulation, a * b) == 0
question: "Use Green's theorem to evaluate the line integral of F = ({P}, {Q}) around the boundary of the rectangle {region_desc}, oriented counterclockwise."
answer: answer
solution:
  - "Green's theorem: {integral_of(F · dr, C)} = {integral_of(∂Q/∂x - ∂P/∂y, R)}"
  - "Compute partial derivatives: ∂Q/∂x = {k}/2, ∂P/∂y = {k}/2"
  - "So ∂Q/∂x - ∂P/∂y = {k}/2 + {k}/2 = {curl_F}"
  - "The double integral becomes: {integral_of(curl_F, R)} = {curl_F} × area of rectangle"
  - "Area of rectangle = {a} × {b} = {area}"
  - "Therefore: {curl_F} × {area} = {answer}"