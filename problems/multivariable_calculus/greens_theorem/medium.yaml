topic: multivariable_calculus/greens_theorem
difficulty: medium
calculator: scientific
variants:
  - name: default
    variables:
      a: integer(1, 4)
      b: integer(5, 9)
      x1: integer(0, 2)
      x2: integer(3, 5)
      y1: integer(0, 2)
      y2: integer(3, 5)
      curl: b - a
      width: x2 - x1
      height: y2 - y1
      area: width * height
      answer: curl * area
      P: a*y
      Q: b*x
      dQ_dx: b
      dP_dy: a
    question: |
      Let {math(C)} be the positively oriented boundary of the rectangle {math(x1 <= x <= x2)}, {math(y1 <= y <= y2)}. Use Green's Theorem to evaluate the line integral of {math(P*dx + Q*dy)} along {math(C)}.
    answer: answer
    answer_type: numeric
    solution:
      - By Green's Theorem, the line integral equals the double integral over the enclosed region {math(D)} of {partial_of(Q, x)} minus {partial_of(P, y)}.
      - Compute {partial_of(Q, x)} = {dQ_dx} and {partial_of(P, y)} = {dP_dy}.
      - The integrand reduces to the constant {curl}.
      - The rectangle {math(D)} has width {width} and height {height}, giving area {area}.
      - The line integral equals {curl} times {area} = {answer}.
