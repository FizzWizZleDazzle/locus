topic: multivariable_calculus/greens_theorem
difficulty: medium
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  P: a * x + b * y
  Q: -b * x + a * y
  dQ_dx: derivative(Q, x)
  dP_dy: derivative(P, y)
  integrand: dQ_dx - dP_dy
  answer: integrand
constraints:
  - a != b
question: "Let C be a positively oriented simple closed curve and D be the region it encloses. Given the vector field F = {vec(P, Q)} where P = {P} and Q = {Q}, find the integrand for Green's theorem: {integral_of(integral_of(?, y), x)} over D."
answer: answer
solution:
  - "Green's theorem states that the line integral around C equals the double integral over D"
  - "The integrand is {dQ_dx} - {dP_dy}"
  - "Calculate {derivative_of(Q, x)} = {dQ_dx}"
  - "Calculate {derivative_of(P, y)} = {dP_dy}"
  - "Therefore the integrand is {dQ_dx} - {dP_dy} = {answer}"