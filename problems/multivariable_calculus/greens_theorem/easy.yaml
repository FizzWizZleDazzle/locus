topic: multivariable_calculus/greens_theorem
difficulty: easy
calculator: none
variables:
  a: integer(1, 4)
  b: integer(1, 4)
  P: a * y
  Q: b * x
  curl: b - a
  R: integer(1, 3)
  area: 3.14159 * R * R
  answer: curl * area
constraints:
  - a != b
question: "Use Green's theorem to evaluate the line integral of F = {vec([P, Q])} around the circle x^2 + y^2 = {R}^2, oriented counterclockwise."
answer: answer
solution:
  - "Green's theorem: Line integral = {integral_of(integral_of(curl, y), x)} over the region"
  - "Compute curl: {derivative_of(Q, x)} - {derivative_of(P, y)} = {b} - {a} = {curl}"
  - "The region is a circle with radius {R}, so area = π({R})^2"
  - "By Green's theorem: Line integral = {curl} × π({R})^2 = {answer}"