topic: multivariable_calculus/directional_derivatives
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(-3, 3)
  d: integer(-3, 3)
  f: a*x^2 + b*y^2 + c*x*y + d
  fx: derivative(f, x)
  fy: derivative(f, y)
  x0: integer(-2, 2)
  y0: integer(-2, 2)
  fx_at_p: evaluate(fx, x, x0)
  fy_at_p: evaluate(fy, y, y0)
  theta_num: choice(1, 2, 3, 5)
  theta_den: choice(3, 4, 6, 6)
  u_x: cos(theta_num * pi / theta_den)
  u_y: sin(theta_num * pi / theta_den)
  dir_deriv: fx_at_p * u_x + fy_at_p * u_y
  answer: simplify(dir_deriv)
constraints:
  - a != b
  - abs(c) > 0
question: "Let f(x,y) = {f}. Find the directional derivative of f at the point ({x0}, {y0}) in the direction of the unit vector that makes an angle of {theta_num}π/{theta_den} with the positive x-axis."
answer: answer
solution:
  - "First find the gradient of f: ∇f = ({fx}, {fy})"
  - "At point ({x0}, {y0}): ∇f({x0}, {y0}) = ({fx_at_p}, {fy_at_p})"
  - "The unit vector in direction {theta_num}π/{theta_den} is u = (cos({theta_num}π/{theta_den}), sin({theta_num}π/{theta_den}))"
  - "The directional derivative is D_u f = ∇f · u = {fx_at_p} · cos({theta_num}π/{theta_den}) + {fy_at_p} · sin({theta_num}π/{theta_den})"
  - "D_u f = {answer}"