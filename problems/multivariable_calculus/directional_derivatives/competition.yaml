topic: multivariable_calculus/directional_derivatives
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(-3, 3)
  d: integer(-3, 3)
  f: a*x^2 + b*y^2 + c*x*y + d
  fx: derivative(f, x)
  fy: derivative(f, y)
  x0: integer(-5, 5)
  y0: integer(-5, 5)
  fx_at_point: evaluate(fx, x, x0)
  fy_at_point: evaluate(fy, y, y0)
  # Unit vector via Pythagorean triple: (p²-q², 2pq, p²+q²) ensures coupled components
  p: choice(2, 3)
  q: choice(1, 2)
  u1_num: p*p - q*q
  u2_num: 2*p*q
  u_denom: p*p + q*q
  # Directional derivative = (grad · u_hat) = (fx*u1 + fy*u2) / denom
  dir_deriv_num: fx_at_point * u1_num + fy_at_point * u2_num
  answer: dir_deriv_num / u_denom
constraints:
  - a != b
  - p > q
  - fx_at_point != 0 or fy_at_point != 0
question: "Let f(x,y) = {f}. Find the directional derivative of f at the point ({x0}, {y0}) in the direction of the unit vector u = ({u1_num}/{u_denom}, {u2_num}/{u_denom})."
answer: answer
solution:
  - "First, compute the gradient of f: ∇f = ({fx}, {fy})"
  - "Evaluate the gradient at ({x0}, {y0}): ∇f({x0}, {y0}) = ({fx_at_point}, {fy_at_point})"
  - "The directional derivative is ∇f · u = {fx_at_point} · {u1_num}/{u_denom} + {fy_at_point} · {u2_num}/{u_denom}"
  - "= ({fx_at_point} · {u1_num} + {fy_at_point} · {u2_num})/{u_denom}"
  - "= {dir_deriv_num}/{u_denom} = {answer}"