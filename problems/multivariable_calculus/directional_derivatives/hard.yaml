topic: multivariable_calculus/directional_derivatives
difficulty: hard
calculator: scientific
variants:
  - name: default
    variables:
      a: nonzero(-4, 4)
      b: nonzero(-4, 4)
      x0: integer(1, 3)
      y0: integer(1, 3)
      func: a*x^2*y + b*y^3
      fx: derivative(func, x)
      fy: derivative(func, y)
      fx_at: evaluate(fx, x, x0)
      fx_at_pt: evaluate(fx_at, y, y0)
      fy_at: evaluate(fy, x, x0)
      fy_at_pt: evaluate(fy_at, y, y0)
      term1: fx_at_pt * 3 / 5
      term2: fy_at_pt * 4 / 5
      answer: term1 + term2
    question: Find the directional derivative of {math(f(x,y))} = {func} at the point {math((x0, y0))} in the direction of the vector {math((3, 4))}.
    answer: answer
    answer_type: numeric
    solution:
      - The direction vector {math((3, 4))} has magnitude 5, so the unit vector is {math(u_1 = 3/5)} and {math(u_2 = 4/5)}.
      - 'Compute the partial derivatives: {equation(partial_of(func, x), fx)} and {equation(partial_of(func, y), fy)}.'
      - 'Evaluate the gradient at {math((x0, y0))}: {math(f_x)} = {fx_at_pt} and {math(f_y)} = {fy_at_pt}.'
      - 'Apply {math(D_u f = f_x u_1 + f_y u_2)}: {term1} + {term2} = {answer}.'
