topic: multivariable_calculus/double_integrals
difficulty: easy
calculator: none
variables:
  a: integer(1, 3)
  b: integer(2, 4)
  c: integer(1, 3)
  d: integer(2, 4)
  k: integer(2, 5)
  f: k
  inner: k * (d - c)
  answer: inner * (b - a)
constraints:
  - a < b
  - c < d
question: "Evaluate the double integral ∫∫ f(x,y) dA over the rectangle [{a}, {b}] × [{c}, {d}] where f(x,y) = {f}."
answer: answer
solution:
  - "Since f(x,y) = {f} is constant, we can evaluate as an iterated integral"
  - "First integrate with respect to y: ∫ {f} dy from {c} to {d} = {f}y evaluated from {c} to {d} = {f}({d} - {c}) = {inner}"
  - "Now integrate with respect to x: ∫ {inner} dx from {a} to {b} = {inner}x evaluated from {a} to {b} = {inner}({b} - {a}) = {answer}"