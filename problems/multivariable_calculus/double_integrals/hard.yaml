topic: multivariable_calculus/double_integrals
difficulty: hard
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(2, 4)
  d: integer(2, 4)
  m: integer(2, 4)
  n: integer(1, 3)
  f: m*x + n*y
  inner_integral: integral(f, x)
  inner_evaluated_upper: evaluate(inner_integral, x, b)
  inner_evaluated_lower: evaluate(inner_integral, x, a)
  inner_result: inner_evaluated_upper - inner_evaluated_lower
  outer_integral: integral(inner_result, y)
  outer_evaluated_upper: evaluate(outer_integral, y, d)
  outer_evaluated_lower: evaluate(outer_integral, y, c)
  answer: outer_evaluated_upper - outer_evaluated_lower
constraints:
  - a < b
  - c < d
question: "Evaluate the double integral of {f} over the region [{a}, {b}] × [{c}, {d}]"
answer: answer
solution:
  - "First integrate with respect to x: {integral_of(f, x)} from {a} to {b}"
  - "The antiderivative is {inner_integral}"
  - "Evaluating from {a} to {b}: {inner_evaluated_upper} - {inner_evaluated_lower} = {inner_result}"
  - "Now integrate with respect to y: {integral_of(inner_result, y)} from {c} to {d}"
  - "The antiderivative is {outer_integral}"
  - "Evaluating from {c} to {d}: {outer_evaluated_upper} - {outer_evaluated_lower} = {answer}"