topic: multivariable_calculus/double_integrals
difficulty: competition
calculator: none
variables:
  a: integer(2, 4)
  b: integer(2, 4)
  c: integer(1, 3)
  d: integer(1, 3)
  k: integer(2, 5)
  m: integer(1, 3)
  n: integer(1, 3)
  f: k * x^m * y^n
  x_lower: 0
  x_upper: a
  y_lower: c * x
  y_upper: d * x + b
  inner: integral(f, y)
  inner_eval: evaluate(inner, y, y_upper) - evaluate(inner, y, y_lower)
  inner_simplified: simplify(inner_eval)
  outer: integral(inner_simplified, x)
  result: evaluate(outer, x, x_upper) - evaluate(outer, x, x_lower)
  answer: simplify(result)
constraints:
  - d > c
  - a != b
question: "Evaluate {definite_integral_of(definite_integral_of(f, y, y_lower, y_upper), x, x_lower, x_upper)} where the region R is bounded by x = {x_lower}, x = {x_upper}, y = {y_lower}, and y = {y_upper}."
answer: answer
solution:
  - "Set up the iterated integral: {definite_integral_of(definite_integral_of(f, y, y_lower, y_upper), x, x_lower, x_upper)}"
  - "First integrate with respect to y: {integral_of(f, y)} = {inner}"
  - "Evaluate from y = {y_lower} to y = {y_upper}: {inner_simplified}"
  - "Now integrate with respect to x: {integral_of(inner_simplified, x)} = {outer}"
  - "Evaluate from x = {x_lower} to x = {x_upper}: {answer}"