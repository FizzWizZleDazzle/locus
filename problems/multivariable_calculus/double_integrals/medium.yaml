topic: multivariable_calculus/double_integrals
difficulty: medium
calculator: none
variables:
  a: integer(1, 4)
  b: integer(1, 4)
  c: integer(1, 3)
  d: integer(1, 3)
  f: c * x + d * y
  x_lower: 0
  x_upper: a
  y_lower: 0
  y_upper: b
  inner: integral(f, y)
  inner_eval: evaluate(inner, y, y_upper) - evaluate(inner, y, y_lower)
  outer: integral(inner_eval, x)
  answer: evaluate(outer, x, x_upper) - evaluate(outer, x, x_lower)
constraints:
  - a != b
question: "Evaluate the double integral {definite_integral_of(definite_integral_of(f, y, y_lower, y_upper), x, x_lower, x_upper)}"
answer: answer
solution:
  - "Set up the iterated integral: {definite_integral_of(definite_integral_of(f, y, y_lower, y_upper), x, x_lower, x_upper)}"
  - "First integrate with respect to y: {integral_of(f, y)} = {inner}"
  - "Evaluate from {y_lower} to {y_upper}: {inner_eval}"
  - "Now integrate with respect to x: {integral_of(inner_eval, x)} = {outer}"
  - "Evaluate from {x_lower} to {x_upper}: {answer}"