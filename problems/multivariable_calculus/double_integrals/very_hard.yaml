topic: multivariable_calculus/double_integrals
difficulty: very_hard
calculator: none
variables:
  a: integer(1, 3)
  b: integer(1, 3)
  c: integer(2, 4)
  d: integer(2, 4)
  m: integer(2, 4)
  n: integer(2, 4)
  f: m*x^2 + n*y^2
  inner_integrated: integral(f, x)
  inner_at_b: evaluate(inner_integrated, x, b)
  inner_at_a: evaluate(inner_integrated, x, a)
  inner_result: inner_at_b - inner_at_a
  outer_integrated: integral(inner_result, y)
  outer_at_d: evaluate(outer_integrated, y, d)
  outer_at_c: evaluate(outer_integrated, y, c)
  answer: outer_at_d - outer_at_c
constraints:
  - a < b
  - c < d
question: "Evaluate the double integral of {f} over the rectangle [{a}, {b}] × [{c}, {d}]"
answer: answer
solution:
  - "First integrate with respect to x: {integral_of(f, x)} from {a} to {b}"
  - "The antiderivative is {inner_integrated}"
  - "Evaluating from {a} to {b}: {inner_at_b} - {inner_at_a} = {inner_result}"
  - "Now integrate with respect to y: {integral_of(inner_result, y)} from {c} to {d}"
  - "The antiderivative is {outer_integrated}"
  - "Evaluating from {c} to {d}: {outer_at_d} - {outer_at_c} = {answer}"