topic: algebra2/radical_equations
difficulty: medium
calculator: none
variables:
  a: integer(1, 5)
  b: integer(1, 8)
  perfect_square: a^2
  inner: perfect_square + b
  c: integer(2, 9)
  rhs: a + c
  equation_form: sqrt(x + b)
  answer: inner
constraints:
  - c > a
  - gcd(b, perfect_square) == 1
question: "Solve for x: {equation(equation_form, rhs)}"
answer: answer
solution:
  - "Start with {equation(equation_form, rhs)}"
  - "Square both sides: {equation(x + b, rhs^2)}"
  - "So x + {b} = {evaluate(rhs^2, rhs, rhs)}"
  - "Subtract {b} from both sides: x = {evaluate(rhs^2 - b, rhs, rhs)}"
  - "Check: {equation_form} = {sqrt(answer + b)} = {sqrt(inner)} = {rhs} ✓"