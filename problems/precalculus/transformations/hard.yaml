topic: precalculus/transformations
difficulty: hard
calculator: graphing
variables:
  # Base function with nice properties
  base: choice("sin(x)", "cos(x)", "x^2", "sqrt(x)", "abs(x)")
  # Transformations - design for clean composition
  a: choice(-3, -2, -1, 1, 2, 3)
  h: integer(-4, 4)
  k: integer(-3, 3)
  # Build transformed function
  inner: a * (x - h)
  f: evaluate(base, x, inner) + k
  # Key points for analysis
  x1: h
  x2: h + 1
  x3: h - 1
  y1: evaluate(f, x, x1)
  y2: evaluate(f, x, x2)
  y3: evaluate(f, x, x3)
  # Inverse transformations
  a_inv: 1/a
  h_inv: -h
  k_inv: -k
constraints:
  - h != 0
  - k != 0
  - abs(a) > 1
question: "Given the transformed function {equation(f, base)}, identify all transformations applied. Then find three points on the transformed graph and determine the sequence of transformations needed to return to the parent function."
answer: a_inv
answer_type: expression
solution:
  - "The function {f} is derived from {base} with transformations:"
  - "Horizontal shift: {h} units (right if positive, left if negative)"
  - "Horizontal scaling: factor of {abs_of(a_inv)} (stretch if < 1, compress if > 1)"
  - "Reflection: across y-axis if {a} < 0"
  - "Vertical shift: {k} units (up if positive, down if negative)"
  - "Three points on the transformed graph:"
  - "({x1}, {y1}), ({x2}, {y2}), ({x3}, {y3})"
  - "To return to parent function, apply inverse transformations:"
  - "1. Vertical shift by {k_inv}"
  - "2. Horizontal scaling by factor {abs_of(a_inv)}"
  - "3. Reflection if needed"
  - "4. Horizontal shift by {h_inv}"