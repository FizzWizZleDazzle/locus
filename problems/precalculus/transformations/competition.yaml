topic: precalculus/transformations
difficulty: competition
calculator: graphing
variables:
  a: choice(2, 3, 4)
  h: integer(-3, 3)
  k: integer(-4, 4)
  p: integer(-5, 5)
  q: integer(-5, 5)
  f: sqrt(x)
  g: a * sqrt(x - h) + k
  transformed_point: (a^2 * (p - h) + h, a * sqrt(p - h) + k)
  x_coord: a^2 * (p - h) + h
  y_coord: a * sqrt(p - h) + k
  original_y: sqrt(p)
  answer: q
constraints:
  - p - h >= 0
  - p >= 1
  - q == y_coord
question: "Let f(x) = {f} and g(x) = {g}. If the point ({p}, {original_y}) on the graph of f is transformed to the point ({x_coord}, {q}) on the graph of g, find the value of {q}."
answer: answer
solution:
  - "The transformation from f(x) = {f} to g(x) = {g} involves:"
  - "• Horizontal shift right by {h} units"
  - "• Vertical stretch by factor {a}"
  - "• Vertical shift up by {k} units"
  - "Starting point on f: ({p}, {original_y})"
  - "After horizontal shift: ({p} - {h}, {original_y}) = ({evaluate(p - h, p, p)}, {original_y})"
  - "After vertical stretch: ({evaluate(p - h, p, p)}, {a} · {original_y}) = ({evaluate(p - h, p, p)}, {evaluate(a * original_y, a, a)})"
  - "After vertical shift: ({evaluate(p - h, p, p)}, {evaluate(a * original_y, a, a)} + {k}) = ({evaluate(p - h, p, p)}, {y_coord})"
  - "But we need the x-coordinate on g, so we solve {equation(sqrt(x - h), sqrt(p - h))} for x"
  - "This gives x = {x_coord}"
  - "Therefore the transformed point is ({x_coord}, {y_coord})"
  - "So {q} = {answer}"