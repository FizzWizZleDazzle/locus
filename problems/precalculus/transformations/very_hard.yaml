topic: precalculus/transformations
difficulty: very_hard
calculator: graphing
variables:
  a: choice(2, 3, 4)
  h: integer(-3, 3)
  k: nonzero(-4, 4)
  b: choice(1/2, 1/3, 1/4)
  f: sqrt(x)
  g: a * sqrt(b * (x - h)) + k
  x_val: integer(4, 16)
  constraint_check: b * (x_val - h)
  y_original: evaluate(f, x, x_val)
  x_transformed: (x_val - h) / (1/b) + h
  y_transformed: a * y_original + k
  answer: x_transformed
constraints:
  - h != 0
  - constraint_check > 0
  - mod(x_val, 4) == 0
question: "Let {equation(f(x), sqrt(x))}. Define {equation(g(x), a * sqrt(b * (x - h)) + k)} where a = {a}, b = {b}, h = {h}, and k = {k}. If the point ({x_val}, {y_original}) is on the graph of f, find the x-coordinate of the corresponding point on the graph of g."
answer: answer
solution:
  - "The transformation from f to g involves: vertical stretch by {a}, horizontal compression by {b}, horizontal shift by {h}, and vertical shift by {k}."
  - "Given point on f: ({x_val}, {y_original})"
  - "For horizontal transformations: if (x₀, y₀) is on f, then the corresponding point on g has x-coordinate satisfying b(x - h) = x₀"
  - "Solving {equation(b * (x - h), x_val)}:"
  - "{equation((x - h) / (1/b), x_val)}"
  - "{equation(x - h, x_val * (1/b))}"
  - "{equation(x, x_val * (1/b) + h)} = {answer}"
  - "The y-coordinate would be {equation(a * y_original + k, y_transformed)}"
  - "So the corresponding point is ({answer}, {y_transformed})"