topic: precalculus/function_composition
difficulty: very_hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: nonzero(-5, 5)
  d: integer(-8, 8)
  k: nonzero(-4, 4)
  f: a*x + b
  g: c*x^2 + d
  h: k*x
  fog: simplify(evaluate(f, x, g))
  goh: simplify(evaluate(g, x, h))
  fogoh: simplify(evaluate(fog, x, h))
  answer: fogoh
constraints:
  - a*c != 0
  - abs(a*c*k) <= 20
question: "Given {equation(f(x), f)}, {equation(g(x), g)}, and {equation(h(x), h)}, find (f ∘ g ∘ h)(x)."
answer: answer
solution:
  - "First find (g ∘ h)(x) by substituting h(x) into g(x)"
  - "g(h(x)) = g({h}) = c({h})^2 + d"
  - "= c({k}x)^2 + d = {c*k^2}x^2 + {d}"
  - "So (g ∘ h)(x) = {goh}"
  - "Now find (f ∘ g ∘ h)(x) by substituting (g ∘ h)(x) into f(x)"
  - "f((g ∘ h)(x)) = f({goh}) = a({goh}) + b"
  - "= {a}({goh}) + {b}"
  - "= {answer}"