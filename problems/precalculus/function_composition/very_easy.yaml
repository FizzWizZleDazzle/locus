topic: precalculus/function_composition
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: integer(2, 6)
  d: integer(1, 3)
  x_val: integer(1, 4)
  f: a * x + b
  g: c * x - d
  g_of_x: evaluate(g, x, x_val)
  answer: evaluate(f, x, g_of_x)
constraints:
  - g_of_x > 0
  - answer < 50
question: "If f(x) = {f} and g(x) = {g}, find (f ∘ g)({x_val})."
answer: answer
solution:
  - "First find g({x_val}) = {c} · {x_val} - {d} = {g_of_x}"
  - "Then find f(g({x_val})) = f({g_of_x})"
  - "f({g_of_x}) = {a} · {g_of_x} + {b} = {answer}"