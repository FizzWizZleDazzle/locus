topic: precalculus/function_composition
difficulty: medium
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: nonzero(-5, 5)
  d: integer(-8, 8)
  f: a * x + b
  g: c * x + d
  x_val: integer(-3, 3)
  g_of_x: evaluate(g, x, x_val)
  f_of_g_of_x: evaluate(f, x, g_of_x)
  answer: f_of_g_of_x
constraints:
  - abs(g_of_x) <= 10
  - abs(f_of_g_of_x) <= 20
question: "Let f(x) = {f} and g(x) = {g}. Find (f ∘ g)({x_val})."
answer: answer
solution:
  - "To find (f ∘ g)({x_val}), first find g({x_val})"
  - "g({x_val}) = {c} · {x_val} + {d} = {g_of_x}"
  - "Now find f(g({x_val})) = f({g_of_x})"
  - "f({g_of_x}) = {a} · {g_of_x} + {b} = {f_of_g_of_x}"