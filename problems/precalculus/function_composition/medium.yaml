topic: precalculus/function_composition
difficulty: medium
calculator: none
variables:
  a: nonzero(-4, 4)
  b: integer(-5, 5)
  c: nonzero(-3, 3)
  d: integer(-4, 4)
  f: a*x + b
  g: c*x + d
  x_val: integer(-3, 3)
  g_at_x: evaluate(g, x, x_val)
  answer: evaluate(f, x, g_at_x)
constraints:
  - a != c
question: "Given f(x) = {f} and g(x) = {g}, find (f ∘ g)({x_val})."
answer: answer
solution:
  - "To find (f ∘ g)({x_val}), first compute g({x_val})"
  - "g({x_val}) = {c}({x_val}) + {d} = {g_at_x}"
  - "Then compute f(g({x_val})) = f({g_at_x})"
  - "f({g_at_x}) = {a}({g_at_x}) + {b} = {answer}"