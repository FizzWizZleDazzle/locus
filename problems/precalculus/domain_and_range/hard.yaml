topic: precalculus/domain_and_range
difficulty: hard
calculator: scientific
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: integer(2, 8)
  d: integer(-8, 8)
  numerator: a*x + b
  denominator: (x - c)*(x - d)
  f: numerator/denominator
  vertical_asymptote_1: c
  vertical_asymptote_2: d
  horizontal_asymptote: 0
  min_val: min(c, d)
  max_val: max(c, d)
constraints:
  - c != d
  - abs(c - d) >= 2
question: "Find the domain of the rational function f(x) = {f}. Express your answer in interval notation."
answer: min_val
answer_type: custom
solution:
  - "The function f(x) = {f} is undefined when the denominator equals zero"
  - "Set the denominator equal to zero: {equation(denominator, 0)}"
  - "Factor: (x - {c})(x - {d}) = 0"
  - "This gives x = {c} or x = {d}"
  - "The function has vertical asymptotes at x = {vertical_asymptote_1} and x = {vertical_asymptote_2}"
  - "Therefore, the domain is all real numbers except x = {c} and x = {d}"
  - "In interval notation: (-∞, {min_val}) ∪ ({min_val}, {max_val}) ∪ ({max_val}, ∞)"