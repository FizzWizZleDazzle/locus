topic: precalculus/domain_and_range
difficulty: very_hard
calculator: graphing
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  c: integer(2, 6)
  d: nonzero(-4, 4)
  k: integer(1, 4)
  h: integer(-5, 5)
  inner: a*x + b
  denom: c*x + d
  f: sqrt(inner) / denom
  critical_x: -d/c
  sqrt_zero: -b/a
  domain_start: max(sqrt_zero, critical_x + 0.1)
  domain_end: critical_x - 0.1
  test_val: (domain_start + domain_end) / 2
  y_at_test: evaluate(f, x, test_val)
  range_bound: evaluate(f, x, domain_end)
constraints:
  - a * d != b * c
  - sqrt_zero < critical_x
  - abs(critical_x - sqrt_zero) > 1
question: "Find the domain and range of {equation(f(x), f)}. Express the domain as an interval and describe the range."
answer: domain_and_range
answer_type: text
solution:
  - "For {equation(f(x), f)} to be defined:"
  - "1) The expression under the square root must be non-negative: {inner} ≥ 0"
  - "   This gives x ≥ {sqrt_zero}"
  - "2) The denominator cannot be zero: {denom} ≠ 0"
  - "   This gives x ≠ {critical_x}"
  - "Since {sqrt_zero} < {critical_x}, the domain is [{sqrt_zero}, {critical_x})"
  - "For the range, as x approaches {critical_x} from the left, the denominator approaches 0"
  - "Since the numerator approaches {equation(sqrt(a*critical_x + b), sqrt(inner))} > 0, f(x) → +∞"
  - "At x = {sqrt_zero}, f({sqrt_zero}) = 0"
  - "Therefore, the range is [0, +∞)"