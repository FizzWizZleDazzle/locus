topic: precalculus/domain_and_range
difficulty: medium
calculator: none
variables:
  a: nonzero(-8, 8)
  b: integer(-8, 8)
  c: nonzero(-8, 8)
  numerator: a*x + b
  f: numerator / (x - c)
  domain_exclude: c
  range_exclude: a
constraints:
  - abs(a) != abs(c)
  - b != a * c
question: "Find the domain and range of {equation(f(x), f)}. Express your answer using interval notation."
answer: domain_exclude
answer_type: domain_range
solution:
  - "The function {equation(f(x), f)} is undefined when the denominator equals zero"
  - "Set x - {c} = 0, so x = {c}"
  - "Domain: (-∞, {c}) ∪ ({c}, ∞)"
  - "For the range, rewrite as y = {f}"
  - "Solve for x: y(x - {c}) = {numerator}"
  - "yx - {c}y = {a}x + {b}"
  - "yx - {a}x = {c}y + {b}"
  - "x(y - {a}) = {c}y + {b}"
  - "This has no solution when y = {a}, so {a} is not in the range"
  - "Range: (-∞, {a}) ∪ ({a}, ∞)"