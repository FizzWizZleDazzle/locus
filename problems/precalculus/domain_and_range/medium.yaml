topic: precalculus/domain_and_range
difficulty: medium
calculator: none
variants:
  - name: default
    variables:
      a: integer(2, 5)
      b: nonzero(-8, 8)
      x_min: -b/a
      func: sqrt(a*x + b)
      neg_b: -b
    question: Find the domain of the function {math(y = func)}. Give your answer as the minimum value of {math(x)} for which the function is defined.
    answer: x_min
    answer_type: numeric
    solution:
      - 'The expression under the square root must be non-negative: {math(a*x + b >= 0)}.'
      - 'Subtract {b} from both sides: {math(a*x >= neg_b)}.'
      - 'Divide both sides by {a}: {math(x >= x_min)}.'
      - The domain is all {math(x >= x_min)}, so the minimum value is {x_min}.
