topic: precalculus/sum_difference_formulas
difficulty: very_easy
calculator: none
variables:
  angle1: choice(0, 30, 45, 60, 90)
  angle2: choice(0, 30, 45, 60, 90)
  sum_angle: angle1 + angle2
  answer: sin(sum_angle)
constraints:
  - angle1 != angle2
  - sum_angle <= 90
question: "Find the exact value of sin({angle1}° + {angle2}°)"
answer: answer
solution:
  - "Use the sine addition formula: sin(A + B) = sin(A)cos(B) + cos(A)sin(B)"
  - "sin({angle1}° + {angle2}°) = sin({angle1}°)cos({angle2}°) + cos({angle1}°)sin({angle2}°)"
  - "Substitute known values from special angles"
  - "sin({angle1}° + {angle2}°) = {answer}"