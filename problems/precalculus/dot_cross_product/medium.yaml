topic: precalculus/dot_cross_product
difficulty: medium
calculator: scientific

variables:
  a1: nonzero(-5, 5)
  a2: integer(-5, 5)
  a3: nonzero(-5, 5)
  b1: nonzero(-5, 5)
  b2: integer(-5, 5)
  b3: nonzero(-5, 5)
  term1: a1*b1
  term2: a2*b2
  term3: a3*b3
  answer: a1*b1 + a2*b2 + a3*b3

question: "Find the dot product of the vectors {vec([a1, a2, a3])} and {vec([b1, b2, b3])}."

answer: answer
answer_type: numeric

solution:
  - "Use the dot product formula: multiply each pair of corresponding components, then add."
  - "({a1})({b1}) + ({a2})({b2}) + ({a3})({b3})"
  - "= {term1} + {term2} + {term3}"
  - "= {answer}"
