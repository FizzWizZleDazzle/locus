topic: precalculus/dot_cross_product
difficulty: very_easy
calculator: none
variables:
  a1: integer(1, 5)
  a2: integer(1, 5)
  b1: integer(1, 5)
  b2: integer(1, 5)
  answer: a1*b1 + a2*b2
question: "Find the dot product of vectors a = ({a1}, {a2}) and b = ({b1}, {b2})."
answer: answer
answer_type: numeric
solution:
  - "The dot product of two 2D vectors is: a·b = a₁b₁ + a₂b₂"
  - "Substitute: ({a1})({b1}) + ({a2})({b2})"
  - "Calculate: {a1*b1} + {a2*b2} = {answer}"