topic: precalculus/inverse_trig_functions
difficulty: hard
calculator: scientific
variables:
  # Design backward: pick angle first, then build the composition
  theta: choice(pi/6, pi/4, pi/3, 2*pi/3, 3*pi/4, 5*pi/6)
  # Pick a trig function and its value at theta
  trig_val: sin(theta)
  # Create a scaled version to make it harder
  k: choice(2, 3, 4)
  scaled_val: k * trig_val
  # Build the composition problem
  inner_expr: asin(x/k)
  outer_expr: cos(inner_expr)
  # The answer when x = scaled_val
  answer: cos(theta)
constraints:
  - abs(scaled_val) <= k  # Ensures asin domain is valid
question: "Find the exact value of {equation(cos(asin(x/k)), outer_expr)} when x = {scaled_val}."
answer: answer
solution:
  - "Substitute x = {scaled_val}: cos(asin({scaled_val}/{k}))"
  - "Simplify the fraction: cos(asin({trig_val}))"
  - "Let α = asin({trig_val}), so sin(α) = {trig_val}"
  - "Since sin({theta}) = {trig_val}, we have α = {theta}"
  - "Therefore cos(asin({trig_val})) = cos({theta}) = {answer}"