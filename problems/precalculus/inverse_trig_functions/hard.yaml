topic: precalculus/inverse_trig_functions
difficulty: hard
calculator: none

variables:
  input_val: choice(1/2, sqrt(2)/2, sqrt(3)/2)
  outer_arg: asin(input_val)
  answer: cos(asin(input_val))

question: "Find the exact value of {math(cos(asin(input_val)))}."

answer: answer
answer_type: expression

solution:
  - "Let {math(theta)} = {math(asin(input_val))}, so {equation(sin(theta), input_val)} with {math(theta)} in the principal range of arcsin."
  - "Use the Pythagorean identity {equation(sin(theta)^2 + cos(theta)^2, 1)}, with {math(cos(theta) >= 0)} on the principal range."
  - "Therefore {equation(cos(theta), sqrt(1 - input_val^2))}."
  - "The exact value is {answer}."
