topic: precalculus/inverse_trig_functions
difficulty: very_easy
calculator: none
variables:
  angle: choice(0, 30, 45, 60, 90)
  rad_angle: angle * pi / 180
  trig_func: choice("sin", "cos")
  value: evaluate(sin(rad_angle), x, 0) if trig_func == "sin" else evaluate(cos(rad_angle), x, 0)
  answer: angle
question: "Find the value in degrees: arc{trig_func}({value})"
answer: answer
solution:
  - "We need to find the angle whose {trig_func} is {value}"
  - "Recall that {trig_func}({angle}°) = {value}"
  - "Therefore, arc{trig_func}({value}) = {angle}°"