topic: precalculus/inverse_trig_functions
difficulty: medium
calculator: scientific
variables:
  angle: choice(0, 30, 45, 60, 90, 120, 135, 150, 180)
  rad_angle: angle * pi / 180
  trig_func: choice("sin", "cos", "tan")
  trig_value: evaluate(trig_func + "(rad_angle)", rad_angle, rad_angle)
  answer: angle
constraints:
  - trig_func != "tan" or angle != 90
  - trig_func != "cos" or angle <= 180
  - trig_func != "sin" or angle <= 180
question: "Find the value of {trig_func}^(-1)({trig_value}) in degrees, where the angle is in the principal range."
answer: answer
solution:
  - "We need to find the angle whose {trig_func} value is {trig_value}"
  - "Recall that {trig_func}({angle}°) = {trig_value}"
  - "Since {angle}° is in the principal range for {trig_func}^(-1), we have:"
  - "{trig_func}^(-1)({trig_value}) = {angle}°"