topic: precalculus/inverse_trig_functions
difficulty: very_hard
calculator: scientific
variables:
  # Design backwards: pick angle first, then build the composition
  theta: choice(pi/6, pi/4, pi/3, 2*pi/3, 3*pi/4, 5*pi/6)
  # Pick a trig ratio that gives a clean value at theta
  trig_val: sin(theta)
  # Build nested composition that simplifies nicely
  inner: asin(trig_val)
  # Add a coefficient that creates a clean multiple of pi
  k: choice(2, 3, 4, 6)
  # Ensure the argument to cos stays in [0, pi] for real output
  arg: k * inner
  outer: cos(arg)
  # The answer is cos(k*theta)
  answer: simplify(outer)
constraints:
  - arg <= pi
  - arg >= 0
question: "Evaluate {equation('cos(' + str(k) + ' * arcsin(' + str(trig_val) + '))', '?')}"
answer: answer
solution:
  - "Let {equation('alpha', 'arcsin(' + str(trig_val) + ')')}"
  - "Since {equation('sin(alpha)', str(trig_val))}, we have {equation('alpha', str(inner))}"
  - "We need to find {equation('cos(' + str(k) + ' * alpha)', 'cos(' + str(k) + ' * ' + str(inner) + ')')}"
  - "This equals {equation('cos(' + str(arg) + ')', str(answer))}"