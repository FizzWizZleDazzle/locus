topic: precalculus/inverse_trig_functions
difficulty: very_hard
calculator: scientific
variables:
  k: integer(2, 5)
  m: integer(1, 4)
  angle: choice(pi/6, pi/4, pi/3, 2*pi/3, 3*pi/4, 5*pi/6)
  inner: k * angle
  trig_val: sin(inner)
  composed: asin(trig_val) / m
  answer: simplify(composed)
constraints:
  - abs(trig_val) <= 1
  - k * angle <= pi
  - k * angle >= 0
question: "Evaluate {equation(asin(sin(k * angle)) / m, answer)} where angle = {angle}"
answer: answer
solution:
  - "First evaluate the inner expression: sin({k} × {angle}) = sin({inner})"
  - "Since {inner} is in [0, π], we have sin({inner}) = {trig_val}"
  - "Now find arcsin({trig_val}). Since {trig_val} = sin({inner}) and {inner} ∈ [0, π/2] ∪ [π/2, π], arcsin returns the angle in [-π/2, π/2] with the same sine value"
  - "If {inner} ≤ π/2, then arcsin({trig_val}) = {inner}"
  - "If {inner} > π/2, then arcsin({trig_val}) = π - {inner}"
  - "In this case, arcsin({trig_val}) = {asin(trig_val)}"
  - "Finally, divide by {m}: {asin(trig_val)} / {m} = {answer}"