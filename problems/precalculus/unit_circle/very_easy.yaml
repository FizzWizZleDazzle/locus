topic: precalculus/unit_circle
difficulty: very_easy
calculator: none
variables:
  angle_choice: choice(0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330)
  angle_rad: angle_choice * pi / 180
  cos_val: cos(angle_rad)
  sin_val: sin(angle_rad)
  answer: sin_val
question: "Find the exact value of sin({angle_choice}°)."
answer: answer
solution:
  - "On the unit circle, {angle_choice}° corresponds to {angle_rad} radians"
  - "At this angle, the y-coordinate gives us sin({angle_choice}°)"
  - "sin({angle_choice}°) = {answer}"