topic: precalculus/unit_circle
difficulty: medium
calculator: none
variables:
  angle_num: choice(1, 2, 3, 4, 5, 7, 11)
  angle_den: choice(3, 4, 6)
  angle: angle_num * pi / angle_den
  cos_val: cos(angle)
  sin_val: sin(angle)
  tan_val: tan(angle)
  question_type: choice("sin", "cos", "tan")
  answer: choice(sin_val, cos_val, tan_val)
constraints:
  - angle_num < angle_den * 2
  - (question_type == "sin" and answer == sin_val) or (question_type == "cos" and answer == cos_val) or (question_type == "tan" and answer == tan_val)
  - question_type != "tan" or angle_num != angle_den / 2
question: "Find the exact value of {question_type}({angle_num}π/{angle_den})."
answer: answer
solution:
  - "The angle {angle_num}π/{angle_den} is in standard position on the unit circle"
  - "This corresponds to {angle} radians"
  - "From the unit circle, we can read the coordinates"
  - "cos({angle_num}π/{angle_den}) = {cos_val}"
  - "sin({angle_num}π/{angle_den}) = {sin_val}"
  - "Therefore, {question_type}({angle_num}π/{angle_den}) = {answer}"