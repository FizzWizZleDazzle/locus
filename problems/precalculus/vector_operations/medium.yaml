topic: precalculus/vector_operations
difficulty: medium
calculator: none
variables:
  a1: integer(-5, 5)
  a2: integer(-5, 5)
  b1: integer(-5, 5)
  b2: integer(-5, 5)
  k: nonzero(-3, 3)
  c1: a1 + k*b1
  c2: a2 + k*b2
  answer: k
constraints:
  - b1 != 0
  - b2 != 0
question: "Given vectors a = ({a1}, {a2}), b = ({b1}, {b2}), and c = ({c1}, {c2}), find the scalar k such that c = a + kb."
answer: answer
answer_type: numeric
solution:
  - "We need c = a + kb"
  - "Component-wise: ({c1}, {c2}) = ({a1}, {a2}) + k({b1}, {b2})"
  - "This gives us: ({c1}, {c2}) = ({a1}, {a2}) + ({k*b1}, {k*b2})"
  - "From the first component: {c1} = {a1} + k * {b1}"
  - "Solving for k: k = ({c1} - {a1}) / {b1} = {c1 - a1} / {b1} = {k}"
  - "Verify with second component: {a2} + {k} * {b2} = {a2} + {k*b2} = {c2} ✓"