topic: precalculus/vector_operations
difficulty: medium
calculator: none
variables:
  a1: integer(-5, 5)
  a2: integer(-5, 5)
  b1: integer(-5, 5)
  b2: integer(-5, 5)
  k: integer(2, 4)
  u: vector(2, -5, 5)
  v: vector(2, -5, 5)
  ku1: k * a1
  ku2: k * a2
  sum1: ku1 + b1
  sum2: ku2 + b2
  answer: vector(2, -15, 15)
constraints:
  - a1^2 + a2^2 != 0
  - b1^2 + b2^2 != 0
  - abs(sum1) <= 15 and abs(sum2) <= 15
question: "Given vectors {vec(u)} = ({a1}, {a2}) and {vec(v)} = ({b1}, {b2}), find {k}{vec(u)} + {vec(v)}."
answer: answer
answer_type: vector
solution:
  - "First compute {k}{vec(u)} = {k} · ({a1}, {a2})"
  - "= ({ku1}, {ku2})"
  - "Now add the vectors: ({ku1}, {ku2}) + ({b1}, {b2})"
  - "= ({sum1}, {sum2})"