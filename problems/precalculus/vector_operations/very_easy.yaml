topic: precalculus/vector_operations
difficulty: very_easy
calculator: none
variables:
  a1: integer(-5, 5)
  a2: integer(-5, 5)
  b1: integer(-5, 5)
  b2: integer(-5, 5)
  sum1: a1 + b1
  sum2: a2 + b2
  answer: sum1, sum2
question: "Find the sum of vectors a = ({a1}, {a2}) and b = ({b1}, {b2})."
answer: answer
answer_type: tuple
solution:
  - "To add vectors, add corresponding components"
  - "First component: {a1} + {b1} = {sum1}"
  - "Second component: {a2} + {b2} = {sum2}"
  - "Therefore, a + b = ({sum1}, {sum2})"