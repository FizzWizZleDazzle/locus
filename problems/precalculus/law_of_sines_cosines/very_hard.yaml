topic: precalculus/law_of_sines_cosines
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: pick angles that give clean side ratios
  A: choice(30, 45, 60, 120, 135, 150)
  B: choice(30, 45, 60, 120, 135, 150)
  C: 180 - A - B
  # Pick a clean side length
  a: integer(5, 12)
  # Use law of sines to get other sides
  b: a * sin(B * pi / 180) / sin(A * pi / 180)
  c: a * sin(C * pi / 180) / sin(A * pi / 180)
  # Round to ensure clean values
  b_clean: round(b, 2)
  c_clean: round(c, 2)
  # Now create an ambiguous case: given two sides and non-included angle
  given_side1: b_clean
  given_side2: c_clean
  given_angle: A
  # Find the two possible values for angle B using law of sines
  sin_B: given_side1 * sin(given_angle * pi / 180) / given_side2
  B1: asin(sin_B) * 180 / pi
  B2: 180 - B1
  # Calculate corresponding C values
  C1: 180 - given_angle - B1
  C2: 180 - given_angle - B2
  # Calculate the third side for each triangle using law of cosines
  side1: sqrt(given_side1^2 + given_side2^2 - 2 * given_side1 * given_side2 * cos(C1 * pi / 180))
  side2: sqrt(given_side1^2 + given_side2^2 - 2 * given_side1 * given_side2 * cos(C2 * pi / 180))
  answer1: round(side1, 2)
  answer2: round(side2, 2)
constraints:
  - A + B < 180
  - A != B
  - sin_B < 1
question: "In triangle ABC, side b = {given_side1}, side c = {given_side2}, and angle A = {given_angle}°. Find all possible values for side a. Round to 2 decimal places."
answer: answer1, answer2
answer_type: set
solution:
  - "Given: b = {given_side1}, c = {given_side2}, A = {given_angle}°"
  - "Using the Law of Sines: sin(B)/b = sin(A)/c"
  - "sin(B) = b·sin(A)/c = {given_side1}·sin({given_angle}°)/{given_side2} = {round(sin_B, 4)}"
  - "This gives two possible angles: B₁ = {round(B1, 1)}° or B₂ = {round(B2, 1)}°"
  - "For B₁ = {round(B1, 1)}°: C₁ = 180° - {given_angle}° - {round(B1, 1)}° = {round(C1, 1)}°"
  - "Using Law of Cosines: a₁² = b² + c² - 2bc·cos(C₁)"
  - "a₁² = {given_side1}² + {given_side2}² - 2({given_side1})({given_side2})cos({round(C1, 1)}°)"
  - "a₁ = {answer1}"
  - "For B₂ = {round(B2, 1)}°: C₂ = 180° - {given_angle}° - {round(B2, 1)}° = {round(C2, 1)}°"
  - "Using Law of Cosines: a₂² = b² + c² - 2bc·cos(C₂)"
  - "a₂² = {given_side1}² + {given_side2}² - 2({given_side1})({given_side2})cos({round(C2, 1)}°)"
  - "a₂ = {answer2}"
  - "Therefore, the two possible values for side a are {answer1} and {answer2}"