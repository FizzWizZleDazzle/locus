topic: precalculus/law_of_sines_cosines
difficulty: hard
calculator: scientific
variants:
  - name: default
    variables:
      a: integer(4, 10)
      b: integer(4, 10)
      C_deg: choice(60, 90, 120)
      cos_C: cos(C_deg * pi / 180)
      c2: a^2 + b^2 - 2*a*b*cos_C
      c: sqrt(c2)
      answer: c
    constraints:
      - a != b
    question: In triangle {math(ABC)}, side {math(a)} = {a}, side {math(b)} = {b}, and the included angle {math(C)} = {C_deg} degrees. Find side {math(c)} using the Law of Cosines.
    answer: answer
    answer_type: expression
    solution:
      - 'The Law of Cosines: {math(c^2 = a^2 + b^2 - 2*a*b*cos(C))}.'
      - Compute {math(a^2)} = {a*a}, {math(b^2)} = {b*b}, and {math(2*a*b)} = {2*a*b}.
      - '{equation(cos(C_deg * pi / 180), cos_C)}.'
      - 'Substitute: {equation(c^2, c2)}.'
      - 'Take the positive square root: {equation(c, c)}.'
