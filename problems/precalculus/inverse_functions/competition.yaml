topic: precalculus/inverse_functions
difficulty: competition
calculator: none
variables:
  a: prime(2, 7)
  b: prime(2, 7)
  c: nonzero(-5, 5)
  d: nonzero(-5, 5)
  f: (a*x + b)/(c*x + d)
  det: a*d - b*c
  f_inv: (d*x - b)/(-c*x + a)
  x0: integer(2, 8)
  y0: evaluate(f, x, x0)
  check_val: evaluate(f_inv, x, y0)
  composition: simplify((a*(d*x - b)/(-c*x + a) + b)/(c*(d*x - b)/(-c*x + a) + d))
constraints:
  - det != 0
  - c*x0 + d != 0
  - -c*y0 + a != 0
question: "Let {equation(f(x), f)}. Find the inverse function f^(-1)(x) and verify that {equation(f^(-1)(f({x0})), x0)}."
answer: f_inv
solution:
  - "To find the inverse of {equation(y, f)}, swap x and y: {equation(x, (a*y + b)/(c*y + d))}"
  - "Cross multiply: x(c*y + d) = a*y + b"
  - "Expand: c*x*y + d*x = a*y + b"
  - "Collect y terms: c*x*y - a*y = b - d*x"
  - "Factor: y(c*x - a) = b - d*x"
  - "Solve for y: {equation(y, (b - d*x)/(c*x - a))}"
  - "Simplify: {equation(f^(-1)(x), f_inv)}"
  - "Verify: {equation(f({x0}), y0)}"
  - "Then {equation(f^(-1)({y0}), check_val)} = {x0} ✓"
  - "The determinant {det} ≠ 0 ensures f is one-to-one and has an inverse"