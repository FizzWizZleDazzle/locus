topic: precalculus/inverse_functions
difficulty: easy
calculator: none
variables:
  a: nonzero(-5, 5)
  b: integer(-8, 8)
  f: a*x + b
  y: integer(-10, 10)
  x_val: (y - b)/a
  answer: simplify(x_val)
constraints:
  - abs(a) <= 3
  - mod(y - b, a) == 0
question: "If f(x) = {f}, find the value of x such that f(x) = {y}."
answer: answer
solution:
  - "We need to solve f(x) = {y}"
  - "Substitute: {equation(f, y)}"
  - "Subtract {b}: {equation(a*x, y - b)}"
  - "Divide by {a}: x = {answer}"