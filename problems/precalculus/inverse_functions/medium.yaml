topic: precalculus/inverse_functions
difficulty: medium
calculator: none
variants:
  - name: default
    variables:
      a: choice(-5, -4, -3, -2, 2, 3, 4, 5)
      b: nonzero(-6, 6)
      func: a*x + b
      answer: expand((x - b) / a)
    question: A function is defined by {math(f(x))} = {func}. Find the inverse function.
    answer: answer
    answer_type: expression
    solution:
      - 'Write {equation(math(y), func)} and swap {math(x)} and {math(y)}: {equation(math(x), a*y + b)}.'
      - 'Subtract {b} from both sides: {equation(math(x - b), a*y)}.'
      - 'Divide both sides by {a}: {equation(math(y), answer)}.'
      - The inverse function is {answer}.
