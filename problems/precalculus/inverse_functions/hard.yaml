topic: precalculus/inverse_functions
difficulty: hard
calculator: none
variables:
  a: nonzero(-5, 5)
  b: nonzero(-8, 8)
  c: nonzero(-8, 8)
  f: (a*x + b) / (x + c)
  # Work backwards: if y = (ax+b)/(x+c), then x = (b-cy)/(y-a)
  # So f^(-1)(x) = (b-cx)/(x-a)
  f_inv: (b - c*x) / (x - a)
  # Pick a clean test value that avoids division by zero
  test_val: choice(-3, -2, -1, 1, 2, 3)
  f_at_test: evaluate(f, x, test_val)
  answer: evaluate(f_inv, x, f_at_test)
constraints:
  - a != c  # Ensures f is not constant
  - test_val != -c  # Avoid division by zero in f
  - f_at_test != a  # Avoid division by zero in f_inv
question: "Let f(x) = {f}. If f({test_val}) = {f_at_test}, find the value of x such that f(x) = {test_val}."
answer: answer
solution:
  - "We need to find x such that f(x) = {test_val}"
  - "Since f({test_val}) = {f_at_test}, we know that f and its inverse swap these values"
  - "So if f({test_val}) = {f_at_test}, then f^(-1)({f_at_test}) = {test_val}"
  - "By the same logic, f^(-1)({test_val}) gives us the x we seek"
  - "To find f^(-1), solve y = {f} for x:"
  - "y(x + {c}) = {a}x + {b}"
  - "yx + {c}y = {a}x + {b}"
  - "yx - {a}x = {b} - {c}y"
  - "x(y - {a}) = {b} - {c}y"
  - "x = ({b} - {c}y) / (y - {a})"
  - "So f^(-1)(x) = {f_inv}"
  - "Therefore f^(-1)({test_val}) = {answer}"