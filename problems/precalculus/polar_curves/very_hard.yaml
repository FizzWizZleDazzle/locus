topic: precalculus/polar_curves
difficulty: very_hard
calculator: graphing
variables:
  n: choice(3, 5, 7)
  k: integer(2, 4)
  a: integer(2, 6)
  r_func: a * (1 + cos(n * theta))
  area_integrand: (1/2) * (r_func)^2
  expanded_integrand: expand(area_integrand)
  period: 2 * pi / n
  full_area_raw: integral(expanded_integrand, theta)
  full_area_at_period: evaluate(full_area_raw, theta, period) - evaluate(full_area_raw, theta, 0)
  full_area: simplify(full_area_at_period)
  petal_area: full_area / n
  inner_loop_condition: r_func < 0
  theta_critical: acos(-1) / n
  inner_start: theta_critical
  inner_end: 2 * pi / n - theta_critical
  inner_integrand: (1/2) * (a * cos(n * theta))^2
  inner_area_raw: integral(inner_integrand, theta)
  inner_area_calc: evaluate(inner_area_raw, theta, inner_end) - evaluate(inner_area_raw, theta, inner_start)
  inner_area: simplify(inner_area_calc)
  answer: simplify(petal_area - inner_area)
constraints:
  - n > 2
  - gcd(n, 2) == 1
question: "Find the area of one petal of the rose curve r = {r_func}, excluding any inner loops that may form when r < 0."
answer: answer
solution:
  - "The rose r = {r_func} has {n} petals since n = {n} is odd"
  - "One petal spans from θ = 0 to θ = {period}"
  - "Check where r < 0: {r_func} < 0 when cos({n}θ) < -1/{a}"
  - "This occurs when {n}θ is between {acos(-1)} and 2π - {acos(-1)}"
  - "So θ is between {inner_start} and {inner_end}"
  - "Area of full petal: {definite_integral_of(expanded_integrand, theta, 0, period)} = {petal_area}"
  - "Area of inner loop: {definite_integral_of(inner_integrand, theta, inner_start, inner_end)} = {inner_area}"
  - "Net area of petal: {petal_area} - {inner_area} = {answer}"