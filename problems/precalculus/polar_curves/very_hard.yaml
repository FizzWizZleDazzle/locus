topic: precalculus/polar_curves
difficulty: very_hard
calculator: graphing
variables:
  n: choice(3, 5, 7)
  k: choice(2, 4, 6)
  a: integer(2, 8)
  r_func: a * sin(n * theta / k)
  petals: n
  period: 2 * k * pi / n
  area_one_petal: a^2 * pi / (4 * k)
  total_area: simplify(petals * area_one_petal)
constraints:
  - gcd(n, k) == 1
  - n > k
question: "Find the total area enclosed by the rose curve r = {r_func}. Note that this curve has {petals} petals."
answer: total_area
solution:
  - "The rose curve r = {r_func} has {petals} petals since n = {n} is odd"
  - "The period of one petal is {period}"
  - "Area of one petal: {integral_of(1/2 * r_func^2, theta)} from 0 to {period}"
  - "= {integral_of(a^2/2 * sin(n*theta/k)^2, theta)} from 0 to {period}"
  - "Using the identity sin²(u) = (1 - cos(2u))/2:"
  - "= {a^2}/4 * {integral_of(1 - cos(2*n*theta/k), theta)} from 0 to {period}"
  - "= {a^2}/4 * [theta - k/(2n) * sin(2n*theta/k)] from 0 to {period}"
  - "= {a^2}/4 * {period} = {area_one_petal}"
  - "Total area = {petals} × {area_one_petal} = {total_area}"