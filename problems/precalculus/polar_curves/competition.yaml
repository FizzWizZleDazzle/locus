topic: precalculus/polar_curves
difficulty: competition
calculator: graphing
variables:
  n: choice(3, 5, 7)
  k: integer(2, 4)
  a: integer(2, 6)
  r_func: a * (1 + cos(n * theta))
  area_integrand: (1/2) * (r_func)^2
  expanded_integrand: expand(area_integrand)
  period: 2 * pi / n
  full_area_raw: integral(expanded_integrand, theta)
  full_area_at_2pi: evaluate(full_area_raw, theta, 2*pi)
  full_area_at_0: evaluate(full_area_raw, theta, 0)
  full_area: full_area_at_2pi - full_area_at_0
  petal_area: full_area / n
  inner_loop_bound: acos(-1/k)
  inner_r: a * (1 - k * sin(theta))
  inner_area_integrand: (1/2) * (inner_r)^2
  inner_expanded: expand(inner_area_integrand)
  inner_integral: integral(inner_expanded, theta)
  inner_upper: evaluate(inner_integral, theta, inner_loop_bound)
  inner_lower: evaluate(inner_integral, theta, -inner_loop_bound)
  inner_loop_area: 2 * (inner_upper - inner_lower)
  answer: petal_area + inner_loop_area
constraints:
  - k <= 3
  - n >= 3
question: "A rose curve is given by r = {r_func} and a cardioid by r = {inner_r}. Find the total area enclosed by exactly one petal of the rose curve plus the area of the inner loop of the cardioid."
answer: answer
solution:
  - "For the rose curve r = {r_func} with odd n = {n}, there are {n} petals"
  - "The curve completes one full cycle when {n}θ = 2π, so period = {period}"
  - "Area of one petal = (1/{n}) × total area"
  - "Total area = {integral_of(expanded_integrand, theta)} from 0 to 2π"
  - "Total area = {full_area}, so one petal has area {petal_area}"
  - "For the cardioid r = {inner_r}, the inner loop occurs when r < 0"
  - "Setting {inner_r} = 0 gives sin(θ) = 1/{k}"
  - "Inner loop bounds: θ = ±arcsin(1/{k}) = ±{inner_loop_bound}"
  - "Area of inner loop = 2 × {definite_integral_of(inner_expanded, theta, -inner_loop_bound, inner_loop_bound)}"
  - "Inner loop area = {inner_loop_area}"
  - "Total area = {petal_area} + {inner_loop_area} = {answer}"