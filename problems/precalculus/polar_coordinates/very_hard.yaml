topic: precalculus/polar_coordinates
difficulty: very_hard
calculator: scientific
variables:
  # Design backward: pick clean Cartesian point, convert to polar
  x: choice(-4, -3, -2, 2, 3, 4)
  y: choice(-4, -3, -2, 2, 3, 4)
  r: sqrt(x^2 + y^2)
  # For clean angle, ensure x,y form a recognizable ratio
  theta_rad: atan2(y, x)
  # Convert to degrees for cleaner answer
  theta_deg: theta_rad * 180 / pi
  # Now work forward: give polar form, ask for specific trig expression
  # This tests deep understanding of polar-rectangular relationships
  expr_num: 2*r*cos(theta_rad) + 3*r*sin(theta_rad)
  expr_denom: r*cos(theta_rad) - r*sin(theta_rad)
  answer: simplify(expr_num / expr_denom)
constraints:
  - x != 0
  - y != 0
  - x != y  # Ensures denominator is nonzero
question: "A point P has polar coordinates (r, θ) where r = {r} and θ = {theta_deg}°. Find the exact value of {equation('2cos(θ) + 3sin(θ)', 'cos(θ) - sin(θ)')}"
answer: answer
solution:
  - "Convert polar to rectangular: x = r·cos(θ) = {r}·cos({theta_deg}°) = {x}"
  - "y = r·sin(θ) = {r}·sin({theta_deg}°) = {y}"
  - "So cos(θ) = {x}/{r} and sin(θ) = {y}/{r}"
  - "Substitute into the expression:"
  - "Numerator: 2·({x}/{r}) + 3·({y}/{r}) = {expr_num}/{r}"
  - "Denominator: ({x}/{r}) - ({y}/{r}) = {expr_denom}/{r}"
  - "The fraction becomes: ({expr_num}/{r}) ÷ ({expr_denom}/{r}) = {expr_num}/{expr_denom}"
  - "Simplifying: {answer}"