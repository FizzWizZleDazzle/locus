topic: precalculus/polar_coordinates
difficulty: competition
calculator: scientific
variables:
  # Design backward: pick clean angle that gives exact trig values
  angle_deg: choice(30, 45, 60, 120, 135, 150, 210, 225, 240, 300, 315, 330)
  angle_rad: angle_deg * pi / 180
  # Pick radius that creates clean coordinates
  r: choice(2, 3, 4, 6, 8, 12)
  # Cartesian coordinates from polar
  x: r * cos(angle_rad)
  y: r * sin(angle_rad)
  # Create a transformed point with clean polar form
  k: choice(2, 3, 4)
  new_r: r * k
  shift: choice(30, 45, 60, 90)
  new_angle_deg: angle_deg + shift
  new_angle_rad: new_angle_deg * pi / 180
  # New cartesian coordinates
  x2: new_r * cos(new_angle_rad)
  y2: new_r * sin(new_angle_rad)
  # Distance between points (designed to be clean)
  d_squared: (x2 - x)^2 + (y2 - y)^2
  d: sqrt(d_squared)
  # Area of triangle formed by origin and two points
  area: abs(x * y2 - x2 * y) / 2
constraints:
  - mod(angle_deg + shift, 360) != angle_deg
  - d == floor(d)
  - area == floor(area)
question: "A point P has polar coordinates ({r}, {angle_deg}°). Point Q is obtained by scaling the radius of P by {k} and rotating by {shift}° counterclockwise. Find the area of triangle OPQ where O is the origin."
answer: area
solution:
  - "Point P in polar form: ({r}, {angle_deg}°)"
  - "Point Q in polar form: ({new_r}, {new_angle_deg}°)"
  - "Convert P to Cartesian: ({x}, {y})"
  - "Convert Q to Cartesian: ({x2}, {y2})"
  - "Area of triangle with vertices at origin, (x₁, y₁), (x₂, y₂) is |x₁y₂ - x₂y₁|/2"
  - "Area = |({x})({y2}) - ({x2})({y})|/2"
  - "Area = {area}"