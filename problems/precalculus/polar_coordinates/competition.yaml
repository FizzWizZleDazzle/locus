topic: precalculus/polar_coordinates
difficulty: competition
calculator: scientific
variables:
  # Design backward: want intersection at clean angle
  theta_int: choice(pi/6, pi/4, pi/3, 2*pi/3, 3*pi/4, 5*pi/6)
  # Pick a that makes r1 = r2 at theta_int
  a: choice(2, 3, 4, 6)
  # Ensure b divides evenly into a for clean intersection
  b: choice(1, 2, 3)
  r1: a * sin(theta)
  r2: b * cos(2*theta)
  # At intersection: a*sin(theta_int) = b*cos(2*theta_int)
  r_int: evaluate(r1, theta, theta_int)
  # Area between curves from 0 to theta_int
  integrand: (1/2) * (r1^2 - r2^2)
  area: integral(integrand, theta)
  answer: evaluate(area, theta, theta_int) - evaluate(area, theta, 0)
constraints:
  - evaluate(r1, theta, theta_int) == evaluate(r2, theta, theta_int)
  - a % b == 0
  - evaluate(r2, theta, theta_int) > 0
question: "Find the area enclosed between the curves r = {r1} and r = {r2} from θ = 0 to their first intersection point in the first quadrant."
answer: answer
solution:
  - "Find intersection: Set {equation(r1, r2)}"
  - "This gives {equation(a * sin(theta), b * cos(2*theta))}"
  - "At θ = {theta_int}, both curves have r = {r_int}"
  - "Area = {integral_of((1/2) * (r1^2 - r2^2), theta)} from 0 to {theta_int}"
  - "Evaluating: Area = {answer}"