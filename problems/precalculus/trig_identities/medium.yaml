topic: precalculus/trig_identities
difficulty: medium
calculator: none
variables:
  a: choice(-6, -5, -4, -3, -2, 2, 3, 4, 5, 6)
  b: nonzero(-8, 8)
  f: a*sin(theta)^2 + a*cos(theta)^2 + b
  answer: a + b
constraints:
  - a != b
question: "Simplify the expression {f}."
answer: answer
answer_type: numeric
solution:
  - "Apply the Pythagorean identity: {equation(sin(theta)^2 + cos(theta)^2, 1)}."
  - "Factor {a} from the trig terms: {equation(f, a*(sin(theta)^2 + cos(theta)^2) + b)}."
  - "Substitute the identity: {equation(a*(sin(theta)^2 + cos(theta)^2) + b, a + b)}."
  - "The simplified result is {answer}."
