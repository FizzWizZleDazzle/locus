topic: precalculus/trig_identities
difficulty: very_hard
calculator: none
variables:
  angle: choice(30, 45, 60, 120, 135, 150)
  angle_rad: angle * 3.14159 / 180
  sin_val: sin(angle_rad)
  cos_val: cos(angle_rad)
  tan_val: tan(angle_rad)
  k: choice(2, 3, 4)
  expr_left: k * sin_val^2 + k * cos_val^2
  expr_right: k
  target_expr: 1 + tan_val^2
  sec_squared: 1 / cos_val^2
  answer: sec_squared
question: "If {equation(k * sin(x)^2 + k * cos(x)^2, k)} for all x, find the exact value of {1 + tan(angle)^2} where angle = {angle}°"
answer: answer
answer_type: expression
solution:
  - "First, recognize that {equation(sin(x)^2 + cos(x)^2, 1)} is the Pythagorean identity"
  - "So {equation(k * sin(x)^2 + k * cos(x)^2, k * (sin(x)^2 + cos(x)^2))} = {equation(k * 1, k)}"
  - "Now we need {1 + tan(angle)^2} where angle = {angle}°"
  - "Recall the identity: {equation(1 + tan(x)^2, sec(x)^2)}"
  - "So {equation(1 + tan(angle)^2, sec(angle)^2)} = {equation(1/cos(angle)^2, answer)}"