topic: precalculus/graphing_trig
difficulty: medium
calculator: graphing
variables:
  a: choice(2, 3, 4)
  b: choice(1, 2, 4)
  c: choice(0, 1, -1, 2, -2)
  f: a * sin(b * x) + c
  period: 2 * pi / b
  amplitude: a
  midline: c
  max_val: a + c
  min_val: -a + c
constraints:
  - a > 0
  - b > 0
question: "Consider the function {equation(f(x), a * sin(b * x) + c)}. Find the amplitude, period, midline, maximum value, and minimum value of this function."
answer: amplitude, period, midline, max_val, min_val
answer_type: tuple
solution:
  - "For a function of the form {equation(f(x), A * sin(B * x) + C)}:"
  - "Amplitude = |A| = |{a}| = {amplitude}"
  - "Period = 2π/|B| = 2π/{b} = {period}"
  - "Midline: y = C = {midline}"
  - "Maximum value = midline + amplitude = {c} + {a} = {max_val}"
  - "Minimum value = midline - amplitude = {c} - {a} = {min_val}"