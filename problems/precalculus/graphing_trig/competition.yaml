topic: precalculus/graphing_trig
difficulty: competition
calculator: graphing
variables:
  k: integer(2, 5)
  phase_num: integer(1, 5)
  phase_den: choice(2, 3, 4, 6)
  phase: phase_num * pi / phase_den
  amp: integer(2, 6)
  vert: integer(-4, 4)
  f: amp * sin(k * x - phase) + vert
  period: 2 * pi / k
  shift: phase / k
  max_val: amp + vert
  min_val: -amp + vert
  first_max_x: shift + pi / (2 * k)
  second_zero_x: shift + pi / k
  area_bound: 2 * pi / k
  area: integral(f, x, 0, area_bound)
  simplified_area: simplify(area)
  answer: simplified_area
constraints:
  - phase_num < phase_den
  - gcd(phase_num, phase_den) == 1
  - vert != 0
question: "Consider the function {equation(f(x), f)}. Find the exact value of {integral_of(f(x), x, 0, area_bound)}, where the upper bound represents one complete period of the function starting from x = 0."
answer: answer
solution:
  - "The function {equation(f(x), f)} has amplitude {amp}, period {period}, phase shift {shift}, and vertical shift {vert}."
  - "One complete period starting from x = 0 ends at x = {area_bound}."
  - "To find {integral_of(f(x), x, 0, area_bound)}, we integrate: {integral_of(amp * sin(k * x - phase) + vert, x, 0, area_bound)}"
  - "Split the integral: {integral_of(amp * sin(k * x - phase), x, 0, area_bound)} + {integral_of(vert, x, 0, area_bound)}"
  - "For the sine integral, use substitution u = {k}x - {phase}, du = {k}dx"
  - "When x = 0, u = -{phase}; when x = {area_bound}, u = {k} · {area_bound} - {phase} = 2π - {phase}"
  - "The sine integral becomes: {amp}/{k} · {integral_of(sin(u), u, -phase, 2*pi - phase)}"
  - "Since sine has period 2π, {integral_of(sin(u), u, -phase, 2*pi - phase)} = 0"
  - "The constant integral: {integral_of(vert, x, 0, area_bound)} = {vert} · {area_bound} = {simplified_area}"
  - "Therefore, {integral_of(f(x), x, 0, area_bound)} = 0 + {simplified_area} = {answer}"