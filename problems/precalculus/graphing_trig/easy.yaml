topic: precalculus/graphing_trig
difficulty: easy
calculator: none
variables:
  a: choice(1, 2, 3, 4)
  b: choice(1, 2, 4)
  c: choice(0, 1, -1, 2, -2)
  f: a * sin(b * x) + c
  period: 2 * pi / b
  amplitude: a
  midline: c
question: "Find the amplitude, period, and midline of {f}."
answer: amplitude
answer_type: multiple
solution:
  - "For a function of the form A·sin(Bx) + C:"
  - "Amplitude = |A| = |{a}| = {amplitude}"
  - "Period = 2π/|B| = 2π/{b} = {period}"
  - "Midline: y = C = {c}"