topic: precalculus/graphing_trig
difficulty: very_hard
calculator: graphing
variables:
  a: choice(2, 3, 4)
  b: choice(1, 2, 3, 4)
  c: choice(-3, -2, -1, 1, 2, 3)
  d: choice(-2, -1, 0, 1, 2)
  f: a * sin(b * x + c) + d
  period: 2 * pi / b
  phase_shift: -c / b
  amplitude: abs(a)
  midline: d
  max_value: d + a
  min_value: d - a
  g: a * cos(b * x)
  h: f - g
  simplified_h: simplify(h)
  zeros_condition: sin(b * x + c) = cos(b * x)
  tan_equation: tan(b * x + c) = 1
  solution_form: (pi/4 - c) / b
  answer: solution_form
constraints:
  - a > 0
  - b != 3
  - gcd(abs(c), 4) == 1
question: "Consider the functions {equation(f, a * sin(b * x + c) + d)} and {equation(g, a * cos(b * x))}. Find the x-coordinate of the first positive intersection point of these two graphs."
answer: answer
solution:
  - "Set the functions equal: {equation(f, g)}"
  - "This gives us: {equation(a * sin(b * x + c) + d, a * cos(b * x))}"
  - "Rearranging: {equation(a * sin(b * x + c) - a * cos(b * x), -d)}"
  - "Factor out {a}: {equation(a * (sin(b * x + c) - cos(b * x)), -d)}"
  - "Since {a} > 0, we need: {equation(sin(b * x + c) - cos(b * x), -d/a)}"
  - "For the special case where {d} = 0, we get: {equation(sin(b * x + c), cos(b * x))}"
  - "This means: {equation(tan(b * x + c), 1)}"
  - "So: {equation(b * x + c, pi/4 + n * pi)} for integer n"
  - "Solving for x: {equation(x, (pi/4 + n * pi - c) / b)}"
  - "For n = 0: {equation(x, (pi/4 - c) / b)}"
  - "Since {c} = {c} and {b} = {b}, we get x = {answer}"
  - "This is positive when {c} < pi/4, which is satisfied"