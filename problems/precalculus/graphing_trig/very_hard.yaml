topic: precalculus/graphing_trig
difficulty: very_hard
calculator: none
variables:
  a: choice(2, 3, 4)
  b: choice(1, 2, 3, 4)
  c: choice(-3, -2, -1, 1, 2, 3)
  d: choice(-2, -1, 0, 1, 2)
  f: a*sin(b*x + c) + d
  period: 2*3.14159/b
  period_frac_num: 2
  period_frac_den: b
  amplitude: a
  phase_shift: -c/b
  phase_num: -c
  phase_den: b
  vertical_shift: d
  max_value: a + d
  min_value: -a + d
  first_max_x: (1.5708 - c)/b
  first_max_num: choice(1, 3, 5)
  first_max_den: 2*b
  answer: amplitude, period_frac_num, period_frac_den, phase_num, phase_den, vertical_shift
constraints:
  - a > 0
  - b > 0
question: "For the function f(x) = {f}, find the amplitude, period (as a fraction of π), phase shift (as a fraction), and vertical shift."
answer: answer
answer_type: tuple
solution:
  - "Given f(x) = {f}, identify the form f(x) = A·sin(Bx + C) + D"
  - "Here A = {a}, B = {b}, C = {c}, D = {d}"
  - "Amplitude = |A| = {amplitude}"
  - "Period = 2π/B = 2π/{b} = {period_frac_num}π/{period_frac_den}"
  - "Phase shift = -C/B = -{c}/{b} = {phase_num}/{phase_den}"
  - "Vertical shift = D = {vertical_shift}"
  - "The function has maximum value {max_value} and minimum value {min_value}"