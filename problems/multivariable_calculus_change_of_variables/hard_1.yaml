topic: multivariable_calculus/change_of_variables
difficulty: hard
calculator: none
variables:
  # Design backward from clean Jacobian determinant
  a: nonzero(-3, 3)
  b: nonzero(-3, 3)
  c: nonzero(-3, 3)
  d: nonzero(-3, 3)
  # Ensure invertible transformation
  det: a*d - b*c
  # Region bounds chosen to give clean answer
  u_max: integer(2, 4)
  v_max: integer(2, 4)
  # Transformation: x = au + bv, y = cu + dv
  # Jacobian determinant is ad - bc by construction
  jacobian: abs(det)
  # Simple integrand that becomes constant after transformation
  k: integer(2, 5)
  # Answer is k times area times Jacobian
  answer: k * u_max * v_max * jacobian
constraints:
  - det != 0
  - abs(det) <= 12
question: "Evaluate {integral_of(k*(a*x + b*y), (x,y))} over the region R, where R is the image of the rectangle 0 ≤ u ≤ {u_max}, 0 ≤ v ≤ {v_max} under the transformation x = {a}u + {b}v, y = {c}u + {d}v."
answer: answer
solution:
  - "The transformation is x = {a}u + {b}v, y = {c}u + {d}v"
  - "The Jacobian matrix is J = [{a}, {b}; {c}, {d}]"
  - "The Jacobian determinant is {det_of(J)} = {a}·{d} - {b}·{c} = {det}"
  - "So |J| = {jacobian}"
  - "Under the transformation: {a}x + {b}y = {a}({a}u + {b}v) + {b}({c}u + {d}v)"
  - "This simplifies to ({det})u + 0v = {det}u"
  - "The integral becomes {integral_of(k*det*u*jacobian, (u,v))} over 0 ≤ u ≤ {u_max}, 0 ≤ v ≤ {v_max}"
  - "= {integral_of(k*det*u, u)} from 0 to {u_max} times {integral_of(1, v)} from 0 to {v_max}"
  - "= {k}·{det}·[u²/2] from 0 to {u_max} times {v_max}"
  - "= {k}·{det}·{u_max}²/2 · {v_max}"
  - "= {answer}"