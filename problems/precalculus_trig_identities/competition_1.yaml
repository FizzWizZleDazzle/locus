topic: precalculus/trig_identities
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  n: 2*k + 1
  angle: pi/n
  target: cos(k*angle)
  answer: simplify(target)
constraints:
  - k >= 2
question: "Express {cos(k*pi/n)} in terms of {cos(pi/n)} where n = {n}."
answer: answer
solution:
  - "We have n = {n} and need to find {cos(k*pi/n)} = {target}"
  - "Since {n} is odd, we can use Chebyshev polynomials"
  - "For n = {n}, the angle {pi/n} satisfies a minimal polynomial"
  - "Let c = {cos(pi/n)}. Then c satisfies a polynomial equation of degree {k}"
  - "Using the multiple angle formula recursively:"
  - "{cos(2*pi/n)} = 2c² - 1"
  - "{cos(3*pi/n)} = 4c³ - 3c"
  - "Continuing this pattern to {cos(k*pi/n)}"
  - "By the theory of cyclotomic polynomials and since {k*pi/n} = {k}π/{n}"
  - "We get {target} = {answer}"