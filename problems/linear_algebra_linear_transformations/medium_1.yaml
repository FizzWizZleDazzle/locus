topic: linear_algebra/linear_transformations
difficulty: medium
calculator: none
variables:
  a: integer(-3, 3)
  b: integer(-3, 3)
  c: integer(-3, 3)
  d: integer(-3, 3)
  T: matrix(2, 2, -3, 3)
  v1: matrix(2, 1, 0, 0)
  v2: matrix(2, 1, 0, 0)
  Tv1: matrix(2, 1, -3, 3)
  Tv2: matrix(2, 1, -3, 3)
  x: integer(-5, 5)
  y: integer(-5, 5)
  v: matrix(2, 1, -5, 5)
  result_x: a*x + b*y
  result_y: c*x + d*y
  answer: matrix(2, 1, -10, 10)
constraints:
  - a*d - b*c != 0
  - abs(a) + abs(b) > 0
  - abs(c) + abs(d) > 0
question: "Let T be the linear transformation with matrix {matrix_of(T)}. Find T({vec(v)}) where the vector v has components x = {x} and y = {y}."
answer: answer
answer_type: vector
solution:
  - "The transformation matrix is {matrix_of(T)}"
  - "For the vector v = {vec(v)}, we compute T(v) by matrix multiplication"
  - "First component: {a} · {x} + {b} · {y} = {result_x}"
  - "Second component: {c} · {x} + {d} · {y} = {result_y}"
  - "Therefore T({vec(v)}) = {vec(answer)}"