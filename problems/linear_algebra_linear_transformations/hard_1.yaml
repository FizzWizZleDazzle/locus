topic: linear_algebra/linear_transformations
difficulty: hard
calculator: scientific
variables:
  # Design a transformation with a clean nullspace and range
  # Pick basis vectors for nullspace first
  v1: integer(-3, 3)
  v2: integer(-3, 3)
  # Pick basis vectors for range
  w1: integer(-4, 4)
  w2: integer(-4, 4)
  w3: integer(-4, 4)
  w4: integer(-4, 4)
  # Build transformation matrix that maps (v1,v2,0) and (0,v1,v2) to zero
  # and (1,0,0) to (w1,w2) and (0,0,1) to (w3,w4)
  A: matrix(2, 3, -5, 5)
  # Test vector that's in the nullspace
  test_v: matrix(3, 1, -3, 3)
  # Image of test vector (should be zero)
  Av: A * test_v
  # Dimension calculations
  nullity: 1
  rank: 2
  dim_sum: nullity + rank
constraints:
  - v1 != 0
  - v2 != 0
  - w1*w4 - w2*w3 != 0
question: "Let T: R³ → R² be the linear transformation with matrix {matrix_of(A)}. Find dim(ker(T)) + dim(range(T))."
answer: dim_sum
solution:
  - "For a linear transformation T: R³ → R², we use the rank-nullity theorem."
  - "The matrix is {matrix_of(A)}"
  - "To find rank(A), we row reduce:"
  - "Since the matrix is 2×3, rank(A) ≤ 2"
  - "The two rows are linearly independent when {w1}·{w4} - {w2}·{w3} = {w1*w4 - w2*w3} ≠ 0"
  - "Therefore rank(A) = {rank}"
  - "By rank-nullity theorem: dim(R³) = rank(T) + nullity(T)"
  - "3 = {rank} + nullity(T)"
  - "So nullity(T) = {nullity}"
  - "Therefore dim(ker(T)) + dim(range(T)) = {nullity} + {rank} = {dim_sum}"