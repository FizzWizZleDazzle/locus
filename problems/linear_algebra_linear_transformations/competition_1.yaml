topic: linear_algebra/linear_transformations
difficulty: competition
calculator: none
variables:
  # Design a transformation with determinant 0 (non-injective)
  # Pick first column
  a: nonzero(-3, 3)
  c: nonzero(-3, 3)
  # Make second column a multiple of first to ensure det = 0
  k: nonzero(-2, 2)
  b: k * a
  d: k * c
  # Build transformation matrix
  T: matrix(2, 2, -3, 3)
  # Override matrix entries to ensure det = 0
  T_11: a
  T_12: b
  T_21: c
  T_22: d
  # Verify determinant is 0
  det: a*d - b*c
  # Since det = 0, rank = 1, so dim(kernel) = 1
  dim_kernel: 1
  dim_image: 1
  answer: 2
constraints:
  - abs(a) + abs(c) > 0
question: "Let T: R² → R² be the linear transformation with matrix {matrix_of(T)}. Find dim(ker(T)) + dim(im(T))."
answer: answer
answer_type: integer
solution:
  - "The matrix of T is {matrix_of(T)}"
  - "Calculate det(T) = {T_11}·{T_22} - {T_12}·{T_21} = {det}"
  - "Since det(T) = 0, T is not injective"
  - "The second column is {k} times the first column"
  - "So rank(T) = 1"
  - "By the rank-nullity theorem: dim(ker(T)) + dim(im(T)) = dim(R²) = 2"
  - "Therefore dim(ker(T)) = 2 - 1 = 1"
  - "And dim(im(T)) = 1"
  - "So dim(ker(T)) + dim(im(T)) = 1 + 1 = 2"