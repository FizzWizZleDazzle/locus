topic: linear_algebra/linear_transformations
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 5)
  b: integer(0, 4)
  c: integer(0, 4)
  d: integer(1, 5)
  A: matrix(2, 2, -5, 5)
  v: vector(2, 1, 3)
  answer: A * v
constraints:
  - det(A) != 0
question: "Let T be the linear transformation with matrix {matrix_of(A)}. Find T({vec(v)})."
answer: answer
answer_type: vector
solution:
  - "To find T({vec(v)}), multiply the matrix by the vector:"
  - "{matrix_of(A)} {vec(v)} = {vec(answer)}"
  - "Therefore T({vec(v)}) = {vec(answer)}"