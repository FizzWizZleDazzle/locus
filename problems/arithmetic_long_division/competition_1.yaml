topic: arithmetic/long_division
difficulty: competition
calculator: none
variables:
  p: prime(11, 29)
  q: prime(31, 47)
  r: integer(100, 999)
  dividend: p * q * r
  d1: integer(2, 9)
  d2: integer(2, 9)
  divisor: d1 * 100 + d2 * 10 + mod(p, 10)
  quotient: floor(dividend / divisor)
  remainder: mod(dividend, divisor)
  check: quotient * divisor + remainder
constraints:
  - d1 != d2
  - mod(divisor, 10) != 0
  - quotient >= 100
question: "Divide {dividend} by {divisor}. Find the quotient and remainder."
answer: quotient
solution:
  - "Perform long division of {dividend} ÷ {divisor}"
  - "The divisor {divisor} goes into {dividend} exactly {quotient} times"
  - "Remainder: {dividend} - {quotient} × {divisor} = {remainder}"
  - "Verification: {quotient} × {divisor} + {remainder} = {check}"
  - "Therefore, the quotient is {quotient}"