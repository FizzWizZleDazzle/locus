topic: arithmetic/long_division
difficulty: hard
calculator: none
variables:
  d: integer(11, 19)
  q: integer(23, 47)
  r: integer(1, 10)
  dividend: d * q + r
  quotient: q
  remainder: r
constraints:
  - r < d
  - d > 10
question: "Divide {dividend} by {d}. Find the quotient and remainder."
answer: quotient
solution:
  - "Perform long division of {dividend} ÷ {d}"
  - "{d} goes into {dividend} exactly {quotient} times"
  - "{quotient} × {d} = {d * q}"
  - "Remainder: {dividend} - {d * q} = {remainder}"
  - "Therefore: {dividend} = {d} × {quotient} + {remainder}"
  - "Answer: quotient = {quotient}, remainder = {remainder}"