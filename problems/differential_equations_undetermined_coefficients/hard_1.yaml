topic: differential_equations/undetermined_coefficients
difficulty: hard
calculator: none
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  a: integer(2, 5)
  b: integer(1, 3)
  char_poly: (r - r1) * (r - r2)
  expanded_char: expand(char_poly)
  p: -(r1 + r2)
  q: r1 * r2
  diff_eq: y'' + p * y' + q * y
  forcing: a * e^(b * x)
  particular: (a * e^(b * x)) / (b^2 + p * b + q)
  particular_coeff: a / (b^2 + p * b + q)
  denominator: b^2 + p * b + q
  answer: particular
constraints:
  - r1 != -b
  - r2 != -b
  - abs(denominator) > 1
question: "Find a particular solution to {equation(diff_eq, forcing)} using the method of undetermined coefficients."
answer: answer
solution:
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "Since the forcing term is {forcing}, we try y_p = A{e^(b * x)}"
  - "Computing derivatives: y_p' = {b}A{e^(b * x)}, y_p'' = {b^2}A{e^(b * x)}"
  - "Substituting into the differential equation:"
  - "{b^2}A{e^(b * x)} + {p}({b}A{e^(b * x)}) + {q}(A{e^(b * x)}) = {forcing}"
  - "Factoring out {e^(b * x)}: A({b^2} + {p * b} + {q}) = {a}"
  - "Since {b} is not a root of the characteristic equation, we have A = {particular_coeff}"
  - "Therefore, y_p = {answer}"