topic: differential_equations/undetermined_coefficients
difficulty: medium
calculator: none
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  a: integer(2, 5)
  b: integer(2, 5)
  char_poly: (r - r1) * (r - r2)
  expanded_char: expand(char_poly)
  p: -r1 - r2
  q: r1 * r2
  diff_eq: y'' + p * y' + q * y
  rhs: a * e^(2*x) + b
  y_c: C1 * e^(r1*x) + C2 * e^(r2*x)
  A: a / (4 + 2*p + q)
  B: b / q
  y_p: A * e^(2*x) + B
  answer: y_c + y_p
constraints:
  - r1 != r2
  - 4 + 2*p + q != 0
  - q != 0
question: "Solve the differential equation {equation(diff_eq, rhs)} using the method of undetermined coefficients."
answer: answer
solution:
  - "First, solve the homogeneous equation {equation(diff_eq, 0)}"
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "This factors as {equation(char_poly, 0)}, giving r = {r1} and r = {r2}"
  - "So the complementary solution is {y_c}"
  - "For the particular solution, try y_p = A e^(2x) + B"
  - "Substituting into the original equation and comparing coefficients:"
  - "For e^(2x) terms: A(4 + 2({p}) + {q}) = {a}, so A = {A}"
  - "For constant terms: B({q}) = {b}, so B = {B}"
  - "Therefore y_p = {y_p}"
  - "The general solution is y = {answer}"