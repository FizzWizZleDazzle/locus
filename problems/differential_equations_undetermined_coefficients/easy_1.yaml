topic: differential_equations/undetermined_coefficients
difficulty: easy
calculator: none
variables:
  r: integer(2, 5)
  a: integer(1, 3)
  b: integer(1, 4)
  equation: "y'' - r^2 * y"
  rhs: a * exp(r * x) + b
  yp_form: "A * exp(r * x) + B"
  A: a / (2 * r)
  B: b / r^2
  yp: A * exp(r * x) + B
  answer: yp
constraints:
  - r > 0
  - a > 0
  - b > 0
question: "Find a particular solution to {equation(equation, rhs)} using the method of undetermined coefficients."
answer: answer
solution:
  - "The differential equation is {equation(equation, rhs)}"
  - "Since the right side contains {a} * exp({r} * x) + {b}, we try {equation('y_p', yp_form)}"
  - "Compute y_p' = A * {r} * exp({r} * x)"
  - "Compute y_p'' = A * {r}^2 * exp({r} * x)"
  - "Substitute into the equation: A * {r}^2 * exp({r} * x) - {r}^2 * (A * exp({r} * x) + B) = {rhs}"
  - "Simplify: A * {r}^2 * exp({r} * x) - A * {r}^2 * exp({r} * x) - {r}^2 * B = {a} * exp({r} * x) + {b}"
  - "This gives: -{r}^2 * B = {b}, so B = {B}"
  - "For the exponential term: 0 = {a} * exp({r} * x) doesn't work!"
  - "We need to modify our guess since exp({r} * x) is a solution to the homogeneous equation"
  - "Try {equation('y_p', 'A * x * exp(r * x) + B')}"
  - "Then y_p' = A * exp({r} * x) + A * {r} * x * exp({r} * x)"
  - "And y_p'' = 2 * A * {r} * exp({r} * x) + A * {r}^2 * x * exp({r} * x)"
  - "Substitute: 2 * A * {r} * exp({r} * x) = {a} * exp({r} * x)"
  - "So A = {A} and B = {B}"
  - "Therefore y_p = {answer}"