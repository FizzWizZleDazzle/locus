topic: differential_equations/undetermined_coefficients
difficulty: very_hard
calculator: scientific
variables:
  r1: integer(-4, -1)
  r2: integer(1, 4)
  a: integer(2, 5)
  b: integer(2, 5)
  char_poly: (r - r1) * (r - r2)
  expanded_char: expand(char_poly)
  p: -(r1 + r2)
  q: r1 * r2
  diff_eq: y'' + p * y' + q * y
  forcing: a * e^(2*x) * cos(b*x)
  A: integer(1, 3)
  B: integer(-3, -1)
  particular: e^(2*x) * (A * cos(b*x) + B * sin(b*x))
  y_p_prime: derivative(particular, x)
  y_p_double_prime: derivative(y_p_prime, x)
  lhs: y_p_double_prime + p * y_p_prime + q * particular
  lhs_expanded: expand(lhs)
  cos_coeff: (4 - p*2 + q) * A - b * (4*B + p*2*B)
  sin_coeff: (4 - p*2 + q) * B + b * (4*A + p*2*A)
  answer: particular
constraints:
  - r1 != r2
  - cos_coeff == a
  - sin_coeff == 0
question: "Find a particular solution to {equation(diff_eq, forcing)} using the method of undetermined coefficients."
answer: answer
solution:
  - "The characteristic equation is {equation(expanded_char, 0)}"
  - "The roots are r = {r1} and r = {r2}"
  - "Since the forcing term is {forcing}, we try {equation('y_p', 'e^(2x)(A cos(bx) + B sin(bx))')}"
  - "Computing derivatives:"
  - "{equation('y_p', particular)}"
  - "{equation(derivative_of('y_p', x), y_p_prime)}"
  - "{equation(derivative_of(derivative_of('y_p', x), x), y_p_double_prime)}"
  - "Substituting into the differential equation and collecting terms:"
  - "Coefficient of {equation('e^(2x) cos(bx)', cos_coeff)}"
  - "Coefficient of {equation('e^(2x) sin(bx)', sin_coeff)}"
  - "Setting the cos coefficient equal to {a}: A = {A}"
  - "Setting the sin coefficient equal to 0: B = {B}"
  - "Therefore, {equation('y_p', answer)}"