topic: algebra2/exponential_equations
difficulty: easy
calculator: scientific
variables:
  k: integer(1, 5)
  c: integer(2, 6)
  base: choice(2, 3, 4, 5)
  exponent: k * x + c
  f: base^exponent
  target_exp: integer(2, 5)
  target: base^target_exp
  equation_to_solve: f - target
  x_value: (target_exp - c) / k
  answer: simplify(x_value)
constraints:
  - mod(target_exp - c, k) == 0
  - target_exp > c
question: "Solve for x: {equation(f, target)}"
answer: answer
solution:
  - "We have {equation(f, target)}"
  - "Since the bases are equal, we can equate the exponents:"
  - "{equation(exponent, target_exp)}"
  - "Solve for x: {equation(k * x, target_exp - c)}"
  - "Therefore, x = {answer}"