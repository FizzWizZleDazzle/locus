topic: multivariable_calculus/greens_theorem
difficulty: competition
calculator: none
variables:
  a: integer(2, 5)
  b: integer(2, 5)
  c: integer(1, 4)
  P: a*x^2 - b*y
  Q: c*x + a*y^2
  dQ_dx: derivative(Q, x)
  dP_dy: derivative(P, y)
  integrand: dQ_dx - dP_dy
  answer: 2*a + 2*b + 2*c
constraints:
  - a != b
  - a != c
  - b != c
question: "Use Green's theorem to evaluate the line integral {integral_of(P*dx + Q*dy, C)} where P = {P}, Q = {Q}, and C is the boundary of the unit square [0,1] × [0,1] oriented counterclockwise."
answer: answer
solution:
  - "By Green's theorem: {integral_of(P*dx + Q*dy, C)} = {integral_of(integral_of(dQ/dx - dP/dy, y), x)} over the region"
  - "Calculate partial derivatives: {derivative_of(Q, x)} = {dQ_dx} and {derivative_of(P, y)} = {dP_dy}"
  - "So {derivative_of(Q, x)} - {derivative_of(P, y)} = {integrand}"
  - "Set up the double integral: {integral_of(integral_of(integrand, y, 0, 1), x, 0, 1)}"
  - "Inner integral: {integral_of(integrand, y, 0, 1)} = {c} + {b} + {a}"
  - "Outer integral: {integral_of(c + b + a, x, 0, 1)} = {answer}"