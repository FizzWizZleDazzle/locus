topic: calculus/volumes_of_revolution
difficulty: easy
calculator: scientific
variables:
  a: integer(1, 4)
  b: integer(2, 5)
  f: a * x
  lower: 0
  upper: b
  integrand: simplify(pi * (f)^2)
  answer: integral(integrand, x)
  answer_eval: evaluate(answer, x, upper) - evaluate(answer, x, lower)
constraints:
  - b > a
question: "Find the volume of the solid formed by revolving the region bounded by {equation(y, f)}, the x-axis, {equation(x, lower)}, and {equation(x, upper)} about the x-axis."
answer: answer_eval
solution:
  - "Using the disk method, the volume is {definite_integral_of(pi * y^2, x, lower, upper)}"
  - "Substitute {equation(y, f)}: {definite_integral_of(integrand, x, lower, upper)}"
  - "Integrate: {integral_of(integrand, x)} = {answer}"
  - "Evaluate from {lower} to {upper}: {answer_eval}"