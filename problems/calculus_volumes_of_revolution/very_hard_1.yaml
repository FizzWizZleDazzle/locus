topic: calculus/volumes_of_revolution
difficulty: very_hard
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(1, 3)
  c: integer(1, 4)
  f: a * x^2 + b * x
  g: c * x
  x1: 0
  x2: solve(f - g, x)
  integrand: expand((f - g)^2)
  antideriv: integral(integrand, x)
  vol_unscaled: evaluate(antideriv, x, x2) - evaluate(antideriv, x, x1)
  answer: simplify(vol_unscaled)
constraints:
  - x2 > 0
  - b != c
question: "Find the volume of the solid obtained by rotating the region bounded by {equation(y, f)} and {equation(y, g)} about the x-axis using the washer method."
answer: answer
solution:
  - "Find intersection points by solving {equation(f, g)}"
  - "Factor: {equation(x * (a * x + b - c), 0)}"
  - "Intersections at x = {x1} and x = {x2}"
  - "For washer method, outer radius R = {f}, inner radius r = {g}"
  - "Volume = {definite_integral_of(R^2 - r^2, x, x1, x2)}"
  - "Expand: {definite_integral_of(integrand, x, x1, x2)}"
  - "Antiderivative: {antideriv}"
  - "Evaluate from {x1} to {x2}: {answer}π"