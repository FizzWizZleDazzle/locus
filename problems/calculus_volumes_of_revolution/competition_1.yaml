topic: calculus/volumes_of_revolution
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  n: integer(2, 4)
  f: k * sqrt(x)
  g: x^n
  a: 0
  b: 1
  integrand_f: k^2 * x
  integrand_g: x^(2*n)
  volume_f: evaluate(integral(integrand_f, x), x, b) - evaluate(integral(integrand_f, x), x, a)
  volume_g: evaluate(integral(integrand_g, x), x, b) - evaluate(integral(integrand_g, x), x, a)
  answer: volume_f - volume_g
constraints:
  - k != n
  - volume_f > volume_g
question: "Consider the region bounded by {equation(f, 0)}, {equation(g, 0)}, x = {a}, and x = {b}. Find the difference between the volumes obtained by revolving this region about the x-axis using the washer method, where the outer radius is given by {f} and the inner radius is given by {g}."
answer: answer
solution:
  - "Using the washer method, V = π∫[R²(x) - r²(x)]dx from {a} to {b}"
  - "Outer radius R(x) = {f}, inner radius r(x) = {g}"
  - "V = π∫[({f})² - ({g})²]dx = π∫[{integrand_f} - {integrand_g}]dx"
  - "V = π[∫{integrand_f}dx - ∫{integrand_g}dx] from {a} to {b}"
  - "V = π[{volume_f} - {volume_g}]"
  - "V = π({answer})"
  - "The answer is {answer}π"