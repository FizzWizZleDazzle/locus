topic: calculus/volumes_of_revolution
difficulty: hard
calculator: scientific
variables:
  a: integer(2, 5)
  b: integer(1, 3)
  c: integer(0, 2)
  f: a * sqrt(x) + b
  g: c
  x1: 0
  x2: integer(1, 4)
  integrand: expand((f - g)^2)
  antideriv: integral(integrand, x)
  volume_over_pi: evaluate(antideriv, x, x2) - evaluate(antideriv, x, x1)
  answer: simplify(volume_over_pi)
constraints:
  - x2 > x1
  - a > b
  - b > c
question: "Find the volume of the solid obtained by rotating the region bounded by {equation(y, f)}, {equation(y, g)}, {equation(x, x1)}, and {equation(x, x2)} about the x-axis. Express your answer as a multiple of π."
answer: answer
solution:
  - "Using the washer method, the volume is {definite_integral_of(π * ((f)^2 - (g)^2), x, x1, x2)}"
  - "Since {g} = {c}, we have {equation((f)^2 - (g)^2, integrand)}"
  - "The antiderivative is {antideriv}"
  - "Evaluating from {x1} to {x2}: {volume_over_pi}"
  - "Therefore, the volume is {answer}π"