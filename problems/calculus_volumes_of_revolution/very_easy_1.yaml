topic: calculus/volumes_of_revolution
difficulty: very_easy
calculator: scientific
variables:
  r: integer(1, 4)
  h: integer(2, 6)
  f: r
  a: 0
  b: h
  integrand: expand(pi * f^2)
  answer: evaluate(pi * r^2 * h, x, 1)
question: "Find the volume of the solid formed by revolving the region bounded by y = {f}, y = 0, x = {a}, and x = {b} about the x-axis."
answer: answer
solution:
  - "For a solid of revolution about the x-axis, V = {definite_integral_of(pi * f^2, x, a, b)}"
  - "Since f(x) = {f} is constant, we have {integral_of(pi * f^2, x)} = {pi * r^2 * x}"
  - "V = {pi * r^2 * b} - {pi * r^2 * a} = {answer}"