topic: arithmetic/decimals
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 9)
  b: integer(2, 9)
  c: integer(2, 9)
  d: integer(2, 9)
  e: integer(2, 9)
  f: integer(2, 9)
  first: a + b/10 + c/100
  second: d + e/10 + f/100
  product: first * second
  rounded: round(product, 2)
  third: rounded / 100
  answer: round(first + second - third, 3)
constraints:
  - a != d
  - b + e >= 10
  - c + f >= 10
question: "Calculate: {first} + {second} - ({first} × {second} ÷ 100). Round to 3 decimal places."
answer: answer
solution:
  - "First, calculate the product: {first} × {second} = {product}"
  - "Round to 2 decimal places: {rounded}"
  - "Divide by 100: {rounded} ÷ 100 = {third}"
  - "Now subtract from the sum: {first} + {second} - {third}"
  - "= {answer}"