topic: arithmetic/decimals
difficulty: hard
calculator: none
variables:
  a: integer(2, 9)
  b: integer(2, 9)
  c: integer(1, 9)
  d: integer(2, 9)
  e: integer(1, 9)
  first: a + b/10 + c/100
  second: d + e/100
  product: first * second
  rounded: round(product, 2)
constraints:
  - a != d
  - b != 5
  - e != 5
question: "Calculate {first} × {second} and round to 2 decimal places"
answer: rounded
solution:
  - "Multiply {first} × {second}"
  - "Break down: {a}.{b}{c} × {d}.0{e}"
  - "Product = {product}"
  - "Round to 2 decimal places: {rounded}"