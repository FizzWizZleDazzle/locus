topic: arithmetic/addition
difficulty: competition
calculator: none
variables:
  # Design for competition: work with carry propagation patterns
  a: integer(100000, 999999)
  b: integer(100000, 999999)
  # Extract digits for analysis
  a6: floor(a/100000)
  a5: mod(floor(a/10000), 10)
  a4: mod(floor(a/1000), 10)
  a3: mod(floor(a/100), 10)
  a2: mod(floor(a/10), 10)
  a1: mod(a, 10)
  b6: floor(b/100000)
  b5: mod(floor(b/10000), 10)
  b4: mod(floor(b/1000), 10)
  b3: mod(floor(b/100), 10)
  b2: mod(floor(b/10), 10)
  b1: mod(b, 10)
  # Compute carries
  c1: floor((a1 + b1)/10)
  c2: floor((a2 + b2 + c1)/10)
  c3: floor((a3 + b3 + c2)/10)
  c4: floor((a4 + b4 + c3)/10)
  c5: floor((a5 + b5 + c4)/10)
  total_carries: c1 + c2 + c3 + c4 + c5
  answer: a + b
constraints:
  # Ensure multiple carry propagations for competition level
  - total_carries >= 3
  # Avoid trivial patterns
  - mod(a, 1000) != 0
  - mod(b, 1000) != 0
question: "Compute {a} + {b}. How many times did you need to carry when adding column by column?"
answer: answer
solution:
  - "Align the numbers vertically and add column by column from right to left"
  - "Ones place: {a1} + {b1} = {a1 + b1}, write {mod(a1 + b1, 10)}, carry {c1}"
  - "Tens place: {a2} + {b2} + {c1} = {a2 + b2 + c1}, write {mod(a2 + b2 + c1, 10)}, carry {c2}"
  - "Hundreds place: {a3} + {b3} + {c2} = {a3 + b3 + c2}, write {mod(a3 + b3 + c2, 10)}, carry {c3}"
  - "Thousands place: {a4} + {b4} + {c3} = {a4 + b4 + c3}, write {mod(a4 + b4 + c3, 10)}, carry {c4}"
  - "Ten-thousands place: {a5} + {b5} + {c4} = {a5 + b5 + c4}, write {mod(a5 + b5 + c4, 10)}, carry {c5}"
  - "Hundred-thousands place: {a6} + {b6} + {c5} = {a6 + b6 + c5}"
  - "Final answer: {answer}"
  - "Total number of carries: {total_carries}"