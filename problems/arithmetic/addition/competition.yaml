topic: arithmetic/addition
difficulty: competition
calculator: none
variables:
  target: integer(1000, 9999)
  d1: integer(1, 9)
  d2: integer(1, 9)
  d3: integer(1, 9)
  d4: integer(1, 9)
  n1: d1 * 1000 + d2 * 100 + d3 * 10 + d4
  n2: d2 * 1000 + d3 * 100 + d4 * 10 + d1
  n3: d3 * 1000 + d4 * 100 + d1 * 10 + d2
  n4: d4 * 1000 + d1 * 100 + d2 * 10 + d3
  sum: n1 + n2 + n3 + n4
  answer: sum
constraints:
  - d1 != d2
  - d3 != d4
question: "A 4-digit number uses digits {d1}, {d2}, {d3}, {d4} exactly once each. Find the sum of all 24 possible 4-digit numbers that can be formed."
answer: answer
solution:
  - "Each digit appears in each position (thousands, hundreds, tens, ones) exactly 6 times"
  - "Sum of digits: {d1} + {d2} + {d3} + {d4} = {evaluate(d1 + d2 + d3 + d4, x, 0)}"
  - "Contribution from each position: 6 × {evaluate(d1 + d2 + d3 + d4, x, 0)} × (1000 + 100 + 10 + 1) = 6 × {evaluate(d1 + d2 + d3 + d4, x, 0)} × 1111"
  - "Total sum: {answer}"