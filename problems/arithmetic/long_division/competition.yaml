topic: arithmetic/long_division
difficulty: competition
calculator: none
variables:
  d: prime(11, 23)
  q: integer(37, 89)
  r: integer(1, 10)
  n: d * q + r
  answer: q
constraints:
  - r < d
  - mod(q, 10) != 0
question: "Find the quotient when {n} is divided by {d}"
answer: answer
solution:
  - "Divide {n} by {d} using long division"
  - "{d} goes into {n} exactly {q} times with remainder {r}"
  - "Check: {d} × {q} + {r} = {n}"
  - "The quotient is {answer}"