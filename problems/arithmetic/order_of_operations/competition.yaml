topic: arithmetic/order_of_operations
difficulty: competition
calculator: none
variables:
  a: integer(2, 9)
  b: integer(2, 9)
  c: integer(2, 9)
  d: integer(2, 9)
  e: integer(2, 9)
  f: integer(2, 9)
  term1: a * b^2
  term2: c * d
  term3: e + f
  numerator: term1 - term2
  answer: numerator / term3
constraints:
  - term1 > term2
  - mod(numerator, term3) == 0
  - answer != 1
question: "Evaluate: {a} × {b}² - {c} × {d} ÷ ({e} + {f})"
answer: answer
solution:
  - "Following order of operations: exponents first"
  - "{b}² = {b*b}"
  - "Then multiplication: {a} × {b*b} = {term1}"
  - "And: {c} × {d} = {term2}"
  - "Parentheses: {e} + {f} = {term3}"
  - "Subtraction: {term1} - {term2} = {numerator}"
  - "Finally division: {numerator} ÷ {term3} = {answer}"