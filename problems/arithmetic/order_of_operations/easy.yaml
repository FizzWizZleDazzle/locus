topic: arithmetic/order_of_operations
difficulty: easy
calculator: none
variables:
  a: integer(2, 9)
  b: integer(2, 5)
  c: integer(1, 4)
  d: integer(3, 8)
  product: a * b
  sum: c + d
  answer: product - sum
constraints:
  - product > sum
question: "Evaluate: {a} × {b} - ({c} + {d})"
answer: answer
solution:
  - "First multiply: {a} × {b} = {product}"
  - "Then add inside parentheses: {c} + {d} = {sum}"
  - "Finally subtract: {product} - {sum} = {answer}"