topic: arithmetic/order_of_operations
difficulty: hard
calculator: none

variables:
  a: integer(2, 5)
  b: integer(3, 8)
  c: integer(1, 4)
  d: integer(2, 6)
  e: integer(2, 7)
  f: integer(1, 9)
  inner: b - c
  sq: inner^2
  term1: a * sq
  term2: d * e
  answer: a * (b - c)^2 - d * e + f

constraints:
  - b > c

question: "Evaluate {a}({b} - {c})^2 - {d} * {e} + {f}."
answer: answer

solution:
  - "Parentheses first: {b} - {c} = {inner}."
  - "Exponent: {inner}^2 = {sq}."
  - "Left multiplication: {a} * {sq} = {term1}."
  - "Right multiplication: {d} * {e} = {term2}."
  - "Final: {term1} - {term2} + {f} = {answer}."

