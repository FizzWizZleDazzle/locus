topic: arithmetic/subtraction
difficulty: hard
calculator: none

variables:
  # Pick the round minuend (multiple of 1000, 3000–9000)
  thousands: integer(3, 9)
  minuend: thousands * 1000
  # Pick the answer (difference) — a 3-digit number to ensure borrowing across zeros
  answer: integer(100, 899)
  # Derive the subtrahend from minuend and answer
  subtrahend: minuend - answer

question: "Compute {minuend} - {subtrahend}."

answer: answer

solution:
  - "We need to subtract {subtrahend} from {minuend}."
  - "Since {minuend} ends in three zeros, we must borrow across them."
  - "Rewrite {minuend} as {math(minuend - 1)} + 1, then continue borrowing as needed."
  - "Working through the borrowing: {minuend} - {subtrahend} = {answer}."
