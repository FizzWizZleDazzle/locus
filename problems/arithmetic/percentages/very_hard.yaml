topic: arithmetic/percentages
difficulty: very_hard
calculator: none
variables:
  original: integer(40, 80)
  first_increase: integer(15, 35)
  second_decrease: integer(10, 25)
  after_first: original * (100 + first_increase) / 100
  final: after_first * (100 - second_decrease) / 100
  net_change: final - original
  net_percent: 100 * net_change / original
  answer: round(net_percent, 1)
constraints:
  - first_increase % 5 == 0
  - second_decrease % 5 == 0
  - original % 10 == 0
question: "A store raises the price of an item by {first_increase}%, then later reduces the new price by {second_decrease}%. If the original price was ${original}, what is the net percentage change from the original price?"
answer: answer
solution:
  - "Original price: ${original}"
  - "After {first_increase}% increase: ${original} × {100 + first_increase}/100 = ${after_first}"
  - "After {second_decrease}% decrease: ${after_first} × {100 - second_decrease}/100 = ${final}"
  - "Net change: ${final} - ${original} = ${net_change}"
  - "Net percentage change: {net_change}/{original} × 100% = {answer}%"