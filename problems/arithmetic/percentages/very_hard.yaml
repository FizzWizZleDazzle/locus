topic: arithmetic/percentages
difficulty: very_hard
calculator: none
variables:
  final_price: choice(84, 108, 126, 144, 162, 189, 216)
  discount1: choice(20, 25, 30, 40)
  discount2: choice(10, 15, 20, 25)
  after_first: final_price * 100 / (100 - discount2)
  original: after_first * 100 / (100 - discount1)
  total_discount: original - final_price
  total_percent: round(total_discount * 100 / original, 1)
  answer: original
constraints:
  - discount1 > discount2
question: "A store applies two successive discounts to an item. After a {discount1}% discount followed by a {discount2}% discount, the final price is ${final_price}. What was the original price?"
answer: answer
solution:
  - "Let the original price be P"
  - "After {discount1}% discount: P × (100 - {discount1})/100"
  - "After {discount2}% discount on that: P × (100 - {discount1})/100 × (100 - {discount2})/100 = {final_price}"
  - "P × ({100 - discount1} × {100 - discount2})/10000 = {final_price}"
  - "P = {final_price} × 10000/({100 - discount1} × {100 - discount2})"
  - "P = ${answer}"