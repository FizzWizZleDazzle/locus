topic: arithmetic/percentages
difficulty: medium
calculator: none
variables:
  original: choice(40, 50, 60, 80, 100, 120, 150, 200)
  percent: choice(15, 20, 25, 30, 35, 40, 45, 50)
  increase: original * percent / 100
  new_value: original + increase
constraints:
  - percent <= 50
question: "A store increases the price of an item from ${original} by {percent}%. What is the new price?"
answer: new_value
solution:
  - "Calculate the increase: {percent}% of ${original}"
  - "Increase = {original} × {percent}/100 = ${increase}"
  - "New price = ${original} + ${increase} = ${new_value}"