topic: arithmetic/ratios_proportions
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  b: integer(1, 4)
  c: a * b
  d: integer(2, 6)
  answer: b * d
constraints:
  - b != d
question: "If {a} pencils cost ${c}, how many pencils can you buy with ${c * d}?"
answer: answer
solution:
  - "Find the cost per pencil: ${c} ÷ {a} = ${b}"
  - "With ${c * d}, you can buy: ${c * d} ÷ ${b} = {answer} pencils"