topic: arithmetic/ratios_proportions
difficulty: very_hard
calculator: none
variables:
  # Design backward: want final answer to be a clean integer
  # Pick scale factors that create integer solutions
  k: integer(2, 5)
  m: integer(3, 7)
  
  # Base values chosen to ensure clean arithmetic
  base_a: integer(2, 6)
  base_b: integer(3, 8)
  base_c: integer(2, 5)
  
  # First ratio pair: a:b = ka:kb
  a: k * base_a
  b: k * base_b
  
  # Second ratio pair: b:c = mb:mc  
  c: m * base_c
  
  # The key insight: for a:b:c to work, b must be compatible
  # So we need k*base_b = m*base_b_prime for some base_b_prime
  # This means b is already set by our construction
  
  # Third ratio pair: derive what d must be
  # If a:b = c:d, then d = b*c/a
  d_num: b * c
  d: d_num / a
  
  # The answer we're looking for
  answer: d
  
constraints:
  - gcd(a, b) == k
  - gcd(b, c) == m
  - mod(d_num, a) == 0
  
question: "If {a}:{b} = {c}:d, find the value of d."
answer: answer
solution:
  - "Set up the proportion: {a}:{b} = {c}:d"
  - "Cross multiply: {a} × d = {b} × {c}"
  - "So {a}d = {d_num}"
  - "Divide both sides by {a}: d = {d_num}/{a}"
  - "Therefore d = {answer}"