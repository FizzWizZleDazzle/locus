topic: arithmetic/ratios_proportions
difficulty: easy
calculator: none
variants:
  - name: default
    variables:
      small: integer(2, 8)
      big: integer(2, 8)
      k: integer(2, 5)
      total_small: small*k
      total_big: big*k
      cross: big*total_small
    constraints:
      - small != big
    question: A recipe uses {small} cups of flour for every {big} cups of sugar. How many cups of sugar are needed if {total_small} cups of flour are used?
    answer: total_big
    solution:
      - 'The ratio of flour to sugar stays constant: {small} to {big}.'
      - 'Scale up: {small} times {k} = {total_small} cups of flour, so multiply sugar by {k} as well.'
      - '{big} times {k} = {total_big} cups of sugar.'
