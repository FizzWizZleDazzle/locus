topic: arithmetic/ratios_proportions
difficulty: competition
calculator: none
variables:
  # Design backwards: want ratio a:b:c where students find missing value
  # Pick small primes for clean scaling
  p1: prime(2, 7)
  p2: prime(2, 7)
  p3: prime(2, 7)
  # Scale factor for the known values
  k: integer(2, 5)
  # Original ratio parts
  a: p1
  b: p2
  c: p3
  # Given: first two parts scaled by k
  given_first: k * a
  given_second: k * b
  # Answer: third part must also be scaled by k
  answer: k * c
  # For the inverse proportion part
  m: integer(12, 24)
  n: integer(3, 6)
  workers: m/n
constraints:
  - p1 != p2
  - p2 != p3
  - p1 != p3
question: "Three quantities are in the ratio {a}:{b}:{c}. If the first two quantities are {given_first} and {given_second} respectively, find the third quantity. Additionally, if {m} workers can complete this many units of work in {n} days, how many workers are needed to complete the same work in {workers} days?"
answer: answer
solution:
  - "Given ratio: {a}:{b}:{c}"
  - "First quantity: {given_first}, Second quantity: {given_second}"
  - "Find the common scaling factor: {given_first}/{a} = {k}"
  - "Verify: {given_second}/{b} = {k}"
  - "Third quantity: {c} × {k} = {answer}"
  - "For the work problem: {m} workers × {n} days = {m}×{n} = total work"
  - "If done in {workers} days: workers needed = {m}×{n}/{workers} = {n}"
  - "The third quantity is {answer}"