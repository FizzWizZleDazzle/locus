topic: arithmetic/mixed_numbers
difficulty: medium
calculator: none

variables:
  whole1: integer(2, 6)
  whole2: integer(1, 4)
  denom: choice(5, 7, 11)
  num1: integer(1, 3)
  num2: integer(1, 3)
  frac_sum_num: num1 + num2
  total_whole: whole1 + whole2
  answer: whole1 + whole2 + (num1 + num2)/denom

constraints:
  - num1 + num2 < denom

question: "Add: {whole1}{math(num1/denom)} + {whole2}{math(num2/denom)}. Express your answer as a mixed number in simplest form."
answer: answer
answer_type: numeric

solution:
  - "Add the whole number parts: {whole1} + {whole2} = {total_whole}."
  - "Add the fractional parts: {math(num1/denom)} + {math(num2/denom)} = {math(frac_sum_num/denom)}."
  - "Combine: {total_whole} + {math(frac_sum_num/denom)} = {answer}."
