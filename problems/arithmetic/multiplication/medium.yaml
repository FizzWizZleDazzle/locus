topic: arithmetic/multiplication
difficulty: medium
calculator: none
variables:
  a: integer(11, 25)
  b: integer(11, 25)
  answer: a * b
constraints:
  - mod(a, 10) != 0
  - mod(b, 10) != 0
  - a != b
question: "Calculate: {a} × {b}"
answer: answer
solution:
  - "Break down {a} × {b} using the distributive property"
  - "Think of {a} as {floor(a/10)}0 + {mod(a, 10)} and {b} as {floor(b/10)}0 + {mod(b, 10)}"
  - "First multiply the tens: {floor(a/10)}0 × {floor(b/10)}0 = {floor(a/10) * floor(b/10) * 100}"
  - "Then cross-multiply: {floor(a/10)}0 × {mod(b, 10)} = {floor(a/10) * 10 * mod(b, 10)}"
  - "And: {mod(a, 10)} × {floor(b/10)}0 = {mod(a, 10) * floor(b/10) * 10}"
  - "Finally multiply the ones: {mod(a, 10)} × {mod(b, 10)} = {mod(a, 10) * mod(b, 10)}"
  - "Add all parts: {floor(a/10) * floor(b/10) * 100} + {floor(a/10) * 10 * mod(b, 10)} + {mod(a, 10) * floor(b/10) * 10} + {mod(a, 10) * mod(b, 10)} = {answer}"