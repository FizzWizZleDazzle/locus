topic: arithmetic/fractions
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 9)
  b: integer(2, 9)
  c: integer(2, 9)
  d: integer(2, 9)
  e: integer(2, 9)
  f: integer(2, 9)
  gcd_bd: gcd(b, d)
  gcd_bf: gcd(b, f)
  gcd_df: gcd(d, f)
  lcm_bdf: b*d*f/(gcd_bd*gcd_bf*gcd_df)*gcd(gcd_bd, gcd_bf, gcd_df)
  num1: a*lcm_bdf/b
  num2: c*lcm_bdf/d
  num3: e*lcm_bdf/f
  total_num: num1 - num2 + num3
  g: gcd(total_num, lcm_bdf)
  final_num: total_num/g
  final_den: lcm_bdf/g
  answer: final_num/final_den
constraints:
  - gcd(a, b) == 1
  - gcd(c, d) == 1
  - gcd(e, f) == 1
question: "Calculate: {a}/{b} - {c}/{d} + {e}/{f}"
answer: answer
solution:
  - "Find the least common denominator of {b}, {d}, and {f}"
  - "LCM({b}, {d}, {f}) = {lcm_bdf}"
  - "Convert each fraction: {a}/{b} = {num1}/{lcm_bdf}, {c}/{d} = {num2}/{lcm_bdf}, {e}/{f} = {num3}/{lcm_bdf}"
  - "Perform the operations: {num1}/{lcm_bdf} - {num2}/{lcm_bdf} + {num3}/{lcm_bdf} = {total_num}/{lcm_bdf}"
  - "Simplify by dividing by GCD({total_num}, {lcm_bdf}) = {g}"
  - "Final answer: {answer}"