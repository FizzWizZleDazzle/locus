topic: arithmetic/fractions
difficulty: very_hard
calculator: none
variables:
  a: integer(2, 9)
  b: integer(2, 9)
  c: integer(2, 9)
  d: integer(2, 9)
  e: integer(2, 9)
  f: integer(2, 9)
  g: integer(2, 9)
  h: integer(2, 9)
  first_num: a*d - b*c
  first_den: b*d
  second_num: e*h + f*g
  second_den: f*h
  cross_num: first_num*second_den
  cross_den: first_den*second_num
  gcd_val: gcd(abs(cross_num), abs(cross_den))
  answer_num: cross_num/gcd_val
  answer_den: cross_den/gcd_val
  answer: answer_num/answer_den
constraints:
  - gcd(a, b) == 1
  - gcd(c, d) == 1
  - gcd(e, f) == 1
question: "Simplify: ({a}/{b} - {c}/{d}) ÷ ({e}/{f} + {g}/{h})"
answer: answer
solution:
  - "First, calculate {a}/{b} - {c}/{d}"
  - "Common denominator: {b} × {d} = {first_den}"
  - "{a}/{b} - {c}/{d} = ({a}×{d} - {b}×{c})/{first_den} = {first_num}/{first_den}"
  - "Next, calculate {e}/{f} + {g}/{h}"
  - "Common denominator: {f} × {h} = {second_den}"
  - "{e}/{f} + {g}/{h} = ({e}×{h} + {f}×{g})/{second_den} = {second_num}/{second_den}"
  - "Now divide: {first_num}/{first_den} ÷ {second_num}/{second_den}"
  - "Multiply by reciprocal: {first_num}/{first_den} × {second_den}/{second_num}"
  - "= {cross_num}/{cross_den}"
  - "Simplify by dividing by GCD({abs_of(cross_num)}, {cross_den}) = {gcd_val}"
  - "Final answer: {answer}"