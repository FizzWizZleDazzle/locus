topic: arithmetic/fractions
difficulty: competition
calculator: none
variables:
  a: integer(1, 9)
  b: integer(1, 9)
  c: integer(1, 9)
  d: integer(1, 9)
  e: integer(1, 9)
  f: integer(1, 9)
  g: integer(1, 9)
  h: integer(1, 9)
  first_num: a*d - b*c
  first_den: b*d
  second_num: e*h - f*g
  second_den: f*h
  product_num: first_num * second_num
  product_den: first_den * second_den
  gcd_val: gcd(abs(product_num), product_den)
  final_num: product_num / gcd_val
  final_den: product_den / gcd_val
  answer: final_num / final_den
constraints:
  - gcd(a, b) == 1
  - gcd(c, d) == 1
  - gcd(e, f) == 1
question: "Compute: ({a}/{b} - {c}/{d}) × ({e}/{f} - {g}/{h})"
answer: answer
solution:
  - "First difference: {a}/{b} - {c}/{d} = ({a}×{d} - {b}×{c})/({b}×{d}) = {first_num}/{first_den}"
  - "Second difference: {e}/{f} - {g}/{h} = ({e}×{h} - {f}×{g})/({f}×{h}) = {second_num}/{second_den}"
  - "Product: {first_num}/{first_den} × {second_num}/{second_den} = {product_num}/{product_den}"
  - "Simplify by dividing by GCD({abs_of(product_num)}, {product_den}) = {gcd_val}"
  - "Final answer: {answer}"