topic: arithmetic/fractions
difficulty: hard
calculator: none
variables:
  a: integer(2, 5)
  b: choice(3, 4, 5, 6)
  c: integer(1, 3)
  d: choice(2, 3, 4)
  e: integer(1, 3)
  f: choice(6, 8, 10, 12)
  div_num: a*d
  div_den: b*c
  g1: gcd(div_num, div_den)
  q_num: div_num/g1
  q_den: div_den/g1
  q_frac: q_num/q_den
  lcd: lcm(q_den, f)
  diff_num: q_num*(lcd/q_den) - e*(lcd/f)
  g2: gcd(abs(diff_num), lcd)
  answer: diff_num/g2 / (lcd/g2)
constraints:
  - diff_num > 0
question: "Evaluate {math(a/b)} divided by {math(c/d)}, then subtract {math(e/f)}. Express your answer as a single fraction in lowest terms."
answer: answer
answer_type: numeric
solution:
  - "Step 1: Divide {math(a/b)} by {math(c/d)} by multiplying by the reciprocal."
  - "{math(a/b)} times {math(d/c)} = {q_frac}"
  - "Step 2: Subtract {math(e/f)} from {q_frac}. The LCD of {q_den} and {f} is {lcd}."
  - "The result is {answer}."
