topic: arithmetic/fractions
difficulty: very_easy
calculator: none
variables:
  a: integer(1, 4)
  b: integer(2, 5)
  c: integer(1, 4)
  d: integer(2, 5)
  num: a*d + c*b
  den: b*d
  gcd_val: gcd(num, den)
  answer_num: num/gcd_val
  answer_den: den/gcd_val
  answer: answer_num/answer_den
constraints:
  - b != d
  - gcd(a, b) == 1
  - gcd(c, d) == 1
question: "Add the fractions: {a}/{b} + {c}/{d}"
answer: answer
solution:
  - "Find a common denominator: {b} × {d} = {den}"
  - "Convert the first fraction: {a}/{b} = {a*d}/{den}"
  - "Convert the second fraction: {c}/{d} = {c*b}/{den}"
  - "Add the numerators: {a*d} + {c*b} = {num}"
  - "The sum is {num}/{den}"
  - "Simplify by dividing by {gcd_val}: {answer}"