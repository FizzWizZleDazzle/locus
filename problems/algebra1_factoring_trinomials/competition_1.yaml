topic: algebra1/factoring_trinomials
difficulty: competition
calculator: none
variables:
  p: prime(11, 29)
  q: prime(11, 29)
  r: integer(2, 9)
  s: integer(2, 9)
  a: p * r
  b: p * s + q * r
  c: q * s
  f: a * x^2 + b * x + c
  factor1: p * x + q
  factor2: r * x + s
  expanded_check: expand(factor1 * factor2)
constraints:
  - p != q
  - r != s
  - gcd(p * r, q * s) == 1
question: "Factor completely: {f}"
answer: factor1
answer_type: factored_form
solution:
  - "We need to factor {f} into the form (ax + b)(cx + d)"
  - "Notice that ac = {a} × {c} = {product1} where product1: a * c"
  - "We need factors of {product1} that multiply to give the middle term coefficient {b}"
  - "The prime factorizations are: {a} = {p} × {r} and {c} = {q} × {s}"
  - "Testing combinations: ({p}x + {q})({r}x + {s})"
  - "Expanding: {p} × {r}x² + ({p} × {s} + {q} × {r})x + {q} × {s}"
  - "This gives {a}x² + {b}x + {c}, which matches our original expression"
  - "Therefore: {f} = {equation(factor1 * factor2, f)}"