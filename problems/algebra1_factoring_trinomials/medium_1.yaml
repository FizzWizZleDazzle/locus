topic: algebra1/factoring_trinomials
difficulty: medium
calculator: none
variables:
  p: integer(-6, 6)
  q: integer(-6, 6)
  factored: (x + p) * (x + q)
  a: p + q
  b: p * q
  expanded: x^2 + a*x + b
  answer: factored
constraints:
  - p != 0
  - q != 0
  - abs(b) <= 20
question: "Factor the trinomial {expanded}"
answer: answer
solution:
  - "We need to find two numbers that multiply to {b} and add to {a}"
  - "The numbers {p} and {q} work: {p} × {q} = {b} and {p} + {q} = {a}"
  - "So {expanded} = {factored}"