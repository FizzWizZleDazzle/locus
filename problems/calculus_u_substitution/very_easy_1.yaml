topic: calculus/u_substitution
difficulty: very_easy
calculator: none
variables:
  a: integer(2, 5)
  n: integer(2, 4)
  f: x^n
  g: a * x^(n-1)
  integrand: f * g
  u: x^n
  du: derivative(u, x)
  answer: integral(integrand, x)
question: "Find {integral_of(integrand, x)}"
answer: answer
solution:
  - "Let u = {u}, then du = {du} dx"
  - "Notice that {g} = {a}/{n} · {du}"
  - "So {integral_of(integrand, x)} = {integral_of(u * (a/n), u)}"
  - "= {a}/{n} · u^2/2 + C"
  - "= {a}/{n} · ({u})^2/2 + C"
  - "= {answer}"