topic: geometry/arc_length_sectors
difficulty: very_easy
calculator: none
variables:
  r: integer(2, 10)
  angle_deg: choice(30, 45, 60, 90, 120, 180)
  angle_rad: angle_deg * pi / 180
  arc_length_exact: r * angle_rad
  arc_length: simplify(arc_length_exact)
question: "A circle has radius {r}. Find the arc length of a sector with central angle {angle_deg}°."
answer: arc_length
solution:
  - "Arc length formula: s = rθ where θ is in radians"
  - "Convert {angle_deg}° to radians: θ = {angle_deg} × π/180 = {angle_rad}"
  - "Arc length = {r} × {angle_rad} = {arc_length}"