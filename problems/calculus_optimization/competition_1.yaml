topic: calculus/optimization
difficulty: competition
calculator: none
variables:
  k: integer(2, 5)
  a: integer(2, 6)
  b: integer(1, 4)
  c: k * a * b
  f: k * x^3 - c * x + a * b
  f_prime: derivative(f, x)
  critical_x_squared: c / (3 * k)
  critical_x: sqrt(critical_x_squared)
  neg_critical_x: -critical_x
  f_second: derivative(f_prime, x)
  max_value: evaluate(f, x, neg_critical_x)
  min_value: evaluate(f, x, critical_x)
  answer: max_value + min_value
constraints:
  - critical_x_squared == a * b
question: "Let {equation(f(x), f)}. Find the sum of the absolute maximum and absolute minimum values of f(x) on the interval {set_of([-2*critical_x, 2*critical_x])}."
answer: answer
solution:
  - "Find critical points by setting {equation(f'(x), 0)}"
  - "{equation(f'(x), f_prime)} = 0"
  - "{equation(3*k*x^2, c)}"
  - "{equation(x^2, critical_x_squared)}"
  - "So {equation(x, critical_x)} or {equation(x, neg_critical_x)}"
  - "Check second derivative: {equation(f''(x), f_second)}"
  - "At {equation(x, critical_x)}: {equation(f''(critical_x), 6*k*critical_x)} > 0, so local minimum"
  - "At {equation(x, neg_critical_x)}: {equation(f''(neg_critical_x), -6*k*critical_x)} < 0, so local maximum"
  - "Evaluate at critical points and endpoints:"
  - "{equation(f(neg_critical_x), max_value)}"
  - "{equation(f(critical_x), min_value)}"
  - "{equation(f(-2*critical_x), evaluate(f, x, -2*critical_x))}"
  - "{equation(f(2*critical_x), evaluate(f, x, 2*critical_x))}"
  - "The absolute maximum is {max_value} and absolute minimum is {min_value}"
  - "Their sum is {answer}"