topic: algebra2/logarithm_properties
difficulty: very_hard
calculator: scientific
variables:
  base: choice(2, 3, 5)
  k: integer(2, 5)
  m: integer(2, 4)
  n: integer(2, 4)
  p: integer(1, 3)
  q: integer(1, 3)
  power1: base^k
  power2: base^m
  power3: base^n
  expr1: log(power1^p * power2^q, base) / log(power3, base)
  numerator: p * k + q * m
  denominator: n
  answer: simplify(numerator / denominator)
constraints:
  - gcd(numerator, denominator) == 1
  - m != n
  - p * k != q * m
question: "Simplify the expression {equation(expr1, '?')} where log represents logarithm."
answer: answer
solution:
  - "Rewrite the expression using properties of logarithms"
  - "Numerator: log({power1}^{p} × {power2}^{q}, {base}) = log({base}^{p}×{k} × {base}^{q}×{m}, {base})"
  - "= log({base}^({p}×{k} + {q}×{m}), {base}) = {numerator}"
  - "Denominator: log({power3}, {base}) = log({base}^{n}, {base}) = {n}"
  - "Therefore: {numerator}/{denominator} = {answer}"