topic: precalculus/dot_cross_product
difficulty: very_easy
calculator: none
variables:
  a1: integer(-5, 5)
  a2: integer(-5, 5)
  b1: integer(-5, 5)
  b2: integer(-5, 5)
  answer: a1 * b1 + a2 * b2
constraints:
  - abs(a1) + abs(a2) > 0
  - abs(b1) + abs(b2) > 0
question: "Find the dot product of {vec([a1, a2])} and {vec([b1, b2])}."
answer: answer
solution:
  - "The dot product of two 2D vectors is computed as:"
  - "{vec([a1, a2])} · {vec([b1, b2])} = ({a1})({b1}) + ({a2})({b2})"
  - "= {answer}"